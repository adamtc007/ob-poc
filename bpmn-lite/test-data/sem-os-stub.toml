# dmn-lite stub Sem OS catalogue — Phase 1.2 through Phase 1.4 input
#
# All IDs are proper UUIDv7 (RFC 9562) with a fixed synthetic timestamp of
# 2026-01-01T00:00:00Z (ms = 0x019C0A5D0000) and deterministic rand fields
# for reproducibility across builds and test runs.
#
# UUIDv7 structure used here:
#   019c0a5d-0000-7000-8NNN-000000000VVV
#   ^^^^^^^^^^^^                           fixed timestamp (2026-01-01)
#                   ^^^^                   version 7
#                        ^^^^              RFC 4122 variant (8) + namespace
#                             ^^^^^^^^^^^^ sequential value
#
# Namespace allocation:
#   8000 = snapshot / domain IDs
#   8001 = Jurisdiction values
#   8002 = CbuType values
#   8003 = ProductCode values
#   8004 = BookingPrincipal values
#   8005 = SourceOfFunds values
#   8006 = EligibilityOutcome values
#   8007 = BookingReasonCode values
#   8008 = AgeBand values         (§5.2)
#   800b = ReviewOutcome values   (§5.3)
#   800c = KycStatus values       (§5.3)
#   800d = RiskLevel values
#   800e = PepStatus values
#   800f = ReviewAction values
#   8010 = TierCode values
#   8011 = FeeBand values
#
# Adding a domain or value here is a governance-grade change: every dependent
# compiled artifact's hash changes (V&S §11.5 / dmn-lite-semantics.md §3.2.4).

snapshot_id      = "019c0a5d-0000-7000-8000-000000000000"
snapshot_version = "v0.1.0-stub"
