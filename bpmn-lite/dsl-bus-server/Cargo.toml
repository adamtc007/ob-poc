[package]
name = "dsl-bus-server"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["Adam Cearns <adamtc007@gmail.com>"]
license = "MIT"
description = "Federated DSL bus — receiver-side server. Tonic services that implement v0.6 §6 invocation + result handlers, gate via inbox idempotency, hand verbs/results off to consumer-supplied dispatchers."

# Capability discipline (v0.6 §5.9 / T2B.2):
#   IN-SCOPE  : tonic server impls of InvocationService + ResultService,
#               idempotent inbox short-circuit, atomic inbox+outbox tx
#               on accept, structural request validation, dispatcher
#               trait surface.
#   OUT-OF-SCOPE: actual verb dispatch (lives in domain bus-handler
#                 crates), outbox sender (dsl-bus-client), manifest
#                 schema (dsl-manifest).

[dependencies]
dsl-bus-protocol = { path = "../dsl-bus-protocol" }
dsl-bus-storage = { path = "../dsl-bus-storage" }
tonic = { workspace = true }
prost = { workspace = true }
prost-types = "0.13"
async-trait = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tokio-stream = { version = "0.1", features = ["net"] }

[lints]
workspace = true
