// Federated DSL bus protocol — v0.6 §6.
//
// Two services connect every federated DSL domain (bpmn-lite, ob-poc,
// dmn-lite, future form-io, …) over gRPC:
//
//   InvocationService.Submit       caller → receiver, "do this verb"
//   ResultService.DeliverResult    receiver → caller, "here's the outcome"
//
// Each domain runs both services and an outbox/inbox queue (v0.6 §8) on
// its own database, so the bus itself is stateless and durability lives
// in the participating domains.
syntax = "proto3";
package dsl.bus.v1;

import "google/protobuf/timestamp.proto";

// ── Common types (§6.1) ──────────────────────────────────────────────

// UUIDv7, 16 raw bytes on the wire. Always-network-order.
message Uuid {
  bytes value = 1;
}

// Caller-provided authority context. Receivers verify
// `service_identity` against an allowlist and (optionally) the
// `signed_token` against a JWT verifier.
message AuthorityContext {
  string service_identity = 1;
  string user_identity = 2;
  repeated string roles = 3;
  bytes signed_token = 4;
}

// Typed value across the bus. `type_name` is informational (manifest
// type name); the `oneof` carries the actual payload. `null_value`
// preserves "absent" for nullable bindings.
message TypedValue {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    Uuid uuid_value = 5;
    bytes blob_value = 6;
    bool null_value = 7;
  }
  string type_name = 10;
}

// Named typed value used for verb inputs and outcome bindings.
message ResolvedBinding {
  string name = 1;
  TypedValue value = 2;
}

// Why a verb invocation ended the way it did. Aligned with v0.5 §9.1
// ExecutionOutcome taxonomy.
enum ExecutionOutcomeKind {
  OUTCOME_UNSPECIFIED = 0;
  COMMITTED = 1;
  IDEMPOTENT_REPLAY_RETURNED = 2;
  OPTIMISTIC_CONFLICT = 3;
  LOCK_TIMEOUT = 4;
  VERB_FAILED = 5;
  AUTHORITY_DENIED = 6;
  CANCELLED = 7;
  TIMED_OUT = 8;
  PANIC_RECOVERED = 9;
  REJECTED_BY_ADMISSION = 10;
  VERSION_MISMATCH = 11;
}

// Result envelope carrying the outcome kind, a free-form detail string,
// and any verb-produced bindings (typically an output entity uuid).
message ExecutionOutcome {
  ExecutionOutcomeKind kind = 1;
  string detail = 2;
  repeated ResolvedBinding bindings = 3;
}

// ── InvocationService (§6.2) ─────────────────────────────────────────

service InvocationService {
  rpc Submit(InvocationRequest) returns (SubmissionAck);
}

message InvocationRequest {
  Uuid idempotency_key = 1;
  // Verb id with the domain prefix stripped (e.g. "cbu.create").
  // The receiver assumes this is one of its own catalogued verbs;
  // the bus client strips the leading "<domain>:" before sending.
  string verb_id = 2;
  repeated ResolvedBinding inputs = 3;
  AuthorityContext authority = 4;
  // Domain id of the sender (e.g. "bpmn-lite"). Receiver records this
  // in its inbox so a result can be routed back.
  string source_domain = 5;
  string catalogue_version = 6;
  Uuid snapshot_pin = 7;
  // gRPC endpoint the receiver should DeliverResult to.
  string result_callback_endpoint = 8;
  google.protobuf.Timestamp timeout_at = 9;
}

message SubmissionAck {
  Uuid execution_id = 1;
  SubmissionStatus status = 2;
  string detail = 3;
}

enum SubmissionStatus {
  SUBMISSION_UNSPECIFIED = 0;
  ACCEPTED = 1;
  DUPLICATE = 2;
  REJECTED_VERB_UNKNOWN = 3;
  REJECTED_VERSION_INCOMPATIBLE = 4;
  REJECTED_AUTHORITY = 5;
  REJECTED_MALFORMED = 6;
}

// ── ResultService (§6.3) ─────────────────────────────────────────────

service ResultService {
  rpc DeliverResult(InvocationResult) returns (ResultAck);
}

message InvocationResult {
  Uuid execution_id = 1;
  Uuid idempotency_key = 2;
  ExecutionOutcome outcome = 3;
  string source_domain = 4;
  google.protobuf.Timestamp executed_at = 5;
  Uuid plan_id = 6;
  string audit_reference = 7;
}

message ResultAck {
  ReceiptStatus status = 1;
  string detail = 2;
}

enum ReceiptStatus {
  RECEIPT_UNSPECIFIED = 0;
  RECEIVED = 1;
  DUPLICATE_IGNORED = 2;
  REJECTED_UNKNOWN_EXECUTION = 3;
}
