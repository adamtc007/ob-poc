# Sage compliance pilot — Chrome DevTools MCP harness
#
# Simulates a compliance officer reviewing Sage-authored workflows.
# Replaces the manual pilot session described in v0.2 Tranche 8.
#
# Pre-conditions:
#   - ob-poc server running:    cd rust && cargo x deploy
#   - React dev server:         cd ob-poc-ui-react && npm run dev
#   - URL:                      http://localhost:3000 (or :5173 via Vite)
#
# What this harness validates (7 v&s audit boxes):
#   1. Sage matches the utterance to a pack with visible confidence
#   2. Parameters are proposed and shown in the confirmation panel
#   3. Human (automated) confirms — the confirmation event is recorded
#   4. DSL is emitted and visible in the authoring panel
#   5. Compile result is shown (pass/fail)
#   6. SVG diagram renders in the Observatory panel
#   7. Audit trail is accessible via the trace endpoint
#
# Run with Claude Code + Chrome MCP:
#   @chrome load this fixture and execute the sage_kyc_all_conditions scenario

[harness]
name = "sage-compliance-pilot"
base_url = "http://localhost:3000"
api_base = "http://localhost:3000/api"
screenshot_dir = "tests/fixtures/screenshots/sage-pilot"
fail_fast = false

[harness.preconditions]
required_endpoints = [
    "http://localhost:3000/",
    "http://localhost:3000/api/sem-os/context",
]

# ── Scenario 1: KYC conjunctive gate ─────────────────────────────────────────
[[scenarios]]
id = "sage_kyc_all_conditions"
description = """
Compliance officer reviews a Sage-authored KYC activation gate.
All three conditions (KYC approved, UBO resolved, sanctions clear)
must hold before activation. Validates that the workflow DSL and
diagram correctly represent the AND-logic using a conjunctive-gate pack.
"""

[[scenarios.steps]]
action = "navigate"
url = "http://localhost:3000"
wait_for = ".chat-input"
screenshot = "01_home_loaded"

[[scenarios.steps]]
action = "create_session"
endpoint = "/api/session"
body = '{}'
save_as = "session_id"
screenshot = "02_session_created"

[[scenarios.steps]]
action = "api_post"
endpoint = "/api/session/{session_id}/input"
body = '{"kind": "utterance", "text": "before the client can go live all three checks must pass: KYC approved UBO resolved and no sanctions hits"}'
expect_response_contains = ["conjunctive-gate", "confidence"]
screenshot = "03_sage_pack_matched"
# Box 1: pack matched with confidence

[[scenarios.steps]]
action = "api_post"
endpoint = "/api/session/{session_id}/input"
body = '{"kind": "utterance", "text": "conjunctive-gate is correct"}'
expect_response_contains = ["gate-name", "proposed_parameters"]
screenshot = "04_parameters_proposed"
# Box 2: parameters proposed

[[scenarios.steps]]
action = "api_post"
endpoint = "/api/session/{session_id}/input"
body = '{"kind": "utterance", "text": "correct"}'
expect_response_contains = ["provenance", "gateway"]
screenshot = "05_dsl_emitted"
# Boxes 3+4: confirmed + DSL emitted

[[scenarios.steps]]
action = "api_get"
endpoint = "/api/session/{session_id}/trace"
expect_response_contains = ["Instantiated", "conjunctive-gate"]
screenshot = "06_audit_trail"
# Box 7: audit trail

[[scenarios.steps]]
action = "visual_check"
description = "Compliance officer review checklist"
assertions = [
    "DSL source is visible and contains (gateway",
    "Provenance atom names the source pack conjunctive-gate",
    "No console errors present",
    "Page renders without blank sections",
]
screenshot = "07_final_review"

[scenarios.expected_results]
pack_matched = "conjunctive-gate"
dsl_contains = ["gateway", "flow", "provenance"]
compile_pass = true
diagram_renders = true
audit_boxes_complete = 7

