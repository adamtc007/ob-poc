<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatory — SemOS</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #94a3b8;
            font-family: system-ui, sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Observatory...</div>
    <!-- eframe looks for a canvas with this ID -->
    <canvas id="observatory_canvas"></canvas>

    <script type="module">
        import init, { start_observatory } from './pkg/observatory_wasm.js';

        async function main() {
            await init();
            document.getElementById('loading').remove();
            await start_observatory();
        }

        main().catch(e => {
            document.getElementById('loading').textContent = 'Failed to load: ' + e;
            console.error(e);
        });
    </script>
</body>
</html>
