[package]
name = "xtask"
version = "0.0.0"  # Internal tooling - not a published crate
edition = "2021"
publish = false

[dependencies]
anyhow = "1.0"
clap = { version = "4.4", features = ["derive"] }
regex = "1.10"
xshell = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json"] }
urlencoding = "2.1"
ob-poc = { path = "..", features = ["database"] }
ob-poc-boundary = { path = "../crates/ob-poc-boundary" }
# Phase 5.4 conformance harness consumes the planning loop +
# index loader directly so the corpus runs through the same
# entry points the sage-acp binary uses.
ob-poc-agent = { path = "../crates/ob-poc-agent" }
ob-poc-types = { path = "../crates/ob-poc-types" }
ob-agentic = { path = "../crates/ob-agentic", features = ["gateway"] }
sem_os_core = { path = "../crates/sem_os_core" }
sem_os_client = { path = "../crates/sem_os_client" }
sem_os_postgres = { path = "../crates/sem_os_postgres" }
dsl-core = { path = "../crates/dsl-core" }
playbook-core = { path = "../crates/playbook-core" }
playbook-lower = { path = "../crates/playbook-lower" }
csv = "1.3"
serde_yaml = "0.9"
sha2 = "0.10"
# Phase 5.4 — StubLlm in byok_conformance needs async_trait to
# implement ob-agentic's LlmClient.
async-trait = "0.1"
glob = "0.3"
bincode = "1"
ob-poc-eval-fixtures = { path = "../../eval/ob-poc-eval-fixtures" }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unreachable_pub = "deny"
