# ============================================================================
# Tier 2: Full Matrix Setup
# ============================================================================

instrument.full-matrix-setup:
  kind: macro

  ui:
    label: "Full Instrument Matrix Setup"
    description: "Complete instrument matrix — all asset families, settlement chains, SSIs, ISDA, and gateways"
    target-label: "Complete Trading Matrix"

  routing:
    mode-tags: [trading, structure]
    operator-domain: instrument

  target:
    operates-on: cbu-ref
    produces: null

  args:
    style: keyworded
    required:
      market:
        type: str
        ui-label: "Primary Market"
        description: "Primary market MIC for settlement chains"
    optional: {}

  prereqs: []

  expands-to:
    - verb: trading-profile.create-draft
      args: {}
    - verb: trading-profile.add-component
      args: { component-type: "EQUITY", market: "${arg.market}" }
    - verb: trading-profile.add-component
      args: { component-type: "FIXED_INCOME", market: "${arg.market}" }
    - verb: trading-profile.add-component
      args: { component-type: "OTC_DERIVATIVE" }
    - verb: trading-profile.add-component
      args: { component-type: "LISTED_DERIVATIVE", market: "${arg.market}" }
    - verb: trading-profile.add-component
      args: { component-type: "FX" }
    - verb: trading-profile.add-component
      args: { component-type: "MONEY_MARKET", market: "${arg.market}" }
    - verb: trading-profile.add-component
      args: { component-type: "FUND" }
    - verb: settlement-chain.create-chain
      args: { name: "${arg.market}-STANDARD", market: "${arg.market}" }
    - verb: isda.create
      args: {}
    - verb: trading-profile.validate-go-live-ready
      args: {}

  aliases:
    - "set up the full instrument matrix"
    - "configure all trading"
    - "complete instrument setup"
    - "full trading configuration"
    - "set up everything for trading"

