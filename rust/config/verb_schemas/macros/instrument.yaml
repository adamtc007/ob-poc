# Instrument Matrix Macros
#
# Taxonomy-driven assembly macros for trading profile composition.
# Each asset family macro expands to the primitive verbs for that
# instrument type: add component + settlement chain + SSI + type-specific config.
#
# The 67 instrument classes collapse to 7 asset families. Most CBUs
# use instrument.full-matrix-setup which chains all families.
#
# INVARIANTS:
# - All macros require a trading profile to exist (create-draft first)
# - Settlement chains and SSIs are per-market, not per-instrument
# - OTC derivatives require ISDA; listed derivatives require exchange gateway

# ============================================================================
# Tier 1: Asset Family Setup Macros
# ============================================================================

instrument.setup-equity:
  kind: macro

  ui:
    label: "Set Up Equity Trading"
    description: "Add equity trading component — settlement chain, DVP SSIs, and booking rules for equities, ETFs, ADRs"
    target-label: "Equity Component"

  routing:
    mode-tags: [trading, structure]
    operator-domain: instrument

  target:
    operates-on: trading-profile-ref
    produces: null

  args:
    style: keyworded
    required:
      market:
        type: str
        ui-label: "Market"
        description: "Primary market MIC code (e.g., XLON, XPAR, XNYS)"
    optional:
      settlement-type:
        type: str
        ui-label: "Settlement Type"
        default: "DVP"
      currency:
        type: str
        ui-label: "Settlement Currency"

  prereqs:
    - type: state_exists
      key: trading_profile.exists

  expands-to:
    - verb: trading-profile.add-component
      args:
        component-type: "EQUITY"
        market: "${arg.market}"
    - verb: settlement-chain.create-chain
      args:
        name: "${arg.market}-EQUITY-DVP"
        market: "${arg.market}"
        currency: "${arg.currency}"
    - verb: cbu-custody.derive-required-coverage
      args: {}

  aliases:
    - "add equity trading"
    - "set up equities"
    - "configure equity settlement"
    - "add equity component"
    - "enable equity trading"

