# Governance Domain Macros
#
# Compound workflows for SemOS registry governance.
# These macros wrap governance/attribute/service-resource verbs
# into deterministic multi-step sequences.
#
# Matched at Tier -2B (MacroIndex, score 0.96) before semantic search.

governance.bootstrap-attribute-registry:
  kind: macro

  ui:
    label: "Bootstrap Attribute Registry"
    description: "Bridge ungoverned attributes into SemOS, sync service resource definitions, and check for gaps"
    target-label: "Bootstrap Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: governance

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required: {}
    optional:
      limit:
        type: str
        ui-label: "Batch Limit"
        description: "Maximum attributes to bridge per batch"
        default: "100"

  prereqs: []

  expands-to:
    - verb: attribute.bridge-to-semos
      args:
        limit: "${arg.limit}"
    - verb: service-resource.sync-definitions
      args: {}
    - verb: service-resource.check-attribute-gaps
      args: {}

  sets-state:
    - key: governance.registry_bootstrapped
      value: true

  unlocks:
    - governance.define-service-dictionary

governance.define-service-dictionary:
  kind: macro

  ui:
    label: "Define Service Resource Dictionary"
    description: "Check SRDEF attribute gaps, define missing attributes, re-sync, and verify coverage"
    target-label: "Dictionary Coverage Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: governance

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required: {}
    optional: {}

  prereqs:
    - type: state_exists
      key: governance.registry_bootstrapped

  expands-to:
    - verb: service-resource.check-attribute-gaps
      args: {}
    - verb: service-resource.sync-definitions
      args: {}
    - verb: attributes.rollup
      args: {}
    - verb: attributes.gaps
      args: {}

  sets-state:
    - key: governance.dictionary_defined
      value: true

  unlocks:
    - governance.full-publish-pipeline

governance.full-publish-pipeline:
  kind: macro

  ui:
    label: "Full Publish Pipeline"
    description: "Validate, dry-run, plan, and publish a changeset through the full governance pipeline"
    target-label: "Publish Result"

  routing:
    mode-tags: [stewardship]
    operator-domain: governance

  target:
    operates-on: changeset-ref
    produces: null

  args:
    style: keyworded
    required:
      changeset:
        type: str
        ui-label: "Changeset ID"
        description: "The changeset to publish"
    optional: {}

  prereqs:
    - type: state_exists
      key: changeset.exists

  expands-to:
    - verb: governance.gate-precheck
      args: {}
    - verb: governance.validate
      args: {}
    - verb: governance.dry-run
      args: {}
    - verb: governance.plan-publish
      args: {}
    - verb: governance.publish
      args: {}

  sets-state:
    - key: governance.changeset_published
      value: true

  unlocks: []

governance.reconcile-registry:
  kind: macro

  ui:
    label: "Reconcile Registry"
    description: "Bridge ungoverned attributes, sync service resource definitions, and recompute stale derived values"
    target-label: "Reconciliation Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: governance

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required: {}
    optional:
      limit:
        type: str
        ui-label: "Batch Limit"
        default: "100"

  prereqs: []

  expands-to:
    - verb: attribute.bridge-to-semos
      args:
        limit: "${arg.limit}"
    - verb: service-resource.sync-definitions
      args: {}
    - verb: derivation.recompute-stale
      args:
        limit: "${arg.limit}"

  sets-state:
    - key: governance.registry_reconciled
      value: true

  unlocks: []

# ── Onboarding Product Suite Macros ────────────────────────────────────────

structure.product-suite-custody-fa-ta:
  kind: macro

  ui:
    label: "Standard Product Suite (Custody + FA + TA)"
    description: "Add the standard product suite — Custody, Fund Accounting, and Transfer Agency — to a CBU as a single runbook"
    target-label: "Product Assignment Plan"

  routing:
    mode-tags: [onboarding, structure]
    operator-domain: cbu

  target:
    operates-on: cbu-ref
    produces: null

  args:
    style: keyworded
    required: {}
    optional:
      cbu:
        type: cbu-ref
        ui-label: "CBU"
        picker: cbu_picker

  prereqs: []

  expands-to:
    - verb: cbu.add-product
      args:
        product-name: "Custody"
    - verb: cbu.add-product
      args:
        product-name: "Fund Accounting"
      depends-on: [0]
    - verb: cbu.add-product
      args:
        product-name: "Transfer Agency"

  sets-state:
    - key: structure.standard_products_assigned
      value: true

  unlocks: []

structure.product-suite-full:
  kind: macro

  ui:
    label: "Full Product Suite"
    description: "Add the full product suite — Custody, Fund Accounting, Transfer Agency, Collateral Management, and Middle Office — to a CBU"
    target-label: "Full Product Assignment Plan"

  routing:
    mode-tags: [onboarding, structure]
    operator-domain: cbu

  target:
    operates-on: cbu-ref
    produces: null

  args:
    style: keyworded
    required: {}
    optional:
      cbu:
        type: cbu-ref
        ui-label: "CBU"
        picker: cbu_picker

  prereqs: []

  expands-to:
    - verb: cbu.add-product
      args:
        product-name: "Custody"
    - verb: cbu.add-product
      args:
        product-name: "Fund Accounting"
      depends-on: [0]
    - verb: cbu.add-product
      args:
        product-name: "Transfer Agency"
    - verb: cbu.add-product
      args:
        product-name: "Collateral Management"
      depends-on: [0]
    - verb: cbu.add-product
      args:
        product-name: "Middle Office"
      depends-on: [0]

  sets-state:
    - key: structure.full_products_assigned
      value: true

  unlocks: []

structure.remove-all-products:
  kind: macro

  ui:
    label: "Remove All Products"
    description: "Remove all product subscriptions from a CBU — clean slate before re-assignment"
    target-label: "Product Removal Plan"

  routing:
    mode-tags: [onboarding, structure]
    operator-domain: cbu

  target:
    operates-on: cbu-ref
    produces: null

  args:
    style: keyworded
    required: {}
    optional: {}

  prereqs: []

  expands-to:
    - verb: cbu.remove-product
      args:
        product-name: "Custody"
    - verb: cbu.remove-product
      args:
        product-name: "Fund Accounting"
    - verb: cbu.remove-product
      args:
        product-name: "Transfer Agency"
    - verb: cbu.remove-product
      args:
        product-name: "Collateral Management"
    - verb: cbu.remove-product
      args:
        product-name: "Middle Office"

  sets-state:
    - key: structure.products_cleared
      value: true

  unlocks:
    - structure.product-suite-custody-fa-ta
    - structure.product-suite-full
