# Shared Atom Domain Macros
#
# Compound workflows for cross-workspace state consistency.
# These macros wrap shared-atom/remediation verbs into
# deterministic multi-step sequences.
#
# Matched at Tier -2B (MacroIndex, score 0.96) before semantic search.

shared-atom.register-and-activate:
  kind: macro

  aliases:
    - "register and activate shared atom"
    - "declare and activate shared atom"
    - "create shared atom"
    - "add cross-workspace attribute"
    - "enable shared atom enforcement"

  ui:
    label: "Register & Activate Shared Atom"
    description: "Declare a new cross-workspace attribute and immediately promote to Active enforcement"
    target-label: "Shared Atom Activation Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required:
      atom-path:
        type: str
        ui-label: "Atom Path"
        description: "Dot-notation attribute path (e.g. entity.lei)"
      display-name:
        type: str
        ui-label: "Display Name"
        description: "Human-readable name for the shared atom"
      owner-workspace:
        type: str
        ui-label: "Owner Workspace"
        description: "Workspace that owns this atom (e.g. kyc)"
      owner-constellation-family:
        type: str
        ui-label: "Owner Constellation Family"
        description: "Constellation family in the owner workspace"
    optional: {}

  prereqs: []

  expands-to:
    - verb: shared-atom.register
      args:
        atom-path: "${arg.atom-path}"
        display-name: "${arg.display-name}"
        owner-workspace: "${arg.owner-workspace}"
        owner-constellation-family: "${arg.owner-constellation-family}"
    - verb: shared-atom.activate
      args:
        atom-path: "${arg.atom-path}"
      depends-on: [0]

  sets-state:
    - key: shared-atom.${arg.atom-path}.active
      value: true

  unlocks: []

shared-atom.full-consistency-check:
  kind: macro

  aliases:
    - "cross-workspace consistency check"
    - "check shared atom health"
    - "scan shared atoms"
    - "list stale workspaces"
    - "cross-workspace health check"

  ui:
    label: "Full Cross-Workspace Consistency Check"
    description: "List all active shared atoms and any open remediation events across workspaces"
    target-label: "Consistency Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required: {}
    optional:
      workspace:
        type: str
        ui-label: "Workspace Filter"
        description: "Limit report to a specific workspace"

  prereqs: []

  expands-to:
    - verb: shared-atom.list
      args:
        status: "active"
    - verb: remediation.list-open
      args:
        workspace: "${arg.workspace}"

  sets-state:
    - key: consistency.last_scan
      value: now

  unlocks: []

shared-atom.deprecate-and-retire:
  kind: macro

  aliases:
    - "deprecate and retire shared atom"
    - "sunset shared atom"
    - "remove shared atom from enforcement"
    - "decommission shared atom"

  ui:
    label: "Deprecate & Retire Shared Atom"
    description: "Deprecate a shared atom (block new consumers) then retire it from active enforcement"
    target-label: "Retirement Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required:
      atom-path:
        type: str
        ui-label: "Atom Path"
        description: "Dot-notation attribute path to retire"
    optional: {}

  prereqs: []

  expands-to:
    - verb: shared-atom.deprecate
      args:
        atom-path: "${arg.atom-path}"
    - verb: shared-atom.retire
      args:
        atom-path: "${arg.atom-path}"
      depends-on: [0]

  sets-state:
    - key: shared-atom.${arg.atom-path}.retired
      value: true

  unlocks: []

# ── P1 Macros: End-to-End Cross-Workspace Workflows ──────────────────

shared-atom.detect-and-remediate:
  kind: macro

  aliases:
    - "detect and remediate stale constellation"
    - "replay stale constellation"
    - "fix cross-workspace drift"
    - "remediate shared fact change"
    - "detect stale state and fix it"

  ui:
    label: "Detect & Remediate Stale Constellation"
    description: >
      End-to-end remediation after a shared fact supersession: check for
      stale consumers, replay the affected constellation from the top,
      and list any remaining open remediations.
    target-label: "Remediation Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required:
      entity-id:
        type: uuid
        ui-label: "Entity ID"
        description: "The entity whose constellation is stale"
      constellation-family:
        type: str
        ui-label: "Constellation Family"
        description: "The consuming constellation family (e.g. onboarding_workspace)"
      atom-path:
        type: str
        ui-label: "Atom Path"
        description: "The shared atom that was superseded (e.g. entity.lei)"
    optional: {}

  prereqs: []

  expands-to:
    - verb: shared-atom.replay-constellation
      args:
        entity-id: "${arg.entity-id}"
        constellation-family: "${arg.constellation-family}"
        atom-path: "${arg.atom-path}"
    - verb: remediation.list-open
      args:
        entity-id: "${arg.entity-id}"
      depends-on: [0]

  sets-state:
    - key: remediation.${arg.entity-id}.replayed
      value: true

  unlocks: []

shared-atom.batch-replay:
  kind: macro

  aliases:
    - "batch replay constellations"
    - "replay all stale constellations"
    - "bulk remediate"
    - "replay multiple entities"

  ui:
    label: "Batch Constellation Replay"
    description: >
      Replay a constellation for multiple entities after a shared fact
      supersession. Iterates over provided entity IDs and replays each.
    target-label: "Batch Replay Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required:
      entity-ids:
        type: str
        ui-label: "Entity IDs"
        description: "Comma-separated list of entity UUIDs to replay"
      constellation-family:
        type: str
        ui-label: "Constellation Family"
        description: "The consuming constellation family"
      atom-path:
        type: str
        ui-label: "Atom Path"
        description: "The shared atom that was superseded"
    optional: {}

  prereqs: []

  expands-to:
    - foreach: entity
      in: "${arg.entity-ids}"
      do:
        - verb: shared-atom.replay-constellation
          args:
            entity-id: "${entity}"
            constellation-family: "${arg.constellation-family}"
            atom-path: "${arg.atom-path}"

  sets-state:
    - key: batch-replay.completed
      value: true

  unlocks: []

shared-atom.acknowledge-batch:
  kind: macro

  aliases:
    - "acknowledge shared update for multiple entities"
    - "batch acknowledge"
    - "acknowledge all stale"

  ui:
    label: "Batch Acknowledge Shared Update"
    description: >
      Acknowledge a shared fact supersession for multiple in-flight entities,
      advancing all consumer refs to the current version.
    target-label: "Batch Acknowledgement Report"

  routing:
    mode-tags: [stewardship]
    operator-domain: shared-atom

  target:
    operates-on: null
    produces: null

  args:
    style: keyworded
    required:
      entity-ids:
        type: str
        ui-label: "Entity IDs"
        description: "Comma-separated list of entity UUIDs"
      atom-path:
        type: str
        ui-label: "Atom Path"
        description: "The shared atom to acknowledge"
    optional: {}

  prereqs: []

  expands-to:
    - foreach: entity
      in: "${arg.entity-ids}"
      do:
        - verb: shared-atom.acknowledge-shared-update
          args:
            entity-id: "${entity}"
            atom-path: "${arg.atom-path}"

  sets-state:
    - key: batch-acknowledge.completed
      value: true

  unlocks: []
