# Macro Search Overrides
#
# Curated aliases and search phrases for macros that can't be derived
# from macro metadata alone. These are merged into MacroIndex at startup.
#
# Format:
#   <macro_fqn>:
#     aliases:
#       - "phrase one"
#       - "phrase two"

# =========================================================================
# SCREENING MACROS — bridge old verb names to macro FQNs
# =========================================================================

