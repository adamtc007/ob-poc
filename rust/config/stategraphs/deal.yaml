graph_id: deal
name: Deal Graph
version: "1"
description: Deal lifecycle graph
entity_types:
  - deal
  - client-group
nodes:
  - node_id: deal.entry
    name: Deal Entry
    node_type: entry
    lane: deal
  - node_id: deal.active
    name: Active Deal
    node_type: milestone
    lane: deal
    satisfied_when:
      - signal: has_active_deal
        description: Active deal exists
edges:
  - edge_id: deal.read
    from_node: deal.entry
    to_node: deal.active
    verb_ids: ["deal.list", "deal.read"]
    edge_type: conditional
  - edge_id: deal.progress
    from_node: deal.active
    to_node: deal.active
    verb_ids: ["deal.update-status", "deal.propose-rate-card", "deal.counter-rate-card", "deal.add-rate-card-line"]
    edge_type: advance
gates: []
