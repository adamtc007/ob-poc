  # ── US 40-Act Open-End Fund ────────────────────────────────────────────
  - id: us-40act-setup
    title: "US 40-Act Open-End Fund Setup"
    modes: [onboarding, structure]
    requires:
      all_of: [compound_action, jurisdiction]
    signals:
      actions: [onboard, "set up", establish, launch, configure]
      jurisdictions: [US]
      nouns_any: [fund, "open-end", "mutual fund", "40-act", "40 act"]
    routes:
      kind: macro
      macro_fqn: struct.us.40act.open-end
    explain:
      summary: "US Investment Company Act of 1940 open-end fund setup"

  # ── Jurisdiction Selector (generic onboarding) ─────────────────────────
  - id: generic-fund-onboarding
    title: "Fund Structure Onboarding (by jurisdiction)"
    modes: [onboarding, structure]
    requires:
      any_of: [compound_action]
    signals:
      actions: [onboard, "set up", establish, launch, configure, prepare, initiate]
      nouns_any: [fund, structure, vehicle, ucits, sicav, icav, oeic]
    routes:
      kind: macro_selector
      select_on: jurisdiction
      options:
        - value: LU
          macro_fqn: struct.lux.ucits.sicav
        - value: IE
          macro_fqn: struct.ie.ucits.icav
        - value: UK
          macro_fqn: struct.uk.authorised.oeic
        - value: US
          macro_fqn: struct.us.40act.open-end
    explain:
      summary: "Fund onboarding — select jurisdiction to determine structure type"

  # ── Full KYC Screening Sequence ────────────────────────────────────────
  - id: full-screening
    title: "Full KYC Screening"
    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, multi_noun_workflow]
    signals:
      actions: [onboard, "run the", "complete the", "do the", configure]
      nouns_any: [kyc, screening, "due diligence", aml, compliance, case]
      phrases_any: ["full screening", "complete screening", "run kyc", "kyc screening"]
    routes:
      kind: macro_sequence
      macros:
        - case.open
        - case.submit
    explain:
      summary: "Open KYC case and submit for screening"

