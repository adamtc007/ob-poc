# Scenario Index — Journey-level intent resolution (Tier -2A)
#
# Each scenario maps compound utterances (e.g., "Onboard a Luxembourg SICAV")
# to macro routes (single macro, macro sequence, or jurisdiction selector).
#
# Scoring ledger:
#   compound action: +4, jurisdiction: +4, structure noun: +3,
#   phase noun: +2, quantifier: +2, macro metadata: +3, single-verb cue: -6
#
# Hard gates: G1 (compound signal), G2 (mode compat), G3 (score >= 8)

scenarios:
  # ── Luxembourg UCITS SICAV ─────────────────────────────────────────────
  - id: lux-sicav-setup
    title: "Luxembourg UCITS SICAV Setup"
    modes: [onboarding, structure]
    requires:
      all_of: [compound_action, jurisdiction]
    signals:
      actions: [onboard, "set up", establish, launch, configure]
      jurisdictions: [LU]
      nouns_any: [sicav, ucits, fund, umbrella, compartment, sub-fund]
    routes:
      kind: macro
      macro_fqn: struct.lux.ucits.sicav
    explain:
      summary: "Full Luxembourg UCITS SICAV structure setup (13 steps)"

  # ── Luxembourg AIF RAIF ────────────────────────────────────────────────
  - id: lux-raif-setup
    title: "Luxembourg AIF RAIF Setup"
