    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, multi_noun_workflow]
    signals:
      actions: [collect, request, solicit, gather, "get the"]
      nouns_any: [document, documents, passport, proof, identity, "proof of address", kyc]
      phrases_any: ["collect documents", "request documents", "gather kyc documents", "get identity documents"]
    routes:
      kind: macro
      macro_fqn: kyc.collect-documents
    explain:
      summary: "Request KYC documents from a party and track requirements"

  # ── Full KYC Onboarding (case + screening + documents) ────────────────
  - id: full-kyc-onboarding
    title: "Full KYC Onboarding Workflow"
    modes: [kyc, onboarding]
    requires:
      all_of: [compound_action, multi_noun_workflow]
    signals:
      actions: [onboard, "run the", "complete the", "do the", "set up"]
      nouns_any: [kyc, onboarding, case, screening, documents, compliance]
      phrases_any: ["full kyc onboarding", "complete kyc process", "onboard with kyc", "run full kyc process", "kyc case and screening"]
    routes:
      kind: macro_sequence
      macros:
        - case.open
        - screening.full
        - kyc.collect-documents
    explain:
      summary: "Full KYC onboarding: open case, run screening, collect documents"

  # ── KYC Case with Screening ──────────────────────────────────────────
  - id: kyc-case-screening
