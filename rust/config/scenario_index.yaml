    signals:
      actions: ["open and collect", "create and request", "set up"]
      nouns_any: [case, documents, kyc, identity]
      phrases_any: ["open case and collect documents", "case with document collection", "new case and request documents"]
    routes:
      kind: macro_sequence
      macros:
