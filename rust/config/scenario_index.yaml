      nouns_any: [fund, "open-end", "mutual fund", "40-act", "40 act"]
    routes:
      kind: macro
      macro_fqn: struct.us.40act.open-end
    explain:
      summary: "US Investment Company Act of 1940 open-end fund setup"

  # ── Jurisdiction Selector (generic onboarding) ─────────────────────────
  - id: generic-fund-onboarding
    title: "Fund Structure Onboarding (by jurisdiction)"
    modes: [onboarding, structure]
    requires:
      any_of: [compound_action]
    signals:
      actions: [onboard, "set up", establish, launch, configure, prepare, initiate]
      nouns_any: [fund, structure, vehicle, ucits, sicav, icav, oeic]
    routes:
      kind: macro_selector
      select_on: jurisdiction
      options:
        - value: LU
          macro_fqn: struct.lux.ucits.sicav
        - value: IE
          macro_fqn: struct.ie.ucits.icav
        - value: UK
          macro_fqn: struct.uk.authorised.oeic
        - value: US
          macro_fqn: struct.us.40act.open-end
    explain:
      summary: "Fund onboarding — select jurisdiction to determine structure type"

  # ── Full KYC Screening ─────────────────────────────────────────────────
  - id: full-screening
    title: "Full KYC Screening"
    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, multi_noun_workflow]
    signals:
      actions: ["run the", "complete the", "do the", "perform", screen]
      nouns_any: [screening, "due diligence", aml, pep, sanctions, "adverse media"]
      phrases_any: ["full screening", "complete screening", "run all checks", "screen this party", "kyc screening"]
    routes:
      kind: macro
      macro_fqn: screening.full
    explain:
      summary: "Full PEP, sanctions, and adverse media screening"

  # ── Full KYC Review (screening + documents) ──────────────────────────
  - id: full-kyc-review
    title: "Full KYC Review"
    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, multi_noun_workflow]
    signals:
      actions: [onboard, "run the", "complete the", "do the", configure, review]
      nouns_any: [kyc, "due diligence", compliance, review]
      phrases_any: ["full kyc", "complete kyc", "kyc review", "run kyc", "do kyc"]
    routes:
      kind: macro
      macro_fqn: kyc.full-review
    explain:
      summary: "Full KYC review: screening, document collection, and case readiness"

  # ── Document Collection ───────────────────────────────────────────────
  - id: kyc-doc-collection
