      actions: ["open and screen", "create and screen", "set up", "run the"]
      nouns_any: [case, screening, kyc, compliance]
      phrases_any: ["open case and screen", "case with screening", "kyc case and screening", "new case with full screening"]
    routes:
      kind: macro_sequence
      macros:
        - case.open
        - screening.full
    explain:
      summary: "Open KYC case and run full screening (PEP, sanctions, adverse media)"

  # ── KYC Case with Document Collection ────────────────────────────────
  - id: kyc-case-documents
