  - id: uk-oeic-setup
    title: "UK Authorised OEIC Setup"
    modes: [onboarding, structure]
    requires:
      all_of: [compound_action, jurisdiction]
    signals:
      actions: [onboard, "set up", establish, launch, configure]
      jurisdictions: [UK]
      nouns_any: [oeic, fund, ucits]
    routes:
