# Scenario Index — Journey-level intent resolution (Tier -2A)
#
# Each scenario maps compound utterances (e.g., "Onboard a Luxembourg SICAV")
# to macro routes (single macro, macro sequence, or jurisdiction selector).
#
# Scoring ledger:
#   compound action: +4, jurisdiction: +4, structure noun: +3,
#   phase noun: +2, quantifier: +2, macro metadata: +3, single-verb cue: -6
#
# Hard gates: G1 (compound signal), G2 (mode compat), G3 (score >= 8)

scenarios:
  # ── CBU Assembly (verb: assemble-cbu) ────────────────────────────────────
  # The intent is always "assemble a CBU". Jurisdiction and vehicle type are
  # parameters that select the macro template, not different intents.
  # Vehicle type is extracted by CompoundSignals.vehicle_type; jurisdiction
  # by CompoundSignals.jurisdiction (or inferred from vehicle type).
  - id: assemble-cbu
    title: "CBU Assembly — Fund Structure Setup"
    modes: [onboarding, structure]
    requires:
      any_of: [compound_action]
    signals:
      actions: [onboard, "set up", establish, launch, configure, prepare, initiate]
      nouns_any:
        [fund, structure, vehicle, sicav, ucits, raif, aif, scsp, slp,
         icav, qiaif, riaif, oeic, aut, "unit trust", acs, ltaf,
         "long-term asset fund", llp, manager, etf, "40-act", "40 act",
         "closed-end", "open-end", "mutual fund", delaware, lp, pe,
         "private equity", umbrella, compartment, sub-fund]
    routes:
      kind: macro_selector
      select_on: jurisdiction
      options:
        - value: LU
          sub_select:
            select_on: vehicle_type
            default_fqn: struct.lux.ucits.sicav
            options:
              - value: sicav
                macro_fqn: struct.lux.ucits.sicav
              - value: raif
                macro_fqn: struct.lux.aif.raif
              - value: scsp
                macro_fqn: struct.lux.pe.scsp
              - value: pe
                macro_fqn: struct.lux.pe.scsp
              - value: aif
                macro_fqn: struct.lux.aif.raif
        - value: IE
          sub_select:
            select_on: vehicle_type
            default_fqn: struct.ie.ucits.icav
            options:
              - value: icav
                macro_fqn: struct.ie.ucits.icav
              - value: aif-icav
                macro_fqn: struct.ie.aif.icav
              - value: hedge
                macro_fqn: struct.ie.hedge.icav
              - value: aif
                macro_fqn: struct.ie.aif.icav
        - value: UK
          sub_select:
            select_on: vehicle_type
            default_fqn: struct.uk.authorised.oeic
            options:
              - value: oeic
                macro_fqn: struct.uk.authorised.oeic
              - value: aut
                macro_fqn: struct.uk.authorised.aut
              - value: acs
                macro_fqn: struct.uk.authorised.acs
              - value: ltaf
                macro_fqn: struct.uk.authorised.ltaf
              - value: manager-llp
                macro_fqn: struct.uk.manager.llp
              - value: pe
                macro_fqn: struct.uk.private-equity.lp
              - value: lp
                macro_fqn: struct.uk.private-equity.lp
        - value: US
          sub_select:
            select_on: vehicle_type
            default_fqn: struct.us.40act.open-end
            options:
              - value: 40act-open-end
                macro_fqn: struct.us.40act.open-end
              - value: 40act-closed-end
                macro_fqn: struct.us.40act.closed-end
              - value: etf
                macro_fqn: struct.us.etf.40act
              - value: delaware-lp
                macro_fqn: struct.us.private-fund.delaware-lp
              - value: pe
                macro_fqn: struct.us.private-fund.delaware-lp
              - value: lp
                macro_fqn: struct.us.private-fund.delaware-lp
    explain:
      summary: "CBU assembly — jurisdiction + vehicle type select the macro template"

  # ── Ownership / Control Query (verb: analyse-ubo) ──────────────────────
  # The intent is "discover who owns/controls this entity." The relationship
  # type (ownership vs control) and query direction (upward/downward/full)
  # are parameters that select the verb, not different intents.
  - id: analyse-ubo
    title: "Ownership & Control Analysis"
    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, phrase_match]
    signals:
      actions: [show, list, find, display, get, who, trace, identify, analyse, analyze]
      nouns_any:
        [owner, owners, ownership, ubo, ubos, "beneficial owner",
         "beneficial owners", controller, controllers, control,
         shareholder, shareholders, "who owns", "who controls",
         structure, graph, "ownership structure", chain, chains,
         subsidiaries, parent, holdings, "control positions"]
      phrases_any:
        - "who owns this"
        - "who are the beneficial owners"
        - "who controls this"
        - "show me the ownership structure"
        - "who are the ubos"
        - "show ultimate owners"
        - "list shareholders"
        - "trace ownership chains"
        - "trace the chain"
        - "show control graph"
        - "what does this entity own"
        - "show subsidiaries"
        - "analyze ownership gaps"
        - "show control positions"
        - "identify ubos"
        - "pierce the veil"
    routes:
      kind: verb_selector
      select_on: relationship_type
      default_verb_fqn: ubo.list-ubos
      options:
        - value: ownership
          sub_select:
            select_on: query_direction
            default_verb_fqn: ubo.list-ubos
            options:
              - value: upward
                verb_fqn: ubo.list-owners
              - value: downward
                verb_fqn: ubo.list-owned
              - value: full
                verb_fqn: ubo.list-ubos
        - value: control
          sub_select:
            select_on: query_direction
            default_verb_fqn: control.identify-ubos
            options:
              - value: upward
                verb_fqn: control.list-controllers
              - value: downward
                verb_fqn: control.list-controlled
              - value: full
                verb_fqn: control.identify-ubos
        - value: all
          sub_select:
            select_on: query_direction
            default_verb_fqn: control.identify-ubos
            options:
              - value: upward
                verb_fqn: control.identify-ubos
              - value: downward
                verb_fqn: control.list-controlled
              - value: full
                verb_fqn: control.build-graph
    explain:
      summary: "Ownership/control analysis — relationship type + direction select the verb"

  # ── Ownership Chain Trace ─────────────────────────────────────────────
  - id: trace-ownership
    title: "Trace Ownership/Control Chain"
    modes: [kyc, onboarding]
    requires:
      any_of: [compound_action, phrase_match]
    signals:
      actions: [trace, follow, unwind, "pierce the veil", "look through"]
      nouns_any:
        [chain, chains, path, "ownership chain", "control chain",
         veil, nominee, "shell companies", tree]
      phrases_any:
        - "trace ownership chains"
        - "trace the chain"
        - "follow the ownership chain"
        - "pierce the veil"
        - "unwind the structure"
        - "trace to natural persons"
        - "trace control chain"
    routes:
      kind: verb_selector
      select_on: relationship_type
      default_verb_fqn: ubo.trace-chains
      options:
        - value: ownership
          verb_fqn: ubo.trace-chains
        - value: control
          verb_fqn: ownership.trace-chain
        - value: all
          verb_fqn: ubo.trace-chains
    explain:
      summary: "Trace ownership/control chain — relationship type selects the verb"

