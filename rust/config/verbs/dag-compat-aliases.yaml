# Internal DAG compatibility aliases.
#
# These entries make legacy `via:` references in DAG taxonomies explicit so
# hygiene validation does not carry anonymous verb names. They are internal
# compatibility declarations; canonical replacements should be used by new DAG
# authoring.
#
# Behavior is `plugin` with handler `NoopAliasStub` — these aliases are never
# actually invoked (they are `tier: diagnostics`, `internal: true`, `side_effects:
# facts_only`), so the handler doesn't need to exist. CRUD was the wrong shape
# (no table) and triggered CRUD_MISSING_TABLE diagnostics across all 48 aliases.

domains:
  ubo-registry:
    description: "Deprecated aliases for ubo.registry DAG references"
    verbs:
      promote: &deprecated_alias
        flavour: attribute_mutating
        description: "Deprecated DAG alias; use the canonical domain-specific verb."
        behavior: plugin
        handler: NoopAliasStub
        metadata: &alias_meta
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: dag_alias
          side_effects: facts_only
          internal: true
          status: active
        three_axis: &alias_axis
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      promote-to-ubo: *deprecated_alias
      advance: *deprecated_alias
      reject: *deprecated_alias
      expire: *deprecated_alias

  doc-request:
    description: "Deprecated aliases for document request DAG references"
    verbs:
      create: *deprecated_alias
      send: *deprecated_alias
      verify: *deprecated_alias

  request:
    description: "Deprecated aliases for outstanding request DAG references"
    verbs:
      send: *deprecated_alias
      record-response: *deprecated_alias
      close: *deprecated_alias

  kyc-agreement:
    description: "Deprecated aliases for KYC agreement DAG references"
    verbs:
      update: *deprecated_alias
      delete: *deprecated_alias

  service-resource:
    description: "Deprecated aliases for service resource DAG references"
    verbs:
      mark-complete: *deprecated_alias

  changeset:
    description: "Deprecated aliases for changeset DAG references"
    verbs:
      submit: *deprecated_alias
      enter-review: *deprecated_alias
      approve: *deprecated_alias
      reject: *deprecated_alias
      publish: *deprecated_alias

  phrase:
    description: "Deprecated aliases for phrase proposal DAG references"
    verbs:
      check-collision: *deprecated_alias
      check-quality: *deprecated_alias
      submit-for-review: *deprecated_alias
      approve-proposal: *deprecated_alias
      reject-proposal: *deprecated_alias
      request-refinement: *deprecated_alias
      reactivate: *deprecated_alias

  screening-ops:
    description: "Deprecated aliases for screening orchestration DAG references"
    verbs:
      start: *deprecated_alias
      full: *deprecated_alias
      retry: *deprecated_alias
      refresh: *deprecated_alias

  screening:
    description: "Deprecated aliases for screening hit DAG references"
    verbs:
      record-hit: *deprecated_alias
      confirm: *deprecated_alias
      dismiss: *deprecated_alias

  cbu:
    description: "Deprecated aliases for CBU evidence DAG references"
    verbs:
      review-evidence: *deprecated_alias
      approve-evidence: *deprecated_alias
      reject-evidence: *deprecated_alias

  evidence:
    description: "Deprecated aliases for evidence DAG references"
    verbs:
      require: *deprecated_alias

  catalogue:
    description: "Deprecated aliases for catalogue proposal DAG references"
    verbs:
      stage-proposal: *deprecated_alias
      reject-proposal: *deprecated_alias
      reopen-proposal: *deprecated_alias

  attribute:
    description: "Deprecated aliases for attribute lifecycle DAG references"
    verbs:
      propose-revision: *deprecated_alias
      retire: *deprecated_alias

  entity-workstream:
    description: "Deprecated aliases for entity workstream DAG references"
    verbs:
      add: *deprecated_alias
      close: *deprecated_alias

  mandate:
    description: "Deprecated aliases for book setup mandate DAG references"
    verbs:
      create: *deprecated_alias

  derivation:
    description: "Deprecated aliases for derivation DAG references"
    verbs:
      activate: *deprecated_alias
