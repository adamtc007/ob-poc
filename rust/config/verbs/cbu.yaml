              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: child-cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: relationship-type
            type: string
            required: true
            description: "FEEDER, PARALLEL, AGGREGATOR, MASTER, or CO_INVEST_VEHICLE"
          - name: relationship-selector
            type: string
            required: false
            description: "Slot-facing selector such as feeder:us or feeder:ie"
          - name: capital-flow
            type: string
            required: false
          - name: effective-from
            type: date
            required: false
          - name: effective-to
            type: date
            required: false
        returns:
          type: uuid
          name: child_cbu_id
