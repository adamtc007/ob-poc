            baseline: reviewable
      list-structure-links:
        description: List persisted structure links for a parent or child CBU
        invocation_phrases:
          - "list CBU structure links"
          - "show feeder links"
          - "show linked structures"
          - "list cross-border structure"
        behavior: plugin
        handler: CbuListStructureLinksOp
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [read, query, relationship, structure]
          phase_tags: [onboarding]
          side_effects: facts_only
        args:
          - name: cbu-id
            type: uuid
            required: false
            description: Generic CBU target used with :direction (defaults to parent)
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: parent-cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: child-cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: status
            type: string
            required: false
          - name: direction
            type: string
            required: false
            default: parent
            description: "Interpret :cbu-id as parent or child"
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      unlink-structure:
        description: Terminate an active parent-child structure link between two CBUs
        invocation_phrases:
          - "unlink CBU structure"
          - "terminate feeder link"
          - "remove linked structure"
          - "detach child CBU"
        behavior: plugin
        handler: CbuUnlinkStructureOp
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [relationship, write, structure, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        args:
          - name: link-id
