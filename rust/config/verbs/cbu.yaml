          consequence:
            baseline: reviewable

      set-commercial-client:
        description: Set commercial client entity for a CBU
        invocation_phrases:
          - "set commercial client"
          - "change commercial client"
          - "set parent client for CBU"
          - "link commercial client"
          - "change commercial client for"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: commercial-client-entity-id
            type: uuid
            required: true
            maps_to: commercial_client_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      delete:
        description: Delete a CBU (fails if has dependencies - use delete-cascade for full cleanup)
        invocation_phrases:
          - "delete CBU"
          - "remove CBU"
          - "drop structure"
          - "delete business unit"
          - "remove structure"
          - "delete client unit"
          - "close CBU"
          - "terminate CBU"
          - "deregister CBU"
          - "destroy CBU"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, destructive, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: delete
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      delete-cascade:
        description: Delete a CBU and all related data (entities, roles, documents, etc.)
        invocation_phrases:
          - "delete CBU and all dependencies"
          - "purge CBU completely"
          - "cascade delete CBU"
          - "full cleanup CBU"
          - "delete CBU with all entities"
          - "remove CBU and related data"
          - "deep delete CBU"
          - "wipe CBU entirely"
          - "remove structure and all linked data"
          - "cascade remove business unit"
          - "nuke everything under this CBU"
          - "nuke this CBU including all roles"
          - "destroy this CBU and everything in it"
          - "remove everything under this structure"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, destructive, cascade, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: CbuDeleteCascadeOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            description: CBU to delete with all dependencies
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: delete-entities
            type: boolean
            required: false
            default: true
            description: Also delete entities linked only to this CBU
        returns:
          type: record
          description: Summary of deleted records by table
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_explicit_authorisation
      list:
        description: List CBUs with optional filters
        invocation_phrases:
          - "list CBUs"
          - "show all CBUs"
          - "show me cbu"
          - "show me cbus"
          - "show me client business unit"
          - "show me client business units"
          - "view CBU list"
          - "display CBUs"
          - "list all business units"
          - "show CBUs for client"
          - "get CBU list"
          - "list all cbus"
          - "show cbu list"
          - "display all cbus"
          - "list every cbu"
          - "show me all cbus"
          - "get all cbus"
          - "what cbus exist"
          - "show cbus in database"
          - "what cbus do we have"
          - "show me the onboarding units"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [read, query, list, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: cbus
          schema: ob-poc
        args:
          - name: status
            type: string
            required: false
            maps_to: status
          - name: client-type
            type: string
            required: false
            maps_to: client_type
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      ensure:
        description: Create or update a CBU by natural key
        invocation_phrases:
          - "ensure CBU exists"
          - "create or update CBU"
          - "upsert CBU"
          - "guarantee CBU"
          - "ensure structure exists"
          - "idempotent CBU create"
          - "setup CBU if missing"
          - "create CBU if not exists"
          - "ensure business unit"
          - "sync CBU"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, idempotent, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        produces:
          type: cbu
          resolved: false
        crud:
          operation: upsert
          table: cbus
          schema: ob-poc
          conflict_keys:
            - name
            - jurisdiction
          returning: cbu_id
        args:
          - name: name
            type: string
            required: true
            maps_to: name
            fuzzy_check:
              entity_type: cbu
              threshold: 0.5
          - name: jurisdiction
            type: string
            required: true
            maps_to: jurisdiction
            description: Jurisdiction code (e.g., US, GB, LU, IE, KY)
            lookup:
              table: master_jurisdictions
              entity_type: jurisdiction
              schema: ob-poc
              search_key: jurisdiction_code
              primary_key: jurisdiction_code
          - name: client-type
            type: string
            required: false
            maps_to: client_type
          - name: nature-purpose
            type: string
            required: false
            maps_to: nature_purpose
          - name: commercial-client-entity-id
            type: uuid
            required: false
            maps_to: commercial_client_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: uuid
          name: cbu_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      submit-for-validation:
        description: Move a CBU into validation review
        invocation_phrases:
          - "submit CBU for validation"
          - "submit fund for validation"
          - "start validation"
          - "send CBU to review"
          - "begin validation review"
          - "move to validation pending"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        lifecycle:
          entity_arg: cbu-id
          requires_states:
            - DISCOVERED
            - VALIDATION_FAILED
          precondition_checks:
            - "requires_scope:cbu"
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
          set_values:
            status: VALIDATION_PENDING
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: cbu-id
          target_workspace: cbu
          target_slot: cbu
      assign-role:
        description: Assign a role to an entity within a CBU
        invocation_phrases:
          - "assign role to entity"
          - "give role in CBU"
          - "add entity role"
          - "link entity with role"
          - "make entity depositary"
          - "appoint depositary"
          - "assign participant role"
          - "add party to structure"
          - "designate entity role"
          - "set entity role in CBU"
          - "assign party to cbu"
          - "add party to cbu"
          - "assign role on this cbu"
          - "appoint a party on this cbu"
          - "make this entity the depositary"
          - "assign a service role on this onboarding unit"
          - "make them the transfer agent"
          - "make State Street the transfer agent"
          - "appoint transfer agent"
          - "assign transfer agent role"
          - "make them the custodian"
          - "make them the auditor"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [relationship, write, role, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        consumes:
          - arg: cbu-id
            type: cbu
            required: true
          - arg: entity-id
            type: entity
            required: true
        crud:
          operation: role_link
          junction: cbu_entity_roles
          schema: ob-poc
          from_col: cbu_id
          to_col: entity_id
          role_table: roles
          role_col: role_id
          returning: cbu_entity_role_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: role
            type: lookup
            required: true
            lookup:
              schema: ob-poc
              table: roles
              entity_type: role
              code_column: name
              id_column: role_id
        sentences:
          step:
            - "Assign {role} role to {entity-id} on {cbu-id}"
          summary:
            - "assigned {role} role"
          clarify:
            role: "Which role? (e.g., depositary, management company)"
            entity-id: "Which party should receive this role?"
        returns:
          type: uuid
          name: cbu_entity_role_id
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      link-structure:
