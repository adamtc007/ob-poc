          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: redemption-notice-days
            type: integer
            required: false
            maps_to: redemption_notice_days
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      set-jurisdiction:
        description: Set CBU jurisdiction
        invocation_phrases:
          - "set CBU jurisdiction"
          - "change CBU jurisdiction"
          - "update CBU jurisdiction"
          - "change fund jurisdiction"
          - "set fund jurisdiction"
          - "change jurisdiction for"
          - "move fund jurisdiction to"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
