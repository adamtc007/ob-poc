          - "set prime broker for fund"
          - "register auditor for entity"
          - "who is the TA for this fund"
          - "appoint paying agent"
          - "I need to add a service provider"
          - "assign valuation agent role"
          - "add authorized signatory"
          - "register authorized trader"
          - "grant power of attorney"
          - "add settlement contact"
          - "who can sign for this entity"
          - "assign account operator"
          - "I need to add a signatory"
          - "authorize representative for trading"
        sentences:
          step:
            - "Assign {role} role in this structure"
            - "Add role relationship for {entity-id}"
          summary:
            - "assigned {role} role"
          clarify:
            cbu-id: "Which structure should receive the role assignment?"
            role: "Which role should be assigned?"
            entity-id: "Which entity should receive the role?"
          completed: "{role} role assigned"
        behavior: plugin
        handler: AssignRole   # dispatches on role-type (I1 fold of the 6 cbu.assign-* specialists)
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [relationship, write, role, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        consumes:
          - arg: cbu-id
            type: cbu
            required: true
        args:
