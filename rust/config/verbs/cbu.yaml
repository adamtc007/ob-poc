          tags: [read, query, list, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: cbus
          schema: ob-poc
        args:
          - name: status
            type: string
            required: false
            maps_to: status
          - name: client-type
            type: string
            required: false
            maps_to: client_type
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      ensure:
        flavour: instance_adding
        description: Create or update a CBU by natural key
        effect_class: idempotent_ensure
        invocation_phrases:
          - "ensure CBU exists"
          - "create or update CBU"
          - "upsert CBU"
          - "guarantee CBU"
          - "ensure structure exists"
          - "idempotent CBU create"
          - "setup CBU if missing"
          - "create CBU if not exists"
          - "ensure business unit"
          - "sync CBU"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, idempotent, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        produces:
          type: cbu
          resolved: false
        crud:
          operation: upsert
          table: cbus
          schema: ob-poc
          conflict_keys:
            - name
            - jurisdiction
          returning: cbu_id
        args:
          - name: name
            type: string
            required: true
            maps_to: name
            fuzzy_check:
              entity_type: cbu
              threshold: 0.5
          - name: jurisdiction
            type: string
            required: true
            maps_to: jurisdiction
            description: Jurisdiction code (e.g., US, GB, LU, IE, KY)
            lookup:
              table: master_jurisdictions
              entity_type: jurisdiction
              schema: ob-poc
              search_key: jurisdiction_code
              primary_key: jurisdiction_code
          - name: client-type
            type: string
            required: false
            maps_to: client_type
          - name: nature-purpose
            type: string
            required: false
            maps_to: nature_purpose
          - name: commercial-client-entity-id
            type: uuid
            required: false
            maps_to: commercial_client_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: uuid
          name: cbu_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      submit-for-validation:
        flavour: attribute_mutating
        description: Move a CBU into validation review
        effect_class: read_modify_write
        invocation_phrases:
          - "submit this CBU for validation"
          - "submit CBU for validation"
          - "submit fund for validation"
          - "start validation"
          - "send CBU to review"
          - "begin validation review"
          - "move to validation pending"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        lifecycle:
          entity_arg: cbu-id
          requires_states:
            - DISCOVERED
            - VALIDATION_FAILED
          precondition_checks:
            - "requires_scope:cbu"
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
          set_values:
            status: VALIDATION_PENDING
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: cbu-id
          target_workspace: cbu
          target_slot: cbu
      assign-role:
