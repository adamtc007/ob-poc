        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      set-commercial-client:
        flavour: attribute_mutating
        description: Set commercial client entity for a CBU
        effect_class: read_modify_write
        invocation_phrases:
          - "set commercial client"
          - "change commercial client"
          - "set parent client for CBU"
          - "link commercial client"
          - "change commercial client for"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: commercial-client-entity-id
            type: uuid
            required: true
