            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      delete:
        flavour: discretionary
        effect_class: admin_override
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: cbu_delete
        description: Delete a CBU (fails if has dependencies - use delete-cascade for full cleanup)
        invocation_phrases:
          - "delete CBU"
          - "remove CBU"
          - "drop structure"
          - "delete business unit"
          - "remove structure"
          - "delete client unit"
          - "close CBU"
          - "terminate CBU"
          - "deregister CBU"
          - "destroy CBU"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, destructive, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: delete
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      delete-cascade:
        flavour: discretionary
        effect_class: admin_override
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: cbu_delete_cascade
        description: Delete a CBU and all related data (entities, roles, documents, etc.)
        invocation_phrases:
          - "delete CBU and all dependencies"
          - "purge CBU completely"
          - "cascade delete CBU"
          - "full cleanup CBU"
          - "delete CBU with all entities"
          - "remove CBU and related data"
          - "deep delete CBU"
          - "wipe CBU entirely"
          - "remove structure and all linked data"
          - "cascade remove business unit"
          - "nuke everything under this CBU"
          - "nuke this CBU including all roles"
          - "destroy this CBU and everything in it"
          - "remove everything under this structure"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, destructive, cascade, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: CbuDeleteCascadeOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            description: CBU to delete with all dependencies
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: delete-entities
            type: boolean
            required: false
            default: true
            description: Also delete entities linked only to this CBU
          - name: hard-delete
            type: boolean
            required: false
            default: true
            description: Use hard cleanup for child tables. Set false for semantic termination.
        returns:
          type: record
          description: Summary of deleted records by table
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_explicit_authorisation
      list:
