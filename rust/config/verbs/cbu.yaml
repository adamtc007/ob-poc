            maps_to: cbu_id
            lookup: { table: cbus, entity_type: cbu, schema: ob-poc, search_key: name, primary_key: cbu_id }
          - name: role-type
            type: string
            required: false
            default: "ROLE"
            description: "Relationship write-path: ROLE | OWNERSHIP | CONTROL | TRUST | FUND | SERVICE_PROVIDER | SIGNATORY"
            valid_values: [ROLE, OWNERSHIP, CONTROL, TRUST, FUND, SERVICE_PROVIDER, SIGNATORY]
          - name: role
            type: lookup
            required: false
            lookup: { schema: ob-poc, table: roles, entity_type: role, code_column: name, id_column: role_id }
          - name: owner-entity-id
            type: uuid
            required: false
            lookup: { table: entities, entity_type: entity, schema: ob-poc, search_key: name, primary_key: entity_id }
          - name: owned-entity-id
