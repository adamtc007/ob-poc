domains:
  cbu:
    description: Client Business Unit operations
    invocation_hints:
      - CBU
      - client
      - fund
      - account
      - portfolio
    verbs:
      create:
        flavour: instance_adding
        description: Create a new Client Business Unit (idempotent by fund-entity-id if provided)
        effect_class: read_modify_write
        invocation_phrases:
          - "create a new CBU for"
          - "create a new CBU for Allianz"
          - "create a new CBU for Allianz Growth Fund"
          - "spin up a new fund for Allianz"
          - "create CBU"
          - "new CBU"
          - "add commercial business unit"
          - "create new CBU"
          - "set up CBU"
          - "establish CBU"
          - "add CBU"
          - "create business unit"
          - "create client"
          - "create fund"
          - "create onboarding unit"
          - "open a new onboarding cbu"
          - "set up a new onboarding unit"
          - "set up a Luxembourg fund book"
          - "configure fund structure"
          - "create fund book"
          - "spin up a new fund"
          - "spin up a new fund called Alpha"
          - "register a new client"
          - "set up a new custody client"
          - "onboard a new entity"
          - "create a new onboarding unit for this fund"
          - "new client setup"
        behavior: plugin
        handler: CbuCreateOp
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [lifecycle, write, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        produces:
          type: cbu
          resolved: false
        args:
          - name: name
            type: string
            required: true
            description: CBU name (typically the fund name)
          - name: jurisdiction
            type: string
            required: false
            description: Jurisdiction code (e.g., US, GB, LU, IE, KY)
            lookup:
              table: master_jurisdictions
              entity_type: jurisdiction
              schema: ob-poc
              search_key: jurisdiction_code
              primary_key: jurisdiction_code
              resolution_mode: reference
          - name: fund-entity-id
            type: uuid
            required: false
            description: Fund/SPV entity to link as ASSET_OWNER (idempotency key - skips if already on a CBU)
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
              resolution_mode: entity
          - name: client-type
            type: string
            required: false
            default: "FUND"
            description: Client type (FUND, CORPORATE, etc.)
          - name: nature-purpose
            type: string
            required: false
          - name: description
            type: string
            required: false
          - name: commercial-client-entity-id
            type: uuid
            required: false
            description: Commercial client entity (apex/parent)
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
              resolution_mode: entity
          - name: manco-entity-id
            type: uuid
            required: false
            description: Management company entity to assign MANAGEMENT_COMPANY role
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
              resolution_mode: entity
        sentences:
          step:
            - "Create {name} structure in {jurisdiction}"
            - "Set up new structure {name}"
          summary:
            - "created {name}"
          clarify:
            name: "What should the structure be called?"
            jurisdiction: "Which jurisdiction? (e.g., LU, IE, UK)"
          completed: "{name} structure created in {jurisdiction}"
        returns:
          type: record
          fields:
            - cbu_id
            - created
            - skipped_reason
        outputs:
          - name: created_cbu_id
            type: uuid
            entity_kind: cbu
            description: ID of the newly created CBU
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      read:
        flavour: attribute_mutating
        description: Read a CBU by ID
        effect_class: read_snapshot
        invocation_phrases:
          - "read CBU"
          - "get CBU"
          - "fetch CBU details"
          - "show CBU by ID"
          - "view CBU info"
          - "describe CBU"
          - "lookup CBU"
          - "find CBU by ID"
          - "display CBU record"
          - "retrieve CBU"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [read, query, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: cbus
          schema: ob-poc
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
              resolution_mode: entity # growing table - search modal
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      rename:
        flavour: attribute_mutating
        description: Rename a CBU
        effect_class: read_modify_write
        invocation_phrases:
          - "rename CBU"
          - "rename fund"
          - "rename structure"
          - "change fund name"
          - "change CBU name"
          - "update fund name"
          - "rename the CBU"
          - "rename structure to"
          - "correct fund name"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: name
            type: string
            required: true
            maps_to: name
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update:
        flavour: attribute_mutating
        description: Update ad hoc CBU attributes
        effect_class: read_modify_write
        invocation_phrases:
          - "update CBU"
          - "set CBU attributes"
          - "update structure attributes"
          - "set redemption notice days"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cbu
          tags: [write, onboarding, property]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: cbus
          schema: ob-poc
          key: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
