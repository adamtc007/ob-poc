domains:
  board:
    description: |
      Board composition and appointment rights management.
      Tracks who sits on boards and who has power to appoint/remove.
      Key for control-based UBO analysis.

    verbs:
      appoint:
        flavour: attribute_mutating
        description: Appoint a person to a board position
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "appoint director to board"
        - "add board member"
        - "who is the new director"
        - "assign person to board seat"
        - "register board appointment"
        - "nominate director for company"
        - "record new board member"
        - "install director on entity board"
        behavior: crud
        crud:
          operation: upsert
          table: board_compositions
          schema: kyc
          returning: id
          conflict_keys:
          - entity_id
          - person_entity_id
          - role_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          description: The entity whose board this is
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: person-entity-id
          type: uuid
          required: true
          maps_to: person_entity_id
          description: The person being appointed
          lookup:
            table: entities
            entity_type: proper_person
            schema: ob-poc
            search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
            primary_key: entity_id
        - name: role-id
          type: uuid
          required: true
          maps_to: role_id
          lookup:
            table: roles
            entity_type: role
            schema: ob-poc
            search_key: name
            primary_key: role_id
        - name: appointed-by-entity-id
          type: uuid
          required: false
          maps_to: appointed_by_entity_id
          description: Entity exercising appointment right
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: appointment-date
          type: date
          required: false
          maps_to: appointment_date
        - name: appointment-source
          type: string
          required: false
          maps_to: appointment_source
          valid_values:
          - ARTICLES
          - SHA
          - BOARD_RESOLUTION
          - SHAREHOLDER_RESOLUTION
          - REGULATOR_APPROVAL
          - COURT_ORDER
          - OTHER
        - name: appointment-document-id
          type: uuid
          required: false
          maps_to: appointment_document_id
          lookup:
            table: document_catalog
            entity_type: document
            schema: ob-poc
            search_key: document_name
            primary_key: doc_id
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: true
        returns:
          type: uuid
          name: board_appointment_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      resign:
        flavour: attribute_mutating
        description: Record resignation/removal from board
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "remove director from board"
        - "record board resignation"
        - "director stepped down"
        - "terminate board appointment"
        - "who resigned from board"
        - "log board member removal"
        - "end director term"
        - "deactivate board seat holder"
        behavior: crud
        crud:
          operation: update
          table: board_compositions
          schema: kyc
          key: id
        args:
        - name: appointment-id
          type: uuid
          required: true
          maps_to: id
        - name: resignation-date
          type: date
          required: true
          maps_to: resignation_date
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      list-by-entity:
        flavour: attribute_mutating
        description: List current board composition for an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "show board composition"
        - "who sits on the board"
        - "list directors for company"
        - "get board members"
        - "display current board seats"
        - "show entity board makeup"
        - "which directors serve here"
        - "view board of directors"
        behavior: crud
        crud:
          operation: list_by_fk
          table: board_compositions
          schema: kyc
          fk_col: entity_id
        args:
        - name: entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-person:
        flavour: attribute_mutating
        description: List all board positions held by a person
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "where does this person sit"
        - "list board positions for person"
        - "show directorships held"
        - "which boards does person serve"
        - "get all board seats"
        - "find director appointments"
        - "person board membership history"
        - "how many boards do they serve"
        behavior: crud
        crud:
          operation: list_by_fk
          table: board_compositions
          schema: kyc
          fk_col: person_entity_id
        args:
        - name: person-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: proper_person
            schema: ob-poc
            search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
            primary_key: entity_id
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      grant-appointment-right:
        flavour: attribute_mutating
        description: Record an appointment right from SHA/articles
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "grant board appointment right"
        - "record appointment power from SHA"
        - "who can appoint directors"
        - "add director nomination right"
        - "register appointment right from articles"
        - "assign board appointment power"
        - "record veto over appointments"
        - "capture shareholder appointment right"
        behavior: crud
        crud:
          operation: upsert
          table: appointment_rights
          schema: kyc
          returning: id
          conflict_keys:
          - target_entity_id
          - holder_entity_id
          - right_type
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: target-entity-id
          type: uuid
          required: true
          maps_to: target_entity_id
          description: Entity whose board can be affected
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: holder-entity-id
          type: uuid
          required: true
          maps_to: holder_entity_id
          description: Entity holding the right
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: right-type
          type: string
          required: true
          maps_to: right_type
          valid_values:
          - APPOINT_DIRECTOR
          - REMOVE_DIRECTOR
          - APPOINT_AND_REMOVE
          - VETO_APPOINTMENT
          - CONSENT_REQUIRED
          - OBSERVER_SEAT
          - APPOINT_CHAIRMAN
          - APPOINT_CEO
          - APPOINT_AUDITOR
        - name: appointable-role-id
          type: uuid
          required: false
          maps_to: appointable_role_id
          lookup:
            table: roles
            entity_type: role
            schema: ob-poc
            search_key: name
            primary_key: role_id
        - name: max-appointments
          type: integer
          required: false
          maps_to: max_appointments
        - name: source-document-id
          type: uuid
          required: false
          maps_to: source_document_id
          lookup:
            table: document_catalog
            entity_type: document
            schema: ob-poc
            search_key: document_name
            primary_key: doc_id
        - name: source-clause
          type: string
          required: false
          maps_to: source_clause
          description: Reference to specific clause (e.g., "Clause 5.2(a)")
        - name: effective-from
          type: date
          required: false
          maps_to: effective_from
        - name: effective-to
          type: date
          required: false
          maps_to: effective_to
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: true
          current_appointments: 0
        returns:
          type: uuid
          name: appointment_right_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      revoke-appointment-right:
        flavour: discretionary
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: board_revoke_appointment_right
        description: Revoke an appointment right
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "revoke board appointment right"
        - "remove director nomination power"
        - "terminate appointment right"
        - "cancel board appointment privilege"
        - "withdraw appointment authority"
        - "end director appointment right"
        - "deactivate nomination power"
        - "remove veto over board appointments"
        behavior: crud
        crud:
          operation: update
          table: appointment_rights
          schema: kyc
          key: id
        args:
        - name: appointment-right-id
          type: uuid
          required: true
          maps_to: id
        - name: effective-to
          type: date
          required: false
          maps_to: effective_to
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      list-appointment-rights:
        flavour: attribute_mutating
        description: List who has appointment rights over an entity's board
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "who has appointment rights"
        - "show board nomination powers"
        - "list appointment rights for entity"
        - "which shareholders appoint directors"
        - "display board control rights"
        - "get director appointment privileges"
        - "who controls board appointments"
        - "view nomination rights over board"
        behavior: crud
        crud:
          operation: list_by_fk
          table: appointment_rights
          schema: kyc
          fk_col: target_entity_id
        args:
        - name: target-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-rights-held:
        flavour: attribute_mutating
        description: List appointment rights held by an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "show rights held by entity"
        - "what appointment powers does it hold"
        - "list boards they can appoint to"
        - "get held appointment rights"
        - "which boards can entity control"
        - "display held nomination powers"
        - "where does entity have board power"
        - "find all held appointment rights"
        behavior: crud
        crud:
          operation: list_by_fk
          table: appointment_rights
          schema: kyc
          fk_col: holder_entity_id
        args:
        - name: holder-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      analyze-control:
        flavour: attribute_mutating
        description: |
          Analyze board control - who controls the board through:
          - Majority of appointments
          - Appointment/removal rights
          - Veto powers
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: board_member
          tags: [kyc]
          subject_kinds: [cbu, company]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "analyze board control structure"
        - "who controls the board"
        - "assess board power dynamics"
        - "identify board majority controller"
        - "check board control for CDD"
        - "evaluate board governance control"
        - "determine UBO through board"
        - "board control analysis for KYC"
        behavior: plugin
        plugin:
          handler: BoardAnalyzeControlOp
        args:
        - name: entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: total_seats
            type: integer
          - name: filled_seats
            type: integer
          - name: vacant_seats
            type: integer
          - name: controllers
            type: array
            description: Entities with board control
          - name: majority_controller
            type: uuid
            description: Entity with majority of appointments (if any)
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
