domains:
  red-flag:
    description: Risk indicators and issues requiring attention
    verbs:
      raise:
        description: Raise a new red flag
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "raise a red flag"
          - "flag compliance risk on case"
          - "report AML concern"
          - "create KYC risk indicator"
          - "log sanctions match finding"
          - "raise adverse media alert"
          - "flag opaque ownership structure"
          - "escalate suspicious finding"
        behavior: crud
        crud:
          operation: insert
          table: red_flags
          schema: kyc
          returning: red_flag_id
        emits_event: red-flag.raised
        args:
          - name: case-id
            type: uuid
            required: true
            maps_to: case_id
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
          - name: workstream-id
            type: uuid
            required: false
            maps_to: workstream_id
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: kyc
              search_key: workstream_id
              primary_key: workstream_id
          - name: flag-type
            type: string
            required: true
            maps_to: flag_type
            valid_values:
              - SANCTIONS_MATCH
              - PEP_IDENTIFIED
              - ADVERSE_MEDIA
              - NOMINEE_UNDISCLOSED
              - OPAQUE_STRUCTURE
              - DOCUMENT_FRAUD
              - INCONSISTENT_INFO
              - HIGH_RISK_JURISDICTION
              - COMPLEX_STRUCTURE
              - SOURCE_OF_WEALTH_UNCLEAR
              - MISSING_UBO
              - SHELL_COMPANY
              - TAX_HAVEN
              - CASH_INTENSIVE
              - REGULATORY_ACTION
              - DOCUMENT_OVERDUE
              - SLA_BREACH
          - name: severity
            type: string
            required: true
            maps_to: severity
            valid_values:
              - SOFT
              - ESCALATE
              - HARD_STOP
          - name: description
            type: string
            required: true
            maps_to: description
          - name: source
            type: string
            required: false
            maps_to: source
            valid_values:
              - SCREENING
              - DOCUMENT_REVIEW
              - ANALYST
              - SYSTEM
              - RULE_ENGINE
              - EXTERNAL
          - name: source-reference
            type: string
            required: false
            maps_to: source_reference
        returns:
          type: uuid
          name: red_flag_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
      mitigate:
        description: Mark red flag as mitigated
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "mitigate red flag"
          - "resolve compliance concern"
          - "mark risk indicator as mitigated"
          - "close red flag with mitigation"
          - "address AML red flag"
          - "record mitigation action taken"
          - "resolve KYC risk finding"
          - "clear red flag with evidence"
        behavior: crud
        crud:
          operation: update
          table: red_flags
          schema: kyc
          key: red_flag_id
          set_values:
            status: MITIGATED
            resolution_type: MITIGATED
            resolved_at: now()
        emits_event: red-flag.mitigated
        args:
          - name: red-flag-id
            type: uuid
            required: true
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: kyc
              search_key: red_flag_id
              primary_key: red_flag_id
          - name: notes
            type: string
            required: true
            maps_to: resolution_notes
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: red-flag-id
          target_workspace: kyc
          target_slot: red_flag
      waive:
        description: Waive red flag with justification
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "waive red flag with justification"
          - "approve red flag waiver"
          - "accept risk with rationale"
          - "override red flag finding"
          - "grant compliance exception"
          - "waive KYC risk indicator"
          - "approve proceeding despite red flag"
          - "senior approval for risk acceptance"
        behavior: crud
        crud:
          operation: update
          table: red_flags
          schema: kyc
          key: red_flag_id
          set_values:
            status: WAIVED
            resolution_type: WAIVED
            resolved_at: now()
        emits_event: red-flag.waived
        args:
          - name: red-flag-id
            type: uuid
            required: true
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: kyc
              search_key: red_flag_id
              primary_key: red_flag_id
          - name: justification
            type: string
            required: true
            maps_to: waiver_justification
          - name: approved-by
            type: uuid
            required: true
            maps_to: waiver_approved_by
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: red-flag-id
          target_workspace: kyc
          target_slot: red_flag

      close:
        description: Close a red flag with a generic resolution outcome
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "close red flag"
          - "resolve risk flag"
          - "record red flag resolution"
          - "close compliance finding"
        behavior: crud
        crud:
          operation: update
          table: red_flags
          schema: kyc
          key: red_flag_id
          set_values:
            status: CLOSED
            resolved_at: now()
        emits_event: red-flag.closed
        args:
          - name: red-flag-id
            type: uuid
            required: true
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: kyc
              search_key: red_flag_id
              primary_key: red_flag_id
          - name: resolution
            type: string
            required: false
            maps_to: resolution_type
          - name: notes
            type: string
            required: false
            maps_to: resolution_notes
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: red-flag-id
          target_workspace: kyc
          target_slot: red_flag

      dismiss:
        description: Dismiss red flag as false positive
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "dismiss red flag as false positive"
          - "close red flag not confirmed"
          - "mark finding as false match"
          - "dismiss screening false positive"
          - "reject red flag after review"
          - "discard unsubstantiated risk flag"
          - "clear false positive alert"
          - "close red flag no action required"
        behavior: crud
        crud:
          operation: update
          table: red_flags
          schema: kyc
          key: red_flag_id
          set_values:
            status: CLOSED
            resolution_type: FALSE_POSITIVE
            resolved_at: now()
        emits_event: red-flag.dismissed
        args:
          - name: red-flag-id
            type: uuid
            required: true
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: kyc
              search_key: red_flag_id
              primary_key: red_flag_id
          - name: notes
            type: string
            required: true
            maps_to: resolution_notes
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: red-flag-id
          target_workspace: kyc
          target_slot: red_flag
      set-blocking:
        description: Set red flag as blocking the case
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "set red flag as blocking"
          - "block case on red flag"
          - "mark risk as case blocker"
          - "prevent case progression"
          - "hard stop on compliance finding"
          - "escalate red flag to blocking"
          - "halt case until flag resolved"
          - "make red flag a gate blocker"
        behavior: crud
        crud:
          operation: update
          table: red_flags
          schema: kyc
          key: red_flag_id
          set_values:
            status: BLOCKING
        emits_event: red-flag.blocking
        args:
          - name: red-flag-id
            type: uuid
            required: true
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: kyc
              search_key: red_flag_id
              primary_key: red_flag_id
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: red-flag-id
          target_workspace: kyc
          target_slot: red_flag
      list-by-case:
        description: List red flags for a case
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list red flags for case"
          - "show all risk indicators"
          - "what red flags are open"
          - "get case risk findings"
          - "display compliance concerns"
          - "view blocking red flags"
          - "show unresolved risk flags"
          - "list AML findings on case"
        behavior: crud
        crud:
          operation: list_by_fk
          table: red_flags
          schema: kyc
          fk_col: case_id
        args:
          - name: case-id
            type: uuid
            required: true
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
          - name: status
            type: string
            required: false
            maps_to: status
          - name: severity
            type: string
            required: false
            maps_to: severity
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      list-by-workstream:
        description: List red flags for a workstream
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: red_flag
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list red flags for workstream"
          - "show entity-level risk flags"
          - "get workstream risk findings"
          - "display compliance issues for entity"
          - "what risks were found on workstream"
          - "view red flags by entity"
          - "show screening alerts for workstream"
          - "list CDD risk indicators"
        behavior: crud
        crud:
          operation: list_by_fk
          table: red_flags
          schema: kyc
          fk_col: workstream_id
        args:
          - name: workstream-id
            type: uuid
            required: true
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: kyc
              search_key: workstream_id
              primary_key: workstream_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
