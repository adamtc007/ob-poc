# Tollgate Decision Engine Verbs
# Phase C.5 of KYC Control Enhancement
#
# Decision engine for KYC workflow gates.
# Evaluates verification completeness against configurable thresholds.

domains:
  tollgate:
    description: |
      Decision engine for KYC workflow gates.
      Evaluates verification completeness against configurable thresholds.
      Supports management overrides with audit trail.

    verbs:
      evaluate:
        flavour: attribute_mutating
        description: |
          Run tollgate evaluation for a case.
          Computes all metrics and compares against thresholds.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "run tollgate evaluation for case"
        - "evaluate kyc tollgate checkpoint"
        - "check verification completeness against thresholds"
        - "is the case passing tollgate"
        - "compute tollgate metrics and score"
        - "assess kyc gate readiness"
        - "run compliance gate evaluation"
        - "evaluate case against tollgate criteria"
        behavior: plugin
        plugin:
          handler: TollgateEvaluateOp
        args:
        - name: case-id
          type: uuid
          required: true
          lookup:
            table: cases
            schema: kyc
            search_key: case_id
            primary_key: case_id
        - name: evaluation-type
          type: string
          required: true
          valid_values:
          - DISCOVERY_COMPLETE
          - EVIDENCE_COMPLETE
          - VERIFICATION_COMPLETE
          - DECISION_READY
          - PERIODIC_REVIEW
          description: "Type of tollgate checkpoint"
        - name: evaluated-by
          type: string
          required: false
          description: "User/system performing evaluation"
        returns:
          type: record
          fields:
          - name: evaluation_id
            type: uuid
          - name: overall_result
            type: string
            description: "PASS, FAIL, PASS_WITH_WARNINGS"
          - name: score
            type: decimal
            description: "Overall score 0-100"
          - name: metrics
            type: json
            description: "All computed metrics"
          - name: blocking_failures
            type: array
            description: "Metrics that failed blocking thresholds"
          - name: warnings
            type: array
            description: "Non-blocking issues"
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      get-metrics:
        flavour: attribute_mutating
        description: Compute current metrics for a CBU without recording evaluation
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "get current tollgate metrics"
        - "compute kyc metrics without recording"
        - "show verification metrics for structure"
        - "what are the compliance metrics"
        - "preview tollgate scores before evaluation"
        - "check ownership and screening percentages"
        - "fetch kyc completeness metrics"
        - "display evidence coverage statistics"
        behavior: plugin
        plugin:
          handler: TollgateGetMetricsOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record
          fields:
          - name: ownership_verified_pct
            type: decimal
            description: "Percentage of ownership chain verified"
          - name: control_verified_pct
            type: decimal
            description: "Percentage of control relationships verified"
          - name: ubo_coverage_pct
            type: decimal
            description: "Percentage of ownership/control covered by identified UBOs"
          - name: doc_completeness_pct
            type: decimal
            description: "Percentage of required documents received"
          - name: screening_clear_pct
            type: decimal
            description: "Percentage of screenings with clear results"
          - name: red_flag_count
            type: integer
            description: "Number of unresolved red flags"
          - name: allegation_unresolved_count
            type: integer
            description: "Number of unresolved allegations"
          - name: days_since_last_refresh
            type: integer
            description: "Days since last KYC refresh"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      set-threshold:
        flavour: attribute_mutating
        description: Update a tollgate threshold
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "set tollgate threshold value"
        - "update compliance gate threshold"
        - "configure kyc metric threshold"
        - "change blocking threshold for metric"
        - "adjust tollgate pass criteria"
        - "modify verification threshold setting"
        - "set minimum score for gate"
        - "update tollgate comparison rule"
        behavior: crud
        crud:
          operation: update
          table: tollgate_thresholds
          schema: kyc
          key: id
        args:
        - name: threshold-name
          type: string
          required: true
          maps_to: threshold_name
        - name: metric-type
          type: string
          required: false
          maps_to: metric_type
          valid_values:
          - OWNERSHIP_VERIFIED_PCT
          - CONTROL_VERIFIED_PCT
          - UBO_COVERAGE_PCT
          - DOC_COMPLETENESS_PCT
          - SCREENING_CLEAR_PCT
          - RED_FLAG_COUNT
          - ALLEGATION_UNRESOLVED_COUNT
          - DAYS_SINCE_REFRESH
          description: "Type of metric being evaluated"
        - name: comparison
          type: string
          required: false
          maps_to: comparison
          valid_values:
          - GT
          - GTE
          - LT
          - LTE
          - EQ
          - NEQ
          description: "Comparison operator (GT=greater than, GTE=>=, LT=<, LTE=<=, EQ==, NEQ=!=)"
        - name: threshold-value
          type: decimal
          required: false
          maps_to: threshold_value
          description: "Threshold value for comparison"
        - name: is-blocking
          type: boolean
          required: false
          maps_to: is_blocking
          description: "Whether failure blocks progression"
        - name: weight
          type: decimal
          required: false
          maps_to: weight
          description: "Weight for scoring (default 1.0)"
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      override:
        flavour: discretionary
        role_guard:
          any_of: [senior_compliance, mlro, executive, board]
        audit_class: tollgate_override
        description: Record management override of tollgate failure
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "override tollgate failure"
        - "record management override for gate"
        - "approve tollgate waiver with justification"
        - "grant compliance gate exception"
        - "override blocking tollgate result"
        - "submit tollgate override approval"
        - "waive failed tollgate checkpoint"
        - "authorize tollgate bypass for case"
        behavior: plugin
        plugin:
          handler: TollgateOverrideOp
        args:
        - name: evaluation-id
          type: uuid
          required: true
          description: "ID of the failed evaluation"
        - name: override-reason
          type: string
          required: true
          description: "Justification for override"
        - name: approved-by
          type: string
          required: true
          description: "User who approved the override"
        - name: approval-authority
          type: string
          required: true
          valid_values:
          - ANALYST
          - SENIOR_ANALYST
          - TEAM_LEAD
          - COMPLIANCE_OFFICER
          - SENIOR_COMPLIANCE
          - MLRO
          - EXECUTIVE
          - BOARD
          description: "Level of authority that approved the override"
        - name: conditions
          type: string
          required: false
          description: "Any conditions attached to override"
        - name: expiry-date
          type: date
          required: false
          description: "When override expires (if applicable)"
        returns:
          type: uuid
          name: override_id
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      list-evaluations:
        flavour: attribute_mutating
        description: List tollgate evaluations for a case
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "list tollgate evaluations for case"
        - "show evaluation history for case"
        - "get all gate results for case"
        - "what tollgate checks were run"
        - "review past tollgate assessments"
        - "display compliance gate evaluation log"
        - "show tollgate pass fail history"
        - "list prior checkpoint evaluations"
        behavior: crud
        crud:
          operation: list_by_fk
          table: tollgate_evaluations
          schema: kyc
          fk_col: case_id
        args:
        - name: case-id
          type: uuid
          required: true
          lookup:
            table: cases
            schema: kyc
            search_key: case_id
            primary_key: case_id
        - name: evaluation-type
          type: string
          required: false
          maps_to: evaluation_type
          valid_values:
          - DISCOVERY_COMPLETE
          - EVIDENCE_COMPLETE
          - VERIFICATION_COMPLETE
          - DECISION_READY
          - PERIODIC_REVIEW
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-thresholds:
        flavour: attribute_mutating
        description: List all configured thresholds
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "list all tollgate thresholds"
        - "show configured compliance gate thresholds"
        - "get threshold settings for tollgates"
        - "what are the current gate limits"
        - "display blocking and warning thresholds"
        - "review tollgate pass criteria"
        - "list metric thresholds by type"
        - "show kyc gate configuration"
        behavior: crud
        crud:
          operation: select
          table: tollgate_thresholds
          schema: kyc
        args:
        - name: evaluation-type
          type: string
          required: false
          maps_to: evaluation_type
        - name: is-blocking
          type: boolean
          required: false
          maps_to: is_blocking
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      get-decision-readiness:
        flavour: attribute_mutating
        description: |
          Summary view of decision readiness:
            - What's blocking?
            - What's complete?
            - What needs attention?
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "check decision readiness for case"
        - "is the case ready for decision"
        - "get decision readiness summary"
        - "what is blocking case approval"
        - "show evidence completeness for decision"
        - "assess if case can proceed"
        - "check outstanding blockers for case"
        - "summarize case readiness status"
        behavior: plugin
        plugin:
          handler: TollgateDecisionReadinessOp
        args:
        - name: case-id
          type: uuid
          required: true
          lookup:
            table: cases
            schema: kyc
            search_key: case_id
            primary_key: case_id
        returns:
          type: record
          fields:
          - name: is_decision_ready
            type: boolean
            description: "True if all blocking gates passed"
          - name: blocking_issues
            type: array
            description: "List of blocking issues"
          - name: completion_summary
            type: json
            description: "Summary of completion by category"
          - name: recommended_actions
            type: array
            description: "Suggested next steps"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-overrides:
        flavour: attribute_mutating
        description: List overrides for a case or evaluation
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "list tollgate overrides"
        - "show active gate waivers"
        - "get overrides for case"
        - "which tollgates have been waived"
        - "display management override history"
        - "list compliance gate exceptions"
        - "show approved tollgate bypasses"
        - "review override audit trail"
        behavior: crud
        crud:
          operation: select
          table: tollgate_overrides
          schema: kyc
        args:
        - name: evaluation-id
          type: uuid
          required: false
          maps_to: evaluation_id
        - name: case-id
          type: uuid
          required: false
          description: "Filter by case (via evaluation)"
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      expire-override:
        flavour: discretionary
        role_guard:
          any_of: [senior_compliance, mlro, executive, board]
        audit_class: tollgate_expire_override
        description: Manually expire an override
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "expire tollgate override"
        - "revoke gate waiver early"
        - "manually expire compliance override"
        - "cancel active tollgate exception"
        - "terminate override before expiry"
        - "withdraw tollgate bypass approval"
        - "force expire gate waiver"
        - "end tollgate override immediately"
        behavior: crud
        crud:
          operation: update
          table: tollgate_overrides
          schema: kyc
          key: id
        args:
        - name: override-id
          type: uuid
          required: true
          maps_to: id
        - name: expired-by
          type: string
          required: true
          description: "User expiring the override"
        - name: reason
          type: string
          required: false
          description: "Reason for early expiration"
        set_values:
          expiry_date: "now()"
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      # =========================================================================
      # GATE-BASED EVALUATION (KYC/UBO Computed Architecture)
      # =========================================================================

      check-gate:
        flavour: attribute_mutating
        description: "Check a named tollgate gate against case state and coverage data"
        invocation_phrases:
        - "check tollgate gate"
        - "check gate status"
        - "check skeleton ready"
        - "check named gate"
        - "run gate check"
        - "tollgate gate check"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: tollgate
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        plugin:
          handler: TollgateEvaluateGateOp
        args:
        - name: case-id
          type: uuid
          required: true
          description: "KYC case to evaluate"
          lookup:
            table: cases
            schema: kyc
            search_key: case_id
            primary_key: case_id
        - name: gate-name
          type: string
          required: true
          description: "Name of the tollgate to evaluate"
          valid_values:
          - SKELETON_READY
          - EVIDENCE_COMPLETE
          - REVIEW_COMPLETE
        - name: determination-run-id
          type: uuid
          required: false
          description: "Specific determination run to evaluate against"
        returns:
          type: record
          fields:
          - name: evaluation_id
            type: uuid
          - name: gate_name
            type: string
          - name: passed
            type: boolean
          - name: evaluation_detail
            type: json
            description: "Detailed evaluation results per criterion"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
