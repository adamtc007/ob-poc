domains:
  entity-workstream:
    description: Per-entity workstream within a KYC case
    verbs:
      create:
        flavour: instance_adding
        description: Create a new entity workstream (idempotent by case+entity)
        invocation_phrases:
        - "create workstream"
        - "add entity workstream"
        - "add entity to case"
        - "create entity workstream"
        - "open a workstream for this entity"
        - "add this person to the KYC case"
        - "start due diligence on this entity"
        - "spin up a workstream"
        - "add an entity to the review"
        - "this entity needs KYC too"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        produces:
          type: workstream
          resolved: false
        consumes:
        - arg: case-id
          type: case
          required: true
        - arg: entity-id
          type: entity
          required: true
        crud:
          operation: upsert
          table: entity_workstreams
          schema: ob-poc
          returning: workstream_id
          conflict_keys:
          - case_id
          - entity_id
        emits_event: workstream.created
        args:
        - name: case-id
          type: uuid
          required: true
          maps_to: case_id
          lookup:
            table: cases
            entity_type: kyc_case
            schema: ob-poc
            search_key: case_id
            primary_key: case_id
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: discovery-source-id
          type: uuid
          required: false
          maps_to: discovery_source_workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        - name: discovery-reason
          type: string
          required: false
          maps_to: discovery_reason
        - name: discovery-depth
          type: integer
          required: false
          maps_to: discovery_depth
          default: 1
        - name: ownership-percentage
          type: decimal
          required: false
          maps_to: ownership_percentage
        - name: is-ubo
          type: boolean
          required: false
          maps_to: is_ubo
          default: false
        returns:
          type: uuid
          name: workstream_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      update-status:
        flavour: attribute_mutating
        description: Update workstream status
        invocation_phrases:
        - "update workstream status"
        - "advance workstream"
        - "change workstream status"
        - "move workstream to"
        - "push this workstream forward"
        - "advance to screening phase"
        - "move to collect"
        - "progress the entity review"
        - "bump this workstream along"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: entity_workstreams
          schema: ob-poc
          key: workstream_id
        emits_event: workstream.status-changed
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        - name: status
          type: string
          required: true
          maps_to: status
          valid_values:
          - PENDING
          - COLLECT
          - VERIFY
          - SCREEN
          - ASSESS
          - COMPLETE
          - BLOCKED
          - ENHANCED_DD
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      block:
        flavour: attribute_mutating
        description: Block workstream with reason
        invocation_phrases:
        - "block workstream"
        - "hold workstream"
        - "pause workstream"
        - "put this on hold"
        - "block this entity's review"
        - "stop work on this entity"
        - "freeze this workstream"
        - "we can't proceed on this entity"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: entity_workstreams
          schema: ob-poc
          key: workstream_id
          set_values:
            status: BLOCKED
            blocked_at: now()
        emits_event: workstream.blocked
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        - name: reason
          type: string
          required: true
          maps_to: blocked_reason
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      complete:
        flavour: attribute_mutating
        description: Mark workstream as complete
        invocation_phrases:
        - "complete workstream"
        - "finish workstream"
        - "mark workstream complete"
        - "close workstream"
        - "this entity is done"
        - "sign off on this workstream"
        - "entity review is complete"
        - "wrap up this entity's due diligence"
        - "all clear on this workstream"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: entity_workstreams
          schema: ob-poc
          key: workstream_id
          set_values:
            status: COMPLETE
            completed_at: now()
        emits_event: workstream.completed
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        - name: risk-rating
          type: string
          required: false
          maps_to: risk_rating
          valid_values:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
      escalate-dd:
        flavour: discretionary
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: entity_workstream_escalate_dd
        description: Escalate workstream to enhanced due diligence
        invocation_phrases:
        - "escalate due diligence"
        - "escalate to enhanced dd"
        - "escalate to enhanced due diligence"
        - "flag for enhanced dd"
        - "require enhanced dd"
        - "set enhanced due diligence"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: entity_workstreams
          schema: ob-poc
          key: workstream_id
          set_values:
            requires_enhanced_dd: true
            status: ENHANCED_DD
        emits_event: workstream.enhanced-dd-set
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
      set-ubo:
        flavour: attribute_mutating
        description: Mark workstream entity as UBO
        invocation_phrases:
        - "mark as ubo"
        - "set ubo flag"
        - "flag entity as ubo"
        - "identify as beneficial owner"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: entity_workstreams
          schema: ob-poc
          key: workstream_id
          set_values:
            is_ubo: true
        emits_event: workstream.ubo-set
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        - name: ownership-percentage
          type: decimal
          required: false
          maps_to: ownership_percentage
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      list-by-case:
        flavour: attribute_mutating
        description: List workstreams for a case
        invocation_phrases:
        - "list workstreams"
        - "show workstreams for case"
        - "get case workstreams"
        - "list entity workstreams"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: entity_workstreams
          schema: ob-poc
          fk_col: case_id
        args:
        - name: case-id
          type: uuid
          required: true
          lookup:
            table: cases
            entity_type: kyc_case
            schema: ob-poc
            search_key: case_id
            primary_key: case_id
        - name: status
          type: string
          required: false
          maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      read:
        flavour: attribute_mutating
        description: Read workstream details
        invocation_phrases:
        - "read workstream"
        - "get workstream details"
        - "show workstream"
        - "view workstream"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: select
          table: entity_workstreams
          schema: ob-poc
        args:
        - name: workstream-id
          type: uuid
          required: true
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      state:
        flavour: attribute_mutating
        description: Get workstream state with embedded awaiting requests, checks, and documents
        invocation_phrases:
        - "workstream state"
        - "get workstream state"
        - "show workstream status"
        - "workstream summary"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: entity_workstream
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: WorkstreamStateOp
        args:
        - name: workstream-id
          type: uuid
          required: true
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: ob-poc
            search_key: workstream_id
            primary_key: workstream_id
        returns:
          type: record
          description: |
            Returns workstream with embedded `awaiting` array of pending requests,
            plus completed checks and received documents. Domain-coherent view
            where requests are child nodes, not a separate list.
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
