domains:
  trust:
    description: |
      Trust-specific control and beneficial interest management.
      Maps trust deed provisions to control vectors for UBO analysis.
      Supports discretionary, fixed interest, unit, and charitable trusts.

    verbs:
      analyze-control:
        flavour: attribute_mutating
        description: |
          Analyze trust control vectors:
          - Trustee with absolute discretion = control
          - Appointor with trustee removal = control
          - Protector with veto = influence
          - Settlor with reserved powers = control
        effect_class: read_snapshot
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "analyze trust control vectors"
        - "who controls this trust"
        - "assess trustee discretion and influence"
        - "map appointor and protector powers"
        - "evaluate settlor reserved powers"
        - "determine trust control structure"
        - "analyze trust deed power distribution"
        - "identify controlling parties of trust"
        behavior: plugin
        plugin:
          handler: TrustAnalyzeControlOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: controlling_parties
            type: array
            description: Entities with control over trust
          - name: beneficial_parties
            type: array
            description: Entities with beneficial interest
          - name: trust_type_inference
            type: string
            description: Inferred trust type (DISCRETIONARY, FIXED_INTEREST, BARE)
          - name: control_summary
            type: object
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      identify-ubos:
        flavour: attribute_mutating
        description: |
          Identify UBOs from trust structure:
            - Fixed interest beneficiaries >= 25%
            - Settlor (if reserved powers)
            - Trustee with absolute discretion
            - Appointor/Protector with removal power
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "identify trust UBOs"
        - "find UBOs from trust structure"
        - "determine beneficial ownership of trust"
        - "run trust UBO discovery"
        - "which beneficiaries exceed twenty-five percent"
        - "identify ultimate beneficial owners"
        - "assess trust beneficial interest thresholds"
        behavior: plugin
        plugin:
          handler: TrustIdentifyUbosOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: cbu-id
          type: uuid
          required: false
          description: Optional CBU context for UBO registration
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record_set
          description: Array of UBO candidates with control/ownership vector
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      classify:
        flavour: attribute_mutating
        description: |
          Classify trust type based on provisions:
            - DISCRETIONARY: Trustee has absolute discretion over distributions
            - FIXED_INTEREST: Beneficiaries have fixed entitlements
            - BARE: Beneficiary has absolute right to capital and income
            - ACCUMULATION: Income can be accumulated
            - PURPOSE: Non-charitable purpose trust
            - CHARITABLE: Charitable trust
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "classify trust type"
        - "what type of trust is this"
        - "determine trust classification"
        - "is this a discretionary or bare trust"
        - "classify trust from provisions"
        - "infer trust category from deed"
        - "categorize trust structure type"
        - "assess trust as fixed interest or accumulation"
        behavior: plugin
        plugin:
          handler: TrustClassifyOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: trust_classification
            type: string
          - name: classification_reasons
            type: array
          - name: confidence
            type: decimal
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
