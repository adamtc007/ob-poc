domains:
  trust:
    description: |
      Trust-specific control and beneficial interest management.
      Maps trust deed provisions to control vectors for UBO analysis.
      Supports discretionary, fixed interest, unit, and charitable trusts.

    verbs:
      record-provision:
        description: Record a provision from the trust deed affecting control or benefit
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "record trust deed provision"
        - "add beneficiary provision to trust"
        - "capture trust provision for settlor"
        - "log discretionary trust provision"
        - "enter appointor power from deed"
        - "who holds protector power"
        - "record income beneficiary entitlement"
        - "add reserved power provision"
        behavior: crud
        crud:
          operation: upsert
          table: trust_provisions
          schema: kyc
          returning: id
          conflict_keys:
          - trust_entity_id
          - provision_type
          - holder_entity_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: trust-entity-id
          type: uuid
          required: true
          maps_to: trust_entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: provision-type
          type: string
          required: true
          maps_to: provision_type
          valid_values:
          - INCOME_BENEFICIARY
          - CAPITAL_BENEFICIARY
          - DISCRETIONARY_BENEFICIARY
          - REMAINDER_BENEFICIARY
          - CONTINGENT_BENEFICIARY
          - DEFAULT_BENEFICIARY
          - APPOINTOR_POWER
          - PROTECTOR_POWER
          - TRUSTEE_REMOVAL
          - TRUST_VARIATION
          - ACCUMULATION_POWER
          - ADVANCEMENT_POWER
          - INVESTMENT_DIRECTION
          - DISTRIBUTION_DIRECTION
          - ADD_BENEFICIARY
          - EXCLUDE_BENEFICIARY
          - RESERVED_POWER
        - name: holder-entity-id
          type: uuid
          required: false
          maps_to: holder_entity_id
          description: Entity holding this provision (null for class beneficiaries)
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: beneficiary-class
          type: string
          required: false
          maps_to: beneficiary_class
          description: Description of beneficiary class if not specific entity
        - name: interest-percentage
          type: decimal
          required: false
          maps_to: interest_percentage
          description: Fixed interest percentage for fixed interest trusts
        - name: discretion-level
          type: string
          required: false
          maps_to: discretion_level
          valid_values:
          - ABSOLUTE
          - LIMITED
          - NONE
          - FETTERED
        - name: vesting-conditions
          type: string
          required: false
          maps_to: vesting_conditions
        - name: vesting-date
          type: date
          required: false
          maps_to: vesting_date
        - name: source-document-id
          type: uuid
          required: false
          maps_to: source_document_id
          lookup:
            table: document_catalog
            entity_type: document
            schema: ob-poc
            search_key: document_name
            primary_key: doc_id
        - name: source-clause
          type: string
          required: false
          maps_to: source_clause
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: true
        returns:
          type: uuid
          name: provision_id
          capture: true

      update-provision:
        description: Update an existing trust provision
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "update trust provision details"
        - "change discretion level on provision"
        - "modify beneficiary interest percentage"
        - "amend vesting conditions for trust"
        - "revise trust deed provision"
        - "adjust beneficial interest allocation"
        - "edit protector power terms"
        - "update vesting date for beneficiary"
        behavior: crud
        crud:
          operation: update
          table: trust_provisions
          schema: kyc
          key: id
        args:
        - name: provision-id
          type: uuid
          required: true
          maps_to: id
        - name: interest-percentage
          type: decimal
          required: false
          maps_to: interest_percentage
        - name: discretion-level
          type: string
          required: false
          maps_to: discretion_level
          valid_values:
          - ABSOLUTE
          - LIMITED
          - NONE
          - FETTERED
        - name: vesting-conditions
          type: string
          required: false
          maps_to: vesting_conditions
        - name: vesting-date
          type: date
          required: false
          maps_to: vesting_date
        - name: notes
          type: string
          required: false
          maps_to: notes
        returns:
          type: affected

      end-provision:
        description: End/revoke a trust provision
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "revoke trust provision"
        - "end beneficiary entitlement"
        - "terminate appointor power"
        - "remove protector from trust deed"
        - "deactivate discretionary provision"
        - "close out trust provision"
        - "revoke settlor reserved power"
        - "end capital beneficiary interest"
        behavior: crud
        crud:
          operation: update
          table: trust_provisions
          schema: kyc
          key: id
        args:
        - name: provision-id
          type: uuid
          required: true
          maps_to: id
        - name: notes
          type: string
          required: false
          maps_to: notes
        set_values:
          is_active: false
        returns:
          type: affected

      list-provisions:
        description: List all provisions for a trust
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list trust deed provisions"
        - "show all provisions for trust"
        - "what provisions does this trust have"
        - "display beneficiary and power provisions"
        - "get trust provision schedule"
        - "show discretionary trust entitlements"
        - "list active trust deed clauses"
        - "enumerate trust control provisions"
        behavior: crud
        crud:
          operation: list_by_fk
          table: trust_provisions
          schema: kyc
          fk_col: trust_entity_id
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: provision-type
          type: string
          required: false
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set

      list-by-holder:
        description: List all trust provisions held by an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list provisions held by entity"
        - "what trust interests does this person hold"
        - "show beneficial interests for holder"
        - "find trust roles for this party"
        - "which trusts is this entity beneficiary of"
        - "get all trust provisions by holder"
        - "show settlor and appointor positions"
        - "list trust powers held by person"
        behavior: crud
        crud:
          operation: list_by_fk
          table: trust_provisions
          schema: kyc
          fk_col: holder_entity_id
        args:
        - name: holder-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: include-inactive
          type: boolean
          required: false
          default: false
        returns:
          type: record_set

      analyze-control:
        description: |
          Analyze trust control vectors:
          - Trustee with absolute discretion = control
          - Appointor with trustee removal = control
          - Protector with veto = influence
          - Settlor with reserved powers = control
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "analyze trust control vectors"
        - "who controls this trust"
        - "assess trustee discretion and influence"
        - "map appointor and protector powers"
        - "evaluate settlor reserved powers"
        - "determine trust control structure"
        - "analyze trust deed power distribution"
        - "identify controlling parties of trust"
        behavior: plugin
        plugin:
          handler: TrustAnalyzeControlOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: controlling_parties
            type: array
            description: Entities with control over trust
          - name: beneficial_parties
            type: array
            description: Entities with beneficial interest
          - name: trust_type_inference
            type: string
            description: Inferred trust type (DISCRETIONARY, FIXED_INTEREST, BARE)
          - name: control_summary
            type: object

      identify-ubos:
        description: |
          Identify UBOs from trust structure:
            - Fixed interest beneficiaries >= 25%
            - Settlor (if reserved powers)
            - Trustee with absolute discretion
            - Appointor/Protector with removal power
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "identify trust UBOs"
        - "who are the beneficial owners"
        - "find UBOs from trust structure"
        - "determine beneficial ownership of trust"
        - "run trust UBO discovery"
        - "which beneficiaries exceed twenty-five percent"
        - "identify ultimate beneficial owners"
        - "assess trust beneficial interest thresholds"
        behavior: plugin
        plugin:
          handler: TrustIdentifyUbosOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: cbu-id
          type: uuid
          required: false
          description: Optional CBU context for UBO registration
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record_set
          description: Array of UBO candidates with control/ownership vector

      classify:
        description: |
          Classify trust type based on provisions:
            - DISCRETIONARY: Trustee has absolute discretion over distributions
            - FIXED_INTEREST: Beneficiaries have fixed entitlements
            - BARE: Beneficiary has absolute right to capital and income
            - ACCUMULATION: Income can be accumulated
            - PURPOSE: Non-charitable purpose trust
            - CHARITABLE: Charitable trust
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: trust
          tags: [kyc]
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "classify trust type"
        - "what type of trust is this"
        - "determine trust classification"
        - "is this a discretionary or bare trust"
        - "classify trust from provisions"
        - "infer trust category from deed"
        - "categorize trust structure type"
        - "assess trust as fixed interest or accumulation"
        behavior: plugin
        plugin:
          handler: TrustClassifyOp
        args:
        - name: trust-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: trust_classification
            type: string
          - name: classification_reasons
            type: array
          - name: confidence
            type: decimal
