  kyc:
    description: "KYC subject stream operations (dsl.kyc lexicon)"

    verbs:
      subject.register:
        flavour: instance_adding
        description: Register a subject on the KYC determination stream
        effect_class: append_fact
        invocation_phrases:
          - "register kyc subject"
          - "create determination subject"
          - "register subject for KYC"
          - "open a subject stream"
          - "register entity for determination"
          - "start subject stream"
          - "create KYC subject"
          - "register for UBO determination"
          - "open determination stream"
          - "register this entity as a KYC subject"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: workflow  # TODO: add kyc_stream variant to dsl-core SourceOfTruth enum
          scope: global
          noun: kyc_subject
          tags: [kyc, subject, registration, stream-backed, dsl-kyc]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: subject-id
            type: uuid
            required: true
            description: The UUID that anchors the subject's stream
          - name: is_natural_person
            type: boolean
            required: false
            description: Whether the subject is a natural person
          - name: entity-id
            type: uuid
            required: false
            description: The entity being registered, if distinct from subject-id (defaults to subject-id) — lets one determination stream register the intermediate entities/persons in its own ownership chain (V&S §7.1)
        returns:
          type: record
          fields:
            - name: seq
              type: integer
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      subject.classify-structure:
        flavour: attribute_mutating
        description: Classify the entity structure for determination purposes (simple, complex, fund, etc.)
        effect_class: append_fact
        invocation_phrases:
          - "classify structure"
          - "classify subject structure"
          - "set entity structure"
          - "classify this entity"
          - "classify for KYC"
          - "set structure classification"
          - "classify the ownership structure"
          - "set entity type for determination"
          - "classify structure type"
          - "set the structure class"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: workflow  # TODO: add kyc_stream variant to dsl-core SourceOfTruth enum
          scope: global
          noun: kyc_subject
          tags: [kyc, subject, classification, structure, stream-backed, dsl-kyc]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: subject-id
            type: uuid
            required: true
            description: Determination root
          - name: structure-class
            type: string
            required: true
            description: "Structure class — drives ubo.determination strategy selection (K-4). private_company/multi_tier_holding/listed_entity typically pair with ownership_prong_strategy (economic %); lp_fund/llp typically pair with control_prong_strategy (GP statutory / designated member control edges, M4). trust/foundation/investment_fund/state_owned/cooperative/nominee classify successfully but have no wire mapping from ubo.edge.assert-control's kind arg to a control edge kind for their structure-specific control basis yet (e.g. TrustRole — separate, smaller follow-on gap)."
            valid_values: [private_company, multi_tier_holding, listed_entity, lp_fund, llp, trust, foundation, investment_fund, state_owned, cooperative, nominee]
          - name: entity-id
            type: uuid
            required: false
            description: The entity being classified, if distinct from subject-id (defaults to subject-id)
        returns:
          type: record
          fields:
            - name: seq
              type: integer
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
