# dsl.kyc — the V&S determination vocabulary (EOP-VS-KYCUBO-001 / EOP-DD-KYCUBO-002).
#
# These are the REPLACEMENT verbs for the legacy ubo.*/control.*/ownership.*/board.* write
# verbs. Every verb here is STREAM-BACKED: it appends an IntentEvent to the durable
# kyc_intent_events stream; current state is a fold/projection of that stream — never a
# direct table write. Ops live in domain_ops::kyc_stream_ops.
#
# The domain split: ubo.edge.* (6 edge lifecycle), ubo.determination.* (4 fold/freeze),
# kyc.subject.* (2 subject registration). All are covered by phase1_lexicon() in the
# ob-poc-kyc-substrate crate.

domains:
  ubo:
    description: "UBO determination — durable stream-backed verb primitives (dsl.kyc lexicon)"

    verbs:
      edge.assert-control:
        flavour: instance_adding
        description: Claim a control edge (voting rights, board appointment, GP statutory, trust role, etc.)
        effect_class: append_fact
        invocation_phrases:
          - "assert control"
          - "claim control edge"
          - "add control relationship"
          - "record control edge"
          - "assert voting control"
          - "declare board appointment control"
          - "record control over entity"
          - "assert this entity controls that one"
          - "add ownership and control edge"
          - "record a control relationship"
          - "assert controlling interest"
          - "claim a control relationship"
          - "add a control assertion"
          - "assert dominant influence"
          - "record GP statutory control"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: workflow  # TODO: add kyc_stream variant to dsl-core SourceOfTruth enum
          scope: global
          noun: control_edge
          tags: [ubo, control, determination, stream-backed, dsl-kyc]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: subject-id
            type: uuid
            required: true
            description: Determination root (the subject stream)
          - name: from_entity_id
            type: uuid
            required: true
            description: Controlling entity
          - name: to_entity_id
            type: uuid
            required: true
            description: Controlled entity
          - name: kind
            type: string
            required: true
            description: "Control basis (fold::control::EdgeKind, payload key `kind` — control.rs::edge_kind_from_payload). trust_role is a recognized EdgeKind variant but has no wire mapping from this string yet (M4 follow-up: needs a sub-kind for settlor/trustee/protector/beneficiary) — passing it, or any unrecognized/omitted value, silently resolves to dominant_influence (the fold's catch-all; the fold is infallible by design, so this cannot be a hard error today)."
            valid_values: [voting_rights, board_appointment, gp_statutory, designated_member, nominee, dominant_influence, economic_interest]
          - name: edge-id
            type: uuid
            required: false
            description: Stable edge identity (generated if omitted)
          - name: percentage
            type: decimal
            required: false
            description: Percentage (for economic_interest edges)
        returns:
          type: record
          fields:
            - name: edge_id
              type: uuid
            - name: seq
              type: integer
            - name: deduped
              type: boolean
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

