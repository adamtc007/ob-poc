          external_effects: []
          consequence:
            baseline: reviewable

      edge.reconcile-conflict:
        flavour: attribute_mutating
        description: Record a conflict-reconciliation event on the subject stream
        effect_class: append_fact
        invocation_phrases:
          - "reconcile conflict"
