domains:
  ubo.registry:
    description: "UBO registry lifecycle — track beneficial ownership determinations through approval"

    invocation_hints:
      - "ubo registry"
      - "promote candidate"
      - "advance ubo"
      - "waive ubo"
      - "approve ubo"

    verbs:
      create:
        description: "Create a new UBO registry allegation"
        invocation_phrases:
          - "create ubo allegation"
          - "record beneficial owner allegation"
          - "add ubo registry entry"
          - "allege beneficial ownership"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, lifecycle, kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: insert
          table: kyc_ubo_registry
          schema: ob-poc
          returning: registry_id
        args:
          - name: case-id
            type: uuid
            required: true
            maps_to: case_id
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
          - name: owner-entity-id
            type: uuid
            required: true
            maps_to: owner_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: owned-entity-id
            type: uuid
            required: true
            maps_to: owned_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: percentage
            type: decimal
            required: false
            maps_to: percentage
          - name: ownership-type
            type: string
            required: false
            maps_to: ownership_type
          - name: source
            type: string
            required: false
            maps_to: source
          - name: status
            type: string
            required: false
            maps_to: status
            default: ALLEGED
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: registry_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      promote:
        description: "Promote a UBO registry entry from CANDIDATE to IDENTIFIED"
        invocation_phrases:
          - "promote ubo candidate"
          - "identify ubo"
          - "confirm ubo candidate"
          - "candidate identified"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, lifecycle, kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: UboRegistryPromoteOp
        args:
          - name: registry-id
            type: uuid
            required: true
            description: UBO registry entry to promote
          - name: notes
            type: string
            required: false
            description: Notes on identification
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: registry-id
          target_workspace: kyc
          target_slot: kyc_ubo_registry

      advance:
        description: "Advance a UBO registry entry through the state machine"
        invocation_phrases:
          - "advance ubo status"
          - "move ubo forward"
          - "progress ubo review"
          - "ubo status change"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, lifecycle, kyc]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: UboRegistryAdvanceOp
        args:
          - name: registry-id
            type: uuid
            required: true
            description: UBO registry entry to advance
          - name: new-status
            type: string
            required: true
            description: Target status
            valid_values:
              - IDENTIFIED
              - PROVABLE
              - PROVED
              - REVIEWED
              - APPROVED
          - name: notes
            type: string
            required: false
            description: Notes on transition
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: registry-id
          target_state_arg: new-status
          target_workspace: kyc
          target_slot: kyc_ubo_registry

      waive:
        description: "Waive a UBO registry entry with authority and reason"
        invocation_phrases:
          - "waive ubo requirement"
          - "waive ubo entry"
          - "exempt from ubo review"
          - "ubo waiver"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, waiver]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: UboRegistryWaiveOp
        args:
          - name: registry-id
            type: uuid
            required: true
            description: UBO registry entry to waive
          - name: reason
            type: string
            required: true
            description: Justification for waiver
          - name: authority
            type: string
            required: true
            description: Authority granting the waiver
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      reject:
        description: "Reject a UBO registry entry (terminal state)"
        invocation_phrases:
          - "reject ubo"
          - "ubo not confirmed"
          - "reject ubo candidate"
          - "ubo determination rejected"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, terminal]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: UboRegistryRejectOp
        args:
          - name: registry-id
            type: uuid
            required: true
            description: UBO registry entry to reject
          - name: reason
            type: string
            required: true
            description: Reason for rejection
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: registry-id
          target_workspace: kyc
          target_slot: kyc_ubo_registry

      expire:
        description: "Expire a UBO registry entry (terminal state)"
        invocation_phrases:
          - "expire ubo entry"
          - "ubo determination expired"
          - "ubo expired"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: ubo_registry
          tags: [ubo, registry, terminal]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        handler: UboRegistryExpireOp
        args:
          - name: registry-id
            type: uuid
            required: true
            description: UBO registry entry to expire
          - name: reason
            type: string
            required: false
            description: Reason for expiry
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: registry-id
          target_workspace: kyc
          target_slot: kyc_ubo_registry
