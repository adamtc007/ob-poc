# Partnership Capital and Control Verbs
# Phase C.4 of KYC Control Enhancement
#
# Models GP/LP dynamics and profit/loss allocation for partnerships.
# Supports LPs, LLPs, and general partnerships.

domains:
  partnership:
    description: |
      Partnership capital accounts and control structure.
      Models GP/LP dynamics and profit/loss allocation.

    verbs:
      record-contribution:
        flavour: attribute_mutating
        description: Record capital contribution (drawdown)
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: partnership
          tags: [kyc]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
        - "record capital contribution"
        - "log partner drawdown payment"
        - "register LP capital call response"
        - "capture partnership capital paid in"
        - "record GP contribution"
        - "process capital drawdown"
        - "log partnership funding received"
        - "add contribution to capital account"
        behavior: plugin
        plugin:
          handler: PartnershipContributionOp
        args:
        - name: partnership-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: partner-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: amount
          type: decimal
          required: true
          description: "Amount of capital contributed"
        - name: contribution-date
          type: date
          required: true
        - name: reference
          type: string
          required: false
          description: "External reference for the contribution"
        returns:
          type: uuid
          name: contribution_id
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      record-distribution:
        flavour: attribute_mutating
        description: Record distribution to partner
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: partnership
          tags: [kyc]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
        - "record distribution to partner"
        - "log profit distribution"
        - "distribute partnership proceeds"
        - "record LP payout"
        - "log partnership distribution event"
        - "pay out partner capital"
        - "record liquidation distribution"
        behavior: plugin
        plugin:
          handler: PartnershipDistributionOp
        args:
        - name: partnership-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: partner-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: amount
          type: decimal
          required: true
          description: "Distribution amount"
        - name: distribution-type
          type: string
          required: true
          valid_values: [PROFIT, RETURN_OF_CAPITAL, LIQUIDATION]
        - name: distribution-date
          type: date
          required: true
        returns:
          type: uuid
          name: distribution_id
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      reconcile:
        flavour: attribute_mutating
        description: |
          Reconcile partnership capital:
          - Verify profit shares sum to 100%
          - Calculate total committed/contributed/unfunded
          - Identify control (GP or majority LP)
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: partnership
          tags: [kyc]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
        - "reconcile partnership capital"
        - "verify profit shares sum correctly"
        - "check partnership capital balances"
        - "do LP commitments reconcile"
        - "validate partnership allocation totals"
        - "run partnership capital audit"
        - "verify unfunded commitments"
        - "check GP and LP capital positions"
        behavior: plugin
        plugin:
          handler: PartnershipReconcileOp
        args:
        - name: partnership-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record
          fields:
          - name: is_reconciled
            type: boolean
            description: "True if profit shares sum to 100%"
          - name: total_commitment
            type: decimal
            description: "Sum of all capital commitments"
          - name: total_contributed
            type: decimal
            description: "Sum of all contributions"
          - name: total_unfunded
            type: decimal
            description: "Commitment minus contributed"
          - name: profit_share_total
            type: decimal
            description: "Should be 100.0 if reconciled"
          - name: controlling_partners
            type: array
            description: "Partners with control (GPs or majority)"
            items:
            - entity_id
            - partner_type
            - control_basis
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      analyze-control:
        flavour: attribute_mutating
        description: |
          Analyze control structure of partnership for UBO identification.
          GPs have presumptive control regardless of capital percentage.
          LPs may have control through voting rights or super-majority stake.
        effect_class: read_snapshot
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: partnership
          tags: [kyc]
          phase_tags: [onboarding]
          side_effects: facts_only
        invocation_phrases:
        - "analyze partnership control structure"
        - "who controls this partnership"
        - "identify UBOs from partnership"
        - "determine GP control for CDD"
        - "assess LP voting control"
        - "partnership UBO analysis"
        - "find controlling persons in fund"
        - "evaluate partnership governance for KYC"
        behavior: plugin
        plugin:
          handler: PartnershipAnalyzeControlOp
        args:
        - name: partnership-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: control-threshold
          type: decimal
          required: false
          default: 25.0
          description: "Percentage threshold for ownership control"
        returns:
          type: record
          fields:
          - name: gp_controllers
            type: array
            description: "GPs with management control"
          - name: lp_controllers
            type: array
            description: "LPs exceeding control threshold"
          - name: ubo_candidates
            type: array
            description: "Natural persons identified as potential UBOs"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
