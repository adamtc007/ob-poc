domains:
  case-event:
    description: Audit trail for KYC case activities
    verbs:
      log:
        flavour: instance_adding
        description: Log a case event
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: case_event
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "log event on KYC case"
        - "record case activity"
        - "add audit trail entry"
        - "capture case event"
        - "write case history note"
        - "record CDD activity step"
        - "log action taken on case"
        - "add event to case timeline"
        behavior: crud
        crud:
          operation: insert
          table: case_events
          schema: kyc
          returning: event_id
        args:
        - name: case-id
          type: uuid
          required: true
          maps_to: case_id
          lookup:
            table: cases
            entity_type: kyc_case
            schema: kyc
            search_key: case_id
            primary_key: case_id
        - name: workstream-id
          type: uuid
          required: false
          maps_to: workstream_id
          lookup:
            table: entity_workstreams
            entity_type: entity_workstream
            schema: kyc
            search_key: workstream_id
            primary_key: workstream_id
        - name: event-type
          type: string
          required: true
          maps_to: event_type
        - name: event-data
          type: json
          required: false
          maps_to: event_data
        - name: actor-id
          type: uuid
          required: false
          maps_to: actor_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: actor-type
          type: string
          required: false
          maps_to: actor_type
          default: USER
          valid_values:
          - USER
          - SYSTEM
          - RULE_ENGINE
          - INTEGRATION
        - name: comment
          type: string
          required: false
          maps_to: comment
        returns:
          type: uuid
          name: event_id
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      list-by-case:
        flavour: attribute_mutating
        description: List events for a case
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: case_event
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "show case event history"
        - "list KYC case events"
        - "get audit trail for case"
        - "display case activity log"
        - "what happened on this case"
        - "view case timeline"
        - "show CDD activity history"
        - "retrieve case event log"
        behavior: crud
        crud:
          operation: list_by_fk
          table: case_events
          schema: kyc
          fk_col: case_id
        args:
        - name: case-id
          type: uuid
          required: true
          lookup:
            table: cases
            entity_type: kyc_case
            schema: kyc
            search_key: case_id
            primary_key: case_id
        - name: event-type
          type: string
          required: false
          maps_to: event_type
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
