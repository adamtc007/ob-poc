domains:
  document:
    description: Document management - solicitation, upload, verification, and lifecycle
    invocation_hints:
      - document
      - passport
      - proof
      - upload
      - verify
      - evidence
      - KYC document
      - CDD
      - doc pack
      - cert of inc
      - articles of association
      - missing documents
      - outstanding documents
      - solicit
      - reject document
      - document request
    verbs:
      # ========================================================================
      # Document Solicitation (outbound tasks)
      # ========================================================================
      solicit:
        description: Solicit a single document from an entity and track through to fulfillment
        behavior: durable
        durable:
          runtime: bpmn-lite
          process_key: kyc-document-request
          correlation_field: workflow-instance-id
          task_bindings:
            send_request_notification: notification.send-document-request
            validate_uploaded_document: document.verify
            update_requirement_status: requirement.create
          timeout: P14D
        invocation_phrases:
          - request document
          - solicit document
          - ask for passport
          - request proof of address
          - request proof of identity
          - get document from entity
          - ask the client for this document
          - request the missing document from this entity
          - solicit this missing document
          - request the certificate of incorporation
          - ask for the cert of inc
          - send a document request to the client
          - chase the missing passport
          - request articles of association from entity
          - ask the entity to provide their ID
          - solicit proof of address from this person
          - can you request the KYC document
          - send out a request for this document
          - request identity documents
          - request identity documents for due diligence
          - request documents for due diligence
          - ask for identity documents
          - request KYC documents
          - request CDD documents
          - solicit identity documents
          - ask for the identity documents
          - solicit the KYC documents from this entity
          - request the CDD documents
          - chase the outstanding documents
          - ask them for their passport
          - chase the client for the passport
          - we need proof of address from this entity
          - send a doc request
          - ask them for their ID
          - KYC document request
          - chase the passport
          - doc collection
          - collect documents
          - chase documents
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [workflow, outbound, write, durable]
          phase_tags: [kyc]
          side_effects: state_write
        lifecycle:
          requires_scope: cbu
        args:
          - name: subject-entity-id
            type: uuid
            required: true
            description: Entity to request document from
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: doc-type
            type: string
            required: true
            description: Document type to solicit
            valid_values:
              - passport
              - proof_of_address
              - articles_of_incorporation
              - certificate_of_incumbency
              - board_resolution
              - tax_form
              - financial_statement
              - identity_card
              - utility_bill
              - bank_statement
          - name: workflow-instance-id
            type: uuid
            required: false
            description: Workflow instance for requirement tracking
          - name: due-date
            type: string
            required: false
            description: Due date (YYYY-MM-DD)
          - name: required-state
            type: string
            required: false
            default: verified
            valid_values:
              - received
              - verified
        sentences:
          step:
            - "Request {doc-type} from {subject-entity-id}"
            - "Solicit {doc-type} document"
          summary:
            - "solicited {doc-type}"
          clarify:
            subject-entity-id: "Which entity should provide the document?"
            doc-type: "What type of document is needed? (e.g., passport, proof of address)"
          completed: "Document request sent to {subject-entity-id} for {doc-type}"
        returns:
          type: record
          fields:
            task_id: uuid
            requirement_id: uuid

      solicit-set:
        description: Solicit multiple documents from an entity and track through to fulfillment
        behavior: durable
        durable:
          runtime: bpmn-lite
          process_key: kyc-document-request-set
          correlation_field: workflow-instance-id
          task_bindings:
            send_request_notification: notification.send-document-request
            validate_uploaded_document: document.verify
            update_requirement_status: requirement.create-set
          timeout: P14D
        invocation_phrases:
          - request documents
          - solicit document set
          - ask for passport and proof of address
          - get KYC documents
          - request identity document set
          - send out the full document request pack
          - send out the whole doc pack for this entity
          - request the full CDD document pack
          - request all outstanding documents
          - solicit the complete document set
          - solicit all required documents from entity
          - send out the KYC document pack
          - request the full set of KYC documents
          - ask for all the missing documents
          - chase the outstanding document pack
          - send the complete document request to entity
          - request all identity and address documents
          - bulk request documents for this person
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request_set
          tags: [workflow, outbound, write, batch, durable]
          phase_tags: [kyc]
          side_effects: state_write
        lifecycle:
          requires_scope: cbu
        args:
          - name: subject-entity-id
            type: uuid
            required: true
            description: Entity to request documents from
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: doc-types
            type: string_list
            required: true
            description: List of document types to solicit
          - name: workflow-instance-id
            type: uuid
            required: false
            description: Workflow instance for requirement tracking
          - name: due-date
            type: string
            required: false
            description: Due date (YYYY-MM-DD)
        sentences:
          step:
            - "Request {doc-types} from {subject-entity-id}"
            - "Solicit documents from {subject-entity-id}"
          summary:
            - "solicited {doc-types}"
          clarify:
            subject-entity-id: "Which entity should provide the documents?"
            doc-types: "Which document types are needed? (e.g., passport, proof of address)"
          completed: "Document request sent to {subject-entity-id} for {doc-types}"
        returns:
          type: record
          fields:
            task_id: uuid
            expected_count: integer
            requirement_ids: list

      # ========================================================================
      # KYC Request Tracking (merged from doc-request)
      # ========================================================================
      create-request:
        description: Create a document request for a KYC workstream.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "create document request"
          - "request KYC document from client"
          - "add document to collection list"
          - "create CDD document request"
          - "open a new document request"
          - "add a doc request to the workstream"
          - "set up a document request for this entity"
          - "create a request for the missing document"
          - "log a new KYC document request"
          - "initiate document collection request"
        behavior: crud
        crud:
          operation: upsert
          table: doc_requests
          schema: kyc
          returning: request_id
          conflict_keys:
            - workstream_id
            - doc_type
        emits_event: document.create-requestd
        args:
          - name: workstream-id
            type: uuid
            required: true
            maps_to: workstream_id
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: kyc
              search_key: workstream_id
              primary_key: workstream_id
          - name: doc-type
            type: string
            required: true
            maps_to: doc_type
            valid_values:
              - PASSPORT
              - NATIONAL_ID
              - DRIVERS_LICENSE
              - PROOF_OF_ADDRESS
              - CERT_OF_INCORPORATION
              - CERT_OF_GOOD_STANDING
              - MEMORANDUM_ARTICLES
              - REGISTER_OF_DIRECTORS
              - REGISTER_OF_SHAREHOLDERS
              - ANNUAL_RETURN
              - TRUST_DEED
              - LETTER_OF_WISHES
              - DEED_OF_APPOINTMENT
              - BANK_STATEMENT
              - SOURCE_OF_WEALTH
              - SOURCE_OF_FUNDS
              - FINANCIAL_STATEMENTS
              - TAX_RETURN
              - REGULATORY_LICENSE
              - POWER_OF_ATTORNEY
              - BOARD_RESOLUTION
              - SIGNATORY_LIST
          - name: due-date
            type: date
            required: false
            maps_to: due_date
          - name: is-mandatory
            type: boolean
            required: false
            maps_to: is_mandatory
            default: true
          - name: priority
            type: string
            required: false
            maps_to: priority
            default: NORMAL
            valid_values:
              - LOW
              - NORMAL
              - HIGH
              - URGENT
        returns:
          type: uuid
          name: request_id
          capture: true

      mark-requested:
        description: Mark a document request as formally requested.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "mark document as requested"
          - "confirm document request sent"
          - "set document status to requested"
          - "record outreach for document"
          - "flag document as sent to client"
          - "mark that we asked for this document"
          - "update request status to requested"
          - "record that the request was dispatched"
          - "confirm we chased the client for this doc"
          - "log outreach for this document request"
        behavior: crud
        crud:
          operation: update
          table: doc_requests
          schema: kyc
          key: request_id
          set_values:
            status: REQUESTED
            requested_at: now()
        emits_event: doc-request.requested
        args:
          - name: request-id
            type: uuid
            required: true
            maps_to: request_id
            lookup:
              table: doc_requests
              entity_type: doc_request
              schema: kyc
              search_key: request_id
              primary_key: request_id
        returns:
          type: affected

      mark-received:
        description: Record receipt against a document request.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "record document received"
          - "mark document as received"
          - "update document request to received"
          - "record KYC document intake"
          - "confirm document arrived from client"
          - "log receipt of this document"
          - "the client sent the passport mark it received"
          - "acknowledge document submission"
          - "we got the document update the status"
          - "record that the document came in"
        behavior: crud
        crud:
          operation: update
          table: doc_requests
          schema: kyc
          key: request_id
          set_values:
            status: RECEIVED
            received_at: now()
        emits_event: document.mark-receivedd
        args:
          - name: request-id
            type: uuid
            required: true
            maps_to: request_id
            lookup:
              table: doc_requests
              entity_type: doc_request
              schema: kyc
              search_key: request_id
              primary_key: request_id
          - name: document-id
            type: uuid
            required: true
            maps_to: document_id
            lookup:
              table: document_catalog
              entity_type: document
              schema: ob-poc
              search_key: document_name
              primary_key: doc_id
        returns:
          type: affected

      verify-request:
        description: Verify a document request as satisfied by a valid document.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "verify KYC document request"
          - "approve requested document as valid"
          - "mark document request verified"
          - "accept document for CDD"
          - "confirm document passes QA for this request"
          - "sign off on the document request"
          - "complete the document request verification"
          - "mark CDD document request as satisfied"
          - "this document satisfies the request"
          - "approve the document for the workstream"
        behavior: crud
        crud:
          operation: update
          table: doc_requests
          schema: kyc
          key: request_id
          set_values:
            status: VERIFIED
            verified_at: now()
        emits_event: doc-request.verified
        args:
          - name: request-id
            type: uuid
            required: true
            maps_to: request_id
            lookup:
              table: doc_requests
              entity_type: doc_request
              schema: kyc
              search_key: request_id
              primary_key: request_id
          - name: notes
            type: string
            required: false
            maps_to: verification_notes
          - name: verification-notes
            type: string
            required: false
            maps_to: verification_notes
        returns:
          type: affected

      reject-request:
        description: Reject a document request submission.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "reject KYC document request"
          - "document failed quality check"
          - "mark document request as rejected"
          - "send document back for resubmission"
          - "reject this document submission"
          - "fail the document against the request"
          - "send the doc request back as unsatisfied"
          - "this document does not meet requirements"
          - "kick back the document request"
          - "the submitted document is invalid for the request"
        behavior: crud
        crud:
          operation: update
          table: doc_requests
          schema: kyc
          key: request_id
          set_values:
            status: REJECTED
        emits_event: document.reject-requested
        args:
          - name: request-id
            type: uuid
            required: true
            maps_to: request_id
            lookup:
              table: doc_requests
              entity_type: doc_request
              schema: kyc
              search_key: request_id
              primary_key: request_id
          - name: reason
            type: string
            required: true
            maps_to: rejection_reason
        returns:
          type: affected

      waive-request:
        description: Waive a document request requirement.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "waive document requirement"
          - "skip this document request"
          - "approve document exemption"
          - "grant a waiver for this document"
          - "exempt entity from this document requirement"
          - "we don't need this document anymore"
          - "waive the passport requirement"
          - "mark this doc request as not required"
          - "override the missing document requirement"
        behavior: crud
        crud:
          operation: update
          table: doc_requests
          schema: kyc
          key: request_id
          set_values:
            status: WAIVED
        emits_event: document.waive-requestd
        args:
          - name: request-id
            type: uuid
            required: true
            maps_to: request_id
            lookup:
              table: doc_requests
              entity_type: doc_request
              schema: kyc
              search_key: request_id
              primary_key: request_id
          - name: notes
            type: string
            required: true
            maps_to: verification_notes
        returns:
          type: affected

      list-requests-by-workstream:
        description: List document requests for a workstream.
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: document_request
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list document requests for workstream"
          - "show outstanding document requests"
          - "what documents are still needed"
          - "show document collection status"
          - "what docs are outstanding for this workstream"
          - "show me all pending document requests"
          - "list the doc requests for this KYC case"
          - "what CDD documents are we still waiting on"
          - "show document collection progress"
          - "how many document requests are still open"
        behavior: crud
        crud:
          operation: list_by_fk
          table: doc_requests
          schema: kyc
          fk_col: workstream_id
        args:
          - name: workstream-id
            type: uuid
            required: true
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: kyc
              search_key: workstream_id
              primary_key: workstream_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set

      # ========================================================================
      # Document Cataloging (legacy)
      # ========================================================================
      catalog:
        description: Catalog a document with type lookup (legacy - prefer document.create)
        behavior: plugin
        invocation_phrases:
          - catalog document
          - add document to catalog
          - register document type
          - add document to the catalog registry
          - classify this document
          - file document under type
          - catalog this uploaded document
          - register a new document entry
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: document_catalog
          tags: [write, legacy]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: doc-type
            type: string
            required: true
            description: Document type code
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: entity-id
            type: uuid
            required: false
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: title
            type: string
            required: false
            description: Document name/title
        returns:
          type: uuid
          name: doc_id
          capture: true

      extract:
        description: Extract data from document using AI/OCR
        behavior: plugin
        invocation_phrases:
          - extract document data
          - OCR document
          - parse document
          - scan the document and extract fields
          - run OCR on this document
          - extract data from the uploaded document
          - read the document contents automatically
          - parse the passport and pull out the details
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: document_extraction
          tags: [write, ai]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: document-id
            type: uuid
            required: true
            description: Document to extract from
        returns:
          type: void

      # ========================================================================
      # Document Creation (for internal/API sources)
      # ========================================================================
      create:
        description: Create a document record (Layer B - logical identity)
        behavior: crud
        invocation_phrases:
          - create document
          - add document record
          - register document
          - create a new document entry
          - add a document to the system
          - register a new document for this entity
          - create a document record for this CBU
          - log a new document in the system
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document
          tags: [write]
          phase_tags: [kyc]
          side_effects: state_write
        crud:
          operation: insert
          table: documents
          schema: ob-poc
          returning: document_id
        args:
          - name: document-type
            type: string
            required: true
            maps_to: document_type
          - name: subject-entity-id
            type: uuid
            required: false
            maps_to: subject_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: subject-cbu-id
            type: uuid
            required: false
            maps_to: subject_cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: requirement-id
            type: uuid
            required: false
            maps_to: requirement_id
          - name: source
            type: string
            required: true
            maps_to: source
            description: Source of document (upload, ocr, api, gleif, workflow)
          - name: source-ref
            type: string
            required: false
            maps_to: source_ref
            description: External system reference ID
        returns:
          type: uuid
          name: document_id
          capture: true
        outputs:
          - name: created_document_id
            type: uuid
            entity_kind: document
            description: ID of the newly created document

      upload-version:
        description: Upload a new version of a document (Layer C - immutable submission)
        behavior: plugin
        invocation_phrases:
          - upload document
          - upload version
          - add document version
          - submit document
          - upload a new document copy
          - submit a replacement document
          - upload the latest version
          - add a new copy of this document
          - submit a refreshed document file
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: document_version
          tags: [write]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: document-id
            type: uuid
            required: true
            description: Document to add version to
          - name: content-type
            type: string
            required: true
            description: MIME type (application/pdf, image/jpeg, etc.)
          - name: blob-ref
            type: string
            required: false
            description: Storage reference (s3://bucket/key or file:///path)
          - name: structured-data
            type: json
            required: false
            description: Structured content (for JSON documents)
          - name: valid-from
            type: string
            required: false
            description: Document validity start (YYYY-MM-DD)
          - name: valid-to
            type: string
            required: false
            description: Document validity end (YYYY-MM-DD)
        returns:
          type: record
          fields:
            version_id: uuid
            version_no: integer
            cargo_ref: string

      # ========================================================================
      # QA / Verification
      # ========================================================================
      verify:
        description: QA approves a document version
        behavior: plugin
        invocation_phrases:
          - verify document
          - approve document
          - QA approve
          - mark document verified
          - approve this document
          - verify this uploaded document
          - review this document for approval
          - check whether this document is valid
          - mark this document as approved
          - sign off on this document
          - confirm the document passes QA
          - accept the passport as valid
          - this document looks good approve it
          - pass the document through QA
          - the document is fine mark it verified
          - verify the passport
          - ID looks good approve it
          - stamp this document as verified
          - this doc checks out
          - QA pass on this document
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_verification
          tags: [workflow, qa, write]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: version-id
            type: uuid
            required: true
            description: Document version to verify
          - name: verified-by
            type: string
            required: true
            description: QA operator identifier
        returns:
          type: affected

      reject:
        description: QA rejects a document version with reason code
        behavior: plugin
        invocation_phrases:
          - reject document
          - QA reject
          - mark document rejected
          - fail document verification
          - reject this document
          - mark this upload as invalid
          - reject the articles of association
          - fail the passport it is unreadable
          - send the document back wrong entity
          - this document is invalid reject it
          - QA fail this document
          - kick back this document version
          - the document is expired reject it
          - reject this upload wrong person
          - reject the articles of association wrong entity name
          - reject this document version it has the wrong entity
          - this document has the wrong entity reject it
          - reject this uploaded document
          - this passport is expired send it back
          - doc is unreadable reject it
          - wrong person on this document
          - kick this back to the client
          - fail this document
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: document_rejection
          tags: [workflow, qa, write]
          phase_tags: [kyc]
          side_effects: state_write
        args:
          - name: version-id
            type: uuid
            required: true
            description: Document version to reject
          - name: rejection-code
            type: string
            required: true
            description: Standardized rejection code
            valid_values:
              - UNREADABLE
              - CUTOFF
              - GLARE
              - LOW_RESOLUTION
              - WRONG_DOC_TYPE
              - WRONG_PERSON
              - SAMPLE_DOC
              - EXPIRED
              - NOT_YET_VALID
              - UNDATED
              - DOB_MISMATCH
              - NAME_MISMATCH
              - ADDRESS_MISMATCH
              - UNSUPPORTED_FORMAT
              - PASSWORD_PROTECTED
              - CORRUPTED
              - SUSPECTED_ALTERATION
              - INCONSISTENT_FONTS
          - name: rejection-reason
            type: string
            required: false
            description: Optional free-text reason detail
          - name: verified-by
            type: string
            required: true
            description: QA operator identifier
        returns:
          type: affected

      start-qa:
        description: Move document version to QA queue
        behavior: crud
        invocation_phrases:
          - start QA
          - begin verification
          - queue for QA
