domains:
  capability-binding:
    description: Layer 4 capability binding lifecycle (per application_instance, service)
    invocation_hints:
      - capability binding
      - binding
      - service binding
      - app binding
    verbs:
      draft:
        description: Draft a new capability binding (creates row in DRAFT state)
        invocation_phrases:
          - "draft capability binding"
          - "create new binding"
          - "draft service binding"
          - "declare binding for instance"
          - "add capability binding"
          - "register service to instance binding"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        crud:
          operation: insert
          table: capability_bindings
          schema: ob-poc
          returning: id
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: application_instance_id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            description: Layer 3 product_service id (R2 will add FK)
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      start-pilot:
        description: Start pilot — limited load, canary cohort
        invocation_phrases:
          - "start pilot for binding"
          - "begin canary on binding"
          - "promote binding to pilot"
          - "kick off pilot"
          - "start canary pilot"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: binding-id
          requires_states:
            - DRAFT
        crud:
          operation: update
          table: capability_bindings
          schema: ob-poc
          key: id
          set_values:
            binding_status: PILOT
            pilot_started_at: now()
        args:
          - name: binding-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: binding-id
          target_workspace: lifecycle_resources
          target_slot: capability_binding

      promote-live:
        description: Promote pilot binding to LIVE — full production traffic
        invocation_phrases:
          - "promote binding to live"
          - "go live with binding"
          - "promote pilot to live"
          - "graduate binding to production"
          - "make binding live"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: binding-id
          requires_states:
            - PILOT
        crud:
          operation: update
          table: capability_bindings
          schema: ob-poc
          key: id
          set_values:
            binding_status: LIVE
            promoted_live_at: now()
        args:
          - name: binding-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: binding-id
          target_workspace: lifecycle_resources
          target_slot: capability_binding

      abort-pilot:
        description: Abort pilot — return binding to DRAFT (pilot did not validate)
        invocation_phrases:
          - "abort pilot"
          - "cancel pilot"
          - "rollback pilot to draft"
          - "fail pilot"
          - "stop pilot and reset"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: binding-id
          requires_states:
            - PILOT
        crud:
          operation: update
          table: capability_bindings
          schema: ob-poc
          key: id
          set_values:
            binding_status: DRAFT
        args:
          - name: binding-id
            type: uuid
            required: true
            maps_to: id
          - name: reason
            type: string
            required: true
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: binding-id
          target_workspace: lifecycle_resources
          target_slot: capability_binding

      deprecate:
        description: Deprecate a LIVE binding — no new consumers; existing traffic drains
        invocation_phrases:
          - "deprecate capability binding"
          - "deprecate binding"
          - "mark binding deprecated"
          - "phase out binding"
          - "begin retirement of binding"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: binding-id
          requires_states:
            - LIVE
        crud:
          operation: update
          table: capability_bindings
          schema: ob-poc
          key: id
          set_values:
            binding_status: DEPRECATED
            deprecated_at: now()
        args:
          - name: binding-id
            type: uuid
            required: true
            maps_to: id
          - name: reason
            type: string
            required: true
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: binding-id
          target_workspace: lifecycle_resources
          target_slot: capability_binding

      retire:
        description: Retire a deprecated binding — terminal
        invocation_phrases:
          - "retire capability binding"
          - "retire binding"
          - "close binding"
          - "terminate binding"
          - "complete binding retirement"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: capability_binding
          tags: [lifecycle, write, destructive, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: binding-id
          requires_states:
            - DEPRECATED
        crud:
          operation: update
          table: capability_bindings
          schema: ob-poc
          key: id
          set_values:
            binding_status: RETIRED
            retired_at: now()
        args:
          - name: binding-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: binding-id
          target_workspace: lifecycle_resources
          target_slot: capability_binding
