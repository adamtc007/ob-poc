domains:
  access-review:
    description: Periodic access review and attestation
    verbs:
      create-campaign:
        description: Create access review campaign
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [authoring]
          side_effects: state_write
          harm_class: reversible
        behavior: crud
        crud:
          operation: insert
          table: access_review_campaigns
          schema: teams
          returning: campaign_id
        args:
        - name: name
          type: string
          required: true
          maps_to: name
        - name: review-type
          type: string
          required: true
          maps_to: review_type
          valid_values:
          - QUARTERLY
          - ANNUAL
          - TRIGGERED
          - JOINER_MOVER_LEAVER
        - name: scope-type
          type: string
          required: true
          maps_to: scope_type
          valid_values:
          - ALL
          - BY_TEAM_TYPE
          - BY_DELEGATING_ENTITY
          - SPECIFIC_TEAMS
          - GOVERNANCE_ONLY
        - name: scope-filter
          type: json
          required: false
          maps_to: scope_filter
        - name: deadline
          type: date
          required: true
          maps_to: deadline
        - name: review-period-start
          type: date
          required: false
          maps_to: review_period_start
        - name: review-period-end
          type: date
          required: false
          maps_to: review_period_end
        produces:
          type: access_review_campaign
        invocation_phrases:
        - create access review campaign
        - start new review campaign
        - launch access review
        - set up review campaign
        - initiate access certification
      populate-campaign:
        description: Populate campaign with review items based on scope
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [authoring]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_populate
        args:
        - name: campaign
          type: uuid
          required: true
          lookup:
            table: access_review_campaigns
            entity_type: access_review_campaign
            schema: teams
            search_key: name
            primary_key: campaign_id
        effects:
        - Creates review items for in-scope memberships
        - Auto-detects flags and recommendations
        - Assigns reviewers based on team hierarchy
        invocation_phrases:
        - populate review campaign
        - add items to campaign
        - scope the access review
        - load review items
        - generate review scope
      launch-campaign:
        description: Launch campaign and notify reviewers
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [governance]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_launch
        args:
        - name: campaign
          type: uuid
          required: true
        effects:
        - Sets status to ACTIVE
        - Sends email notifications to reviewers
        - Schedules reminder notifications
        invocation_phrases:
        - launch the campaign
        - activate review campaign
        - send campaign to reviewers
        - start the review cycle
        - kick off access review
      confirm-access:
        description: Confirm access is appropriate
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [review]
          side_effects: state_write
          harm_class: reversible
        behavior: crud
        crud:
          operation: update
          table: access_review_items
          schema: teams
          key: item_id
          set_values:
            status: CONFIRMED
            reviewed_at: now()
        args:
        - name: item
          type: uuid
          required: true
          maps_to: item_id
        - name: notes
          type: string
          required: false
          maps_to: reviewer_notes
        invocation_phrases:
        - confirm access is appropriate
        - approve this access
        - certify access
        - mark access as valid
        - confirm entitlement
      revoke-access:
        description: Revoke access - ends the membership
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [destructive]
          side_effects: state_write
          harm_class: irreversible
        behavior: plugin
        handler: access_review_revoke
        args:
        - name: item
          type: uuid
          required: true
        - name: reason
          type: string
          required: true
        - name: effective-date
          type: date
          required: false
          description: 'When to end access (default: immediately)'
        effects:
        - Marks review item as REVOKED
        - Ends membership effective_to date
        - Logs to audit trail
        invocation_phrases:
        - revoke access
        - remove access
        - terminate entitlement
        - end access
        - cut off access
      extend-access:
        description: Extend access with new end date
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [review]
          side_effects: state_write
          harm_class: reversible
        behavior: crud
        crud:
          operation: update
          table: access_review_items
          schema: teams
          key: item_id
          set_values:
            status: EXTENDED
            reviewed_at: now()
        args:
        - name: item
          type: uuid
          required: true
          maps_to: item_id
        - name: extend-to
          type: date
          required: true
          maps_to: extended_to
        - name: reason
          type: string
          required: true
          maps_to: extension_reason
        invocation_phrases:
        - extend access
        - renew access
        - push back access expiry
        - extend entitlement date
        - grant access extension
      escalate-item:
        description: Escalate item for senior review
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [review]
          side_effects: state_write
          harm_class: reversible
        behavior: crud
        crud:
          operation: update
          table: access_review_items
          schema: teams
          key: item_id
          set_values:
            status: ESCALATED
            escalated_at: now()
        args:
        - name: item
          type: uuid
          required: true
          maps_to: item_id
        - name: escalate-to
          type: uuid
          required: false
          maps_to: escalated_to_user_id
          lookup:
            table: clients
            entity_type: user
            schema: client_portal
            search_key: email
            primary_key: client_id
        - name: reason
          type: string
          required: true
          maps_to: escalation_reason
        invocation_phrases:
        - escalate review item
        - escalate for senior review
        - flag item for escalation
        - refer to senior reviewer
        - escalate access concern
      bulk-confirm:
        description: Confirm multiple items at once
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [review]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_bulk_confirm
        args:
        - name: items
          type: uuid_list
          required: true
        - name: notes
          type: string
          required: false
        invocation_phrases:
        - bulk confirm items
        - confirm all selected
        - batch approve access
        - confirm multiple items
        - mass certify
      confirm-all-clean:
        description: Confirm all unflagged items for reviewer
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [review]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_confirm_clean
        args:
        - name: campaign
          type: uuid
          required: true
        - name: reviewer
          type: uuid
          required: false
          description: 'Specific reviewer (default: current user)'
        invocation_phrases:
        - confirm all clean items
        - approve all unflagged
        - certify clean items
        - bulk confirm unflagged
        - clear all good items
      attest:
        description: Formal attestation of reviews with digital signature
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [governance]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_attest
        args:
        - name: campaign
          type: uuid
          required: true
        - name: scope
          type: string
          required: true
          valid_values:
          - FULL_CAMPAIGN
          - MY_REVIEWS
          - SPECIFIC_TEAM
          - SPECIFIC_ITEMS
        - name: team
          type: uuid
          required: false
          description: Required if scope is SPECIFIC_TEAM
        - name: items
          type: uuid_list
          required: false
          description: Required if scope is SPECIFIC_ITEMS
        - name: attestation-text
          type: string
          required: false
          description: 'Custom attestation text (default: standard template)'
        effects:
        - Creates attestation record with signature hash
        - Records IP and session context
        - Logs to audit trail
        invocation_phrases:
        - attest to review
        - sign off on review
        - formal attestation
        - digitally attest
        - certify review completion
      process-deadline:
        description: Handle items past deadline
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [automated]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        handler: access_review_process_deadline
        args:
        - name: campaign
          type: uuid
          required: true
        - name: action
          type: string
          required: true
          valid_values:
          - suspend
          - escalate
          - report-only
        effects:
        - Suspends unreviewed memberships if action=suspend
        - Escalates to compliance if action=escalate
        - Notifies stakeholders
        invocation_phrases:
        - process deadline items
        - handle overdue reviews
        - process past-due items
        - deadline enforcement
        - escalate overdue reviews
      send-reminders:
        description: Send reminder emails to reviewers with pending items
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [notification]
          side_effects: emitting
          harm_class: reversible
        behavior: plugin
        handler: access_review_send_reminders
        args:
        - name: campaign
          type: uuid
          required: true
        effects:
        - Sends email to reviewers with pending items
        - Includes countdown to deadline
        invocation_phrases:
        - send review reminders
        - remind reviewers
        - nudge pending reviewers
        - send reminder emails
        - chase outstanding reviews
      my-pending:
        description: Get my pending review items
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [read-only]
          side_effects: none
          harm_class: read_only
        behavior: crud
        crud:
          operation: select
          table: access_review_items
          schema: teams
        args:
        - name: campaign
          type: uuid
          required: false
          maps_to: campaign_id
          description: 'Filter to specific campaign (default: all active)'
        - name: reviewer
          type: uuid
          required: true
          maps_to: reviewer_user_id
          lookup:
            table: clients
            entity_type: user
            schema: client_portal
            search_key: email
            primary_key: client_id
        - name: status
          type: string
          required: false
          maps_to: status
          default: PENDING
        invocation_phrases:
        - my pending reviews
        - what's waiting for me
        - show my review queue
        - my outstanding items
        - my access reviews
      campaign-status:
        description: Get campaign details with review items
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [read-only]
          side_effects: none
          harm_class: read_only
        behavior: crud
        crud:
          operation: select
          table: access_review_campaigns
          schema: teams
          key: campaign_id
        args:
        - name: campaign
          type: uuid
          required: true
          maps_to: campaign_id
          lookup:
            table: access_review_campaigns
            entity_type: access_review_campaign
            schema: teams
            search_key: name
            primary_key: campaign_id
        invocation_phrases:
        - campaign status
        - review campaign progress
        - how's the campaign going
        - campaign dashboard
        - review campaign summary
      list-items:
        description: List review items for a campaign
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [read-only]
          side_effects: none
          harm_class: read_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: access_review_items
          schema: teams
          fk_col: campaign_id
        args:
        - name: campaign
          type: uuid
          required: true
          maps_to: campaign_id
          lookup:
            table: access_review_campaigns
            entity_type: access_review_campaign
            schema: teams
            search_key: name
            primary_key: campaign_id
        - name: status
          type: string
          required: false
          maps_to: status
        invocation_phrases:
        - list review items
        - show campaign items
        - view review items
        - list items for campaign
        - review item list
      audit-report:
        description: List attestations for audit trail
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [read-only]
          side_effects: none
          harm_class: read_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: access_review_attestations
          schema: teams
          fk_col: campaign_id
        args:
        - name: campaign
          type: uuid
          required: true
          maps_to: campaign_id
          lookup:
            table: access_review_campaigns
            entity_type: access_review_campaign
            schema: teams
            search_key: name
            primary_key: campaign_id
        invocation_phrases:
        - access review audit report
        - attestation trail
        - review audit log
        - certification audit
        - compliance audit for reviews
      list-flagged:
        description: List items with detected issues
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: access_review
          phase_tags: [read-only]
          side_effects: none
          harm_class: read_only
        behavior: crud
        crud:
          operation: select
          table: access_review_items
          schema: teams
        args:
        - name: campaign
          type: uuid
          required: true
          maps_to: campaign_id
        - name: flag-type
          type: string
          required: false
          valid_values:
          - legal_expired
          - legal_expiring
          - no_legal_link
          - dormant
          - never_logged_in
        invocation_phrases:
        - list flagged items
        - show flagged reviews
        - items with issues
        - flagged access items
        - problematic access entries
