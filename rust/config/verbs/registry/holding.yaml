domains:
  holding:
    description: Investor position management in share classes (supports both TA KYC-as-a-Service and UBO intra-group holdings)
    verbs:
      create:
        description: Create a new investor holding in a share class (idempotent by share_class+investor)
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "create holding in share class"
        - "register new investor position"
        - "add holding for investor"
        - "set up share class holding"
        - "what holdings need creating"
        - "open position in this class"
        - "book investor into share class"
        - "new TA holding record"
        behavior: crud
        crud:
          operation: upsert
          table: holdings
          schema: kyc
          returning: id
          conflict_keys:
          - share_class_id
          - investor_entity_id
        args:
        - name: share-class-id
          type: uuid
          required: true
          maps_to: share_class_id
          lookup:
            table: share_classes
            entity_type: share_class
            schema: kyc
            search_key: name
            primary_key: id
        - name: investor-entity-id
          type: uuid
          required: true
          maps_to: investor_entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: units
          type: decimal
          required: false
          maps_to: units
          default: 0
        - name: cost-basis
          type: decimal
          required: false
          maps_to: cost_basis
        - name: acquisition-date
          type: date
          required: false
          maps_to: acquisition_date
        returns:
          type: uuid
          name: holding_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      create-for-investor:
        description: Create holding linked to an investor record (for TA KYC-as-a-Service)
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "create holding for investor record"
        - "link holding to TA investor"
        - "add position for this investor"
        - "register holding via investor ID"
        - "set up TA holding record"
        - "book investor position in class"
        - "attach holding to investor"
        - "new holding with provider reference"
        behavior: crud
        crud:
          operation: upsert
          table: holdings
          schema: kyc
          returning: id
          conflict_keys:
          - share_class_id
          - investor_id
        args:
        - name: share-class-id
          type: uuid
          required: true
          maps_to: share_class_id
          lookup:
            table: share_classes
            entity_type: share_class
            schema: kyc
            search_key: name
            primary_key: id
        - name: investor-id
          type: uuid
          required: true
          maps_to: investor_id
          lookup:
            table: investors
            entity_type: investor
            schema: kyc
            search_key: investor_name
            primary_key: investor_id
        - name: usage-type
          type: string
          required: true
          maps_to: usage_type
          description: "Purpose of holding: TA (Transfer Agency - client investors) or UBO (intra-group ownership tracking)"
          validation:
            enum:
            - TA
            - UBO
        - name: provider
          type: string
          required: false
          maps_to: provider
          description: "Data source: clearstream, euroclear, manual, csv_import, api"
        - name: provider-reference
          type: string
          required: false
          maps_to: provider_reference
          description: "External reference ID from data provider"
        - name: units
          type: decimal
          required: false
          maps_to: units
          default: 0
        - name: cost-basis
          type: decimal
          required: false
          maps_to: cost_basis
        - name: acquisition-date
          type: date
          required: false
          maps_to: acquisition_date
        - name: holding-status
          type: string
          required: false
          maps_to: holding_status
          default: ACTIVE
          description: "Holding lifecycle status (uppercase per schema)"
          validation:
            enum:
            - PENDING
            - ACTIVE
            - SUSPENDED
            - TRANSFERRED
            - CLOSED
        returns:
          type: uuid
          name: holding_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      ensure:
        description: Ensure investor holding exists (upsert)
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "ensure holding exists for investor"
        - "upsert investor position record"
        - "guarantee holding is registered"
        - "make sure holding is in place"
        - "does this holding exist already"
        - "idempotent holding setup"
        - "verify or create investor holding"
        - "ensure position record in register"
        behavior: crud
        crud:
          operation: upsert
          table: holdings
          schema: kyc
          conflict_keys:
          - share_class_id
          - investor_entity_id
          returning: id
        args:
        - name: share-class-id
          type: uuid
          required: true
          maps_to: share_class_id
          lookup:
            table: share_classes
            entity_type: share_class
            schema: kyc
            search_key: name
            primary_key: id
        - name: investor-entity-id
          type: uuid
          required: true
          maps_to: investor_entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: investor-id
          type: uuid
          required: false
          maps_to: investor_id
          lookup:
            table: investors
            entity_type: investor
            schema: kyc
            search_key: investor_name
            primary_key: investor_id
        - name: usage-type
          type: string
          required: false
          maps_to: usage_type
          description: "Purpose: TA (Transfer Agency) or UBO (intra-group ownership)"
          validation:
            enum:
            - TA
            - UBO
        - name: provider
          type: string
          required: false
          maps_to: provider
        - name: provider-reference
          type: string
          required: false
          maps_to: provider_reference
        - name: units
          type: decimal
          required: false
          maps_to: units
        - name: cost-basis
          type: decimal
          required: false
          maps_to: cost_basis
        - name: acquisition-date
          type: date
          required: false
          maps_to: acquisition_date
        - name: holding-status
          type: string
          required: false
          maps_to: holding_status
          description: "Holding lifecycle status (uppercase per schema)"
          validation:
            enum:
            - PENDING
            - ACTIVE
            - SUSPENDED
            - TRANSFERRED
            - CLOSED
        returns:
          type: uuid
          name: holding_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update-units:
        description: Update holding units (for position adjustments)
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "update units on this holding"
        - "adjust position size"
        - "change holding unit count"
        - "modify investor position amount"
        - "correct units in register"
        - "how do I adjust holding units"
        - "amend cost basis on position"
        - "restate investor holding balance"
        behavior: crud
        crud:
          operation: update
          table: holdings
          schema: kyc
          key: id
        args:
        - name: holding-id
          type: uuid
          required: true
          maps_to: id
          lookup:
            table: holdings
            entity_type: holding
            schema: kyc
            search_key: id
            primary_key: id
        - name: units
          type: decimal
          required: true
          maps_to: units
        - name: cost-basis
          type: decimal
          required: false
          maps_to: cost_basis
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update-status:
        description: Update holding status
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "change holding status"
        - "update position lifecycle state"
        - "suspend this investor holding"
        - "mark holding as transferred"
        - "set holding to pending"
        - "what status is this holding"
        - "transition holding to active"
        - "update register status for position"
        behavior: crud
        crud:
          operation: update
          table: holdings
          schema: kyc
          key: id
        args:
        - name: holding-id
          type: uuid
          required: true
          maps_to: id
          lookup:
            table: holdings
            entity_type: holding
            schema: kyc
            search_key: id
            primary_key: id
        - name: holding-status
          type: string
          required: true
          maps_to: holding_status
          description: "Holding lifecycle status (uppercase per schema)"
          validation:
            enum:
            - PENDING
            - ACTIVE
            - SUSPENDED
            - TRANSFERRED
            - CLOSED
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: holding-id
          target_state_arg: status
          target_workspace: cbu
          target_slot: holding

      read:
        description: Read a holding by ID
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "show holding details"
        - "get investor position info"
        - "look up this holding"
        - "what is the holding balance"
        - "fetch holding record by ID"
        - "display position details"
        - "read holding from register"
        - "show cost basis for holding"
        behavior: crud
        crud:
          operation: select
          table: holdings
          schema: kyc
        args:
        - name: holding-id
          type: uuid
          required: true
          maps_to: id
          lookup:
            table: holdings
            entity_type: holding
            schema: kyc
            search_key: id
            primary_key: id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-share-class:
        description: List holdings for a share class
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list holdings in share class"
        - "show investors in this class"
        - "who holds this share class"
        - "get all positions for ISIN"
        - "show register for share class"
        - "display holders by class"
        - "investor list for this class"
        - "which investors hold this class"
        behavior: crud
        crud:
          operation: list_by_fk
          table: holdings
          schema: kyc
          fk_col: share_class_id
        args:
        - name: share-class-id
          type: uuid
          required: true
          lookup:
            table: share_classes
            entity_type: share_class
            schema: kyc
            search_key: name
            primary_key: id
        - name: status
          type: string
          required: false
          maps_to: status
        - name: usage-type
          type: string
          required: false
          maps_to: usage_type
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-investor:
        description: List holdings for an investor across all share classes
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list all holdings for investor"
        - "show positions across share classes"
        - "what does this investor hold"
        - "get portfolio for investor entity"
        - "investor holdings across all funds"
        - "display all positions for entity"
        - "which classes does investor hold"
        - "show investor portfolio breakdown"
        behavior: crud
        crud:
          operation: list_by_fk
          table: holdings
          schema: kyc
          fk_col: investor_entity_id
        args:
        - name: investor-entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-investor-record:
        description: List holdings for an investor record (TA workflow)
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list holdings for investor record"
        - "show TA positions for investor"
        - "get holdings by investor ID"
        - "display register for TA investor"
        - "what positions does investor have"
        - "fetch holdings via TA record"
        - "investor record position summary"
        - "show holdings linked to investor"
        behavior: crud
        crud:
          operation: list_by_fk
          table: holdings
          schema: kyc
          fk_col: investor_id
        args:
        - name: investor-id
          type: uuid
          required: true
          lookup:
            table: investors
            entity_type: investor
            schema: kyc
            search_key: investor_name
            primary_key: investor_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      close:
        description: Close a holding (mark as inactive)
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: holding
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "close this investor holding"
        - "mark position as closed"
        - "deactivate holding in register"
        - "close out investor position"
        - "shut down this holding"
        - "zero out and close position"
        - "terminate holding record"
        - "archive this investor position"
        behavior: crud
        crud:
          operation: update
          table: holdings
          schema: kyc
          key: id
          set_values:
            status: closed
            holding_status: closed
        args:
        - name: holding-id
          type: uuid
          required: true
          maps_to: id
          lookup:
            table: holdings
            entity_type: holding
            schema: kyc
            search_key: id
            primary_key: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: holding-id
          target_workspace: cbu
          target_slot: holding

      restrict:
        description: "Apply legal restriction to holding (court order / dispute freeze)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: holding
          subject_kinds: [holding]
          phase_tags: [holding]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "restrict holding"
          - "lock holding"
          - "freeze holding"
          - "apply holding restriction"
          - "holding legal lock"
        args:
          - name: holding-id
            type: uuid
            required: true
            maps_to: holding_id
          - name: reason
            type: string
            required: true
            maps_to: reason
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: holding-id
          target_workspace: cbu
          target_slot: holding

      lift-restriction:
        description: "Lift legal restriction from holding"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: holding
          subject_kinds: [holding]
          phase_tags: [holding]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "unlock holding"
          - "lift holding restriction"
          - "release holding lock"
        args:
          - name: holding-id
            type: uuid
            required: true
            maps_to: holding_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: holding-id
          target_workspace: cbu
          target_slot: holding

      pledge:
        description: "Pledge holding as collateral against a loan / derivative exposure"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: holding
          subject_kinds: [holding]
          phase_tags: [holding]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "pledge holding as collateral"
          - "collateralize holding"
          - "mark holding as pledged"
          - "pledge these units"
        args:
          - name: holding-id
            type: uuid
            required: true
            maps_to: holding_id
          - name: collateral-ref
            type: string
            required: true
            maps_to: collateral_ref
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: holding-id
          target_workspace: cbu
          target_slot: holding

      release-pledge:
        description: "Release pledge on holding (collateral no longer required)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: holding
          subject_kinds: [holding]
          phase_tags: [holding]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "release pledge"
          - "unpledge holding"
          - "remove holding collateral"
        args:
          - name: holding-id
            type: uuid
            required: true
            maps_to: holding_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: holding-id
          target_workspace: cbu
          target_slot: holding
