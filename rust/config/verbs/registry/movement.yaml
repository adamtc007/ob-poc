domains:
  movement:
    description: Fund subscription, redemption, transfer, and PE/VC capital transactions
    verbs:
      subscribe:
        description: Record a subscription (investor buying units). Idempotent via (holding_id, trade_date, reference).
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: movement
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "record investor subscription order"
        - "book subscription into fund"
        - "process new subscription for LP"
        - "investor buying units in share class"
        - "enter subscription trade for holding"
        - "how do I record a subscription"
        - "add subscription movement to register"
        - "create subscription at today NAV"
        behavior: crud
        crud:
          operation: upsert
          table: movements
          schema: kyc
          returning: id
          conflict_keys:
          - holding_id
          - trade_date
          - reference
        args:
        - name: holding-id
          type: uuid
          required: true
          maps_to: holding_id
          lookup:
            table: holdings
            entity_type: holding
            schema: kyc
            search_key: id
            primary_key: id
        - name: units
          type: decimal
          required: true
          maps_to: units
        - name: price-per-unit
          type: decimal
          required: true
          maps_to: price_per_unit
        - name: amount
          type: decimal
          required: false
          maps_to: amount
        - name: currency
          type: string
          required: false
          maps_to: currency
          default: EUR
        - name: trade-date
          type: date
          required: true
          maps_to: trade_date
        - name: settlement-date
          type: date
          required: false
          maps_to: settlement_date
        - name: reference
          type: string
          required: true
          maps_to: reference
        - name: notes
          type: string
          required: false
          maps_to: notes
        returns:
          type: uuid
          name: movement_id
          capture: true
        set_values:
          movement_type: subscription
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

