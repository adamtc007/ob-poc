domains:
  share-class:
    description: Fund share class management and investor registry (Clearstream-style)
    verbs:
      create:
        description: Create a new share class for a fund CBU (idempotent by cbu+name)
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, creation]
        invocation_phrases:
          - "create new share class for fund"
          - "add share class to this CBU"
          - "set up UCITS share class"
          - "register new fund share class"
          - "create institutional share class"
          - "how do I add a share class"
          - "define share class with ISIN"
          - "new retail share class for vehicle"
        crud:
          operation: upsert
          table: share_classes
          schema: kyc
          returning: id
          conflict_keys:
            - cbu_id
            - name
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: entity-id
            type: uuid
            required: false
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: name
            type: string
            required: true
            maps_to: name
          - name: isin
            type: string
            required: false
            maps_to: isin
          - name: currency
            type: string
            required: false
            maps_to: currency
            default: EUR
          - name: fund-type
            type: string
            required: false
            maps_to: fund_type
            valid_values:
              - HEDGE_FUND
              - UCITS
              - AIFMD
              - PRIVATE_EQUITY
              - REIT
          - name: fund-structure
            type: string
            required: false
            maps_to: fund_structure
            valid_values:
              - OPEN_ENDED
              - CLOSED_ENDED
          - name: investor-eligibility
            type: string
            required: false
            maps_to: investor_eligibility
            valid_values:
              - RETAIL
              - PROFESSIONAL
              - QUALIFIED
          - name: nav-per-share
            type: decimal
            required: false
            maps_to: nav_per_share
          - name: nav-date
            type: date
            required: false
            maps_to: nav_date
          - name: management-fee-bps
            type: integer
            required: false
            maps_to: management_fee_bps
          - name: performance-fee-bps
            type: integer
            required: false
            maps_to: performance_fee_bps
          - name: high-water-mark
            type: boolean
            required: false
            maps_to: high_water_mark
          - name: hurdle-rate
            type: decimal
            required: false
            maps_to: hurdle_rate
          - name: subscription-frequency
            type: string
            required: false
            maps_to: subscription_frequency
          - name: redemption-frequency
            type: string
            required: false
            maps_to: redemption_frequency
          - name: redemption-notice-days
            type: integer
            required: false
            maps_to: redemption_notice_days
          - name: lock-up-period-months
            type: integer
            required: false
            maps_to: lock_up_period_months
          - name: gate-percentage
            type: decimal
            required: false
            maps_to: gate_percentage
          - name: minimum-investment
            type: decimal
            required: false
            maps_to: minimum_investment
          - name: class-category
            type: string
            required: false
            maps_to: class_category
            valid_values:
              - CORPORATE
              - FUND
        returns:
          type: uuid
          name: share_class_id
          capture: true
      ensure:
        description: Create or update share class by ISIN
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, upsert, isin]
        invocation_phrases:
          - "ensure share class exists by ISIN"
          - "upsert share class for fund"
          - "sync share class from data provider"
          - "guarantee share class is registered"
          - "idempotent share class setup by ISIN"
          - "verify or create share class"
          - "make sure share class is on file"
          - "import share class by ISIN code"
        crud:
          operation: upsert
          table: share_classes
          schema: kyc
          conflict_keys:
            - cbu_id
            - isin
          returning: id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: entity-id
            type: uuid
            required: false
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: name
            type: string
            required: true
            maps_to: name
          - name: isin
            type: string
            required: true
            maps_to: isin
          - name: currency
            type: string
            required: false
            maps_to: currency
          - name: fund-type
            type: string
            required: false
            maps_to: fund_type
            valid_values:
              - HEDGE_FUND
              - UCITS
              - AIFMD
              - PRIVATE_EQUITY
              - REIT
          - name: fund-structure
            type: string
            required: false
            maps_to: fund_structure
            valid_values:
              - OPEN_ENDED
              - CLOSED_ENDED
          - name: investor-eligibility
            type: string
            required: false
            maps_to: investor_eligibility
            valid_values:
              - RETAIL
              - PROFESSIONAL
              - QUALIFIED
          - name: nav-per-share
            type: decimal
            required: false
            maps_to: nav_per_share
          - name: nav-date
            type: date
            required: false
            maps_to: nav_date
          - name: management-fee-bps
            type: integer
            required: false
            maps_to: management_fee_bps
          - name: performance-fee-bps
            type: integer
            required: false
            maps_to: performance_fee_bps
          - name: high-water-mark
            type: boolean
            required: false
            maps_to: high_water_mark
          - name: hurdle-rate
            type: decimal
            required: false
            maps_to: hurdle_rate
          - name: subscription-frequency
            type: string
            required: false
            maps_to: subscription_frequency
          - name: redemption-frequency
            type: string
            required: false
            maps_to: redemption_frequency
          - name: redemption-notice-days
            type: integer
            required: false
            maps_to: redemption_notice_days
          - name: lock-up-period-months
            type: integer
            required: false
            maps_to: lock_up_period_months
          - name: gate-percentage
            type: decimal
            required: false
            maps_to: gate_percentage
          - name: minimum-investment
            type: decimal
            required: false
            maps_to: minimum_investment
          - name: class-category
            type: string
            required: false
            maps_to: class_category
            valid_values:
              - CORPORATE
              - FUND
        returns:
          type: uuid
          name: share_class_id
          capture: true
      update-nav:
        description: Update NAV for a share class
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, nav, update]
        invocation_phrases:
          - "update NAV for share class"
          - "set new NAV per share"
          - "post daily NAV to share class"
          - "refresh net asset value"
          - "enter latest NAV for fund class"
          - "how do I update the NAV"
          - "publish new NAV per unit"
          - "record NAV at valuation date"
        crud:
          operation: update
          table: share_classes
          schema: kyc
          key: id
        args:
          - name: share-class-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: share_classes
              entity_type: share_class
              schema: kyc
              search_key: name
              primary_key: id
          - name: nav-per-share
            type: decimal
            required: true
            maps_to: nav_per_share
          - name: nav-date
            type: date
            required: true
            maps_to: nav_date
        returns:
          type: affected
      read:
        description: Read a share class by ID
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, query]
        invocation_phrases:
          - "show share class details"
          - "look up this share class"
          - "get share class by ID"
          - "what is the current NAV"
          - "fetch share class information"
          - "display share class fee structure"
          - "read share class from register"
          - "show fund class ISIN and currency"
        crud:
          operation: select
          table: share_classes
          schema: kyc
        args:
          - name: share-class-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: share_classes
              entity_type: share_class
              schema: kyc
              search_key: name
              primary_key: id
        returns:
          type: record
      list:
        description: List share classes for a fund
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, query, list]
        invocation_phrases:
          - "list share classes for fund"
          - "show all classes in this CBU"
          - "what share classes does fund have"
          - "get share class register for fund"
          - "display fund class lineup"
          - "which share classes are active"
          - "enumerate share classes by vehicle"
          - "show available share classes"
        crud:
          operation: list_by_fk
          table: share_classes
          schema: kyc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set
      close:
        description: Close a share class to new subscriptions
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: share_class
          tags: [fund, share_class, lifecycle, close]
        invocation_phrases:
          - "close share class to subscriptions"
          - "shut down share class"
          - "stop accepting new investors"
          - "close fund class to new money"
          - "soft close this share class"
          - "how do I close a share class"
          - "mark share class as closed"
          - "suspend subscriptions for share class"
        crud:
          operation: update
          table: share_classes
          schema: kyc
          key: id
          set_values:
            status: closed
        args:
          - name: share-class-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: share_classes
              entity_type: share_class
              schema: kyc
              search_key: name
              primary_key: id
        returns:
          type: affected
