domains:
  service:
    description: "Service catalog operations — lifecycle governance (R2) plus read access."
    verbs:
      define:
        description: Promote an ungoverned service into the governed draft state
        invocation_phrases:
          - "define service"
          - "govern service"
          - "promote service to draft"
          - "start governing service"
          - "register service in catalogue"
          - "begin service definition"
          - "draft service"
          - "create governed service"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: service-id
          requires_states:
            - ungoverned
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: services
          schema: ob-poc
          key: service_id
          set_values:
            lifecycle_status: draft
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: service-id
          target_workspace: product_maintenance
          target_slot: service

      propose-revision:
        description: Move an active service back to draft for revision
        invocation_phrases:
          - "propose service revision"
          - "revise service"
          - "edit active service"
          - "amend service definition"
          - "modify governed service"
          - "revisit service"
          - "open service for revision"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: service-id
          requires_states:
            - active
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: services
          schema: ob-poc
          key: service_id
          set_values:
            lifecycle_status: draft
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: service-id
          target_workspace: product_maintenance
          target_slot: service

      deprecate:
        description: Mark an active service as deprecated
        invocation_phrases:
          - "deprecate service"
          - "mark service deprecated"
          - "phase out service"
          - "sunset service"
          - "end-of-life service"
          - "deprecate catalogue service"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: service-id
          requires_states:
            - active
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: services
          schema: ob-poc
          key: service_id
          set_values:
            lifecycle_status: deprecated
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: service-id
          target_workspace: product_maintenance
          target_slot: service

      retire:
        description: Retire a deprecated service (terminal)
        invocation_phrases:
          - "retire service"
          - "remove service from catalogue"
          - "fully retire service"
          - "decommission service"
          - "terminate service definition"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: service-id
          requires_states:
            - deprecated
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: services
          schema: ob-poc
          key: service_id
          set_values:
            lifecycle_status: retired
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: service-id
          target_workspace: product_maintenance
          target_slot: service

      list-versions:
        description: List versions for a service
        invocation_phrases:
          - "list service versions"
          - "show all service versions"
          - "enumerate versions of service"
          - "list versions for this service"
          - "show service version history"
          - "service version list"
        behavior: crud
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service
          phase_tags: [stewardship]
          side_effects: facts_only
        crud:
          operation: select
          table: service_versions
          schema: ob-poc
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      show:
        description: Show full service detail including lifecycle status
        invocation_phrases:
          - "show service"
          - "describe service in full"
          - "display full service detail"
          - "show service with lifecycle"
          - "inspect service"
          - "service deep dive"
        behavior: crud
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service
          phase_tags: [stewardship]
          side_effects: facts_only
        crud:
          operation: select
          table: services
          schema: ob-poc
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      read:
        description: Read a service by ID or code
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "read service details"
        - "get service by code"
        - "show service definition"
        - "look up custody service"
        - "fetch service catalog entry"
        - "describe this service"
        - "what is this service"
        - "display service information"
        - "show service details"
        - "read service"
        behavior: crud
        crud:
          operation: select
          table: services
          schema: ob-poc
        args:
        - name: service-id
          type: uuid
          required: false
          maps_to: service_id
          lookup:
            table: services
            entity_type: service
            schema: ob-poc
            search_key: name
            primary_key: service_id
        - name: service-code
          type: string
          required: false
          maps_to: service_code
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list:
        description: List services with optional filters
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list available services"
        - "show all services in catalog"
        - "what services are offered"
        - "browse service catalog"
        - "display active services"
        - "enumerate custody services"
        - "get service list with filters"
        - "search services by type"
        - "list all service types"
        - "list services"
        - "show all services"
        behavior: crud
        crud:
          operation: select
          table: services
          schema: ob-poc
        args:
        - name: service-type
          type: string
          required: false
          maps_to: service_type
        - name: is-active
          type: boolean
          required: false
          maps_to: is_active
        - name: limit
          type: integer
          required: false
          default: 100
        - name: offset
          type: integer
          required: false
          default: 0
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-product:
        description: List services for a product
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list services for a product"
        - "show services under this product"
        - "what services does this product include"
        - "get services linked to product"
        - "which services are bundled with product"
        - "display product service offerings"
        - "find services by product"
        - "enumerate mandatory services for product"
        - "list services for this product"
        - "what services does this product provide"
        - "show services for product"
        - "which services are available"
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: services
          join_table: product_services
          join_col: service_id
          filter_col: product_id
          schema: ob-poc
        args:
        - name: product-id
          type: uuid
          required: true
          lookup:
            table: products
            entity_type: product
            schema: ob-poc
            search_key: name
            primary_key: product_id
        - name: is-mandatory
          type: boolean
          required: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
