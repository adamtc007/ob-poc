# =============================================================================
# Identifier Domain Verbs
# =============================================================================
# Purpose: Attach and manage external identifiers (LEI, Clearstream KV, ISIN, etc.)
#          to entities using the entity_identifiers table from migration 010
# =============================================================================

domains:
  identifier:
    description: External identifier management for entities (LEI, Clearstream, Tax ID, ISIN, etc.)
    verbs:
      attach:
        description: Attach an external identifier to an entity (idempotent by entity+scheme+id)
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "attach identifier to entity"
        - "add external ID"
        - "register identifier for company"
        - "link identifier to party"
        - "set entity identifier"
        - "assign external reference"
        - "add tax ID to entity"
        - "record BIC for entity"
        behavior: crud
        crud:
          operation: upsert
          table: entity_identifiers
          schema: ob-poc
          returning: identifier_id
          conflict_keys:
          - entity_id
          - scheme
          - id
        args:
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          description: The entity to attach the identifier to
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: scheme
          type: string
          required: true
          maps_to: scheme
          description: Identifier scheme (e.g., LEI, CLEARSTREAM_KV, ISIN)
          valid_values:
          - LEI
          - CLEARSTREAM_KV
          - CLEARSTREAM_ACCT
          - ISIN
          - company_register
          - tax_id
          - SWIFT_BIC
          - DUNS
          - VAT
          - national_id
        - name: id
          type: string
          required: true
          maps_to: id
          description: The identifier value
        - name: scheme-name
          type: string
          required: false
          maps_to: scheme_name
          description: Human-readable scheme name (e.g., "Clearstream Banking KV Reference")
        - name: uri
          type: string
          required: false
          maps_to: uri
          description: URI for the identifier (e.g., GLEIF API URL)
        - name: is-validated
          type: boolean
          required: false
          maps_to: is_validated
          default: false
          description: Whether this identifier has been validated
        - name: validation-source
          type: string
          required: false
          maps_to: validation_source
          description: Source of validation (e.g., "GLEIF API", "Manual verification")
        - name: effective-from
          type: date
          required: false
          maps_to: effective_from
          description: When this identifier became effective
        - name: effective-to
          type: date
          required: false
          maps_to: effective_to
          description: When this identifier expired (for historical tracking)
        returns:
          type: uuid
          name: identifier_id
          capture: true

      attach-lei:
        description: Attach LEI with GLEIF-specific metadata (convenience wrapper)
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "attach LEI to entity"
        - "add LEI code"
        - "set legal entity identifier"
        - "record GLEIF LEI"
        - "link LEI to company"
        - "assign LEI number"
        - "register LEI for entity"
        - "store LEI from GLEIF"
        behavior: crud
        crud:
          operation: upsert
          table: entity_identifiers
          schema: ob-poc
          returning: identifier_id
          conflict_keys:
          - entity_id
          - scheme
          - id
          set_values:
            scheme: LEI
            scheme_name: Legal Entity Identifier (GLEIF)
        args:
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: lei
          type: string
          required: true
          maps_to: id
          description: 20-character LEI code
        - name: lei-status
          type: string
          required: false
          maps_to: lei_status
          valid_values:
          - ISSUED
          - LAPSED
          - RETIRED
          - PENDING_ARCHIVAL
          - MERGED
          - DUPLICATE
        - name: lei-next-renewal
          type: date
          required: false
          maps_to: lei_next_renewal
        - name: lei-managing-lou
          type: string
          required: false
          maps_to: lei_managing_lou
          description: Managing LOU (e.g., "BLOOMBERG", "DTCC")
        - name: is-validated
          type: boolean
          required: false
          maps_to: is_validated
          default: true
        - name: validation-source
          type: string
          required: false
          maps_to: validation_source
          default: GLEIF API
        returns:
          type: uuid
          name: identifier_id
          capture: true

      attach-clearstream:
        description: Attach Clearstream KV reference or account number
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "attach Clearstream reference"
        - "add Clearstream KV number"
        - "link Clearstream account"
        - "set Clearstream ID"
        - "record CASCADE reference"
        - "register Clearstream KV"
        - "assign Clearstream identifier"
        - "store Clearstream account number"
        behavior: crud
        crud:
          operation: upsert
          table: entity_identifiers
          schema: ob-poc
          returning: identifier_id
          conflict_keys:
          - entity_id
          - scheme
          - id
          set_values:
            scheme_name: Clearstream Banking Reference
        args:
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: reference
          type: string
          required: true
          maps_to: id
          description: Clearstream reference ID
        - name: reference-type
          type: string
          required: false
          maps_to: scheme
          default: CLEARSTREAM_KV
          valid_values:
          - CLEARSTREAM_KV
          - CLEARSTREAM_ACCT
        - name: is-validated
          type: boolean
          required: false
          maps_to: is_validated
          default: true
        - name: validation-source
          type: string
          required: false
          maps_to: validation_source
          default: Clearstream CASCADE-RS
        returns:
          type: uuid
          name: identifier_id
          capture: true

      validate:
        description: Mark an identifier as validated
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "validate this identifier"
        - "mark identifier as verified"
        - "confirm identifier is valid"
        - "approve identifier validation"
        - "verify LEI is current"
        - "mark ID as validated"
        - "certify identifier source"
        - "confirm external ID"
        behavior: crud
        crud:
          operation: update
          table: entity_identifiers
          schema: ob-poc
          key: identifier_id
        args:
        - name: identifier-id
          type: uuid
          required: true
          maps_to: identifier_id
        - name: validation-source
          type: string
          required: true
          maps_to: validation_source
          description: Source of validation (e.g., "GLEIF API", "Manual verification")
        set_values:
          is_validated: true
          validated_at: now()
        returns:
          type: affected

      invalidate:
        description: Mark an identifier as invalid or expired
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "invalidate this identifier"
        - "mark identifier as expired"
        - "expire this LEI"
        - "flag identifier as invalid"
        - "deactivate external ID"
        - "revoke identifier validation"
        - "mark ID as lapsed"
        - "set identifier as inactive"
        behavior: crud
        crud:
          operation: update
          table: entity_identifiers
          schema: ob-poc
          key: identifier_id
        args:
        - name: identifier-id
          type: uuid
          required: true
          maps_to: identifier_id
        - name: effective-to
          type: date
          required: false
          maps_to: effective_to
          description: Expiration date (defaults to today)
        set_values:
          is_validated: false
        returns:
          type: affected

      remove:
        description: Remove an identifier from an entity (hard delete)
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "remove identifier from entity"
        - "delete external ID"
        - "detach identifier"
        - "remove LEI from entity"
        - "drop this identifier"
        - "unlink external reference"
        - "clear identifier record"
        - "strip identifier from party"
        behavior: crud
        crud:
          operation: delete
          table: entity_identifiers
          schema: ob-poc
          key: identifier_id
        args:
        - name: identifier-id
          type: uuid
          required: true
          maps_to: identifier_id
        returns:
          type: affected

      list-by-entity:
        description: List all identifiers for an entity
        metadata:
          tier: reference
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list identifiers for entity"
        - "show all IDs for company"
        - "what identifiers does this have"
        - "get entity external references"
        - "display LEIs and identifiers"
        - "show registered identifiers"
        - "list external IDs"
        - "which identifiers are on file"
        behavior: crud
        crud:
          operation: list_by_fk
          table: entity_identifiers
          schema: ob-poc
          fk_col: entity_id
        args:
        - name: entity-id
          type: uuid
          required: true
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: scheme
          type: string
          required: false
          maps_to: scheme
          description: Filter by scheme (e.g., "LEI", "CLEARSTREAM_KV")
        returns:
          type: record_set

      find-by-lei:
        description: Find entity by LEI
        metadata:
          tier: reference
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "find entity by LEI"
        - "look up LEI code"
        - "search by LEI number"
        - "who has this LEI"
        - "resolve LEI to entity"
        - "match LEI to company"
        - "which entity owns this LEI"
        - "look up legal entity identifier"
        behavior: crud
        crud:
          operation: select
          table: entity_identifiers
          schema: ob-poc
        args:
        - name: lei
          type: string
          required: true
          maps_to: id
        set_values:
          scheme: LEI
        returns:
          type: record

      find-by-clearstream:
        description: Find entity by Clearstream reference
        metadata:
          tier: reference
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "find by Clearstream reference"
        - "look up Clearstream KV"
        - "search by CASCADE number"
        - "who has this Clearstream ID"
        - "resolve Clearstream reference"
        - "match Clearstream account"
        - "look up KV reference"
        - "find entity by Clearstream"
        behavior: crud
        crud:
          operation: select
          table: entity_identifiers
          schema: ob-poc
        args:
        - name: reference
          type: string
          required: true
          maps_to: id
        - name: reference-type
          type: string
          required: false
          maps_to: scheme
          default: CLEARSTREAM_KV
        returns:
          type: record

      find-by-isin:
        description: Find entity by ISIN (for share classes/funds)
        metadata:
          tier: reference
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "find by ISIN"
        - "look up ISIN code"
        - "search entity by ISIN"
        - "which fund has this ISIN"
        - "resolve ISIN to entity"
        - "match ISIN to share class"
        - "look up security identifier"
        - "find fund by ISIN"
        behavior: crud
        crud:
          operation: select
          table: entity_identifiers
          schema: ob-poc
        args:
        - name: isin
          type: string
          required: true
          maps_to: id
        set_values:
          scheme: ISIN
        returns:
          type: record

      update-lei-status:
        description: Update LEI status after GLEIF refresh
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: identifier
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "update LEI status"
        - "refresh LEI from GLEIF"
        - "mark LEI as lapsed"
        - "change LEI status"
        - "set LEI renewal date"
        - "update GLEIF LEI status"
        - "mark LEI as issued"
        - "sync LEI status from GLEIF"
        behavior: crud
        crud:
          operation: update
          table: entity_identifiers
          schema: ob-poc
          key: identifier_id
        args:
        - name: identifier-id
          type: uuid
          required: true
          maps_to: identifier_id
        - name: lei-status
          type: string
          required: true
          maps_to: lei_status
          valid_values:
          - ISSUED
          - LAPSED
          - RETIRED
          - PENDING_ARCHIVAL
          - MERGED
          - DUPLICATE
        - name: lei-next-renewal
          type: date
          required: false
          maps_to: lei_next_renewal
        set_values:
          validated_at: now()
        returns:
          type: affected
