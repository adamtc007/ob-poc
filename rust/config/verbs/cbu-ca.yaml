# Cbu-ca verbs — Tranche 2+3 DAG alignment (2026-04-24)
# 
# Generated as part of the verb-declaration batch that backfills
# verbs implied by DAG state machines but not previously declared.

domains:
  cbu-ca:
    description: CBU-level corporate-action events (rename, redomiciliation, merger, conversion)
    invocation_hints: []
    verbs:
      submit-for-review:
        description: "Submit CBU-level CA event for board / legal / compliance review"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cbu-corporate-action
          subject_kinds: [cbu-corporate-action]
          phase_tags: [cbu-corporate-action]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "submit CBU CA for review"
          - "escalate CBU CA event"
          - "send CBU corporate action for approval"
        args:
          - name: event-id
            type: uuid
            required: true
            maps_to: event_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: reviewable

