# CBU Role Assignment Verbs - V2
# Updated to use role taxonomy with validation
# Supports ownership chains, trust structures, fund hierarchies

domains:
  cbu:
    description: "CBU entity role management with validation"
    invocation_hints:
      - role
      - director
      - UBO
      - shareholder
      - signatory
      - trustee

    verbs:
      # ═══════════════════════════════════════════════════════════════════════
      # CORE ROLE ASSIGNMENT
      # ═══════════════════════════════════════════════════════════════════════

      validate-roles:
        flavour: discretionary
        effect_class: read_snapshot
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: cbu_validate_roles
        description: "Validate all role assignments for a CBU (check requirements)"
        invocation_phrases:
          - "validate roles"
          - "check role completeness"
          - "role validation"
          - "are required roles filled"
          - "validate CBU roles"
          - "check role requirements"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: role
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: plugin
        custom_handler: cbu_role_validate_all

        args:
          - name: cbu-id
            type: uuid
            required: true

        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
