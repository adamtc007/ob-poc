# Service-consumption verbs — Tranche 2+3 DAG alignment (2026-04-24)
# 
# Generated as part of the verb-declaration batch that backfills
# verbs implied by DAG state machines but not previously declared.

domains:
  service-consumption:
    description: Per-(CBU, service_kind) service provisioning lifecycle
    invocation_hints: []
    verbs:
      provision:
        description: "Provision a service for a CBU (proposed → provisioned; accounts opened, routings set)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: service-consumption
          subject_kinds: [service-consumption]
          phase_tags: [service-consumption]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "provision service"
          - "set up service for CBU"
          - "open accounts for service"
          - "provision service consumption"
        args:
          - name: consumption-id
            type: uuid
            required: true
            maps_to: consumption_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: consumption-id
          target_workspace: cbu
          target_slot: service_consumption

      activate:
        description: "Activate service for operational use (provisioned → active)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
