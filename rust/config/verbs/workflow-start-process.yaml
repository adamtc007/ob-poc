domains:
  workflow:
    description: "Workflow process execution operations"
    verbs:
      start-process:
        flavour: instance_adding
        description: |
          Start a named BPMN process instance and run it to quiescence.
          If the process immediately parks at a dsl.form human task, the
          response contains a bpmn_form payload for the cockpit to render.
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: external
          subject_kinds: []
          phase_tags: [workflow]
          side_effects: state_write
        args:
          - name: process_name
            type: string
            required: true
            description: Name of the process definition (matches process_definitions.name)
          - name: initial_data
            type: object
            required: false
            description: Initial data to inject into the process instance
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
