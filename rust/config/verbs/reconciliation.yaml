# Reconciliation Config Verbs (Pilot P.3 — 2026-04-23)
#
# Config-level reconciliation lifecycle per pass-3 addendum §3.1 and
# pass-7 phase 3 (preferences_set). Captures WHAT we reconcile (which
# source-of-record, tolerances, escalation paths) — NOT the recon RUN
# events (those are layer-3 operational runtime per the what-vs-how
# rule and live in service-profile territory).
#
# State machine: reconciliation_config_lifecycle (4 states).
#   draft → active → suspended → active → retired
#
# Product gates: activated_by [product.custody, product.fund_accounting,
#                              product.cash_management]
#   - position recon → custody
#   - cash recon → custody or cash_management
#   - NAV recon → fund_accounting

domains:
  reconciliation:
    description: "Reconciliation config lifecycle (per-mandate recon streams)"
    invocation_hints:
      - reconciliation
      - recon
      - reconcile
      - reconcile positions
      - reconcile cash
      - reconcile NAV
      - reconciliation config
    verbs:

      create-config:
        flavour: instance_adding
        description: "Create new reconciliation config (entry state: draft)"
        invocation_phrases:
          - "create reconciliation config"
          - "set up recon"
          - "configure reconciliation"
          - "define recon stream"
          - "new reconciliation"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: reconciliation
          subject_kinds: [cbu]
          phase_tags: [preferences_set]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: cbu
            type: uuid
            required: true
          - name: stream
            type: string
            required: true
            valid_values: [position, cash, nav]
          - name: sor
            type: string
            required: true
            description: "Source-of-record identifier (e.g. BNY_EAGLE, CUSTODIAN_SOR)"
          - name: tolerance
            type: decimal
            required: false
        returns:
          type: uuid
          name: reconciliation_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      activate:
        flavour: attribute_mutating
        description: "Activate a reconciliation config (draft → active)"
        invocation_phrases:
          - "activate reconciliation"
          - "enable recon"
          - "go live on reconciliation"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: reconciliation
          subject_kinds: [reconciliation]
          phase_tags: [preferences_set]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: reconciliation
            type: uuid
            required: true
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: draft
                to: active
        transition_args:
          entity_id_arg: reconciliation
          target_workspace: instrument_matrix
          target_slot: reconciliation

      suspend:
        flavour: discretionary
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: reconciliation_suspend
        description: "Suspend an active reconciliation (operational hold)"
        invocation_phrases:
          - "suspend reconciliation"
          - "pause recon"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: reconciliation
          subject_kinds: [reconciliation]
          phase_tags: [operational]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: reconciliation
            type: uuid
            required: true
          - name: reason
            type: string
            required: false
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: active
                to: suspended
        transition_args:
          entity_id_arg: reconciliation
          target_workspace: instrument_matrix
          target_slot: reconciliation

      reactivate:
        flavour: attribute_mutating
        description: "Re-activate a suspended reconciliation (suspended → active)"
        invocation_phrases:
          - "reactivate reconciliation"
          - "resume recon"
          - "re-enable recon"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: reconciliation
          subject_kinds: [reconciliation]
          phase_tags: [operational]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: reconciliation
            type: uuid
            required: true
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: suspended
                to: active
        transition_args:
          entity_id_arg: reconciliation
          target_workspace: instrument_matrix
          target_slot: reconciliation

      retire:
        flavour: discretionary
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: reconciliation_retire
        description: "Retire a reconciliation config (terminal)"
        invocation_phrases:
          - "retire reconciliation"
          - "decommission recon"
          - "remove reconciliation"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: reconciliation
          subject_kinds: [reconciliation]
          phase_tags: [operational]
          side_effects: state_write
          harm_class: irreversible
        behavior: plugin
        args:
          - name: reconciliation
            type: uuid
            required: true
          - name: reason
            type: string
            required: false
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: requires_explicit_authorisation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: active
                to: retired
              - from: suspended
                to: retired
        transition_args:
          entity_id_arg: reconciliation
          target_workspace: instrument_matrix
          target_slot: reconciliation
