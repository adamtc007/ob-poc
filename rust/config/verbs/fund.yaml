domains:
  fund:
    description: Fund structure operations - umbrellas, sub-funds, share classes, master-feeder
    verbs:
      # =========================================================================
      # FUND CREATION / ENSURE VERBS
      # =========================================================================

      create:
        description: Create a fund structure or share class using a fund-type discriminator
        invocation_phrases:
          - "create umbrella fund"
          - "create sub-fund"
          - "create share class"
          - "create standalone fund"
          - "create master fund"
          - "create feeder fund"
          - "new SICAV"
          - "new compartment"
          - "new share class"
          - "new hedge fund"
          - "new master fund"
          - "new feeder"
          - "set up umbrella fund"
          - "open a new subfund"
          - "create an umbrella fund"
          - "set up a SICAV"
          - "open a new fund structure"
          - "set up a new subfund under the umbrella"
          - "add a subfund to the umbrella"
          - "create a new compartment under this umbrella"
          - "create a standalone fund"
          - "set up a standalone AIF"
          - "register a new standalone fund in Jersey"
          - "create a standalone hedge fund"
          - "spin up a new subfund"
          - "add another compartment"
          - "launch a new sub-fund"
          - "set up a new fund"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        produces:
          type: entity
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table: entity_funds
          returning: entity_id
        args:
          - name: fund-type
            type: string
            required: true
            description: Canonical fund subtype selector
            validation:
              enum:
                - umbrella
                - subfund
                - share-class
                - standalone
                - master
                - feeder
          - name: name
            type: string
            required: true
            maps_to: name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
            lookup:
              table: master_jurisdictions
              entity_type: jurisdiction
              schema: ob-poc
              search_key: jurisdiction_code
              primary_key: jurisdiction_code
          - name: umbrella-id
            type: uuid
            required: false
            maps_to: parent_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: subfund-id
            type: uuid
            required: false
            maps_to: parent_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: master-id
            type: uuid
            required: false
            maps_to: master_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: fund-structure-type
            type: string
            required: false
            maps_to: fund_structure_type
            validation:
              enum: [SICAV, ICAV, OEIC, VCC, UNIT_TRUST, FCP, OTHER]
          - name: regulatory-status
            type: string
            required: false
            maps_to: regulatory_status
            validation:
              enum: [UCITS, AIF, RAIF, PART_II, UNREGULATED]
          - name: registration-number
            type: string
            required: false
            maps_to: registration_number
          - name: incorporation-date
            type: date
            required: false
            maps_to: incorporation_date
          - name: financial-year-end
            type: string
            required: false
            maps_to: financial_year_end
          - name: investment-objective
            type: string
            required: false
            maps_to: investment_objective
          - name: base-currency
            type: string
            required: false
            maps_to: base_currency
          - name: launch-date
            type: date
            required: false
            maps_to: launch_date
          - name: isin-base
            type: string
            required: false
            maps_to: isin_base
          - name: share-class-type
            type: string
            required: false
            maps_to: share_class_type
            validation:
              enum: [INSTITUTIONAL, RETAIL, SEED, FOUNDER, CLEAN]
          - name: distribution-type
            type: string
            required: false
            maps_to: distribution_type
            validation:
              enum: [ACC, DIST, FLEX]
          - name: currency
            type: string
            required: false
            maps_to: currency
          - name: hedged
            type: boolean
            required: false
            maps_to: is_hedged
            default: false
          - name: isin
            type: string
            required: false
            maps_to: isin
          - name: minimum-investment
            type: decimal
            required: false
            maps_to: minimum_investment
          - name: management-fee-bps
            type: integer
            required: false
            maps_to: management_fee_bps
          - name: standalone-strategy
            type: string
            required: false
            maps_to: fund_type
            validation:
              enum:
                - HEDGE_FUND
                - PRIVATE_EQUITY
                - REAL_ESTATE
                - INFRASTRUCTURE
                - CREDIT
                - MULTI_STRATEGY
          - name: investor-type
            type: string
            required: false
            maps_to: investor_type
            validation:
              enum: [US_TAXABLE, US_TAX_EXEMPT, NON_US, INSTITUTIONAL, RETAIL]
          - name: lei
            type: string
            required: false
            maps_to: lei
          - name: gleif-status
            type: string
            required: false
            maps_to: gleif_status
            validation:
              enum: [ACTIVE, INACTIVE, null]
          - name: gleif-category
            type: string
            required: false
            maps_to: gleif_category
            validation:
              enum: [FUND, GENERAL, BRANCH, SOLE_PROPRIETOR]
          - name: gleif-legal-form-id
            type: string
            required: false
            maps_to: gleif_legal_form_id
          - name: gleif-registered-as
            type: string
            required: false
            maps_to: gleif_registered_as
          - name: gleif-registered-at
            type: string
            required: false
            maps_to: gleif_registered_at
          - name: legal-address-city
            type: string
            required: false
            maps_to: legal_address_city
          - name: legal-address-country
            type: string
            required: false
            maps_to: legal_address_country
        returns:
          type: uuid
          name: entity_id
          capture: true
        outputs:
          - name: created_fund_id
            type: uuid
            entity_kind: fund
            description: ID of the newly created fund

      ensure:
        description: Create or update a fund structure or share class using a fund-type discriminator
        invocation_phrases:
          - "ensure umbrella exists"
          - "ensure sub-fund exists"
          - "ensure share class"
          - "upsert umbrella fund"
          - "upsert sub-fund"
          - "upsert share class"
          - "ensure standalone fund exists"
          - "create or update the fund"
          - "make sure the fund is registered"
          - "ensure the fund structure is in place"
          - "register fund if it does not exist"
          - "create standalone if missing"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        produces:
          type: entity
          resolved: false
        crud:
          operation: entity_upsert
          base_table: entities
          schema: ob-poc
          extension_table: entity_funds
          returning: entity_id
        args:
          - name: fund-type
            type: string
            required: true
            description: Canonical fund subtype selector
            validation:
              enum:
                - umbrella
                - subfund
                - share-class
                - standalone
                - master
                - feeder
          - name: name
            type: string
            required: true
            maps_to: name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: umbrella-id
            type: uuid
            required: false
            maps_to: parent_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: subfund-id
            type: uuid
            required: false
            maps_to: parent_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: master-id
            type: uuid
            required: false
            maps_to: master_fund_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: fund-structure-type
            type: string
            required: false
            maps_to: fund_structure_type
          - name: regulatory-status
            type: string
            required: false
            maps_to: regulatory_status
          - name: registration-number
            type: string
            required: false
            maps_to: registration_number
          - name: incorporation-date
            type: date
            required: false
            maps_to: incorporation_date
          - name: financial-year-end
            type: string
            required: false
            maps_to: financial_year_end
          - name: investment-objective
            type: string
            required: false
            maps_to: investment_objective
          - name: base-currency
            type: string
            required: false
            maps_to: base_currency
          - name: launch-date
            type: date
            required: false
            maps_to: launch_date
          - name: isin-base
            type: string
            required: false
            maps_to: isin_base
          - name: share-class-type
            type: string
            required: false
            maps_to: share_class_type
          - name: distribution-type
            type: string
            required: false
            maps_to: distribution_type
          - name: currency
            type: string
            required: false
            maps_to: currency
          - name: hedged
            type: boolean
            required: false
            maps_to: is_hedged
            default: false
          - name: isin
            type: string
            required: false
            maps_to: isin
          - name: minimum-investment
            type: decimal
            required: false
            maps_to: minimum_investment
          - name: management-fee-bps
            type: integer
            required: false
            maps_to: management_fee_bps
          - name: standalone-strategy
            type: string
            required: false
            maps_to: fund_type
          - name: investor-type
            type: string
            required: false
            maps_to: investor_type
          - name: lei
            type: string
            required: false
            maps_to: lei
          - name: gleif-status
            type: string
            required: false
            maps_to: gleif_status
          - name: gleif-category
            type: string
            required: false
            maps_to: gleif_category
          - name: gleif-legal-form-id
            type: string
            required: false
            maps_to: gleif_legal_form_id
          - name: gleif-registered-as
            type: string
            required: false
            maps_to: gleif_registered_as
          - name: gleif-registered-at
            type: string
            required: false
            maps_to: gleif_registered_at
          - name: legal-address-city
            type: string
            required: false
            maps_to: legal_address_city
          - name: legal-address-country
            type: string
            required: false
            maps_to: legal_address_country
        returns:
          type: uuid
          name: entity_id
          capture: true

      link-feeder:
        description: Link an existing feeder fund to a master fund (idempotent by parent+child+type)
        invocation_phrases:
          - "link feeder to master"
          - "connect feeder"
          - "attach feeder fund"
          - "link to master"
          - "associate feeder"
          - "connect to master fund"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: fund_structure
          schema: ob-poc
          returning: structure_id
          conflict_keys:
            - parent_entity_id
            - child_entity_id
            - relationship_type
        args:
          - name: feeder-id
            type: uuid
            required: true
            maps_to: child_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: master-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
        returns:
          type: uuid
          name: structure_id

      # =========================================================================
      # FUND STRUCTURE OPERATIONS
      # =========================================================================

      add-to-umbrella:
        description: Add an existing sub-fund to an umbrella (idempotent by parent+child+type)
        invocation_phrases:
          - "add to umbrella"
          - "attach sub-fund"
          - "link to umbrella"
          - "add fund to umbrella"
          - "connect to umbrella"
          - "put under umbrella"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: fund_structure
          schema: ob-poc
          returning: structure_id
          conflict_keys:
            - parent_entity_id
            - child_entity_id
            - relationship_type
        args:
          - name: umbrella-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: subfund-id
            type: uuid
            required: true
            maps_to: child_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
        returns:
          type: uuid
          name: structure_id

      add-share-class:
        description: Add a share class to a sub-fund (idempotent by parent+child+type)
        invocation_phrases:
          - "add share class to fund"
          - "attach share class"
          - "link share class"
          - "add class to subfund"
          - "connect share class"
          - "add a new share class to this fund"
          - "create and attach a share class"
          - "register a share class on the subfund"
          - "add an institutional share class"
          - "set up a share class on this compartment"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: fund_structure
          schema: ob-poc
          returning: structure_id
          conflict_keys:
            - parent_entity_id
            - child_entity_id
            - relationship_type
        args:
          - name: subfund-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: share-class-id
            type: uuid
            required: true
            maps_to: child_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
        returns:
          type: uuid
          name: structure_id

      list-subfunds:
        description: List all sub-funds within an umbrella
        invocation_phrases:
          - "list sub-funds"
          - "show compartments"
          - "view umbrella contents"
          - "list fund compartments"
          - "show sub-funds in umbrella"
          - "display all sub-funds"
          - "show sub-funds"
          - "show the umbrella compartments"
          - "what subfunds are under this umbrella"
          - "list the umbrella children"
          - "show me all the subfunds"
          - "what compartments exist under this umbrella"
          - "list the funds within this umbrella"
          - "how many subfunds does this umbrella have"
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: fund_structure
          schema: ob-poc
          fk_col: parent_entity_id
        args:
          - name: umbrella-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set

      list-share-classes:
        description: List all share classes for a sub-fund
        invocation_phrases:
          - "list share classes"
          - "show fund classes"
          - "view share classes"
          - "display all classes"
          - "show classes for subfund"
          - "list fund share classes"
          - "show economic share classes"
          - "show the share class lineup"
          - "what share classes exist on this fund"
          - "list the economic classes"
          - "show me all the share classes"
          - "what share classes do we have"
          - "get the share class list"
          - "show me the classes on this fund"
          - "list all share classes for this subfund"
          - "pull up the share classes"
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: fund_structure
          schema: ob-poc
          fk_col: parent_entity_id
        args:
          - name: subfund-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set

      list-feeders:
        description: List all feeder funds for a master
        invocation_phrases:
          - "list feeder funds"
          - "show feeders"
          - "view master feeders"
          - "display feeder structure"
          - "list connected feeders"
          - "show all feeders"
        metadata:
          tier: reference
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: fund_structure
          schema: ob-poc
          fk_col: parent_entity_id
        args:
          - name: master-id
            type: uuid
            required: true
            maps_to: parent_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set

      # =========================================================================
      # FUND VEHICLE METADATA (merged from fund-vehicle)
      # =========================================================================

      upsert-vehicle:
        description: Create or update fund vehicle metadata for an existing fund entity.
        invocation_phrases:
          - "create fund vehicle"
          - "set fund type"
          - "register fund structure"
          - "configure fund vehicle"
          - "register Luxembourg fund"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [trading, metadata]
          phase_tags: [trading]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: fund_vehicles
          schema: kyc
          returning: fund_entity_id
          conflict_keys:
            - fund_entity_id
        args:
          - name: fund-entity-id
            type: uuid
            required: true
            maps_to: fund_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: vehicle-type
            type: string
            required: true
            maps_to: vehicle_type
            validation:
              enum:
                - SCSP
                - SICAV_RAIF
                - SICAV_SIF
                - SIF
                - SICAV_UCITS
                - FCP
                - LLC
                - LP
                - TRUST
                - OEIC
                - ETF
                - REIT
                - BDC
                - OTHER
          - name: umbrella-entity-id
            type: uuid
            required: false
            maps_to: umbrella_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: is-umbrella
            type: boolean
            required: false
            maps_to: is_umbrella
            default: false
          - name: domicile-country
            type: string
            required: false
            maps_to: domicile_country
          - name: manager-entity-id
            type: uuid
            required: false
            maps_to: manager_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: meta
            type: json
            required: false
            maps_to: meta
          - name: created-by
            type: string
            required: false
            maps_to: created_by
        returns:
          type: uuid
          name: fund_entity_id
          capture: true

      read-vehicle:
        description: Read fund vehicle metadata by fund entity ID.
        invocation_phrases:
          - "get fund vehicle"
          - "read fund type"
          - "what type of fund"
          - "fund structure info"
        metadata:
          tier: diagnostics
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [trading, metadata]
          phase_tags: [trading]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: select
          table: fund_vehicles
          schema: kyc
        args:
          - name: fund-entity-id
            type: uuid
            required: true
            maps_to: fund_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record

      delete-vehicle:
        description: Delete fund vehicle metadata from a fund entity.
        invocation_phrases:
          - "delete fund vehicle"
          - "remove fund type"
          - "unclassify fund"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          dangerous: true
          tags: [trading, metadata]
          phase_tags: [trading]
          side_effects: state_write
        behavior: crud
        crud:
          operation: delete
          table: fund_vehicles
          schema: kyc
          key: fund_entity_id
        args:
          - name: fund-entity-id
            type: uuid
            required: true
            maps_to: fund_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: affected

      list-by-manager:
        description: List all funds managed by an entity.
        invocation_phrases:
          - "funds by manager"
          - "funds managed by"
          - "list managed funds"
        metadata:
          tier: diagnostics
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [trading, query]
          phase_tags: [trading]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: fund_vehicles
          schema: kyc
          fk_col: manager_entity_id
        args:
          - name: manager-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set

      list-by-vehicle-type:
        description: List all funds of a specific vehicle type.
