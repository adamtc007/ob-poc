      # =========================================================================
      # FUND-OF-FUNDS INVESTMENT LINKS
      # =========================================================================

      add-investment:
        description: Record a fund's investment in another fund (idempotent by investor+investee)
        invocation_phrases:
          - "add fund investment"
          - "record fund holding"
          - "add FoF investment"
          - "create investment link"
          - "fund invests in fund"
          - "record fund allocation"
          - "add underlying investment"
          - "add investor to fund"
          - "record a new commitment into this fund"
          - "register an investment into this fund"
          - "add an investor position to this fund"
        metadata:
          tier: intent
          source_of_truth: register
          scope: cbu
          noun: fund
          tags: [onboarding]
          subject_kinds: [fund]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: fund_investments
          schema: ob-poc
          returning: investment_id
          conflict_keys:
            - investor_entity_id
            - investee_entity_id
        args:
          - name: investor-fund-id
            type: uuid
            required: true
            maps_to: investor_entity_id
            description: The Fund-of-Funds making the investment
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: investee-fund-id
            type: uuid
            required: true
            maps_to: investee_entity_id
            description: The underlying fund being invested in
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: percentage-of-nav
            type: decimal
            required: true
            maps_to: percentage_of_investor_nav
            description: "% of investor fund's NAV allocated to this investment"
          - name: percentage-of-investee
            type: decimal
            required: false
            maps_to: percentage_of_investee_aum
            description: "% of investee fund's AUM held by this investor"
          - name: investment-date
            type: date
            required: false
            maps_to: investment_date
          - name: investment-type
            type: string
            required: false
            maps_to: investment_type
            validation:
              enum:
                - DIRECT
                - VIA_SHARE_CLASS
                - SIDE_POCKET
        returns:
          type: uuid
          name: investment_id

