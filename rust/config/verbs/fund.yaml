          table: fund_compartments
          schema: kyc
          returning: id
          conflict_keys:
            - umbrella_fund_entity_id
            - compartment_code
        args:
          - name: umbrella-fund-entity-id
            type: uuid
            required: true
            maps_to: umbrella_fund_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: compartment-code
            type: string
            required: true
            maps_to: compartment_code
