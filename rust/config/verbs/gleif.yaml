domains:
  gleif:
    description: GLEIF API integration for LEI data enrichment and corporate tree import
    invocation_hints:
    - LEI
    - GLEIF
    - legal entity identifier
    - parent company
    - ultimate parent
    - corporate hierarchy
    - who owns
    - ownership chain
    - corporate structure
    - fund manager
    - umbrella fund
    verbs:
      enrich:
        flavour: attribute_mutating
        description: Enrich an entity with GLEIF data by LEI (creates entity if not exists)
        invocation_phrases:
        - enrich from GLEIF
        - enrich the entity data from GLEIF
        - get LEI data
        - fetch LEI record
        - import from GLEIF
        - pull the LEI data
        - enrich this entity from LEI
        - get the GLEIF record for this company
        - look up and import LEI data
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - enrichment
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        args:
        - name: lei
          type: string
          required: false
          description: LEI to look up in GLEIF (required if entity-id not provided)
        - name: entity-id
          type: uuid
          required: false
          description: Existing entity to enrich (will use its LEI)
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: decision-id
          type: uuid
          required: false
          description: Link to research decision that found this LEI (for audit trail)
        returns:
          type: uuid
          name: entity_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      search:
        flavour: attribute_mutating
        description: Search GLEIF for entities by name, jurisdiction, or category
        invocation_phrases:
        - search GLEIF
        - find in GLEIF
        - look up LEI
        - search for entity
        - what's the LEI
        - look up the LEI number
        - find this company in GLEIF
        - LEI search
        - check the LEI database
        - search GLEIF by name
        behavior: plugin
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - search
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: facts_only
        args:
        - name: name
          type: string
          required: false
          description: Entity name to search for (partial match)
        - name: jurisdiction
          type: string
          required: false
          description: ISO 2-letter jurisdiction code (e.g., DE, LU, US)
        - name: category
          type: string
          required: false
          description: Entity category filter
          valid_values:
          - FUND
          - BRANCH
          - SOLE_PROPRIETOR
          - GENERAL
        - name: status
          type: string
          required: false
          description: Registration status filter
          valid_values:
          - ACTIVE
          - INACTIVE
          - LAPSED
        - name: limit
          type: integer
          required: false
          default: 20
          description: Maximum results to return (max 100)
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      import-tree:
        flavour: instance_adding
        description: Import corporate tree (parents and/or children) from GLEIF
        invocation_phrases:
        - import the GLEIF hierarchy
        - import the corporate hierarchy from GLEIF
        - get parent chain from GLEIF
        - load corporate structure
        - import ownership tree
        - pull the corporate hierarchy
        - import the group structure from GLEIF
        - get the parent chain
        - load the subsidiary tree
        - GLEIF hierarchy import
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - import
          - hierarchy
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        args:
        - name: root-lei
          type: string
          required: true
          description: LEI of the root entity to start traversal from
        - name: direction
          type: string
          required: false
          default: DOWN
          description: Direction to traverse the tree
          valid_values:
          - UP
          - DOWN
          - BOTH
        - name: max-depth
          type: integer
          required: false
          default: 3
          description: Maximum depth to traverse (1-10)
        - name: create-entities
          type: boolean
          required: false
          default: true
          description: Whether to create entities for discovered records
        - name: decision-id
          type: uuid
          required: false
          description: Link to research decision that initiated this import (for audit trail)
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      import-managed-funds:
        flavour: instance_adding
        description: Import funds managed by an investment manager with full CBU structure
        invocation_phrases:
        - import managed funds
        - get funds for manager
        - load fund portfolio
        - import investment manager funds
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - import
          - funds
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        args:
        - name: manager-lei
          type: string
          required: true
          description: LEI of the fund manager (e.g., AllianzGI)
        - name: ultimate-client-lei
          type: string
          required: false
          description: LEI of ultimate parent client for role assignment
        - name: create-cbus
          type: boolean
          required: false
          default: true
          description: Whether to create CBUs for each fund
        - name: limit
          type: integer
          required: false
          description: Maximum number of funds to import (for testing)
        - name: dry-run
          type: boolean
          required: false
          default: false
          description: If true, only report what would be imported without making changes
        - name: decision-id
          type: uuid
          required: false
          description: Link to research decision that initiated this import (for audit trail)
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      refresh:
        flavour: attribute_mutating
        description: Refresh stale GLEIF data for entities
        metadata:
          tier: intent
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - refresh
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        invocation_phrases:
        - refresh GLEIF data for entity
        - update stale LEI records
        - resync entity from GLEIF API
        - how do I refresh LEI data
        - pull latest GLEIF information
        - re-import LEI details
        - update outdated GLEIF records
        - force GLEIF data refresh
        behavior: plugin
        args:
        - name: entity-id
          type: uuid
          required: false
          description: Specific entity to refresh (if omitted, refreshes all stale)
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: stale-days
          type: integer
          required: false
          default: 30
          description: Consider data stale if older than this many days
        - name: limit
          type: integer
          required: false
          default: 100
          description: Maximum entities to refresh in one call
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      trace-ownership:
        flavour: attribute_mutating
        description: Trace ownership chain from entity to UBO terminus via GLEIF parent relationships
        invocation_phrases:
        - get funds managed by this entity
        - list managed funds from GLEIF
        - show fund portfolio for manager
        - which funds does this IM manage
        - fetch managed fund LEIs
        - look up funds under management
        - find GLEIF fund relationships
        - what funds are managed by this LEI
        behavior: plugin
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - lookup
          - funds
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: facts_only
        args:
        - name: manager-lei
          type: string
          required: true
          description: LEI of the investment manager
        - name: resolve-umbrellas
          type: boolean
          required: false
          default: true
          description: Also fetch SICAV umbrella structure for funds
        - name: limit
          type: integer
          required: false
          description: Maximum funds to return
        returns:
          type: record
          name: funds
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      resolve-successor:
        flavour: attribute_mutating
        description: Resolve a merged or inactive LEI to its current successor entity
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - lookup
          - successor
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        invocation_phrases:
        - resolve successor for merged LEI
        - find current entity for inactive LEI
        - trace LEI merger successor
        - what replaced this LEI
        - look up successor after corporate merger
        - resolve lapsed LEI to active entity
        - follow LEI succession chain
        - find active replacement for retired LEI
        behavior: plugin
        args:
        - name: lei
          type: string
          required: true
          description: LEI of potentially inactive/merged entity
        returns:
          type: record
          name: successor
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      lookup:
        flavour: attribute_mutating
        description: 'Consolidated GLEIF lookup — fetch relationship data by target-type. Replaces 8 individual get-* verbs
          with a single entry point. target-type: record | parent | children | manager | managed-funds | master-fund | umbrella
          | isin

          '
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: lei
          subject_kinds:
          - company
          tags:
          - gleif
          - external-api
          - lookup
          - onboarding
          - consolidated
          phase_tags:
          - onboarding
          - kyc
          side_effects: facts_only
        invocation_phrases:
        - look up in GLEIF
        - GLEIF lookup
        - get GLEIF data
        - fetch from GLEIF
        - get LEI details
        - who is the parent company
        - show subsidiaries
        - who manages this fund
        - get umbrella fund
        - get master fund
        - find managed funds
        - resolve ISIN to LEI
        - look up GLEIF record
        - show GLEIF relationship
        - fetch GLEIF hierarchy
        behavior: plugin
        args:
        - name: target-type
          type: string
          required: true
          description: 'Type of lookup: record, parent, children, manager, managed-funds, master-fund, umbrella, isin'
          valid_values:
          - record
          - parent
          - children
          - manager
          - managed-funds
          - master-fund
          - umbrella
          - isin
        - name: lei
          type: string
          required: false
          description: LEI to look up (required for most target-types)
        - name: entity-id
          type: uuid
          required: false
          description: Entity UUID (will resolve to LEI)
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: isin
          type: string
          required: false
          description: ISIN code (required when target-type=isin)
        - name: limit
          type: integer
          required: false
          default: 100
          description: Maximum results to return
        - name: resolve-umbrellas
          type: boolean
          required: false
          default: true
          description: Also fetch umbrella structure (for managed-funds)
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      import-to-client-group:
        flavour: instance_adding
        description: Import GLEIF tree and populate client_group tables with role tagging. Optionally includes managed funds
          (IM relationships).
        invocation_phrases:
        - research group from GLEIF
        - import corporate structure to client group
        - discover group entities
        - crawl GLEIF into client group
        - populate client group from LEI
        - import group with funds
        - discover funds for client group
        behavior: plugin
        metadata:
          tier: composite
          source_of_truth: external
          scope: global
          noun: client_group
          tags:
          - gleif
          - external-api
          - import
          - client-group
          - discovery
          - funds
          - onboarding
          phase_tags:
          - onboarding
          - kyc
          side_effects: state_write
        args:
        - name: group-id
          type: uuid
          required: true
          description: Client group to populate
          slot_type: client_group_ref
          lookup:
            table: client_group
            entity_type: client_group
            schema: ob-poc
            search_key: canonical_name
            primary_key: id
        - name: root-lei
          type: string
          required: true
          description: Root LEI to start tree traversal (typically ultimate parent)
        - name: max-depth
          type: integer
          required: false
          default: 3
          description: Maximum depth for tree traversal (default 3)
        - name: include-funds
          type: boolean
          required: false
          default: false
          description: Include funds managed by entities in the tree (IS_FUND-MANAGED_BY). These are tagged with relationship_category=INVESTMENT_MANAGEMENT.
        - name: max-funds-per-manco
          type: integer
          required: false
          default: 500
          description: Maximum funds to load per ManCo (safety limit to prevent runaway API calls)
        - name: decision-id
          type: uuid
          required: false
          description: Link to research decision for audit trail
        returns:
          type: record
          fields:
          - group_id
          - root_lei
          - include_funds
          - gleif_entities_created
          - gleif_entities_updated
          - gleif_relationships_created
          - client_group_entities_added
          - client_group_funds_added
          - fund_metadata_populated
          - client_group_roles_assigned
          - client_group_relationships_created
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
