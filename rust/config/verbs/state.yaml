domains:
  state:
    description: Reducer-based slot state derivation and override management
    invocation_hints:
      - derive slot state
      - diagnose state
      - override slot state
      - list state overrides
    verbs:
      derive:
        description: Compute reducer state for a single slot
        behavior: plugin
        handler: StateDeriveOp
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: state
          subject_kinds:
            - cbu
            - client-group
            - entity
            - fund
            - document
            - deal
            - kyc-case
          phase_tags:
            - monitoring
          side_effects: facts_only
          harm_class: read_only
        args:
          - name: cbu-id
            type: uuid
            required: true
          - name: entity-id
            type: uuid
            required: true
          - name: slot-path
            type: string
            required: true
          - name: case-id
            type: uuid
            required: false
          - name: state-machine
            type: string
            required: false
        returns:
          type: record
          capture: false
        invocation_phrases:
          - derive slot state
          - compute slot state
          - what state is this slot in
          - calculate reducer state
          - get derived state
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
