domains:
  phrase:
    description: Governed phrase authoring — observe misses, check collisions, propose phrases
    verbs:
      observe-misses:
        description: Trawl session traces for utterance miss and wrong-match patterns
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "observe misses"
          - "find utterance misses"
          - "trawl session traces for misses"
          - "what utterances are failing"
          - "show miss patterns"
          - "scan for wrong matches"
          - "phrase observation run"
        behavior: plugin
        handler: phrase_observe_misses
        args:
          - name: limit
            type: integer
            required: false
            default: "100"
        returns:
          type: record
          description: Pattern summary with miss count, wrong-match count, top patterns
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      coverage-report:
        description: Per-workspace phrase coverage and gap analysis
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "phrase coverage report"
          - "show phrase coverage"
          - "phrase gaps by workspace"
          - "which workspaces need more phrases"
          - "utterance coverage analysis"
        behavior: plugin
        handler: phrase_coverage_report
        args: []
        returns:
          type: record_set
          description: Per-workspace coverage with verb count, phrase count, avg phrases per verb
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      check-collisions:
        description: Check a candidate phrase for collisions against the phrase bank
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "check phrase collisions"
          - "collision check"
          - "will this phrase collide"
          - "test phrase for conflicts"
          - "phrase collision audit"
        behavior: plugin
        handler: phrase_check_collisions
        args:
          - name: phrase
            type: string
            required: true
            description: The candidate phrase to check
          - name: target-verb
            type: string
            required: true
            description: The verb FQN the phrase should map to
          - name: workspace
            type: string
            required: false
            description: Workspace scope (null for global)
        returns:
          type: record
          description: Collision report with exact conflicts, semantic near-misses, cross-workspace conflicts
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      propose:
        description: Generate a governed phrase proposal with evidence and collision report
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "propose a new phrase"
          - "suggest phrase mapping"
          - "create phrase proposal"
          - "propose phrase for verb"
        behavior: plugin
        handler: phrase_propose
        args:
          - name: phrase
            type: string
            required: true
          - name: target-verb
            type: string
            required: true
          - name: workspace
            type: string
            required: false
          - name: rationale
            type: string
            required: false
        returns:
          type: record
          description: Proposal with confidence score, risk tier, collision report
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      batch-propose:
        description: Generate bulk proposals from aggregated miss analysis (max 50)
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "batch propose phrases"
          - "bulk phrase proposals"
          - "generate phrase proposals from misses"
          - "propose phrases from observation"
        behavior: plugin
        handler: phrase_batch_propose
        args:
          - name: limit
            type: integer
            required: false
            default: "50"
        returns:
          type: record_set
          description: Batch of proposals ordered by risk tier then confidence
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      review-proposals:
        description: List pending phrase proposals grouped by risk tier
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "review phrase proposals"
          - "show pending proposals"
          - "list phrase proposals"
          - "what phrases are pending review"
        behavior: plugin
        handler: phrase_review_proposals
        args: []
        returns:
          type: record_set
          description: Pending proposals with evidence, collision reports, risk tiers
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      approve:
        description: Approve a phrase proposal and publish through SemOS governance
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "approve phrase"
          - "accept phrase proposal"
          - "publish this phrase"
        behavior: plugin
        handler: phrase_approve
        args:
          - name: proposal-id
            type: uuid
            required: true
          - name: rationale
            type: string
            required: false
            description: Written rationale (mandatory for critical-tier verbs)
        returns:
          type: record
          description: Published phrase with phrase_bank entry ID
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: phrase-id
          target_workspace: semos_maintenance
          target_slot: phrase_authoring

      reject:
        description: Reject a phrase proposal with reason code
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "reject phrase"
          - "decline phrase proposal"
          - "reject this phrase"
        behavior: plugin
        handler: phrase_reject
        args:
          - name: proposal-id
            type: uuid
            required: true
          - name: reason
            type: string
            required: true
        returns:
          type: record
          description: Rejection confirmation with reason
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: phrase-id
          target_workspace: semos_maintenance
          target_slot: phrase_authoring

      defer:
        description: Park a phrase proposal for later review
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: phrase
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "defer phrase"
          - "park this proposal"
          - "defer phrase review"
        behavior: plugin
        handler: phrase_defer
        args:
          - name: proposal-id
            type: uuid
            required: true
          - name: reason
            type: string
            required: false
        returns:
          type: record
          description: Deferred confirmation
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
