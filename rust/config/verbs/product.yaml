domains:
  product:
    description: "Product catalog operations (read-only - products are reference data)"
    verbs:
      read:
        description: Read a product by ID or code
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: product
          phase_tags: [onboarding]
        invocation_phrases:
          - "show product details"
          - "get product by code"
          - "look up product"
          - "what is this product"
          - "display product information"
          - "fetch product record"
          - "read product catalog entry"
          - "describe this product"
        behavior: crud
        crud:
          operation: select
          table: products
          schema: ob-poc
        args:
          - name: product-id
            type: uuid
            required: false
            maps_to: product_id
            lookup:
              table: products
              entity_type: product
              schema: ob-poc
              search_key: name
              primary_key: product_id
          - name: product-code
            type: string
            required: false
            maps_to: product_code
        returns:
          type: record

      list:
        description: List products with optional filters
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: product
          phase_tags: [onboarding]
        invocation_phrases:
          - "list available products"
          - "show product catalog"
          - "what products are available"
          - "display all products"
          - "get product list"
          - "show active products"
          - "browse product catalog"
          - "enumerate custody products"
        behavior: crud
        crud:
          operation: select
          table: products
          schema: ob-poc
        args:
          - name: product-category
            type: string
            required: false
            maps_to: product_category
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set
