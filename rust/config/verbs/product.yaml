domains:
  product:
    description: "Product catalogue governance and read operations"
    verbs:
      define:
        flavour: attribute_mutating
        description: Define a governed product catalogue entry
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
        - "define product"
        - "register product in catalogue"
        - "create governed product"
        - "add product to catalogue"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: product
          tags: [catalogue, product, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
        - name: product-id
          type: uuid
          required: false
        - name: name
          type: string
          required: true
        - name: description
          type: string
          required: false
        - name: product-code
          type: string
          required: false
        - name: product-category
          type: string
          required: false
        - name: regulatory-framework
          type: string
          required: false
        - name: min-asset-requirement
          type: decimal
          required: false
        - name: is-active
          type: boolean
          required: false
        - name: metadata
          type: json
          required: false
        - name: owner-principal-fqn
          type: string
          required: false
        - name: governance-status
          type: string
          required: false
        returns:
          type: uuid
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      amend:
        flavour: attribute_mutating
        description: Amend a governed product catalogue entry
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
        - "amend product"
        - "update product catalogue entry"
        - "revise product definition"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: product
          tags: [catalogue, product, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
        - name: product-id
          type: uuid
          required: false
        - name: product
          type: string
          required: false
        - name: product-code
          type: string
          required: false
        - name: name
          type: string
          required: false
        - name: description
          type: string
          required: false
        - name: product-category
          type: string
          required: false
        - name: regulatory-framework
          type: string
          required: false
        - name: min-asset-requirement
          type: decimal
          required: false
        - name: is-active
          type: boolean
          required: false
        - name: metadata
          type: json
          required: false
        - name: owner-principal-fqn
          type: string
          required: false
        - name: governance-status
          type: string
          required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      retire:
        flavour: discretionary
        audit_class: product_retire
        description: Retire a governed product catalogue entry
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
        - "retire product"
        - "remove product from active catalogue"
        - "sunset product"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: product
          tags: [catalogue, product, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
        - name: product-id
          type: uuid
          required: false
        - name: product
          type: string
          required: false
        - name: product-code
          type: string
          required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      read:
        flavour: attribute_mutating
        description: Read a product by ID or code
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: product
          phase_tags: [onboarding]
          side_effects: facts_only
        invocation_phrases:
        - "show me product"
        - "show product details"
        - "show me product details"
        - "get product by code"
        - "look up product"
        - "what is this product"
        - "display product information"
        - "fetch product record"
        - "read product catalog entry"
        - "describe this product"
        - "product details"
        - "read product information"
        behavior: crud
        crud:
          operation: select
          table: products
          schema: ob-poc
        args:
        - name: product-id
          type: uuid
          required: false
          maps_to: product_id
          lookup:
            table: products
            entity_type: product
            schema: ob-poc
            search_key: name
            primary_key: product_id
        - name: product-code
          type: string
          required: false
          maps_to: product_code
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list:
        flavour: attribute_mutating
        description: List products with optional filters
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: product
          phase_tags: [onboarding]
          side_effects: facts_only
        invocation_phrases:
        - "show me products"
        - "products"
        - "list products"
        - "show products"
        - "list available products"
        - "show product catalog"
        - "what products are available"
        - "display all products"
        - "get product list"
        - "show active products"
        - "browse product catalog"
        - "enumerate custody products"
        - "list all products"
        - "browse products"
        behavior: crud
        crud:
          operation: select
          table: products
          schema: ob-poc
        args:
        - name: product-category
          type: string
          required: false
          maps_to: product_category
        - name: is-active
          type: boolean
          required: false
          maps_to: is_active
        - name: limit
          type: integer
          required: false
          default: 100
        - name: offset
          type: integer
          required: false
          default: 0
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
