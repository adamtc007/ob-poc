domains:
  service-version:
    description: "Service-version lifecycle (R2) — per-version drafted → reviewed → published → superseded → retired."
    verbs:
      draft:
        description: Draft a new version of a service
        invocation_phrases:
          - "draft service version"
          - "create new service version"
          - "start new version of service"
          - "begin service version draft"
          - "draft new service revision"
          - "open service version"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service-version
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        crud:
          operation: insert
          table: service_versions
          schema: ob-poc
        args:
          - name: service-id
            type: uuid
            required: true
            maps_to: service_id
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
          - name: version
            type: string
            required: true
            maps_to: version
          - name: spec
            type: string
            required: false
            maps_to: spec
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: record
          fields:
            - id
            - service_id
            - version
            - lifecycle_status
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      submit-for-review:
        description: Submit a drafted service version for review
        invocation_phrases:
          - "submit service version for review"
          - "send service version to review"
          - "request review of service version"
          - "advance service version to review"
          - "submit version for review"
          - "queue service version for review"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service-version
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: version-id
          requires_states:
            - drafted
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: service_versions
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: reviewed
        args:
          - name: version-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: version-id
          target_workspace: product_maintenance
          target_slot: service_version

      publish:
        description: Publish a reviewed service version
        invocation_phrases:
          - "publish service version"
          - "release service version"
          - "make service version live"
          - "go-live service version"
          - "promote service version to published"
          - "publish version"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service-version
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: version-id
          requires_states:
            - reviewed
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: service_versions
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: published
        args:
          - name: version-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: version-id
          target_workspace: product_maintenance
          target_slot: service_version

      retire:
        description: Retire a service version (terminal)
        invocation_phrases:
          - "retire service version"
          - "decommission service version"
          - "remove service version"
          - "terminate service version"
          - "fully retire version"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service-version
          tags: [lifecycle, write, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        lifecycle:
          entity_arg: version-id
          requires_states:
            - published
            - superseded
          precondition_checks:
            - "requires_scope:product"
        crud:
          operation: update
          table: service_versions
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: retired
        args:
          - name: version-id
            type: uuid
            required: true
            maps_to: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: version-id
          target_workspace: product_maintenance
          target_slot: service_version

      update:
        description: Update a drafted service version's spec or notes
        invocation_phrases:
          - "update service version"
          - "edit service version"
          - "modify service version spec"
          - "change service version metadata"
          - "amend service version"
          - "revise service version draft"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service-version
          tags: [write, property]
          phase_tags: [stewardship]
          side_effects: state_write
        crud:
          operation: update
          table: service_versions
          schema: ob-poc
          key: id
        args:
          - name: version-id
            type: uuid
            required: true
            maps_to: id
          - name: spec
            type: string
            required: false
            maps_to: spec
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      compare:
        description: Compare two versions of a service
        invocation_phrases:
          - "compare service versions"
          - "diff service versions"
          - "show service version differences"
          - "compare versions of service"
          - "service version diff"
          - "see what changed between versions"
        behavior: crud
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: service-version
          phase_tags: [stewardship]
          side_effects: facts_only
        crud:
          operation: select
          table: service_versions
          schema: ob-poc
        args:
          - name: from-version-id
            type: uuid
            required: true
          - name: to-version-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
