domains:
  entity:
    description: Entity management operations
    invocation_hints:
      - entity
      - company
      - person
      - counterparty
      - director
      - UBO
    dynamic_verbs:
      - pattern: create-{type_code}
        source:
          table: entity_types
          schema: ob-poc
          code_column: type_code
          name_column: name
          transform: kebab_case
        behavior: crud
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        base_args:
          - name: name
            type: string
            required: true
            maps_to: name
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
    verbs:
      create-limited-company:
        description: Create a limited company entity
        behavior: crud
        invocation_phrases:
          - "create company"
          - "add company"
          - "create limited company"
          - "register company"
          - "new company entity"
          - "set up company"
          - "create organisation"
          - "add new legal entity"
          - "register limited company"
          - "create corporate entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, creation, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: limited_company
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: name
            type: string
            required: true
            maps_to: company_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: company-number
            type: string
            required: false
            maps_to: registration_number
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
        returns:
          type: uuid
          name: entity_id
          capture: true
      create-proper-person:
        description: Create a natural person entity
        behavior: crud
        invocation_phrases:
          - "create person"
          - "add person"
          - "add individual"
          - "create individual"
          - "register natural person"
          - "new person entity"
          - "create director"
          - "add UBO person"
          - "create beneficial owner"
          - "register individual"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, creation, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: proper_person
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: first-name
            type: string
            required: true
            maps_to: first_name
          - name: last-name
            type: string
            required: true
            maps_to: last_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: date-of-birth
            type: date
            required: false
            maps_to: date_of_birth
          - name: nationality
            type: string
            required: false
            maps_to: nationality
        returns:
          type: uuid
          name: entity_id
          capture: true
      create-trust-discretionary:
        description: Create a discretionary trust entity
        behavior: crud
        invocation_phrases:
          - "create trust"
          - "add discretionary trust"
          - "create trust entity"
          - "register trust"
          - "new trust"
          - "set up discretionary trust"
          - "create trust structure"
          - "add trust"
          - "establish trust"
          - "create new trust entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, creation, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: trust
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: name
            type: string
            required: true
            maps_to: trust_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: string
            required: true
            maps_to: jurisdiction
          - name: establishment-date
            type: date
            required: false
            maps_to: establishment_date
          - name: trust-purpose
            type: string
            required: false
            maps_to: trust_purpose
        returns:
          type: uuid
          name: entity_id
          capture: true
      create-partnership-limited:
        description: Create a limited partnership entity
        behavior: crud
        invocation_phrases:
          - "create partnership"
          - "add limited partnership"
          - "create LP"
          - "register partnership"
          - "new limited partnership"
          - "set up partnership entity"
          - "create partnership structure"
          - "add LP entity"
          - "establish limited partnership"
          - "create new partnership"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, creation, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: partnership
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: name
            type: string
            required: true
            maps_to: partnership_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: formation-date
            type: date
            required: false
            maps_to: formation_date
        returns:
          type: uuid
          name: entity_id
          capture: true

      # =========================================================================
      # ENSURE (UPSERT) VERBS - Idempotent entity creation
