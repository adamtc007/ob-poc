          - "add or update company"
          - "upsert company"
          - "ensure counterparty"
          - "ensure company exists"
          - "get or create company"
          - "idempotent company create"
          - "ensure limited company"
          - "find or create company"
          - "ensure corporate entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, upsert, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: limited_company
          resolved: false
        crud:
          operation: entity_upsert
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: name
