domains:
  entity:
    description: Entity management operations
    invocation_hints:
      - entity
      - company
      - person
      - counterparty
      - director
      - UBO
    verbs:
      create:
        description: Create an entity of the requested entity type
        behavior: crud
        invocation_phrases:
          - "create entity"
          - "create company"
          - "create person"
          - "create trust"
          - "create partnership"
          - "add entity"
          - "register entity"
          - "new entity"
          - "set up entity"
          - "create legal entity"
          - "register company"
          - "register person"
          - "create a new company"
          - "set up a new legal entity"
          - "register a new trust"
          - "add a new company"
          - "add a new person"
          - "register John Smith as a person"
          - "onboard a new counterparty"
          - "add a new legal entity to the system"
          - "register a new organisation"
          - "create a legal entity for HSBC"
          - "create a legal entity for this company"
          - "create an entity for this bank"
          - "create a new counterparty record"
          - "add this company to the system"
          # Trust sub-type phrases — discretionary
          - "create a discretionary trust"
          - "set up a discretionary trust"
          - "register a discretionary trust entity"
          - "add a new discretionary trust"
          - "create a discretionary trust for the family"
          - "onboard a discretionary trust structure"
          - "set up an offshore discretionary trust"
          - "create a legal entity"
          - "create entity for"
          - "create a Cayman discretionary trust"
          - "register a new discretionary trust"
          - "add discretionary trust entity"
          - "add a legal entity"
          - "register a new entity"
          # Trust sub-type phrases — charitable
          - "create a charitable trust"
          - "set up a charitable trust"
          - "register a charitable trust entity"
          - "add a charitable trust"
          - "create a charitable foundation trust"
          - "onboard a charitable trust structure"
          - "set up a new charitable trust entity"
          - "register a charity trust"
          - "create a philanthropic trust"
          - "add a new charitable trust entity"
          # Trust sub-type phrases — fixed interest
          - "create a fixed interest trust"
          - "set up a fixed interest trust"
          - "register a fixed interest trust entity"
          - "add a fixed interest trust"
          - "create a fixed-interest trust"
          - "onboard a fixed interest trust structure"
          - "set up a new fixed interest trust entity"
          - "create a life interest trust"
          - "register a fixed interest trust"
          - "add a new fixed interest trust entity"
          # Trust sub-type phrases — unit trust
          - "create a unit trust"
          - "set up a unit trust"
          - "register a unit trust entity"
          - "add a unit trust"
          - "create a new unit trust"
          - "onboard a unit trust structure"
          - "set up a unit trust entity"
          - "register a new unit trust"
          - "create a unit trust fund entity"
          - "add a new unit trust entity"
          # Trust sub-type phrases — bare/simple trust
          - "create a bare trust"
          - "set up a bare trust"
          - "register a bare trust entity"
          - "create a simple trust"
          - "add a bare trust"
          - "set up a nominee trust"
          - "create a bare trust entity"
          - "register a simple trust"
          # Trust sub-type phrases — purpose trust
          - "create a purpose trust"
          - "set up a purpose trust"
          - "register a purpose trust entity"
          - "create a non-charitable purpose trust"
          - "add a purpose trust"
          - "set up a STAR trust"
          - "create an orphan purpose trust"
          - "register a purpose trust structure"
          # Partnership sub-type phrases — general partnership
          - "create a general partnership"
          - "set up a general partnership"
          - "register a general partnership entity"
          - "add a general partnership"
          - "create a GP entity"
          - "onboard a general partnership"
          - "set up a new general partnership"
          - "register a GP"
          - "create a general partnership for the GP"
          - "add a new general partnership entity"
          # Partnership sub-type phrases — limited partnership
          - "create a limited partnership"
          - "set up a limited partnership"
          - "register a limited partnership entity"
          - "add a limited partnership"
          - "create an LP entity"
          - "onboard a limited partnership"
          - "set up a new limited partnership"
          - "register an LP"
          - "create a limited partnership structure"
          - "add a new limited partnership entity"
          # Partnership sub-type phrases — LLP
          - "create an LLP"
          - "set up an LLP"
          - "register an LLP entity"
          - "add an LLP"
          - "create a limited liability partnership"
          - "onboard an LLP"
          - "set up a new LLP"
          - "register a limited liability partnership"
          - "create an LLP entity"
          - "add a new LLP entity"
          # Partnership sub-type phrases — Scottish LP / SLP
          - "create a Scottish limited partnership"
          - "set up an SLP"
          - "register an SLP entity"
          - "create an SLP"
          - "add a Scottish limited partnership"
          - "set up a Scottish LP"
          - "register a Scottish limited partnership"
          - "create a Scottish LP entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, creation, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        produces:
          type: entity
          resolved: false
        crud:
          operation: entity_create
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: entity-type
            type: string
            required: true
          - name: name
            type: string
            required: false
          - name: first-name
            type: string
            required: false
            maps_to: first_name
          - name: last-name
            type: string
            required: false
            maps_to: last_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: company-number
            type: string
            required: false
            maps_to: registration_number
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: date-of-birth
            type: date
            required: false
            maps_to: date_of_birth
          - name: nationality
            type: string
            required: false
            maps_to: nationality
          - name: establishment-date
            type: date
            required: false
            maps_to: establishment_date
          - name: trust-purpose
            type: string
            required: false
            maps_to: trust_purpose
          - name: formation-date
            type: date
            required: false
            maps_to: formation_date
        returns:
          type: uuid
          name: entity_id
          capture: true
        outputs:
          - name: created_entity_id
            type: uuid
            entity_kind: entity
            description: ID of the newly created entity

      ensure:
        description: Create or update an entity of the requested entity type
        behavior: crud
        invocation_phrases:
          - "ensure entity"
          - "ensure company"
          - "ensure person"
          - "ensure trust"
          - "ensure partnership"
          - "upsert entity"
          - "get or create entity"
          - "find or create entity"
          - "ensure entity exists"
          - "add or update entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, upsert, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        produces:
          type: entity
          resolved: false
        crud:
          operation: entity_upsert
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: entity-type
            type: string
            required: true
          - name: name
            type: string
            required: false
          - name: first-name
            type: string
            required: false
            maps_to: first_name
          - name: last-name
            type: string
            required: false
            maps_to: last_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: company-number
            type: string
            required: false
            maps_to: registration_number
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: lei
            type: string
            required: false
            maps_to: lei
            description: Legal Entity Identifier (LEI) from GLEIF
          - name: date-of-birth
            type: date
            required: false
            maps_to: date_of_birth
          - name: nationality
            type: string
            required: false
            maps_to: nationality
          - name: establishment-date
            type: date
            required: false
            maps_to: establishment_date
          - name: trust-purpose
            type: string
            required: false
            maps_to: trust_purpose
          - name: formation-date
            type: date
            required: false
            maps_to: formation_date
        returns:
          type: uuid
          name: entity_id
          capture: true

      read:
        description: Read an entity by ID
        invocation_phrases:
          - "read entity"
          - "get entity"
          - "show entity"
          - "view entity"
          - "fetch entity details"
          - "look up entity"
          - "find entity by id"
          - "describe entity"
          - "entity details"
          - "retrieve entity"
          - "pull up this entity"
          - "show me this company"
          - "what do we know about this entity"
          - "get the details on this person"
          - "show entity information"
          - "look up this counterparty"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: entities
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record
      update:
        description: Update an entity's base fields
        invocation_phrases:
          - "update entity"
          - "modify entity details"
          - "change entity information"
          - "edit entity"
          - "update company details"
          - "modify entity"
          - "change entity name"
          - "update entity attributes"
          - "amend entity"
          - "update party details"
          - "change company details"
          - "change person details"
          - "amend this entity record"
          - "update this company record"
          - "edit the legal entity details"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, modification, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: entities
          schema: ob-poc
          key: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: name
            type: string
            required: false
            maps_to: name
          - name: status
            type: string
            required: false
            maps_to: status
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
        returns:
          type: affected
      delete:
        description: Delete an entity (cascades to type extension)
        invocation_phrases:
          - "delete entity"
          - "remove entity"
          - "drop entity"
          - "delete person"
          - "delete company"
          - "remove party"
          - "delete entity record"
          - "destroy entity"
          - "erase entity"
          - "remove entity from system"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, deletion, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: delete
          table: entities
          schema: ob-poc
          key: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: affected
      list:
        description: List entities with optional filters
        invocation_phrases:
          - "list entities"
          - "show all entities"
          - "view entity list"
          - "list companies"
          - "show entities by type"
          - "list all entities"
          - "display entities"
          - "get entity list"
          - "enumerate entities"
          - "browse entities"
          - "show me all companies"
          - "what entities do we have"
          - "list the registered entities"
          - "show me all entities"
          - "what companies are in the system"
          - "list all persons"
          - "show me every entity"
          - "which entities do we have on file"
          - "give me a list of all counterparties"
          - "show all registered companies"
          - "list all the people and companies"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, listing, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: entities
          schema: ob-poc
        args:
          - name: entity-type
            type: string
            required: false
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: status
            type: string
            required: false
            maps_to: status
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set

      query:
        description: Query entities for batch template iteration (returns entity refs, not records)
        invocation_phrases:
          - "query entities"
          - "search entities"
          - "find entities"
          - "entity search"
          - "filter entities"
          - "query entity by name"
          - "entity query"
          - "search for entities"
          - "find matching entities"
          - "entity lookup"
          - "search for a company by name"
          - "find all entities in Luxembourg"
          - "look up entities matching a pattern"
          - "find persons by jurisdiction"
          - "search counterparties"
          - "find entities by type"
        behavior: plugin
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, batch, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        plugin:
          handler: entity_query
        args:
          - name: type
            type: string
            required: false
            description: Entity type filter (fund, proper_person, limited_company, etc.)
          - name: name-like
            type: string
            required: false
            description: Name pattern for ILIKE search (supports % wildcards)
          - name: jurisdiction
            type: string
            required: false
            description: Jurisdiction code filter
          - name: limit
            type: integer
            required: false
            default: 1000
            description: Maximum number of results
        returns:
          type: entity_query_result
          description: List of (entity_id, name) tuples for batch iteration
          capture: true

      # =========================================================================
      # GHOST ENTITY VERBS - Progressive refinement workflow
      # =========================================================================

      ghost:
        description: Create a ghost person entity (name only, minimal attributes)
        invocation_phrases:
          - "create ghost entity"
          - "add ghost person"
          - "create ghost"
          - "ghost entity"
          - "create provisional person"
          - "add unverified person"
          - "create name-only entity"
          - "ghost a person"
          - "create preliminary entity"
          - "add ghost record"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, creation, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: entity_ghost
        produces:
          type: entity
          subtype: proper_person
          resolved: false
        args:
          - name: name
            type: string
            required: true
            description: Full name as discovered (e.g., "John Smith" from document)
          - name: source
            type: string
            required: false
            description: Discovery source (document, ownership_chain, allegation, gleif)
          - name: source-reference
            type: string
            required: false
            description: Reference to source (document_id, relationship_id, etc.)
          - name: notes
            type: string
            required: false
            description: Context notes about the ghost entity
        returns:
          type: uuid
          name: entity_id
          capture: true
        outputs:
          - name: created_entity_id
            type: uuid
            entity_kind: entity
            description: ID of the newly created ghost entity

      identify:
        description: Add identifying attributes to a ghost entity (transitions to IDENTIFIED state)
        invocation_phrases:
          - "identify ghost entity"
          - "add identity to ghost"
          - "identify person"
          - "set ghost identity"
          - "add identifying details"
          - "identify entity"
          - "resolve ghost identity"
          - "add ID to ghost"
          - "enrich ghost entity"
          - "provide ghost identification"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, identification, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: entity_identify
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entity_proper_persons
              entity_type: proper_person
              schema:
                ob-poc
                # Composite search: name + nationality (usually captured first) + DOB (year approx or exact)
              search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
              primary_key: entity_id
          - name: first-name
            type: string
            required: false
            description: First name (if splitting from full name)
          - name: last-name
            type: string
            required: false
            description: Last name (if splitting from full name)
          - name: date-of-birth
            type: date
            required: false
            description: Date of birth
          - name: nationality
            type: string
            required: false
            description: Nationality/citizenship
          - name: id-document-type
            type: string
            required: false
            description: ID document type (PASSPORT, NATIONAL_ID, etc.)
          - name: id-document-number
            type: string
            required: false
            description: ID document number
        returns:
          type: uuid
          name: entity_id

      verify:
        description: Mark an identified entity as verified (transitions to VERIFIED state)
        invocation_phrases:
          - "verify entity"
          - "confirm entity identity"
          - "mark entity verified"
          - "verify person"
          - "approve entity identification"
          - "verify ghost entity"
          - "confirm ghost identity"
          - "entity verification"
          - "complete entity verification"
          - "mark as verified"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, verification, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        crud:
          operation: update
          table: entity_proper_persons
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entity_proper_persons
              entity_type: proper_person
              schema:
                ob-poc
                # Composite search: name + nationality + DOB discriminators
              search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
              primary_key: entity_id
          - name: verification-notes
            type: string
            required: false
            description: Notes about how verification was completed
        returns:
          type: affected

      list-ghosts:
        description: List ghost entities requiring identification
        invocation_phrases:
          - "list ghost entities"
          - "show ghosts"
          - "list unverified entities"
          - "show ghost persons"
          - "list pending ghosts"
          - "display ghost entities"
          - "get ghost list"
          - "view unidentified entities"
          - "show provisional entities"
          - "list entities needing identification"
          - "which entities need verification"
          - "show unconfirmed persons"
          - "who hasn't been identified yet"
          - "list entities that haven't been verified"
          - "show entities awaiting identification"
          - "any ghost records outstanding"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, ghost, listing, onboarding]
          phase_tags: [onboarding]
          side_effects: facts_only
        crud:
          operation: select
          table: entity_proper_persons
          schema: ob-poc
          where_clause: "person_state = 'GHOST'"
        args:
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set

      # =========================================================================
      # PLACEHOLDER ENTITY VERBS - Deferred resolution for macro expansion
      # =========================================================================

      ensure-or-placeholder:
        description: Return existing entity or create placeholder for later resolution
        behavior: plugin
        invocation_phrases:
          - "ensure entity or create placeholder"
          - "get or placeholder"
          - "entity placeholder"
          - "deferred entity"
          - "create placeholder entity"
          - "placeholder for entity"
          - "ensure or placeholder"
          - "find or create placeholder"
          - "get entity or create placeholder"
          - "deferred entity resolution"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, placeholder, macro, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: entity_ensure_or_placeholder
        args:
          - name: ref
            type: uuid
            required: false
            description: Optional entity reference to check
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: kind
            type: string
            required: true
            description: Kind of placeholder (depositary, auditor, custodian, etc.)
            valid_values:
              - depositary
              - auditor
              - custodian
              - administrator
              - transfer-agent
              - prime-broker
              - legal-counsel
              - tax-advisor
              - compliance-officer
              - director
              - secretary
              - authorized-signatory
          - name: cbu-id
            type: uuid
            required: true
            description: CBU this placeholder is being created for
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: name-hint
            type: string
            required: false
            description: Optional name hint for the placeholder
        returns:
          type: record
          fields:
            - name: entity_id
              type: uuid
              description: The entity ID (existing or placeholder)
            - name: is_placeholder
              type: boolean
              description: True if a placeholder was created
          capture: true

      resolve-placeholder:
        description: Resolve a placeholder entity to a real entity
        behavior: plugin
        invocation_phrases:
          - "resolve placeholder"
          - "resolve this placeholder to the real entity"
          - "resolve placeholder to the real entity"
          - "replace this placeholder with the real entity"
          - "link placeholder to entity"
          - "replace placeholder"
          - "resolve placeholder entity"
          - "convert placeholder to real entity"
          - "swap placeholder"
          - "placeholder resolution"
          - "assign entity to placeholder"
          - "fill placeholder"
          - "resolve deferred entity"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, placeholder, resolution, onboarding]
          phase_tags: [onboarding]
          side_effects: state_write
        plugin:
          handler: entity_resolve_placeholder
        args:
          - name: placeholder-id
            type: uuid
            required: true
            description: The placeholder entity ID
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: resolved-entity-id
            type: uuid
            required: true
            description: The real entity to resolve to
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: resolved-by
            type: string
            required: false
            description: Who is performing the resolution
            default: system
        returns:
          type: record
          fields:
            - name: placeholder_entity_id
              type: uuid
            - name: resolved_to_entity_id
              type: uuid
            - name: status
              type: string
            - name: roles_transferred
              type: integer

      list-placeholders:
        description: List pending placeholder entities for a CBU
        behavior: plugin
        invocation_phrases:
          - "list placeholders"
          - "show pending placeholders"
          - "view unresolved entities"
          - "list placeholder entities"
          - "show unresolved placeholders"
          - "display placeholders"
          - "get placeholder list"
          - "view deferred entities"
          - "list pending entity placeholders"
          - "show placeholders for CBU"
