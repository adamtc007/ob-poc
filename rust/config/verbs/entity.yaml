      ensure-partnership-limited:
        description: Create or update a limited partnership entity (idempotent by name)
        behavior: crud
        invocation_phrases:
          - "ensure partnership"
          - "add or update partnership"
          - "upsert partnership"
          - "ensure partnership exists"
          - "get or create partnership"
          - "find or create LP"
          - "ensure limited partnership"
          - "idempotent partnership create"
          - "ensure LP entity"
          - "ensure partnership structure"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, upsert, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: partnership
          resolved: false
        crud:
          operation: entity_upsert
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
          type_id_column: entity_type_id
          returning: entity_id
        args:
          - name: name
            type: string
            required: true
            maps_to: partnership_name
          - name: cbu-id
            type: uuid
            required: false
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: formation-date
            type: date
            required: false
            maps_to: formation_date
        returns:
          type: uuid
          name: entity_id
          capture: true

      read:
        description: Read an entity by ID
        invocation_phrases:
          - "read entity"
          - "get entity"
          - "show entity"
          - "view entity"
          - "fetch entity details"
          - "look up entity"
          - "find entity by id"
          - "describe entity"
          - "entity details"
          - "retrieve entity"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: select
          table: entities
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record
      update:
        description: Update an entity's base fields
        invocation_phrases:
          - "update entity"
          - "modify entity details"
          - "change entity information"
          - "edit entity"
          - "update company details"
          - "modify entity"
          - "change entity name"
          - "update entity attributes"
          - "amend entity"
          - "update party details"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, modification, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: update
          table: entities
          schema: ob-poc
          key: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: name
            type: string
            required: false
            maps_to: name
          - name: status
            type: string
            required: false
            maps_to: status
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
        returns:
          type: affected
      delete:
        description: Delete an entity (cascades to type extension)
        invocation_phrases:
          - "delete entity"
          - "remove entity"
          - "drop entity"
          - "delete person"
          - "delete company"
          - "remove party"
          - "delete entity record"
          - "destroy entity"
          - "erase entity"
          - "remove entity from system"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, deletion, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: delete
          table: entities
          schema: ob-poc
          key: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: affected
      list:
        description: List entities with optional filters
        invocation_phrases:
          - "list entities"
          - "show all entities"
          - "view entity list"
          - "list companies"
          - "show entities by type"
          - "list all entities"
          - "display entities"
          - "get entity list"
          - "enumerate entities"
          - "browse entities"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, listing, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: select
          table: entities
          schema: ob-poc
        args:
          - name: entity-type
            type: string
            required: false
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: status
            type: string
            required: false
            maps_to: status
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set

      query:
        description: Query entities for batch template iteration (returns entity refs, not records)
        invocation_phrases:
          - "query entities"
          - "search entities"
          - "find entities"
          - "entity search"
          - "filter entities"
          - "query entity by name"
          - "entity query"
          - "search for entities"
          - "find matching entities"
          - "entity lookup"
        behavior: plugin
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, batch, onboarding]
          phase_tags: [onboarding]
        plugin:
          handler: entity_query
        args:
          - name: type
            type: string
            required: false
            description: Entity type filter (fund, proper_person, limited_company, etc.)
          - name: name-like
            type: string
            required: false
            description: Name pattern for ILIKE search (supports % wildcards)
          - name: jurisdiction
            type: string
            required: false
            description: Jurisdiction code filter
          - name: limit
            type: integer
            required: false
            default: 1000
            description: Maximum number of results
        returns:
          type: entity_query_result
          description: List of (entity_id, name) tuples for batch iteration
          capture: true

      # =========================================================================
      # GHOST ENTITY VERBS - Progressive refinement workflow
      # =========================================================================

      ghost:
        description: Create a ghost person entity (name only, minimal attributes)
        invocation_phrases:
          - "create ghost entity"
          - "add ghost person"
          - "create ghost"
          - "ghost entity"
          - "create provisional person"
          - "add unverified person"
          - "create name-only entity"
          - "ghost a person"
          - "create preliminary entity"
          - "add ghost record"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, creation, onboarding]
          phase_tags: [onboarding]
        plugin:
          handler: entity_ghost
        produces:
          type: entity
          subtype: proper_person
          resolved: false
        args:
          - name: name
            type: string
            required: true
            description: Full name as discovered (e.g., "John Smith" from document)
          - name: source
            type: string
            required: false
            description: Discovery source (document, ownership_chain, allegation, gleif)
          - name: source-reference
            type: string
            required: false
            description: Reference to source (document_id, relationship_id, etc.)
          - name: notes
            type: string
            required: false
            description: Context notes about the ghost entity
        returns:
          type: uuid
          name: entity_id
          capture: true

      identify:
        description: Add identifying attributes to a ghost entity (transitions to IDENTIFIED state)
        invocation_phrases:
          - "identify ghost entity"
          - "add identity to ghost"
          - "identify person"
          - "set ghost identity"
          - "add identifying details"
          - "identify entity"
          - "resolve ghost identity"
          - "add ID to ghost"
          - "enrich ghost entity"
          - "provide ghost identification"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, identification, onboarding]
          phase_tags: [onboarding]
        plugin:
          handler: entity_identify
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entity_proper_persons
              entity_type: proper_person
              schema: ob-poc
              # Composite search: name + nationality (usually captured first) + DOB (year approx or exact)
              search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
              primary_key: entity_id
          - name: first-name
            type: string
            required: false
            description: First name (if splitting from full name)
          - name: last-name
            type: string
            required: false
            description: Last name (if splitting from full name)
          - name: date-of-birth
            type: date
            required: false
            description: Date of birth
          - name: nationality
            type: string
            required: false
            description: Nationality/citizenship
          - name: id-document-type
            type: string
            required: false
            description: ID document type (PASSPORT, NATIONAL_ID, etc.)
          - name: id-document-number
            type: string
            required: false
            description: ID document number
        returns:
          type: uuid
          name: entity_id

      verify:
        description: Mark an identified entity as verified (transitions to VERIFIED state)
        invocation_phrases:
          - "verify entity"
          - "confirm entity identity"
          - "mark entity verified"
          - "verify person"
          - "approve entity identification"
          - "verify ghost entity"
          - "confirm ghost identity"
          - "entity verification"
          - "complete entity verification"
          - "mark as verified"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, ghost, verification, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: update
          table: entity_proper_persons
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entity_proper_persons
              entity_type: proper_person
              schema: ob-poc
              # Composite search: name + nationality + DOB discriminators
              search_key: "(search_name (nationality :selectivity 0.7) (date_of_birth :selectivity 0.95 :match-mode year-or-exact))"
              primary_key: entity_id
          - name: verification-notes
            type: string
            required: false
            description: Notes about how verification was completed
        returns:
          type: affected

      list-ghosts:
        description: List ghost entities requiring identification
        invocation_phrases:
          - "list ghost entities"
          - "show ghosts"
          - "list unverified entities"
          - "show ghost persons"
          - "list pending ghosts"
          - "display ghost entities"
          - "get ghost list"
          - "view unidentified entities"
          - "show provisional entities"
          - "list entities needing identification"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: entity
          noun: entity
          tags: [query, ghost, listing, onboarding]
          phase_tags: [onboarding]
        crud:
          operation: select
          table: entity_proper_persons
          schema: ob-poc
          where_clause: "person_state = 'GHOST'"
        args:
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set

      # =========================================================================
      # PLACEHOLDER ENTITY VERBS - Deferred resolution for macro expansion
      # =========================================================================

      ensure-or-placeholder:
        description: Return existing entity or create placeholder for later resolution
        behavior: plugin
        invocation_phrases:
          - "ensure entity or create placeholder"
          - "get or placeholder"
          - "entity placeholder"
          - "deferred entity"
          - "create placeholder entity"
          - "placeholder for entity"
          - "ensure or placeholder"
          - "find or create placeholder"
          - "get entity or create placeholder"
          - "deferred entity resolution"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, placeholder, macro, onboarding]
          phase_tags: [onboarding]
        plugin:
          handler: entity_ensure_or_placeholder
        args:
          - name: ref
            type: uuid
            required: false
            description: Optional entity reference to check
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: kind
            type: string
            required: true
            description: Kind of placeholder (depositary, auditor, custodian, etc.)
            valid_values:
              - depositary
              - auditor
              - custodian
              - administrator
              - transfer-agent
              - prime-broker
              - legal-counsel
              - tax-advisor
              - compliance-officer
              - director
              - secretary
              - authorized-signatory
          - name: cbu-id
            type: uuid
            required: true
            description: CBU this placeholder is being created for
            lookup:
              table: cbus
