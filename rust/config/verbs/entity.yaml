          - "ensure person exists"
          - "get or create person"
          - "idempotent person create"
          - "find or create individual"
          - "ensure individual exists"
          - "ensure natural person"
          - "ensure individual"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: global
          noun: entity
          tags: [lifecycle, upsert, onboarding]
          phase_tags: [onboarding]
        produces:
          type: entity
          subtype: proper_person
          resolved: false
        crud:
          operation: entity_upsert
          base_table: entities
          schema: ob-poc
          extension_table_column: table_name
