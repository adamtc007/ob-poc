domains:
  service-resource:
    description: "Service resource type (read-only) and instance operations"
    verbs:
      define-type:
        flavour: attribute_mutating
        description: Define a governed service resource type
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "define service resource type"
          - "register resource type"
          - "add resource type to catalogue"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource
          tags: [catalogue, service-resource-type, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: resource-id
            type: uuid
            required: false
          - name: name
            type: string
            required: true
          - name: resource-code
            type: string
            required: true
          - name: resource-type
            type: string
            required: true
          - name: owner
            type: string
            required: true
          - name: owner-principal-fqn
            type: string
            required: false
          - name: description
            type: string
            required: false
          - name: lifecycle-status
            type: string
            required: false
          - name: governance-status
            type: string
            required: false
          - name: metadata
            type: json
            required: false
          - name: is-active
            type: boolean
            required: false
          - name: service-scope
            type: string
            required: false
          - name: resource-namespace
            type: string
            required: false
          - name: category
            type: string
            required: false
          - name: version
            type: string
            required: false
          - name: srdef-version
            type: string
            required: false
          - name: implementation-type
            type: string
            required: false
          - name: validation-rules
            type: json
            required: false
          - name: capability-schema
            type: json
            required: false
          - name: default-config
            type: json
            required: false
          - name: ui-schema
            type: json
            required: false
          - name: dependency-config
            type: json
            required: false
        returns:
          type: uuid
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      amend-type:
        flavour: attribute_mutating
        description: Amend a governed service resource type
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "amend service resource type"
          - "update resource type"
          - "revise resource type definition"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource
          tags: [catalogue, service-resource-type, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: resource-id
            type: uuid
            required: false
          - name: resource
            type: string
            required: false
          - name: resource-code
            type: string
            required: false
          - name: name
            type: string
            required: false
          - name: description
            type: string
            required: false
          - name: resource-type
            type: string
            required: false
          - name: owner
            type: string
            required: false
          - name: owner-principal-fqn
            type: string
            required: false
          - name: lifecycle-status
            type: string
            required: false
          - name: governance-status
            type: string
            required: false
          - name: metadata
            type: json
            required: false
          - name: is-active
            type: boolean
            required: false
          - name: service-scope
            type: string
            required: false
          - name: resource-namespace
            type: string
            required: false
          - name: category
            type: string
            required: false
          - name: version
            type: string
            required: false
          - name: srdef-version
            type: string
            required: false
          - name: implementation-type
            type: string
            required: false
          - name: validation-rules
            type: json
            required: false
          - name: capability-schema
            type: json
            required: false
          - name: default-config
            type: json
            required: false
          - name: ui-schema
            type: json
            required: false
          - name: dependency-config
            type: json
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      retire-type:
        flavour: discretionary
        audit_class: service_resource_retire_type
        description: Retire a governed service resource type
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "retire service resource type"
          - "retire resource type"
          - "sunset resource type"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource
          tags: [catalogue, service-resource-type, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: resource-id
            type: uuid
            required: false
          - name: resource
            type: string
            required: false
          - name: resource-code
            type: string
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      add-capability:
        flavour: attribute_mutating
        description: Add a service-resource capability mapping
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "add service resource capability"
          - "link service to resource capability"
          - "create resource capability"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource_capability
          tags: [catalogue, service-resource-capability, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: capability-id
            type: uuid
            required: false
          - name: service-id
            type: uuid
            required: false
          - name: service
            type: string
            required: false
          - name: service-code
            type: string
            required: false
          - name: resource-id
            type: uuid
            required: false
          - name: resource
            type: string
            required: false
          - name: resource-code
            type: string
            required: false
          - name: supported-options
            type: json
            required: false
          - name: priority
            type: integer
            required: false
          - name: cost-factor
            type: decimal
            required: false
          - name: performance-rating
            type: integer
            required: false
          - name: resource-config
            type: json
            required: false
          - name: is-active
            type: boolean
            required: false
          - name: is-required
            type: boolean
            required: false
        returns:
          type: uuid
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      amend-capability:
        flavour: attribute_mutating
        description: Amend a service-resource capability mapping
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "amend service resource capability"
          - "update service resource capability"
          - "revise resource capability"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource_capability
          tags: [catalogue, service-resource-capability, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: capability-id
            type: uuid
            required: false
          - name: service-id
            type: uuid
            required: false
          - name: service
            type: string
            required: false
          - name: service-code
            type: string
            required: false
          - name: resource-id
            type: uuid
            required: false
          - name: resource
            type: string
            required: false
          - name: resource-code
            type: string
            required: false
          - name: supported-options
            type: json
            required: false
          - name: priority
            type: integer
            required: false
          - name: cost-factor
            type: decimal
            required: false
          - name: performance-rating
            type: integer
            required: false
          - name: resource-config
            type: json
            required: false
          - name: is-active
            type: boolean
            required: false
          - name: is-required
            type: boolean
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      remove-capability:
        flavour: discretionary
        audit_class: service_resource_remove_capability
        description: Remove a service-resource capability mapping from active use
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "remove service resource capability"
          - "deactivate service resource capability"
          - "retire resource capability"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: service_resource_capability
          tags: [catalogue, service-resource-capability, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: capability-id
            type: uuid
            required: false
          - name: service-id
            type: uuid
            required: false
          - name: service
            type: string
            required: false
          - name: service-code
            type: string
            required: false
          - name: resource-id
            type: uuid
            required: false
          - name: resource
            type: string
            required: false
          - name: resource-code
            type: string
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      # === Type Operations (read-only - reference data) ===
      read:
        flavour: attribute_mutating
        description: Read a service resource type by ID or code
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "read service resource type"
          - "get resource type details"
          - "show service resource definition"
          - "look up resource type by code"
          - "fetch resource type information"
          - "describe this service resource"
          - "what is this resource type"
          - "display resource type specification"
        behavior: crud
        crud:
          operation: select
          table: service_resource_types
          schema: ob-poc
        args:
          - name: resource-id
            type: uuid
            required: false
            maps_to: resource_id
            lookup:
              table: service_resource_types
              entity_type: resource_type
              schema: ob-poc
              search_key: name
              primary_key: resource_id
          - name: resource-code
            type: string
            required: false
            maps_to: resource_code
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list:
        flavour: attribute_mutating
        description: List service resource types with optional filters
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list service resource types"
          - "show all resource types"
          - "browse resource type catalog"
          - "what resource types are available"
          - "display resource types with filters"
          - "enumerate service resource definitions"
          - "get all resource types"
          - "search resource type catalog"
          - "browse service resources"
          - "list resources"
          - "show resources"
        behavior: crud
        crud:
          operation: select
          table: service_resource_types
          schema: ob-poc
        args:
          - name: resource-type
            type: string
            required: false
            maps_to: resource_type
          - name: owner
            type: string
            required: false
            maps_to: owner
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set

      # === Taxonomy lookups (read-only - taxonomy managed separately) ===
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      list-by-service:
        flavour: attribute_mutating
        description: List service resource types for a service
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list resources for a service"
          - "show resource types under this service"
          - "what resources does this service require"
          - "get resources linked to service"
          - "which resource types belong to service"
          - "display resource capabilities for service"
          - "find resources by service"
          - "enumerate resources for service delivery"
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: service_resource_types
          join_table: service_resource_capabilities
          join_col: resource_id
          filter_col: service_id
          schema: ob-poc
        args:
          - name: service-id
            type: uuid
            required: true
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
        returns:
          type: record_set

      # === Attribute lookups (read-only - attribute requirements managed separately) ===
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      list-attributes:
        flavour: attribute_mutating
        description: List attribute requirements for a service resource type
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list attribute requirements for resource"
          - "show required attributes for resource type"
          - "what attributes does this resource need"
          - "get resource attribute specifications"
          - "display mandatory attributes for resource"
          - "which attributes are required for provisioning"
          - "enumerate resource attribute requirements"
          - "check attribute needs for resource type"
          - "show resource attributes"
          - "list attributes for resource"
          - "resource attribute list"
        behavior: crud
        crud:
          operation: list_by_fk
          table: resource_attribute_requirements
          schema: ob-poc
          fk_col: resource_id
        args:
          - name: resource-id
            type: uuid
            required: true
            lookup:
              table: service_resource_types
              entity_type: resource_type
              schema: ob-poc
              search_key: name
              primary_key: resource_type_id
          - name: is-mandatory
            type: boolean
            required: false
        returns:
          type: record_set

      # === Instance Operations (provisioning and lifecycle) ===
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      provision:
        flavour: instance_adding
        description: Provision a service resource instance for a CBU
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "provision a resource instance"
          - "create resource instance for CBU"
          - "set up resource for structure"
          - "provision service resource for client"
          - "deploy new resource instance"
          - "instantiate service resource"
          - "stand up resource for custody account"
          - "create new resource provisioning request"
        behavior: plugin
        handler: resource_instance_create
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: resource-type
            type: string
            required: true
          - name: instance-url
            type: string
            required: false
            description: URL for resource instance (auto-generated if not provided)
          - name: instance-id
            type: string
            required: false
          - name: instance-name
            type: string
            required: false
          - name: product-id
            type: uuid
            required: false
            lookup:
              table: products
              entity_type: product
              schema: ob-poc
              search_key: name
              primary_key: product_id
          - name: service-id
            type: uuid
            required: false
            lookup:
              table: services
              entity_type: service
              schema: ob-poc
              search_key: name
              primary_key: service_id
          - name: market-id
            type: uuid
            required: false
            lookup:
              table: markets
              entity_type: market
              schema: ob-poc
              search_key: mic
              primary_key: market_id
          - name: currency
            type: string
            required: false
          - name: counterparty-entity-id
            type: uuid
            required: false
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: config
            type: json
            required: false
          # Dependency tracking
          - name: depends-on
            type: string_list
            required: false
            description: |
              URLs or @symbol references of resources this instance depends on.
              Used by the DSL compiler for topological ordering.
          # Specific dependency injections (from resource_dependencies config)
          - name: settlement-account-url
            type: string
            required: false
            description: URL of settlement account (auto-injected for dependent resources)
          - name: custody-account-url
            type: string
            required: false
            description: URL of custody account (auto-injected for dependent resources)
          - name: nav-engine-url
            type: string
            required: false
            description: URL of NAV engine (auto-injected for dependent resources)
        consumes:
          - arg: cbu-id
            type: cbu
          - arg: depends-on
            type: resource_instance
            required: false
        produces:
          type: resource_instance
          resolved: false
        returns:
          type: uuid
          name: instance_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      confirm-provisioning-result:
        flavour: attribute_mutating
        description: Confirm the owner-returned provisioning result for a resource request
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: service_resource
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
          - "confirm provisioning result"
          - "record resource owner result"
          - "confirm resource activation"
          - "record owner returned resource locator"
        behavior: plugin
        handler: ConfirmProvisioningResultOp
        args:
          - name: provisioning-request-id
            type: uuid
            required: true
            lookup:
              table: provisioning_requests
              schema: ob-poc
              search_key: request_id
              primary_key: request_id
              entity_type: provisioning_request
          - name: payload
            type: json
            required: true
          - name: content-hash
            type: string
            required: false
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: provisioning-request-id
          target_workspace: onboarding_request
          target_slot: provisioning_request

      get-provisioning-status:
        flavour: attribute_mutating
        description: Read provisioning and resource-instance status for a data-request slice
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: service_resource
          phase_tags: [onboarding]
          side_effects: facts_only
        invocation_phrases:
          - "get provisioning status for this slice"
          - "get slice provisioning status"
          - "show slice provisioning status"
          - "show resource provisioning status for this slice"
          - "check activation status for this slice"
          - "show owner provisioning result for this slice"
          - "read service resource activation status by slice"
          - "what is the provisioning status of this slice"
          - "owner side activation status for this onboarding slice"
          - "slice owner provisioning status"
        behavior: plugin
        handler: GetProvisioningStatusOp
        args:
          - name: slice-id
            type: uuid
            required: true
            lookup:
              table: onboarding_data_request_slices
              schema: ob-poc
              search_key: slice_id
              primary_key: slice_id
              entity_type: onboarding_data_request_slice
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      read-resource-owner:
        flavour: attribute_mutating
        description: Read an addressable resource-owner principal
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: resource_owner_principal
          phase_tags: [onboarding, stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "read resource owner"
          - "show resource owner principal"
          - "get resource owner"
          - "who owns this service resource"
        behavior: crud
        crud:
          operation: select
          table: resource_owner_principals
          schema: ob-poc
        args:
          - name: owner-principal-fqn
            type: string
            required: false
            maps_to: owner_principal_fqn
            lookup:
              table: resource_owner_principals
              entity_type: resource_owner_principal
              schema: ob-poc
              search_key: display_name
              primary_key: owner_principal_fqn
          - name: owner-system
            type: string
            required: false
            maps_to: owner_system
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-resource-owners:
        flavour: attribute_mutating
        description: List resource-owner principals available for service-resource dispatch
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: resource_owner_principal
          phase_tags: [onboarding, stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list resource owners"
          - "show resource owner principals"
          - "list service resource owners"
          - "which systems own service resources"
        behavior: crud
        crud:
          operation: select
          table: resource_owner_principals
          schema: ob-poc
        args:
          - name: status
            type: string
            required: false
            maps_to: status
          - name: owner-system
            type: string
            required: false
            maps_to: owner_system
          - name: limit
            type: integer
            required: false
            default: 100
          - name: offset
            type: integer
            required: false
            default: 0
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      set-attr:
        flavour: attribute_mutating
        description: Set an attribute value on a service resource instance
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "set attribute on resource instance"
          - "update resource instance attribute"
          - "assign attribute value to resource"
          - "configure resource instance property"
          - "change resource attribute value"
          - "enter attribute for provisioned resource"
          - "modify resource instance configuration"
          - "set property on service resource"
        behavior: plugin
        handler: resource_set_attr
        args:
          - name: instance-id
            type: uuid
            required: true
            lookup:
              table: cbu_resource_instances
              entity_type: resource_instance
              schema: ob-poc
              search_key: instance_name
              primary_key: instance_id
          - name: attr
            type: string
            required: true
          - name: value
            type: string
            required: true
          - name: state
            type: string
            required: false
            valid_values:
              - proposed
              - confirmed
              - derived
              - system
          - name: source
            type: json
            required: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      activate:
        flavour: attribute_mutating
        description: Activate a service resource instance
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
