domains:
  service-resource:
    description: "Service resource type (read-only) and instance operations"
    verbs:
      # === Type Operations (read-only - reference data) ===
      read:
        description: Read a service resource type by ID or code
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "read service resource type"
        - "get resource type details"
        - "show service resource definition"
        - "look up resource type by code"
        - "fetch resource type information"
        - "describe this service resource"
        - "what is this resource type"
        - "display resource type specification"
        behavior: crud
        crud:
          operation: select
          table: service_resource_types
          schema: ob-poc
        args:
        - name: resource-id
          type: uuid
          required: false
          maps_to: resource_id
          lookup:
            table: service_resource_types
            entity_type: resource_type
            schema: ob-poc
            search_key: name
            primary_key: resource_type_id
        - name: resource-code
          type: string
          required: false
          maps_to: resource_code
        returns:
          type: record

      list:
        description: List service resource types with optional filters
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list service resource types"
        - "show all resource types"
        - "browse resource type catalog"
        - "what resource types are available"
        - "display resource types with filters"
        - "enumerate service resource definitions"
        - "get all resource types"
        - "search resource type catalog"
        behavior: crud
        crud:
          operation: select
          table: service_resource_types
          schema: ob-poc
        args:
        - name: resource-type
          type: string
          required: false
          maps_to: resource_type
        - name: owner
          type: string
          required: false
          maps_to: owner
        - name: is-active
          type: boolean
          required: false
          maps_to: is_active
        - name: limit
          type: integer
          required: false
          default: 100
        - name: offset
          type: integer
          required: false
          default: 0
        returns:
          type: record_set

      # === Taxonomy lookups (read-only - taxonomy managed separately) ===
      list-by-service:
        description: List service resource types for a service
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list resources for a service"
        - "show resource types under this service"
        - "what resources does this service require"
        - "get resources linked to service"
        - "which resource types belong to service"
        - "display resource capabilities for service"
        - "find resources by service"
        - "enumerate resources for service delivery"
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: service_resource_types
          join_table: service_resource_capabilities
          join_col: resource_id
          filter_col: service_id
          schema: ob-poc
        args:
        - name: service-id
          type: uuid
          required: true
          lookup:
            table: services
            entity_type: service
            schema: ob-poc
            search_key: name
            primary_key: service_id
        returns:
          type: record_set

      # === Attribute lookups (read-only - attribute requirements managed separately) ===
      list-attributes:
        description: List attribute requirements for a service resource type
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list attribute requirements for resource"
        - "show required attributes for resource type"
        - "what attributes does this resource need"
        - "get resource attribute specifications"
        - "display mandatory attributes for resource"
        - "which attributes are required for provisioning"
        - "enumerate resource attribute requirements"
        - "check attribute needs for resource type"
        behavior: crud
        crud:
          operation: list_by_fk
          table: resource_attribute_requirements
          schema: ob-poc
          fk_col: resource_id
        args:
        - name: resource-id
          type: uuid
          required: true
          lookup:
            table: service_resource_types
            entity_type: resource_type
            schema: ob-poc
            search_key: name
            primary_key: resource_type_id
        - name: is-mandatory
          type: boolean
          required: false
        returns:
          type: record_set

      # === Instance Operations (provisioning and lifecycle) ===
      provision:
        description: Provision a service resource instance for a CBU
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "provision a resource instance"
        - "create resource instance for CBU"
        - "set up resource for structure"
        - "provision service resource for client"
        - "deploy new resource instance"
        - "instantiate service resource"
        - "stand up resource for custody account"
        - "create new resource provisioning request"
        behavior: plugin
        handler: resource_instance_create
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: resource-type
          type: string
          required: true
        - name: instance-url
          type: string
          required: false
          description: URL for resource instance (auto-generated if not provided)
        - name: instance-id
          type: string
          required: false
        - name: instance-name
          type: string
          required: false
        - name: product-id
          type: uuid
          required: false
          lookup:
            table: products
            entity_type: product
            schema: ob-poc
            search_key: name
            primary_key: product_id
        - name: service-id
          type: uuid
          required: false
          lookup:
            table: services
            entity_type: service
            schema: ob-poc
            search_key: name
            primary_key: service_id
        - name: config
          type: json
          required: false
          # Dependency tracking
        - name: depends-on
          type: string_list
          required: false
          description: |
            URLs or @symbol references of resources this instance depends on.
            Used by the DSL compiler for topological ordering.
          # Specific dependency injections (from resource_dependencies config)
        - name: settlement-account-url
          type: string
          required: false
          description: URL of settlement account (auto-injected for dependent resources)
        - name: custody-account-url
          type: string
          required: false
          description: URL of custody account (auto-injected for dependent resources)
        - name: nav-engine-url
          type: string
          required: false
          description: URL of NAV engine (auto-injected for dependent resources)
        consumes:
        - arg: cbu-id
          type: cbu
        - arg: depends-on
          type: resource_instance
          required: false
        produces:
          type: resource_instance
          resolved: false
        returns:
          type: uuid
          name: instance_id
          capture: true

      set-attr:
        description: Set an attribute value on a service resource instance
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "set attribute on resource instance"
        - "update resource instance attribute"
        - "assign attribute value to resource"
        - "configure resource instance property"
        - "change resource attribute value"
        - "enter attribute for provisioned resource"
        - "modify resource instance configuration"
        - "set property on service resource"
        behavior: plugin
        handler: resource_set_attr
        args:
        - name: instance-id
          type: uuid
          required: true
          lookup:
            table: cbu_resource_instances
            entity_type: resource_instance
            schema: ob-poc
            search_key: instance_name
            primary_key: instance_id
        - name: attr
          type: string
          required: true
        - name: value
          type: string
          required: true
        - name: state
          type: string
          required: false
          valid_values:
          - proposed
          - confirmed
          - derived
          - system
        - name: source
          type: json
          required: false

      activate:
        description: Activate a service resource instance
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "activate resource instance"
        - "enable service resource"
        - "make resource instance active"
        - "go live with resource instance"
        - "turn on provisioned resource"
        - "set resource instance to active"
        - "activate provisioned service resource"
        - "bring resource instance online"
        behavior: plugin
        handler: resource_activate
        args:
        - name: instance-id
          type: uuid
          required: true

      suspend:
        description: Suspend a service resource instance
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "suspend resource instance"
        - "pause service resource"
        - "temporarily disable resource"
        - "put resource instance on hold"
        - "freeze provisioned resource"
        - "halt resource instance operations"
        - "suspend active service resource"
        - "take resource instance offline temporarily"
        behavior: plugin
        handler: resource_suspend
        args:
        - name: instance-id
          type: uuid
          required: true
          lookup:
            table: cbu_resource_instances
            entity_type: resource_instance
            schema: ob-poc
            search_key: instance_name
            primary_key: instance_id
        - name: reason
          type: string
          required: false

      decommission:
        description: Decommission a service resource instance
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "decommission resource instance"
        - "retire service resource"
        - "permanently remove resource instance"
        - "shut down provisioned resource"
        - "decommission and archive resource"
        - "terminate resource instance"
        - "wind down service resource"
        - "take resource out of service"
        behavior: plugin
        handler: resource_decommission
        args:
        - name: instance-id
          type: uuid
          required: true
          lookup:
            table: cbu_resource_instances
            entity_type: resource_instance
            schema: ob-poc
            search_key: instance_name
            primary_key: instance_id
        - name: reason
          type: string
          required: false

      validate-attrs:
        description: Validate that all required attributes are set for a resource instance
        metadata:
          tier: diagnostics
          source_of_truth: catalog
          scope: cbu
          noun: service_resource
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "validate resource instance attributes"
        - "check required attributes are set"
        - "are all attributes filled for resource"
        - "verify resource attribute completeness"
        - "run attribute validation on resource"
        - "is this resource ready for activation"
        - "check attribute compliance for resource"
        - "validate provisioning attribute requirements"
        behavior: plugin
        handler: resource_validate_attrs
        args:
        - name: instance-id
          type: uuid
          required: true
          lookup:
            table: cbu_resource_instances
            entity_type: resource_instance
            schema: ob-poc
            search_key: instance_name
            primary_key: instance_id
        returns:
          type: record
          name: validation_result

      # === Lifecycle taxonomy and provisioning (merged from lifecycle) ===
      read-lifecycle:
        description: Read a lifecycle by ID or code
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "read lifecycle"
        - "get lifecycle definition"
        - "show lifecycle"
        - "describe lifecycle"
        behavior: crud
        crud:
          operation: select
          table: lifecycles
          schema: ob-poc
        args:
        - name: lifecycle-id
          type: uuid
          required: false
          maps_to: lifecycle_id
        - name: code
          type: string
          required: false
          maps_to: code
        returns:
          type: record

      list-lifecycles:
        description: List lifecycles with optional filters
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "list lifecycles"
        - "show all lifecycles"
        - "which lifecycles exist"
        behavior: crud
        crud:
          operation: select
          table: lifecycles
          schema: ob-poc
        args:
        - name: category
          type: string
          required: false
          maps_to: category
        - name: owner
          type: string
          required: false
          maps_to: owner
        - name: is-active
          type: boolean
          required: false
          maps_to: is_active
        returns:
          type: record_set

      list-lifecycles-by-instrument:
        description: List lifecycles for an instrument class
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "list lifecycles by instrument"
        - "which lifecycles apply to equities"
        - "instrument lifecycle requirements"
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: lifecycles
          join_table: instrument_lifecycles
          join_col: lifecycle_id
          filter_col: instrument_class_id
          schema: ob-poc
        args:
        - name: instrument-class
          type: lookup
          required: true
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: custody
            code_column: code
            id_column: class_id
        - name: is-mandatory
          type: boolean
          required: false
        returns:
          type: record_set

      read-lifecycle-resource-type:
        description: Read a lifecycle resource type
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "read lifecycle resource type"
        - "inspect lifecycle resource type"
        behavior: crud
        crud:
          operation: select
          table: lifecycle_resource_types
          schema: ob-poc
        args:
        - name: resource-type-id
          type: uuid
          required: false
          maps_to: resource_type_id
        - name: code
          type: string
          required: false
          maps_to: code
        returns:
          type: record

      list-lifecycle-resource-types:
        description: List lifecycle resource types
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "list lifecycle resource types"
        - "show lifecycle resource types"
        behavior: crud
        crud:
          operation: select
          table: lifecycle_resource_types
          schema: ob-poc
        args:
        - name: resource-type
          type: string
          required: false
          maps_to: resource_type
        - name: owner
          type: string
          required: false
          maps_to: owner
        returns:
          type: record_set

      list-resources-for-lifecycle:
        description: List resource types required by a lifecycle
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "list resources for lifecycle"
        - "show lifecycle resources"
        - "lifecycle resource requirements"
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: lifecycle_resource_types
          join_table: lifecycle_resource_capabilities
          join_col: resource_type_id
          filter_col: lifecycle_id
          schema: ob-poc
        args:
        - name: lifecycle
          type: lookup
          required: true
          lookup:
            table: lifecycles
            entity_type: lifecycle
            schema: ob-poc
            code_column: code
            id_column: lifecycle_id
        - name: is-required
          type: boolean
          required: false
        returns:
          type: record_set

      provision-lifecycle:
        description: Provision a lifecycle resource instance for a CBU
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "provision lifecycle"
        - "start lifecycle provisioning"
        - "set up lifecycle"
        behavior: plugin
        plugin:
          handler: LifecycleProvisionOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: resource-type
          type: lookup
          required: true
          lookup:
            table: lifecycle_resource_types
            entity_type: lifecycle_resource_type
            schema: ob-poc
            code_column: code
            id_column: resource_type_id
        - name: instance-identifier
          type: string
          required: false
        - name: market
          type: lookup
          required: false
          lookup:
            table: markets
            entity_type: market
            schema: custody
            code_column: mic
            id_column: market_id
        - name: currency
          type: string
          required: false
        - name: counterparty
          type: uuid
          required: false
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: provider
          type: string
          required: false
        - name: provider-account
          type: string
          required: false
        - name: provider-bic
          type: string
          required: false
        - name: depends-on
          type: string_list
          required: false
        - name: config
          type: json
          required: false
        produces:
          type: lifecycle_instance
          resolved: false
        returns:
          type: uuid
          name: instance_id
          capture: true

      activate-lifecycle:
        description: Activate a lifecycle resource instance
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "activate lifecycle"
        - "start lifecycle"
        - "enable lifecycle"
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: ACTIVE
            activated_at: now()
        args:
        - name: instance-id
          type: uuid
          required: true
          maps_to: instance_id
        returns:
          type: affected

      suspend-lifecycle:
        description: Suspend a lifecycle resource instance
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "suspend lifecycle"
        - "pause lifecycle"
        - "freeze lifecycle"
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: SUSPENDED
            suspended_at: now()
        args:
        - name: instance-id
          type: uuid
          required: true
          maps_to: instance_id
        - name: reason
          type: string
          required: false
        returns:
          type: affected

      decommission-lifecycle:
        description: Decommission a lifecycle resource instance
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "decommission lifecycle"
        - "retire lifecycle"
        - "end lifecycle"
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: DECOMMISSIONED
            decommissioned_at: now()
        args:
        - name: instance-id
          type: uuid
          required: true
          maps_to: instance_id
        - name: reason
          type: string
          required: false
        returns:
          type: affected

      list-lifecycle-instances:
        description: List lifecycle resource instances for a CBU
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "list lifecycle instances"
        - "show lifecycle instances"
        - "what resources are provisioned"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_lifecycle_instances
          schema: ob-poc
          fk_col: cbu_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: resource-type
          type: string
          required: false
          maps_to: resource_type_id
        - name: status
          type: string
          required: false
          maps_to: status
        returns:
          type: record_set

      analyze-lifecycle-gaps:
        description: Analyze lifecycle provisioning gaps for a CBU
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "analyze lifecycle gaps"
        - "find gaps in lifecycle"
        - "what is missing for onboarding"
        behavior: plugin
        plugin:
          handler: LifecycleAnalyzeGapsOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: scope
          type: string
          required: false
          default: ALL
        returns:
          type: record_set

      check-lifecycle-readiness:
        description: Check if CBU is ready to trade an instrument
        metadata:
          tier: diagnostics
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "check lifecycle readiness"
        - "is lifecycle ready"
        - "assess onboarding completeness"
        behavior: plugin
        plugin:
          handler: LifecycleCheckReadinessOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: instrument-class
          type: lookup
          required: true
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: custody
            code_column: code
            id_column: class_id
        - name: market
          type: lookup
          required: false
          lookup:
            table: markets
            entity_type: market
            schema: custody
            code_column: mic
            id_column: market_id
        - name: counterparty
          type: uuid
          required: false
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        returns:
          type: record

      generate-lifecycle-plan:
        description: Generate DSL provisioning plan for lifecycle gaps
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "generate lifecycle plan"
        - "create lifecycle plan"
        - "generate provisioning roadmap"
        behavior: plugin
        plugin:
          handler: LifecycleGeneratePlanOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: user-responses
          type: json
          required: false
        returns:
          type: record

      execute-lifecycle-plan:
        description: Execute a provisioning plan
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "execute lifecycle plan"
