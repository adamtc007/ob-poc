# Book verbs — Tranche 2+3 DAG alignment (2026-04-24)
# 
# Generated as part of the verb-declaration batch that backfills
# verbs implied by DAG state machines but not previously declared.

domains:
  book:
    description: Client book setup journey — groups CBUs under one commercial client
    invocation_hints: []
    verbs:
      create:
        description: "Create a new client book (scope: client_group_id). Starts book-setup journey."
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: book
          subject_kinds: [book]
          phase_tags: [book]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "create a book"
          - "new book for client"
          - "set up client book"
          - "book setup"
        args:
          - name: client-group-id
            type: uuid
            required: true
            maps_to: client_group_id
          - name: name
            type: string
            required: true
            maps_to: name
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: client-group-id
          target_workspace: book_setup
          target_slot: book

      select-structure:
        description: "Select jurisdiction-specific structure template for the book (e.g. struct.lux.ucits.sicav)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: book
          subject_kinds: [book]
          phase_tags: [book]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "select structure for book"
          - "pick jurisdiction template"
          - "set book structure"
          - "choose fund template"
        args:
          - name: book-id
            type: uuid
            required: true
            maps_to: book_id
          - name: structure-template
            type: string
            required: true
            maps_to: structure_template
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: book-id
          target_workspace: book_setup
          target_slot: book

      mark-ready:
        description: "Mark book as ready-for-deal (terminal-positive in book-setup journey)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: book
          subject_kinds: [book]
          phase_tags: [book]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "mark book ready for deal"
          - "book setup complete"
          - "handoff book to deal"
          - "book ready for contracting"
        args:
          - name: book-id
            type: uuid
            required: true
            maps_to: book_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting] 
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: book-id
          target_workspace: book_setup
          target_slot: book

      abandon:
        description: "Abandon book-setup journey (pre-contract)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: book
          subject_kinds: [book]
          phase_tags: [book]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "abandon book setup"
          - "cancel book"
          - "stop book setup"
          - "abort book creation"
        args:
          - name: book-id
            type: uuid
            required: true
            maps_to: book_id
          - name: reason
            type: string
            required: true
            maps_to: reason
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: book-id
          target_workspace: book_setup
          target_slot: book
