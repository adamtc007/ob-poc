# Temporal Query Domain
#
# Provides point-in-time queries for regulatory lookback.
# Answers: "What did the structure look like on date X?"
#
# Uses SQL functions created in migrations/005_temporal_query_layer.sql

domains:
  temporal:
    description: Point-in-time queries for historical state lookback

    verbs:
      # =========================================================================
      # Ownership Queries
      # =========================================================================

      ownership-as-of:
        flavour: attribute_mutating
        description: Get ownership relationships for an entity as of a specific date
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "ownership as of date"
        - "who owned entity on date"
        - "historical ownership lookup"
        - "ownership structure at date"
        - "point in time ownership"
        - "shareholders on specific date"
        - "ownership snapshot for date"
        - "past ownership relationships"
        behavior: plugin
        plugin:
          handler: temporal_ownership_as_of
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Entity to query ownership for
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: as-of-date
          type: date
          required: false
          default: today
          description: Point-in-time date (defaults to today)
        returns:
          type: record_set
          description: Ownership relationships valid on that date
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      ubo-chain-as-of:
        flavour: attribute_mutating
        description: Trace ownership chain to UBOs as of a specific date
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "UBO chain as of date"
        - "who were the UBOs on date"
        - "historical beneficial owners"
        - "trace ownership chain at date"
        - "UBO lookback for date"
        - "beneficial ownership at point in time"
        - "past UBO structure"
        - "UBOs at approval date"
        behavior: plugin
        plugin:
          handler: temporal_ubo_chain_as_of
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Starting entity to trace ownership from
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: as-of-date
          type: date
          required: false
          default: today
          description: Point-in-time date
        - name: threshold
          type: decimal
          required: false
          default: 25.0
          description: Minimum ownership percentage to qualify as UBO
        returns:
          type: record_set
          description: UBO chains with effective percentages
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # =========================================================================
      # CBU State Queries
      # =========================================================================

      cbu-relationships-as-of:
        flavour: attribute_mutating
        description: Get all relationships (ownership, control, trust) for a CBU as of a date
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "CBU relationships as of date"
        - "structure relationships at date"
        - "historical relationships for CBU"
        - "who was connected on date"
        - "relationship snapshot at date"
        - "past CBU relationship map"
        - "control and ownership at date"
        - "CBU structure lookback"
        behavior: plugin
        plugin:
          handler: temporal_cbu_relationships_as_of
        args:
        - name: cbu-id
          type: uuid
          required: true
          description: CBU to query
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: as-of-date
          type: date
          required: false
          default: today
          description: Point-in-time date
        returns:
          type: record_set
          description: All relationships for CBU entities on that date
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      cbu-roles-as-of:
        flavour: attribute_mutating
        description: Get entity roles within a CBU as of a specific date
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "CBU roles as of date"
        - "who held which roles on date"
        - "historical role assignments"
        - "entity roles at point in time"
        - "past depositary for CBU"
        - "role holders on specific date"
        - "role snapshot for date"
        - "who was assigned on date"
        behavior: plugin
        plugin:
          handler: temporal_cbu_roles_as_of
        args:
        - name: cbu-id
          type: uuid
          required: true
          description: CBU to query
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: as-of-date
          type: date
          required: false
          default: today
          description: Point-in-time date
        returns:
          type: record_set
          description: Entity-role assignments valid on that date
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      cbu-state-at-approval:
        flavour: discretionary
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: temporal_cbu_state_at_approval
        description: Get CBU state at the time its KYC case was approved
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "state at KYC approval"
        - "CBU snapshot at approval"
        - "what was approved"
        - "structure when case approved"
        - "approved state lookback"
        - "KYC approval point snapshot"
        - "entity state at sign-off"
        - "show approved structure"
        behavior: plugin
        plugin:
          handler: temporal_cbu_state_at_approval
        args:
        - name: cbu-id
          type: uuid
          required: true
          description: CBU to query
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record_set
          description: State snapshot from KYC approval date
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # =========================================================================
      # History/Audit Queries
      # =========================================================================

      relationship-history:
        flavour: attribute_mutating
        description: Get change history for a specific relationship
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "relationship change history"
        - "audit trail for relationship"
        - "how has relationship changed"
        - "relationship modification log"
        - "track relationship changes"
        - "relationship version history"
        - "when did relationship change"
        - "show relationship audit"
        behavior: plugin
        plugin:
          handler: temporal_relationship_history
        args:
        - name: relationship-id
          type: uuid
          required: true
          description: Relationship to get history for
        - name: limit
          type: integer
          required: false
          default: 50
          description: Maximum records to return
        returns:
          type: record_set
          description: Audit trail of changes to this relationship
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      entity-history:
        flavour: attribute_mutating
        description: Get all relationship changes involving an entity
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: facts_only
        invocation_phrases:
        - "entity change history"
        - "all changes for entity"
        - "entity audit trail"
        - "what changed for this person"
        - "entity relationship timeline"
        - "historical changes for entity"
        - "track entity modifications"
        - "show entity history"
        behavior: plugin
        plugin:
          handler: temporal_entity_history
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Entity to get history for
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: from-date
          type: date
          required: false
          description: Start of date range
        - name: to-date
          type: date
          required: false
          description: End of date range
        - name: limit
          type: integer
          required: false
          default: 100
          description: Maximum records to return
        returns:
          type: record_set
          description: All relationship changes for this entity
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # =========================================================================
      # Comparison Queries
      # =========================================================================

      compare-ownership:
        flavour: attribute_mutating
        description: Compare ownership structure between two dates
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: temporal
          subject_kinds: []
          phase_tags: [monitoring]
          side_effects: state_write
        invocation_phrases:
        - "compare ownership between dates"
        - "ownership diff across dates"
        - "what ownership changed"
        - "before and after ownership"
        - "ownership delta analysis"
        - "side by side ownership comparison"
        - "track ownership changes over time"
        - "who was added or removed"
        behavior: plugin
        plugin:
          handler: temporal_compare_ownership
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Entity to compare
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: date-a
          type: date
          required: true
          description: First comparison date
        - name: date-b
          type: date
          required: true
          description: Second comparison date
        returns:
          type: record
          description: Diff showing added, removed, and changed relationships
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
