domains:
  application:
    description: Layer 4 application registry — BNY system catalogue cards
    invocation_hints:
      - application
      - app
      - BNY system
      - vendor
    verbs:
      register:
        flavour: instance_adding
        description: Register a new BNY application in the catalogue
        invocation_phrases:
          - "register application"
          - "add application to catalogue"
          - "register BNY system"
          - "add app to registry"
          - "create application registry entry"
          - "onboard application"
          - "register new app"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application
          tags: [lifecycle, write, registry, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        crud:
          operation: insert
          table: applications
          schema: ob-poc
          returning: id
        args:
          - name: name
            type: string
            required: true
            maps_to: name
            description: Application name (unique, e.g. CCC-Settlement, INFORM-NAV)
          - name: vendor
            type: string
            required: false
            maps_to: vendor
            description: Vendor or supplier (e.g. BNY-Internal, Calypso, Murex)
          - name: owner-team
            type: string
            required: false
            maps_to: owner_team
            description: Owning platform / engineering team
          - name: description
            type: string
            required: false
            maps_to: description
        returns:
          type: uuid
          name: id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update:
        flavour: attribute_mutating
        description: Update an application registry card
        invocation_phrases:
          - "update application"
          - "edit application registry"
          - "update app metadata"
          - "change application owner team"
          - "update vendor for application"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application
          tags: [write, registry, property, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        crud:
          operation: update
          table: applications
          schema: ob-poc
          key: id
        args:
          - name: application-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: applications
              entity_type: application
              schema: ob-poc
              search_key: name
              primary_key: id
          - name: vendor
            type: string
            required: false
            maps_to: vendor
          - name: owner-team
            type: string
            required: false
            maps_to: owner_team
          - name: description
            type: string
            required: false
            maps_to: description
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      decommission:
        flavour: discretionary
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: application_decommission
        description: Decommission an application from the catalogue (rejected if active instances exist)
        invocation_phrases:
          - "decommission application"
          - "retire application from catalogue"
          - "remove application registry entry"
          - "deregister application"
          - "sunset application"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application
          tags: [lifecycle, write, destructive, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        crud:
          operation: delete
          table: applications
          schema: ob-poc
          key: id
        args:
          - name: application-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: applications
              entity_type: application
              schema: ob-poc
              search_key: name
              primary_key: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
