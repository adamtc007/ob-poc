# ============================================================================
# Ownership Computation & Reconciliation Verbs
# ============================================================================
# Ownership snapshots, special rights, reconciliation against BODS/GLEIF

domains:
  ownership:
    description: Ownership computation, snapshots, special rights, and reconciliation

    verbs:
      # --------------------------------------------------------------------------
      # Ownership Computation
      # --------------------------------------------------------------------------

      compute:
        description: Derive ownership snapshots from register holdings
        invocation_phrases:
          - "compute ownership"
          - "calculate ownership snapshot"
          - "derive ownership"
          - "run ownership computation"
          - "compute voting percentages"
          - "calculate economic ownership"
          - "generate ownership snapshot"
          - "compute as of date"
          - "derive ownership from register"
          - "calculate who owns what"
          - "compute the ownership waterfall"
          - "run ownership waterfall analysis"
          - "calculate the ownership percentages"
          - "compute beneficial ownership thresholds"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        plugin:
          handler: OwnershipComputeOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
            description: Defaults to today
          - name: basis
            type: string
            required: false
            default: "VOTES"
            validation:
              enum:
                - VOTES
                - ECONOMIC
                - BOTH
        returns:
          type: record
          fields:
            - name: issuer_entity_id
              type: uuid
            - name: as_of_date
              type: date
            - name: snapshots_created
              type: integer
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      snapshot.list:
        description: List ownership snapshots for an issuer
        invocation_phrases:
          - "list ownership snapshots"
          - "show ownership history"
          - "view ownership records"
          - "list snapshots for issuer"
          - "show ownership timeline"
          - "display ownership snapshots"
          - "get snapshot history"
          - "list historical ownership"
          - "show beneficial ownership history"
          - "what ownership snapshots exist"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: plugin
        plugin:
          handler: OwnershipSnapshotListOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
          - name: derived-from
            type: string
            required: false
            default: "ALL"
            validation:
              enum:
                - REGISTER
                - BODS
                - GLEIF
                - PSC
                - MANUAL
                - ALL
          - name: min-pct
            type: decimal
            required: false
            description: Filter to holdings above this percentage
          - name: basis
            type: string
            required: false
            default: "VOTES"
            validation:
              enum:
                - VOTES
                - ECONOMIC
                - UNITS
                - CAPITAL
                - DECLARED
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      snapshot.get:
        description: Get a specific ownership snapshot
        invocation_phrases:
          - "get ownership snapshot"
          - "show specific snapshot"
          - "view snapshot details"
          - "retrieve ownership record"
          - "display snapshot"
          - "fetch snapshot by ID"
          - "get snapshot details"
          - "retrieve beneficial ownership snapshot"
          - "look up ownership record"
          - "fetch ownership position snapshot"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: select
          table: ownership_snapshots
          schema: kyc
          key: snapshot_id
        args:
          - name: snapshot-id
            type: uuid
            required: true
            maps_to: snapshot_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      # --------------------------------------------------------------------------
      # Control Position Queries
      # --------------------------------------------------------------------------

      list-control-positions:
        description: Get control positions for an issuer (who controls what %)
        invocation_phrases:
          - "who has control"
          - "display voting percentages"
          - "show control breakdown"
          - "view control structure"
          - "list control positions"
          - "show who controls what"
          - "display ownership control"
          - "get control position summary"
          - "show voting rights breakdown"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        plugin:
          handler: OwnershipControlPositionsOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
          - name: basis
            type: string
            required: false
            default: "VOTES"
            validation:
              enum:
                - VOTES
                - ECONOMIC
                - FULLY_DILUTED
                - EXERCISABLE
        returns:
          type: record_set
          fields:
            - name: holder_entity_id
              type: uuid
            - name: holder_name
              type: string
            - name: voting_pct
              type: decimal
            - name: economic_pct
              type: decimal
            - name: has_control
              type: boolean
            - name: has_significant_influence
              type: boolean
            - name: has_board_rights
              type: boolean
            - name: board_seats
              type: integer
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      find-controller:
        description: Find who controls an issuer (>50% voting or board majority)
        invocation_phrases:
          - "find controller"
          - "show controlling entity"
          - "who has majority"
          - "find majority owner"
          - "who owns controlling stake"
          - "show ultimate controller"
          - "find who controls"
          - "identify beneficial owner with control"
          - "who holds majority voting rights"
          - "who ultimately controls this entity"
          - "who is the controlling party"
          - "find the ultimate controller"
          - "who has voting control"
          - "show the control hierarchy"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: plugin
        plugin:
          handler: OwnershipWhoControlsOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # --------------------------------------------------------------------------
      # Special Rights
      # --------------------------------------------------------------------------

      right.add-to-class:
        description: Add a special right attached to a share class
        invocation_phrases:
          - "add class right"
          - "attach right to class"
          - "add share class right"
          - "grant class voting right"
          - "add board appointment right"
          - "attach veto to class"
          - "add anti-dilution right"
          - "grant tag along right"
          - "assign special right to share class"
          - "register class-level entitlement"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: insert
          table: special_rights
          schema: kyc
          returning: right_id
        args:
          - name: share-class-id
            type: uuid
            required: true
            maps_to: share_class_id
            lookup:
              table: share_classes
              entity_type: share_class
              schema: kyc
              search_key: name
              primary_key: id
          - name: issuer-entity-id
            type: uuid
            required: true
            maps_to: issuer_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: right-type
            type: string
            required: true
            maps_to: right_type
            validation:
              enum:
                - BOARD_APPOINTMENT
                - BOARD_OBSERVER
                - VETO_MA
                - VETO_FUNDRAISE
                - VETO_DIVIDEND
                - VETO_LIQUIDATION
                - ANTI_DILUTION
                - DRAG_ALONG
                - TAG_ALONG
                - FIRST_REFUSAL
                - REDEMPTION
                - CONVERSION_TRIGGER
                - PROTECTIVE_PROVISION
                - INFORMATION_RIGHTS
                - OTHER
          - name: board-seats
            type: integer
            required: false
            maps_to: board_seats
          - name: threshold-pct
            type: decimal
            required: false
            maps_to: threshold_pct
          - name: threshold-basis
            type: string
            required: false
            maps_to: threshold_basis
            validation:
              enum:
                - VOTES
                - ECONOMIC
                - UNITS
          - name: source-type
            type: string
            required: false
            maps_to: source_type
            validation:
              enum:
                - ARTICLES
                - SHA
                - SIDE_LETTER
                - BOARD_RESOLUTION
                - INVESTMENT_AGREEMENT
          - name: source-clause-ref
            type: string
            required: false
            maps_to: source_clause_ref
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: right_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      right.add-to-holder:
        description: Add a special right attached to a specific holder (side letter)
        invocation_phrases:
          - "add holder right"
          - "grant investor right"
          - "add side letter right"
          - "attach right to holder"
          - "grant board observer"
          - "add information rights"
          - "grant protective provision"
          - "add investor veto"
          - "attach entitlement to shareholder"
          - "register holder-level special right"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: insert
          table: special_rights
          schema: kyc
          returning: right_id
        args:
          - name: holder-entity-id
            type: uuid
            required: true
            maps_to: holder_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: issuer-entity-id
            type: uuid
            required: true
            maps_to: issuer_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: right-type
            type: string
            required: true
            maps_to: right_type
            validation:
              enum:
                - BOARD_APPOINTMENT
                - BOARD_OBSERVER
                - VETO_MA
                - VETO_FUNDRAISE
                - VETO_DIVIDEND
                - VETO_LIQUIDATION
                - ANTI_DILUTION
                - DRAG_ALONG
                - TAG_ALONG
                - FIRST_REFUSAL
                - INFORMATION_RIGHTS
                - PROTECTIVE_PROVISION
                - OTHER
          - name: board-seats
            type: integer
            required: false
            maps_to: board_seats
          - name: board-seat-type
            type: string
            required: false
            maps_to: board_seat_type
            validation:
              enum:
                - DIRECTOR
                - OBSERVER
                - ALTERNATE
                - CHAIRMAN
          - name: threshold-pct
            type: decimal
            required: false
            maps_to: threshold_pct
          - name: threshold-basis
            type: string
            required: false
            maps_to: threshold_basis
            validation:
              enum:
                - VOTES
                - ECONOMIC
                - UNITS
          - name: source-type
            type: string
            required: false
            maps_to: source_type
            validation:
              enum:
                - SHA
                - SIDE_LETTER
                - INVESTMENT_AGREEMENT
          - name: source-clause-ref
            type: string
            required: false
            maps_to: source_clause_ref
          - name: source-document-id
            type: uuid
            required: false
            maps_to: source_document_id
            lookup:
              table: document_catalog
              entity_type: document
              schema: ob-poc
              search_key: document_name
              primary_key: doc_id
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: right_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      right.end:
        description: End a special right (set effective_to date)
        invocation_phrases:
          - "end special right"
          - "terminate right"
          - "expire holder right"
          - "remove special right"
          - "end board right"
          - "terminate veto right"
          - "close out right"
          - "revoke shareholder entitlement"
          - "sunset ownership right"
          - "expire voting right"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: special_rights
          schema: kyc
          key: right_id
        args:
          - name: right-id
            type: uuid
            required: true
            maps_to: right_id
          - name: effective-to
            type: date
            required: true
            maps_to: effective_to
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      right.list-for-issuer:
        description: List all special rights for an issuer
        invocation_phrases:
          - "list issuer rights"
          - "show rights for company"
          - "display special rights"
          - "list all rights"
          - "show company rights"
          - "view issuer special rights"
          - "get rights summary"
          - "show equity rights for company"
          - "list shareholder register rights"
          - "what entitlements exist for issuer"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: special_rights
          schema: kyc
          fk_col: issuer_entity_id
          filter:
            effective_to:
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            maps_to: issuer_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      right.list-for-holder:
        description: List all special rights held by an entity
        invocation_phrases:
          - "list holder rights"
          - "show my rights"
          - "display investor rights"
          - "what rights do they have"
          - "list entity rights"
          - "show rights held"
          - "view holder entitlements"
          - "show beneficial owner rights"
          - "what rights does this investor have"
          - "list UBO special entitlements"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: special_rights
          schema: kyc
          fk_col: holder_entity_id
          filter:
            effective_to:
        args:
          - name: holder-entity-id
            type: uuid
            required: true
            maps_to: holder_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      # --------------------------------------------------------------------------
      # Reconciliation
      # --------------------------------------------------------------------------

      reconcile:
        description: Compare ownership from different sources
        invocation_phrases:
          - "reconcile ownership"
          - "flag circular ownership"
          - "check for circular ownership"
          - "reconcile circular ownership"
          - "resolve circular ownership findings"
          - "compare ownership sources"
          - "run reconciliation"
          - "check ownership match"
          - "reconcile against BODS"
          - "compare to GLEIF"
          - "run ownership comparison"
          - "verify ownership data"
          - "cross-check ownership"
          - "match register against GLEIF data"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        plugin:
          handler: OwnershipReconcileOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
          - name: source-a
            type: string
            required: false
            default: "REGISTER"
            validation:
              enum:
                - REGISTER
                - BODS
                - GLEIF
          - name: source-b
            type: string
            required: false
            default: "BODS"
            validation:
              enum:
                - REGISTER
                - BODS
                - GLEIF
          - name: basis
            type: string
            required: false
            default: "VOTES"
            validation:
              enum:
                - VOTES
                - ECONOMIC
          - name: tolerance-bps
            type: integer
            required: false
            default: 100
            description: Tolerance in basis points (100 = 1%)
        returns:
          type: uuid
          name: run_id
          capture: true
        produces:
          type: reconciliation_run
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      reconcile.findings:
        description: List findings from a reconciliation run
        invocation_phrases:
          - "show reconciliation findings"
          - "list discrepancies"
          - "view reconcile results"
          - "show ownership mismatches"
          - "display findings"
          - "get reconciliation errors"
          - "show what doesn't match"
          - "list ownership discrepancies found"
          - "view reconciliation breaks"
          - "what ownership data conflicts exist"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        plugin:
          handler: OwnershipReconcileFindingsOp
        args:
          - name: run-id
            type: uuid
            required: true
            lookup:
              table: ownership_reconciliation_runs
              entity_type: reconciliation_run
              schema: kyc
              search_key: run_id
              primary_key: run_id
          - name: severity
            type: string
            required: false
            default: "ALL"
            validation:
              enum:
                - INFO
                - WARN
                - ERROR
                - CRITICAL
                - ALL
          - name: status
            type: string
            required: false
            default: "OPEN"
            validation:
              enum:
                - OPEN
                - ACKNOWLEDGED
                - INVESTIGATING
                - RESOLVED
                - FALSE_POSITIVE
                - ALL
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      reconcile.resolve-finding:
        description: Resolve a reconciliation finding
        invocation_phrases:
          - "resolve finding"
          - "close reconciliation issue"
          - "mark as resolved"
          - "acknowledge finding"
          - "dismiss false positive"
          - "resolve discrepancy"
          - "close out finding"
          - "mark reconciliation break as resolved"
          - "clear ownership discrepancy"
          - "flag finding as false positive"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: ownership_reconciliation_findings
          schema: kyc
          key: finding_id
        args:
          - name: finding-id
            type: uuid
            required: true
            maps_to: finding_id
          - name: resolution-status
            type: string
            required: true
            maps_to: resolution_status
            validation:
              enum:
                - ACKNOWLEDGED
                - INVESTIGATING
                - RESOLVED
                - FALSE_POSITIVE
          - name: resolution-notes
            type: string
            required: false
            maps_to: resolution_notes
          - name: resolved-by
            type: string
            required: false
            maps_to: resolved_by
        defaults:
          resolved_at: now()
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      reconcile.list-runs:
        description: List reconciliation runs for an issuer
        invocation_phrases:
          - "list reconciliation runs"
          - "show reconcile history"
          - "view past reconciliations"
          - "list previous runs"
          - "show reconciliation jobs"
          - "display run history"
          - "get reconciliation audit trail"
          - "show BODS reconciliation history"
          - "list completed ownership comparisons"
          - "view past ownership cross-checks"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: ownership_reconciliation_runs
          schema: kyc
          fk_col: issuer_entity_id
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            maps_to: issuer_entity_id
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: status
            type: string
            required: false
            validation:
              enum:
                - RUNNING
                - COMPLETED
                - FAILED
                - CANCELLED
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      # --------------------------------------------------------------------------
      # Ownership Analysis
      # --------------------------------------------------------------------------

      analyze-gaps:
        description: Analyze ownership gaps for an issuer
        invocation_phrases:
          - "find missing ownership"
          - "check for gaps"
          - "identify ownership holes"
          - "analyze missing percentages"
          - "find unidentified holders"
          - "show ownership gaps"
          - "check total coverage"
          - "where is ownership look-through incomplete"
          - "identify UBO coverage gaps"
        metadata:
          tier: intent
          source_of_truth: entity
          scope: cbu
          noun: ownership
          phase_tags: [kyc]
          side_effects: facts_only
        behavior: plugin
        plugin:
          handler: OwnershipAnalyzeGapsOp
        args:
          - name: issuer-entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              schema: ob-poc
              entity_type: entity
              search_key: name
              primary_key: entity_id
          - name: as-of
            type: date
            required: false
        returns:
          type: record
          fields:
            - name: total_ownership_pct
              type: decimal
            - name: gap_pct
              type: decimal
            - name: unidentified_holders
              type: array
            - name: is_reconciled
              type: boolean
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      trace-chain:
        description: Trace ownership chain from one entity to another
        invocation_phrases:
          - "trace from entity to entity"
          - "show ownership link"
          - "follow chain between"
