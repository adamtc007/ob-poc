# Admin Verbs - Regulators
# Manage recognized regulators reference data

domains:
  admin.regulators:
    description: "Regulators reference data management"
    verbs:
      list:
        flavour: attribute_mutating
        description: "List recognized regulators"
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: regulators
          phase_tags: [administration]
          side_effects: facts_only
        invocation_phrases:
          - "list regulators"
          - "show all regulators"
          - "which regulators are recognized"
          - "get regulators for jurisdiction"
          - "list regulatory bodies"
          - "show recognized regulators"
          - "what regulators do we have"
          - "display regulators"
        behavior: crud
        crud:
          operation: select
          table: regulators
          schema: ob-poc
          multiple: true
        args:
          - name: jurisdiction
            type: string
            required: false
            maps_to: jurisdiction
          - name: tier
            type: string
            required: false
            maps_to: regulatory_tier
          - name: active-only
            type: boolean
            required: false
            default: true
            maps_to: active
        returns:
          type: record_set

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      read:
        flavour: attribute_mutating
        description: "Get regulator by code"
        effect_class: read_snapshot
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: regulators
          phase_tags: [administration]
          side_effects: facts_only
        invocation_phrases:
          - "get regulator details"
          - "look up regulator by code"
          - "show regulator info"
          - "find regulator"
          - "read regulator record"
          - "regulator details for code"
          - "what is this regulator"
          - "fetch regulator"
        behavior: crud
        crud:
          operation: select
          table: regulators
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: regulator_code
        returns:
          type: record

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      create:
        flavour: instance_adding
        description: "Add new recognized regulator (idempotent by code)"
        effect_class: idempotent_ensure
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: regulators
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
          - "add a regulator"
          - "create new regulator"
          - "register a regulatory body"
          - "add recognized regulator"
          - "set up new regulator"
          - "define regulator"
          - "onboard a regulator"
          - "new regulatory authority"
        behavior: crud
        crud:
          operation: upsert
          table: regulators
          schema: ob-poc
          returning: regulator_code
          conflict_keys:
            - regulator_code
        args:
          - name: code
            type: string
            required: true
            maps_to: regulator_code
          - name: name
            type: string
            required: true
            maps_to: regulator_name
          - name: jurisdiction
            type: string
            required: true
            maps_to: jurisdiction
          - name: tier
            type: string
            required: true
            maps_to: regulatory_tier
          - name: type
            type: string
            required: false
            default: "GOVERNMENT"
            maps_to: regulator_type
          - name: registry-url
            type: string
            required: false
            maps_to: registry_url
        returns:
          type: string
          capture: true

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      update:
        flavour: attribute_mutating
        description: "Update regulator"
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: regulators
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
          - "update regulator"
          - "change regulator details"
          - "modify regulator"
          - "edit regulator record"
          - "update regulatory tier"
          - "change regulator URL"
          - "amend regulator info"
          - "update regulator registry URL"
        behavior: crud
        crud:
          operation: update
          table: regulators
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: regulator_code
          - name: tier
            type: string
            required: false
            maps_to: regulatory_tier
          - name: registry-url
            type: string
            required: false
            maps_to: registry_url
          - name: active
            type: boolean
            required: false
            maps_to: active
        returns:
          type: string

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      deactivate:
        flavour: attribute_mutating
        description: "Deactivate regulator"
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: regulators
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
          - "deactivate regulator"
          - "disable regulator"
          - "remove regulator"
          - "retire regulator"
          - "mark regulator inactive"
          - "turn off regulator"
          - "decommission regulator"
          - "sunset regulator"
        behavior: crud
        crud:
          operation: update
          table: regulators
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: regulator_code
        computed:
          - column: active
            value: false
        returns:
          type: string

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
