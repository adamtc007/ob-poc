# Admin Verbs - Role Types
# Manage role types reference data at runtime

domains:
  admin.role-types:
    description: "Role types reference data management"
    verbs:
      list:
        description: "List all role types"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: role_types
        invocation_phrases:
          - "list role types"
          - "show all role types"
          - "what role types exist"
          - "get available roles"
          - "display role type categories"
          - "show me the roles"
          - "enumerate role types"
          - "which roles are defined"
        behavior: crud
        crud:
          operation: select
          table: role_types
          schema: ob_ref
          multiple: true
        args:
          - name: category
            type: string
            required: false
            maps_to: category
          - name: active-only
            type: boolean
            required: false
            default: true
            maps_to: active
        returns:
          type: record_set

      read:
        description: "Get role type by code"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: role_types
        invocation_phrases:
          - "get role type details"
          - "show role type by code"
          - "look up role type"
          - "fetch role type info"
          - "what is this role type"
          - "describe a role type"
          - "read role type definition"
          - "find role type by code"
        behavior: crud
        crud:
          operation: select
          table: role_types
          schema: ob_ref
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      create:
        description: "Create new role type (idempotent by code)"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: role_types
        invocation_phrases:
          - "create a role type"
          - "add new role type"
          - "register role type"
          - "define a new role"
          - "set up role type"
          - "add role to reference data"
          - "create custody role type"
          - "new role type entry"
        behavior: crud
        crud:
          operation: upsert
          table: role_types
          schema: ob_ref
          returning: role_type_id
          conflict_keys:
            - code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: category
            type: string
            required: true
            maps_to: category
          - name: triggers-full-kyc
            type: boolean
            required: false
            default: false
            maps_to: triggers_full_kyc
          - name: triggers-screening
            type: boolean
            required: false
            default: false
            maps_to: triggers_screening
          - name: triggers-id-verification
            type: boolean
            required: false
            default: false
            maps_to: triggers_id_verification
          - name: check-regulatory-status
            type: boolean
            required: false
            default: false
            maps_to: check_regulatory_status
          - name: if-regulated-obligation
            type: string
            required: false
            maps_to: if_regulated_obligation
          - name: cascade-to-entity-ubos
            type: boolean
            required: false
            default: false
            maps_to: cascade_to_entity_ubos
          - name: description
            type: string
            required: false
            maps_to: description
        returns:
          type: uuid
          capture: true

      update:
        description: "Update role type"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: role_types
        invocation_phrases:
          - "update role type"
          - "modify role type settings"
          - "change role type configuration"
          - "edit role type"
          - "adjust role type triggers"
          - "update KYC triggers for role"
          - "change screening settings on role"
          - "modify role type properties"
        behavior: crud
        crud:
          operation: update
          table: role_types
          schema: ob_ref
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: triggers-full-kyc
            type: boolean
            required: false
            maps_to: triggers_full_kyc
          - name: triggers-screening
            type: boolean
            required: false
            maps_to: triggers_screening
          - name: check-regulatory-status
            type: boolean
            required: false
            maps_to: check_regulatory_status
          - name: if-regulated-obligation
            type: string
            required: false
            maps_to: if_regulated_obligation
          - name: active
            type: boolean
            required: false
            maps_to: active
        returns:
          type: uuid

      deactivate:
        description: "Deactivate a role type"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: role_types
        invocation_phrases:
          - "deactivate role type"
          - "disable a role type"
          - "retire role type"
          - "turn off role type"
          - "remove role type from active"
          - "decommission role type"
          - "mark role type inactive"
          - "sunset a role type"
        behavior: crud
        crud:
          operation: update
          table: role_types
          schema: ob_ref
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        computed:
          - column: active
            value: false
        returns:
          type: uuid
