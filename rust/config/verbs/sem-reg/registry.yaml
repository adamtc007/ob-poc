        handler: AffinityDataForVerbOp
        invocation_phrases:
          - "what data does this verb touch"
          - "which tables does this verb read"
          - "data footprint for verb"
          - "what does this operation access"
          - "show verb data dependencies"
          - "what tables does this verb write"
          - "data assets for verb"
          - "verb data surface"
          - "what data does this operation use"
