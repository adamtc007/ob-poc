# Registry Domain Verbs (Spec §C.1)
#
# Read-only registry query verbs. These expose the Semantic Registry's
# immutable snapshot store through the DSL pipeline and CCIR.
#
# Backend: sem_reg MCP tools via dispatch_tool()
# AgentMode: Allowed in BOTH Research and Governed modes

domains:
  registry:
    description: |
      Semantic Registry read-only query operations.
      Describe, search, list, and navigate registered objects
      (attributes, verbs, entity types, policies, taxonomies, views).
    invocation_hints:
      - "describe attribute"
      - "search registry"
      - "list verbs"
      - "resolve context"
      - "show lineage"
      - "coverage report"
    verbs:
      # ============================================
      # Object Description
      # ============================================
      describe-object:
        flavour: attribute_mutating
        description: Describe a registered object by FQN (attribute, verb, entity type, policy, view)
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: registry_object
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryDescribeObjectOp
        invocation_phrases:
          - "describe registry object"
          - "show object definition"
          - "show entity type definition"
        args:
          - name: fqn
            type: string
            required: true
            description: Fully qualified name of the object
          - name: object-type
            type: string
            required: false
            description: |
              Object type hint: attribute_def, verb_contract, entity_type_def,
              policy_rule, view_def. Auto-detected if omitted.
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # ============================================
      # Search & List
      # ============================================
      search:
        flavour: attribute_mutating
        description: Search registry objects by keyword or pattern
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: registry_search
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistrySearchOp
        invocation_phrases:
          - "search the registry"
          - "find in registry"
          - "search for attributes"
          - "look up in semantic registry"
        args:
          - name: query
            type: string
            required: true
            description: Search query text
          - name: object-type
            type: string
            required: false
            description: Filter by object type
          - name: limit
            type: integer
            required: false
            default: 20
            description: Maximum results to return
        returns:
          type: record_set
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-objects:
        flavour: attribute_mutating
        description: List registered objects by type with optional filters
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: registry_object
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryListObjectsOp
        invocation_phrases:
          - "list registry objects"
          - "list all verbs"
          - "show registered entity types"
        args:
          - name: object-type
            type: string
            required: true
            description: "Object type: attribute_def, verb_contract, entity_type_def, etc."
          - name: limit
            type: integer
            required: false
            default: 100
            description: Maximum results to return
        returns:
          type: record_set
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      # ============================================
      # Context Resolution
      # ============================================
      resolve-context:
        flavour: attribute_mutating
        description: Resolve full context for a subject (verbs, attributes, policies, governance signals)
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: context_resolution
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryResolveContextOp
        invocation_phrases:
          - "resolve context"
          - "what can I do with this"
          - "show available operations"
          - "resolve context for entity"
        args:
          - name: subject-id
            type: uuid
            required: true
            description: Subject entity or case ID
          - name: subject-type
            type: string
            required: false
            description: "Subject type hint: entity, case, document, task, view"
          - name: mode
            type: string
            required: false
            default: normal
            description: "Evidence mode: strict, normal, exploratory, governance"
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      # ============================================
