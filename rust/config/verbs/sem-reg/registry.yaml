          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryVerbSurfaceOp
        invocation_phrases:
          - "show verb surface"
          - "what verbs apply here"
          - "available verbs for this view"
        args:
          - name: view-fqn
            type: string
            required: false
            description: View FQN to get verb surface for
          - name: entity-type-fqn
            type: string
            required: false
            description: Entity type FQN to get verb surface for
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      attribute-producers:
        flavour: attribute_mutating
