        invocation_phrases:
          - "classify this"
          - "what taxonomy does this belong to"
          - "classification of object"
        args:
          - name: object-fqn
            type: string
            required: true
            description: Object FQN to classify
          - name: taxonomy-fqn
            type: string
            required: false
            description: Taxonomy to classify against (all if omitted)
        returns:
          type: record
          capture: false
        three_axis:
