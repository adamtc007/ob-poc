        invocation_phrases:
          - "show lineage"
          - "trace provenance"
          - "what depends on this"
          - "where does this come from"
        args:
          - name: object-fqn
            type: string
            required: true
            description: Object FQN to trace lineage for
          - name: direction
            type: string
            required: false
            default: both
            description: "Direction: forward (impact), reverse (provenance), both"
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      regulation-trace:
        flavour: attribute_mutating
        description: Trace regulatory requirements for an object
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: regulation_trace
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
