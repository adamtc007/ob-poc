          - "evidence status"
        args:
          - name: object-fqn
            type: string
            required: false
            description: Object FQN to check (all if omitted)
          - name: max-age-days
            type: integer
            required: false
            default: 90
            description: Maximum age in days before considered stale
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      evidence-gaps:
        flavour: attribute_mutating
        description: Identify evidence gaps in the registry
        metadata:
          tier: diagnostics
          source_of_truth: operational
