      coverage-report:
        flavour: attribute_mutating
        description: Generate coverage report for registry (tier distribution, completeness)
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: coverage_report
          category: registry_query
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryCoverageReportOp
        invocation_phrases:
