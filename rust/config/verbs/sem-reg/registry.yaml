          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: RegistryAttributeProducersOp
        invocation_phrases:
          - "what produces this attribute"
          - "attribute producers"
          - "which verb creates this"
        args:
          - name: attribute-fqn
            type: string
            required: true
            description: Attribute FQN to find producers for
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      # ============================================
      # Lineage & Tracing
      # ============================================
      lineage:
        flavour: attribute_mutating
        description: Trace lineage for an object (forward impact or reverse provenance)
        metadata:
          tier: diagnostics
          source_of_truth: operational
