          - "find adjacent verbs"
          - "which operations are related to this verb"
          - "verbs that share the same tables"
          - "neighboring verbs in the data graph"
          - "verbs co-accessing this data"
          - "what operations overlap with this verb"
          - "show verb neighbors"
          - "related operations by shared data"
          - "verbs with shared data dependencies"
        args:
          - name: verb-fqn
            type: string
            required: true
            description: Fully-qualified verb name to find adjacent verbs for
          - name: min-overlap
