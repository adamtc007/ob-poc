# Schema Domain Verbs
#
# Schema introspection and extraction verbs for building registry definitions
# from relational schema. These verbs bridge the gap between raw PostgreSQL
# schema (tables, columns, foreign keys) and typed Semantic Registry objects
# (attribute definitions, entity type definitions, verb contracts).
#
# Backend: plugin handlers (SchemaIntrospectOp, SchemaExtract*Op, SchemaCrossReferenceOp)
# AgentMode: Allowed in BOTH Research and Governed modes

domains:
  schema:
    description: |
      Schema introspection and extraction for building registry definitions
      from relational schema. Discovers tables, columns, and foreign keys
      from PostgreSQL information_schema, then extracts typed attribute
      definitions, entity type definitions, and verb contracts suitable
      for publishing into the Semantic Registry.
    invocation_hints:
      - "describe entity schema"
      - "show schema fields"
      - "show schema relationships"
      - "show schema verbs"
      - "introspect schema"
      - "extract attributes from schema"
      - "extract verbs"
      - "extract entities"
      - "cross reference schema"
    verbs:
      # ============================================
      # Structure Semantics
      # ============================================
      domain.describe:
        flavour: attribute_mutating
        description: Describe a data-management domain from structure semantics
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_domain
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, schema, data-management]
          subject_kinds: []
          phase_tags: [stewardship, data-management, data]
        behavior: plugin
        handler: SchemaDomainDescribeOp
        invocation_phrases:
          - "describe schema domain"
          - "describe data domain"
          - "show domain schema"
          - "show semantic model for domain"
        args:
          - name: domain
            type: string
            required: true
            description: Domain or entity type to describe (e.g., deal, cbu, document, product)
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      entity.describe:
        flavour: attribute_mutating
        description: Describe an entity type with fields, relationships, and available verbs
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: schema_entity
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, schema, data-management]
          subject_kinds: []
          phase_tags: [stewardship, data-management, data]
        behavior: plugin
        handler: SchemaEntityDescribeOp
        invocation_phrases:
          - "describe entity schema"
          - "show entity schema"
          - "show schema fields relationships and verbs"
          - "describe semantic registry entity"
          - "show semantic model for entity"
        args:
          - name: entity-type
            type: string
            required: true
            description: Entity type to describe (e.g., deal, cbu, document, product)
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      entity.list-fields:
        flavour: attribute_mutating
        description: List fields for an entity type from registry or ontology metadata
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_field
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, schema, data-management]
          subject_kinds: []
          phase_tags: [stewardship, data-management, data]
        behavior: plugin
        handler: SchemaEntityListFieldsOp
        invocation_phrases:
          - "list schema fields"
          - "show fields for entity"
          - "what fields does this entity have"
          - "show entity attributes"
        args:
          - name: entity-type
            type: string
            required: true
            description: Entity type to inspect
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      entity.list-relationships:
        flavour: attribute_mutating
        description: List relationships for an entity type from ontology metadata
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_relationship
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, schema, data-management]
          subject_kinds: []
          phase_tags: [stewardship, data-management, data]
        behavior: plugin
        handler: SchemaEntityListRelationshipsOp
        invocation_phrases:
          - "list schema relationships"
          - "what does this entity relate to"
          - "show foreign key relationships"
        args:
          - name: entity-type
            type: string
            required: true
            description: Entity type to inspect
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      entity.list-verbs:
        flavour: attribute_mutating
        description: List DSL verbs available for an entity type's domain
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_verb
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, schema, data-management]
          subject_kinds: []
          phase_tags: [stewardship, data-management, data]
        behavior: plugin
        handler: SchemaEntityListVerbsOp
        invocation_phrases:
          - "list schema verbs"
          - "show available verbs"
          - "what verbs apply to this entity"
          - "show operations for entity"
        args:
          - name: entity-type
            type: string
            required: true
            description: Entity type to inspect
        returns:
          type: record
          capture: false

      # ============================================
      # Schema Introspection
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      introspect:
        flavour: attribute_mutating
        description: Introspect database schema (tables, columns, foreign keys)
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_introspection
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaIntrospectOp
        invocation_phrases:
          - "introspect database schema"
          - "show schema tables and columns"
          - "describe database structure"
          - "list tables in schema"
          - "inspect schema foreign keys"
        args:
          - name: schema-name
            type: string
            required: true
            description: PostgreSQL schema name to introspect (e.g., ob-poc, sem_reg)
          - name: table-name
            type: string
            required: false
            description: Optional table name to narrow introspection to a single table
          - name: include-fks
            type: boolean
            required: false
            default: true
            description: Whether to include foreign key relationships in the output
        returns:
          type: record
          capture: false

      # ============================================
      # Attribute Extraction
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      extract-attributes:
        flavour: attribute_mutating
        description: Extract attribute definitions from schema columns
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: attribute_extraction
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaExtractAttributesOp
        invocation_phrases:
          - "extract attributes from schema"
          - "derive attribute definitions from columns"
          - "build attributes from table columns"
          - "generate attribute defs from schema"
        args:
          - name: schema-name
            type: string
            required: true
            description: PostgreSQL schema name to extract attributes from
          - name: table-name
            type: string
            required: false
            description: Optional table name to extract attributes from a single table
        returns:
          type: record
          capture: false

      # ============================================
      # Verb Extraction
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      extract-verbs:
        flavour: attribute_mutating
        description: Extract verb contracts from YAML config
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: verb_extraction
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaExtractVerbsOp
        invocation_phrases:
          - "extract verb contracts from config"
          - "derive verb definitions from YAML"
          - "build verb contracts from verb config"
          - "generate verb contracts"
          - "extract verbs from YAML"
        args:
          - name: domain
            type: string
            required: false
            description: Optional domain filter (e.g., cbu, entity, kyc) to extract verbs for a single domain
          - name: include-generated
            type: boolean
            required: false
            default: false
            description: Whether to include auto-generated phrase verbs in the output
        returns:
          type: record
          capture: false

      # ============================================
      # Entity Type Extraction
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      extract-entities:
        flavour: attribute_mutating
        description: Extract entity type definitions from schema tables
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: entity_extraction
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaExtractEntitiesOp
        invocation_phrases:
          - "extract entity types from schema"
          - "derive entity definitions from tables"
          - "build entity type defs from schema"
          - "generate entity types from database"
        args:
          - name: schema-name
            type: string
            required: true
            description: PostgreSQL schema name to extract entity type definitions from
        returns:
          type: record
          capture: false

      # ============================================
      # Cross-Reference / Drift Detection
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      cross-reference:
        flavour: attribute_mutating
        description: Cross-reference schema against registry snapshots for drift detection
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: global
          noun: schema_cross_reference
          category: schema_analysis
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaCrossReferenceOp
        invocation_phrases:
          - "cross reference schema against registry"
          - "detect schema drift"
          - "compare schema to registry snapshots"
          - "check schema registry alignment"
          - "find schema drift"
        args:
          - name: schema-name
            type: string
            required: false
            description: PostgreSQL schema name to cross-reference (all schemas if omitted)
          - name: object-type
            type: string
            required: false
            description: |
              Object type to cross-reference: attribute_def, entity_type_def,
              verb_contract. All types if omitted.
        returns:
          type: record
          capture: false

      # ============================================
      # Diagram Generation
      # ============================================
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      generate-erd:
        flavour: attribute_mutating
        description: Generate an entity-relationship diagram with verb surface annotations
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: erd_diagram
          category: diagram_generation
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaGenerateErdOp
        invocation_phrases:
          - "generate ERD"
          - "show schema diagram"
          - "draw entity relationships"
          - "create entity relationship diagram"
          - "visualize database schema"
          - "show schema as diagram"
          - "generate mermaid ERD"
          - "diagram this schema"
          - "show table relationships"
          - "ER diagram for schema"
        args:
          - name: schema-name
            type: string
            required: true
            description: PostgreSQL schema name to generate ERD for (e.g., ob-poc, sem_reg)
          - name: format
            type: string
            required: false
            default: mermaid
            description: Output format (currently only mermaid supported)
          - name: show-verb-surface
            type: boolean
            required: false
            default: true
            description: Whether to include verb surface annotations on entities
          - name: show-affinity-kind
            type: boolean
            required: false
            default: false
            description: Whether to expose affinity relation labels alongside verbs
          - name: enrich
            type: boolean
            required: false
            default: true
            description: Whether to enrich with AffinityGraph metadata
          - name: tables
            type: string_list
            required: false
            description: Optional list of table names to include
          - name: depth
            type: integer
            required: false
            default: 1
            description: Traversal depth hint for enrichment
          - name: group-by
            type: string
            required: false
            default: schema
            description: Grouping hint (domain, schema, verb_domain, none)
          - name: domain
            type: string
            required: false
            description: Optional domain filter to show only tables for a specific domain
          - name: max-tables
            type: integer
            required: false
            default: 50
            description: Maximum number of tables to include in the diagram
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      generate-verb-flow:
        flavour: attribute_mutating
        description: Generate a verb-flow diagram showing what data a verb touches
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: verb_flow_diagram
          category: diagram_generation
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship, data]
          subject_kinds: []
          phase_tags: [stewardship, data]
        behavior: plugin
        handler: SchemaGenerateVerbFlowOp
        invocation_phrases:
          - "show verb flow diagram"
          - "visualize verb data dependencies"
          - "draw verb flow"
          - "generate verb data flow"
          - "show what data this verb touches"
          - "diagram verb data surface"
          - "verb flow visualization"
          - "show data flow for verb"
          - "generate mermaid verb flow"
          - "visualize verb graph"
        args:
          - name: verb-fqn
            type: string
            required: false
            description: Fully-qualified verb name to generate flow diagram for (e.g., cbu.create)
          - name: domain
            type: string
            required: false
            description: Domain prefix to render a domain-centric verb flow (e.g., cbu)
          - name: format
            type: string
            required: false
            default: mermaid
            description: Output format (currently only mermaid supported)
          - name: depth
            type: integer
            required: false
            default: 2
            description: Traversal depth for transitive data edges
        returns:
          type: record
          capture: false

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      generate-discovery-map:
        flavour: attribute_mutating
        description: Generate a domain discovery map (Phase 2 stub)
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: discovery_map
          category: diagram_generation
          context: scripted_ok
          side_effects: facts_only
          tags: [stewardship]
          subject_kinds: []
          phase_tags: [stewardship]
        behavior: plugin
        handler: SchemaGenerateDiscoveryMapOp
        invocation_phrases:
          - "generate discovery map"
          - "show domain discovery map"
          - "visualize domain structure"
          - "domain overview diagram"
          - "show all domains and tables"
          - "generate domain map"
          - "domain data landscape"
          - "show schema discovery map"
          - "domain table map"
          - "visualize data landscape"
        args:
          - name: domain
            type: string
            required: false
            description: Optional domain filter
          - name: format
            type: string
            required: false
            default: mermaid
            description: Output format (currently only mermaid supported)
          - name: cluster-by
            type: string
            required: false
            default: verb
            description: Clustering mode (verb, data, intent, domain)
        returns:
          type: record
          capture: false
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
