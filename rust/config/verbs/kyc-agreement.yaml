# KYC Service Agreement Verbs
# For KYC-as-a-Service sponsor relationships

domains:
  kyc-agreement:
    description: "KYC service agreement management for sponsor relationships"
    verbs:
      create:
        description: "Create KYC service agreement with sponsor (idempotent by sponsor+reference)"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: kyc_agreement
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "create KYC service agreement"
        - "set up sponsor agreement"
        - "new KYC agreement with sponsor"
        - "establish KYC service contract"
        - "add KYC sponsor relationship"
        - "register service agreement"
        - "create KYC-as-a-service agreement"
        - "onboard KYC sponsor"
        behavior: crud
        crud:
          operation: upsert
          table: kyc_service_agreements
          schema: ob-poc
          returning: agreement_id
          conflict_keys:
          - sponsor_cbu_id
          - agreement_reference
        args:
        - name: sponsor-cbu-id
          type: uuid
          required: true
          maps_to: sponsor_cbu_id
          lookup:
            entity_type: cbu
            table: cbus
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: sponsor-entity-id
          type: uuid
          required: false
          maps_to: sponsor_entity_id
          lookup:
            entity_type: entity
            table: entities
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: agreement-reference
          type: string
          required: true
          maps_to: agreement_reference
        - name: kyc-standard
          type: string
          required: true
          maps_to: kyc_standard
          default: "BNY_STANDARD"
        - name: auto-accept-threshold
          type: string
          required: false
          maps_to: auto_accept_threshold
        - name: sponsor-review-required
          type: boolean
          required: false
          maps_to: sponsor_review_required
          default: true
        - name: target-turnaround-days
          type: integer
          required: false
          maps_to: target_turnaround_days
          default: 5
        - name: effective-date
          type: date
          required: true
          maps_to: effective_date
        returns:
          type: uuid
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      read:
        description: "Get service agreement details"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: kyc_agreement
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "show KYC agreement details"
        - "get service agreement"
        - "view KYC sponsor agreement"
        - "read agreement terms"
        - "what are the agreement details"
        - "display KYC service contract"
        - "look up KYC agreement"
        - "fetch sponsor agreement info"
        behavior: crud
        crud:
          operation: select
          table: kyc_service_agreements
          schema: ob-poc
        args:
        - name: agreement-id
          type: uuid
          required: false
          maps_to: agreement_id
        - name: sponsor-cbu-id
          type: uuid
          required: false
          maps_to: sponsor_cbu_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list:
        description: "List service agreements for a sponsor"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: kyc_agreement
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
        - "list KYC agreements"
        - "show all service agreements"
        - "what agreements does sponsor have"
        - "display KYC contracts"
        - "get agreements for sponsor"
        - "show sponsor agreements"
        - "list active KYC agreements"
        - "which KYC agreements exist"
        behavior: crud
        crud:
          operation: select
          table: kyc_service_agreements
          schema: ob-poc
          multiple: true
        args:
        - name: sponsor-cbu-id
          type: uuid
          required: true
          maps_to: sponsor_cbu_id
        - name: status
          type: string
          required: false
          maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      update-status:
        description: "Update agreement status"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: kyc_agreement
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
        - "update agreement status"
        - "change KYC agreement status"
        - "activate service agreement"
        - "suspend KYC agreement"
        - "terminate sponsor agreement"
        - "set agreement to active"
        - "modify agreement status"
        - "advance agreement state"
        behavior: crud
        crud:
          operation: update
          table: kyc_service_agreements
          schema: ob-poc
        args:
        - name: agreement-id
          type: uuid
          required: true
          maps_to: agreement_id
        - name: status
          type: string
          required: true
          maps_to: status
        returns:
          type: uuid
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
