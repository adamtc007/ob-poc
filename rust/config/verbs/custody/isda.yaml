domains:
  isda:
    description: ISDA and CSA agreement management for OTC derivatives
    verbs:
      create:
        flavour: instance_adding
        description: Create ISDA agreement with counterparty (idempotent by cbu+counterparty+date). Internal - use trading-profile.add-component for authoring.
        metadata:
          tier: projection
          source_of_truth: operational
          scope: cbu
          noun: isda
          internal: true
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "create ISDA master agreement"
          - "set up ISDA with counterparty"
          - "register new ISDA agreement"
          - "add OTC derivatives agreement"
          - "provision ISDA under NY law"
          - "create English law ISDA"
          - "establish master agreement for swaps"
          - "onboard ISDA for this CBU"
        behavior: crud
        crud:
          operation: upsert
          table: isda_agreements
          schema: ob-poc
          returning: isda_id
          conflict_constraint: isda_agreements_cbu_id_counterparty_entity_id_agreement_dat_key
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: counterparty
            type: uuid
            required: true
            maps_to: counterparty_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: agreement-date
            type: date
            required: true
            maps_to: agreement_date
          - name: governing-law
            type: string
            required: false
            maps_to: governing_law
            valid_values:
              - NY
              - ENGLISH
          - name: effective-date
            type: date
            required: true
            maps_to: effective_date
        returns:
          type: uuid
          name: isda_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      add-coverage:
        flavour: instance_adding
        description: Add instrument class coverage to ISDA (idempotent by isda+instrument_class). Internal - use trading-profile.add-component for authoring.
        metadata:
          tier: projection
          source_of_truth: operational
          scope: cbu
          noun: isda
          internal: true
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add product coverage to ISDA"
          - "extend ISDA to cover IRS"
          - "include CDS under this agreement"
          - "add instrument class to ISDA"
          - "which OTC products does ISDA cover"
          - "assign ISDA taxonomy for derivatives"
          - "link swap class to agreement"
          - "broaden ISDA product scope"
        behavior: crud
        crud:
          operation: upsert
          table: isda_product_coverage
          schema: ob-poc
          returning: coverage_id
          conflict_keys:
            - isda_id
            - instrument_class_id
        args:
          - name: isda-id
            type: uuid
            required: true
            maps_to: isda_id
            lookup:
              table: isda_agreements
              entity_type: isda
              schema: ob-poc
              search_key: isda_id
              primary_key: isda_id
          - name: instrument-class
            type: lookup
            required: true
            maps_to: instrument_class_id
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: ob-poc
              code_column: code
              id_column: class_id
          - name: isda-taxonomy
            type: lookup
            required: false
            maps_to: isda_taxonomy_id
            lookup:
              table: isda_product_taxonomy
              schema: ob-poc
              code_column: taxonomy_code
              id_column: taxonomy_id
        returns:
          type: uuid
          name: coverage_id
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      add-csa:
        flavour: instance_adding
        description: Add CSA (Credit Support Annex) to ISDA (idempotent by isda+csa_type). Internal - use trading-profile.add-component for authoring.
        metadata:
          tier: projection
          source_of_truth: operational
          scope: cbu
          noun: isda
          internal: true
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add CSA to ISDA agreement"
          - "attach credit support annex"
          - "set up VM CSA for collateral"
          - "configure initial margin CSA"
          - "add collateral annex with threshold"
          - "provision CSA minimum transfer amount"
          - "link collateral SSI to CSA"
          - "establish credit support terms"
        behavior: crud
        crud:
          operation: upsert
          table: csa_agreements
          schema: ob-poc
          returning: csa_id
          conflict_constraint: csa_agreements_isda_id_csa_type_key
        args:
          - name: isda-id
            type: uuid
            required: true
            maps_to: isda_id
            lookup:
              table: isda_agreements
              entity_type: isda
              schema: ob-poc
              search_key: isda_id
              primary_key: isda_id
          - name: csa-type
            type: string
            required: true
            maps_to: csa_type
            valid_values:
              - VM
              - IM
          - name: threshold
            type: decimal
            required: false
            maps_to: threshold_amount
          - name: threshold-currency
            type: string
            required: false
            maps_to: threshold_currency
          - name: mta
            type: decimal
            required: false
            maps_to: minimum_transfer_amount
          - name: collateral-ssi
            type: uuid
            required: false
            maps_to: collateral_ssi_id
          - name: effective-date
            type: date
            required: true
            maps_to: effective_date
        returns:
          type: uuid
          name: csa_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      remove-coverage:
        flavour: attribute_mutating
        description: Remove instrument class coverage from ISDA. Internal - use trading-profile.remove-component for authoring.
        metadata:
          tier: projection
          source_of_truth: operational
          scope: cbu
          noun: isda
          internal: true
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove product from ISDA"
          - "drop instrument class coverage"
          - "remove IRS from agreement scope"
          - "exclude CDS from ISDA"
          - "narrow ISDA product coverage"
          - "delete ISDA coverage entry"
          - "remove OTC class from agreement"
          - "unlink product from ISDA"
        behavior: crud
        crud:
          operation: delete
          table: isda_product_coverage
          schema: ob-poc
        args:
          - name: coverage-id
            type: uuid
            required: true
            maps_to: coverage_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      remove-csa:
        flavour: attribute_mutating
        description: Remove CSA from ISDA. Internal - use trading-profile.remove-component for authoring.
        metadata:
          tier: projection
          source_of_truth: operational
          scope: cbu
          noun: isda
          internal: true
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove CSA from ISDA"
          - "detach credit support annex"
          - "delete VM CSA agreement"
          - "remove initial margin annex"
          - "drop collateral support terms"
          - "cancel CSA arrangement"
          - "remove collateral annex from ISDA"
          - "delete credit support configuration"
        behavior: crud
        crud:
          operation: delete
          table: csa_agreements
          schema: ob-poc
        args:
          - name: csa-id
            type: uuid
            required: true
            maps_to: csa_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      list:
        flavour: attribute_mutating
        description: List ISDA agreements for CBU
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: isda
          subject_kinds: [isda]
          phase_tags: [trading]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "list ISDA agreements for CBU"
          - "show OTC master agreements"
          - "which ISDAs does this fund have"
          - "display derivatives agreements"
          - "what counterparties have ISDAs"
          - "show active ISDA contracts"
          - "check ISDA coverage for this CBU"
          - "list all master agreements"
        behavior: crud
        crud:
          operation: list_by_fk
          table: isda_agreements
          schema: ob-poc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: counterparty
            type: uuid
            required: false
            maps_to: counterparty_entity_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
