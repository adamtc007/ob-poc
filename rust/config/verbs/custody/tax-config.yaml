domains:
  tax-config:
    description: "Tax withholding and reclaim configuration"

    verbs:
      # =========================================================================
      # TAX JURISDICTION REFERENCE DATA
      # =========================================================================

      define-jurisdiction:
        description: "Define tax jurisdiction with withholding rates"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "define tax jurisdiction and rates"
          - "add withholding tax country"
          - "register new tax jurisdiction"
          - "set up country withholding rules"
          - "configure tax authority for market"
          - "what reclaim deadlines apply here"
          - "provision jurisdiction tax defaults"
          - "create tax jurisdiction profile"
        behavior: crud
        crud:
          operation: upsert
          table: tax_jurisdictions
          schema: custody
          conflict_keys:
            - jurisdiction_code
          returning: jurisdiction_id
        args:
          - name: code
            type: string
            required: true
            maps_to: jurisdiction_code
          - name: name
            type: string
            required: true
            maps_to: jurisdiction_name
          - name: country-code
            type: string
            required: true
            maps_to: country_code
          - name: default-rate
            type: decimal
            required: false
            maps_to: default_withholding_rate
          - name: reclaim-available
            type: boolean
            required: false
            maps_to: reclaim_available
            default: true
          - name: reclaim-deadline-days
            type: integer
            required: false
            maps_to: reclaim_deadline_days
          - name: tax-authority-name
            type: string
            required: false
            maps_to: tax_authority_name
          - name: tax-authority-code
            type: string
            required: false
            maps_to: tax_authority_code
          - name: documentation-requirements
            type: json
            required: false
            maps_to: documentation_requirements
        returns:
          type: uuid
          name: jurisdiction_id
          capture: true
        lifecycle:
          precondition_checks:
            - "reviewed:none"
          writes_tables:
            - custody.tax_jurisdictions

      list-jurisdictions:
        description: "List tax jurisdictions"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "list available tax jurisdictions"
          - "show countries with withholding tax"
          - "which jurisdictions allow reclaim"
          - "display tax authority reference data"
          - "what withholding rates are defined"
          - "check tax jurisdiction coverage"
          - "show reclaim-eligible countries"
          - "browse tax jurisdictions by country"
        behavior: crud
        crud:
          operation: select
          table: tax_jurisdictions
          schema: custody
        args:
          - name: country-code
            type: string
            required: false
            maps_to: country_code
          - name: reclaim-available
            type: boolean
            required: false
            maps_to: reclaim_available
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.tax_jurisdictions

      # =========================================================================
      # TAX TREATY RATES
      # =========================================================================

      set-treaty-rate:
        description: "Set bilateral tax treaty rate"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "set bilateral treaty withholding rate"
          - "configure double taxation agreement"
          - "add treaty rate for dividend income"
          - "what is the DTA rate between countries"
          - "apply reduced withholding under treaty"
          - "register interest income treaty rate"
          - "set beneficial owner treaty entitlement"
          - "provision treaty rate for jurisdiction pair"
        behavior: crud
        crud:
          operation: upsert
          table: tax_treaty_rates
          schema: custody
          conflict_keys:
            - source_jurisdiction_id
            - investor_jurisdiction_id
            - income_type
            - instrument_class_id
          returning: treaty_id
        args:
          - name: source-jurisdiction
            type: lookup
            required: true
            maps_to: source_jurisdiction_id
            lookup:
              table: tax_jurisdictions
              entity_type: tax_jurisdiction
              schema: custody
              code_column: jurisdiction_code
              id_column: jurisdiction_id
          - name: investor-jurisdiction
            type: lookup
            required: true
            maps_to: investor_jurisdiction_id
            lookup:
              table: tax_jurisdictions
              entity_type: tax_jurisdiction
              schema: custody
              code_column: jurisdiction_code
              id_column: jurisdiction_id
          - name: income-type
            type: string
            required: true
            maps_to: income_type
            valid_values:
              - DIVIDEND
              - INTEREST
              - ROYALTY
              - CAPITAL_GAIN
          - name: instrument-class
            type: lookup
            required: false
            maps_to: instrument_class_id
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: standard-rate
            type: decimal
            required: true
            maps_to: standard_rate
          - name: treaty-rate
            type: decimal
            required: true
            maps_to: treaty_rate
          - name: beneficial-owner-required
            type: boolean
            required: false
            maps_to: beneficial_owner_required
            default: true
          - name: documentation-codes
            type: string_list
            required: false
            maps_to: documentation_codes
          - name: effective-date
            type: date
            required: true
            maps_to: effective_date
          - name: treaty-reference
            type: string
            required: false
            maps_to: treaty_reference
        returns:
          type: uuid
          name: treaty_id
          capture: true
        lifecycle:
          precondition_checks:
            - "requires_prior:tax-config.define-jurisdiction"
          writes_tables:
            - custody.tax_treaty_rates
          reads_tables:
            - custody.tax_jurisdictions

      list-treaty-rates:
        description: "List treaty rates for jurisdiction pair"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "show treaty rates between jurisdictions"
          - "list DTA withholding rates"
          - "what treaty rates apply for dividends"
          - "display bilateral tax treaty schedule"
          - "check reduced rate for income type"
          - "which treaties cover interest income"
          - "show withholding treaty reference data"
          - "list all tax treaty configurations"
        behavior: crud
        crud:
          operation: select
          table: tax_treaty_rates
          schema: custody
        args:
          - name: source-jurisdiction
            type: string
            required: false
          - name: investor-jurisdiction
            type: string
            required: false
          - name: income-type
            type: string
            required: false
            maps_to: income_type
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.tax_treaty_rates

      # =========================================================================
      # CBU TAX STATUS
      # =========================================================================

      set-tax-status:
        description: "Set CBU tax status for jurisdiction"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "set tax status for this fund"
          - "configure CBU investor type for tax"
          - "mark fund as tax-exempt in jurisdiction"
          - "assign FATCA status to CBU"
          - "set qualified intermediary designation"
          - "update CRS reporting classification"
          - "apply pension fund tax exemption"
          - "configure sovereign wealth tax status"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_tax_status
          schema: custody
          conflict_keys:
            - cbu_id
            - tax_jurisdiction_id
          returning: status_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: jurisdiction
            type: lookup
            required: true
            maps_to: tax_jurisdiction_id
            lookup:
              table: tax_jurisdictions
              entity_type: tax_jurisdiction
              schema: custody
              code_column: jurisdiction_code
              id_column: jurisdiction_id
          - name: investor-type
            type: string
            required: true
            maps_to: investor_type
            valid_values:
              - PENSION
              - SOVEREIGN
              - CHARITY
              - CORPORATE
              - INDIVIDUAL
              - FUND
          - name: tax-exempt
            type: boolean
            required: false
            maps_to: tax_exempt
            default: false
          - name: exempt-reason
            type: string
            required: false
            maps_to: exempt_reason
          - name: documentation-status
            type: string
            required: false
            maps_to: documentation_status
            default: PENDING
            valid_values:
              - PENDING
              - SUBMITTED
              - VALIDATED
              - EXPIRED
          - name: documentation-expiry
            type: date
            required: false
            maps_to: documentation_expiry
          - name: applicable-treaty-rate
            type: decimal
            required: false
            maps_to: applicable_treaty_rate
          - name: qualified-intermediary
            type: boolean
            required: false
            maps_to: qualified_intermediary
            default: false
          - name: qi-ein
            type: string
            required: false
            maps_to: qi_ein
          - name: fatca-status
            type: string
            required: false
            maps_to: fatca_status
            valid_values:
              - EXEMPT
              - PARTICIPATING
              - NON_PARTICIPATING
          - name: crs-status
            type: string
            required: false
            maps_to: crs_status
        returns:
          type: uuid
          name: status_id
          capture: true
        lifecycle:
          precondition_checks:
            - "requires_scope:cbu"
          writes_tables:
            - custody.cbu_tax_status
          reads_tables:
            - custody.tax_jurisdictions

      list-tax-status:
        description: "List tax status for CBU"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "show tax status for this CBU"
          - "list fund tax classifications"
          - "what FATCA status is configured"
          - "display investor type per jurisdiction"
          - "check tax exemption settings"
          - "which jurisdictions have QI status"
          - "show CBU tax documentation status"
          - "list CRS and FATCA designations"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_tax_status
          schema: custody
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.cbu_tax_status

      # =========================================================================
      # TAX RECLAIM CONFIGURATION
      # =========================================================================

      set-reclaim-config:
        description: "Configure tax reclaim processing"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "configure tax reclaim for jurisdiction"
          - "set up withholding tax recovery"
          - "enable automatic reclaim processing"
          - "assign reclaim service provider"
          - "set minimum reclaim threshold amount"
          - "configure batch reclaim frequency"
          - "outsource tax reclaim to provider"
          - "provision reclaim fee structure"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_tax_reclaim_config
          schema: custody
          conflict_keys:
            - cbu_id
            - source_jurisdiction_id
          returning: config_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: source-jurisdiction
            type: lookup
            required: true
            maps_to: source_jurisdiction_id
            lookup:
              table: tax_jurisdictions
              entity_type: tax_jurisdiction
              schema: custody
              code_column: jurisdiction_code
              id_column: jurisdiction_id
          - name: reclaim-method
            type: string
            required: true
            maps_to: reclaim_method
            valid_values:
              - AUTOMATIC
              - MANUAL
              - OUTSOURCED
              - NO_RECLAIM
          - name: service-provider
            type: uuid
            required: false
            maps_to: service_provider_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: minimum-amount
            type: decimal
            required: false
            maps_to: minimum_reclaim_amount
          - name: minimum-currency
            type: string
            required: false
            maps_to: minimum_reclaim_currency
          - name: batch-frequency
            type: string
            required: false
            maps_to: batch_frequency
            valid_values:
              - IMMEDIATE
              - WEEKLY
              - MONTHLY
              - QUARTERLY
          - name: expected-recovery-days
            type: integer
            required: false
            maps_to: expected_recovery_days
          - name: fee-structure
            type: json
            required: false
            maps_to: fee_structure
        returns:
          type: uuid
          name: config_id
          capture: true
        lifecycle:
          precondition_checks:
            - "requires_scope:cbu"
          writes_tables:
            - custody.cbu_tax_reclaim_config
          reads_tables:
            - custody.tax_jurisdictions

      list-reclaim-configs:
        description: "List reclaim configurations for CBU"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "list reclaim configurations for CBU"
          - "show tax recovery setup by jurisdiction"
          - "which reclaim methods are configured"
          - "display active reclaim providers"
          - "check reclaim batch frequency settings"
          - "what jurisdictions have reclaim enabled"
          - "show minimum reclaim thresholds"
          - "list outsourced reclaim arrangements"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_tax_reclaim_config
          schema: custody
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.cbu_tax_reclaim_config

      deactivate-reclaim:
        description: "Deactivate reclaim configuration"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "deactivate tax reclaim processing"
          - "stop reclaim for this jurisdiction"
          - "disable withholding tax recovery"
          - "suspend reclaim configuration"
          - "turn off automatic reclaim"
          - "cancel outsourced reclaim arrangement"
          - "halt tax reclaim submissions"
          - "decommission reclaim for country"
        behavior: crud
        crud:
          operation: update
          table: cbu_tax_reclaim_config
          schema: custody
          key: config_id
          set_values:
            is_active: false
        args:
          - name: config-id
            type: uuid
            required: true
            maps_to: config_id
        returns:
          type: affected
        lifecycle:
          precondition_checks:
            - "requires_scope:cbu"
          writes_tables:
            - custody.cbu_tax_reclaim_config

      # =========================================================================
      # TAX REPORTING OBLIGATIONS
      # =========================================================================

      set-reporting:
        description: "Set tax reporting obligation"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "set tax reporting obligation"
          - "configure FATCA reporting for fund"
          - "register CRS reporting status"
          - "add DAC6 obligation for CBU"
          - "assign GIIN for FATCA compliance"
          - "set qualified intermediary reporting"
          - "configure 871(m) withholding regime"
          - "provision UK CDOT reporting"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_tax_reporting
          schema: custody
          conflict_keys:
            - cbu_id
            - reporting_regime
            - reporting_jurisdiction_id
          returning: reporting_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: regime
            type: string
            required: true
            maps_to: reporting_regime
            valid_values:
              - FATCA
              - CRS
              - DAC6
              - UK_CDOT
              - QI
              - 871M
          - name: jurisdiction
            type: lookup
            required: true
            maps_to: reporting_jurisdiction_id
            lookup:
              table: tax_jurisdictions
              entity_type: tax_jurisdiction
              schema: custody
              code_column: jurisdiction_code
              id_column: jurisdiction_id
          - name: status
            type: string
            required: false
            maps_to: reporting_status
            default: REQUIRED
            valid_values:
              - REQUIRED
              - EXEMPT
              - PARTICIPATING
              - PENDING
          - name: giin
            type: string
            required: false
            maps_to: giin
          - name: registration-date
            type: date
            required: false
            maps_to: registration_date
          - name: reporting-entity
            type: uuid
            required: false
            maps_to: reporting_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: sponsor-entity
            type: uuid
            required: false
            maps_to: sponsor_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: reporting_id
          capture: true
        lifecycle:
          precondition_checks:
            - "requires_scope:cbu"
          writes_tables:
            - custody.cbu_tax_reporting
          reads_tables:
            - custody.tax_jurisdictions

      list-reporting:
        description: "List tax reporting obligations for CBU"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: tax_config
          phase_tags: [trading]
        invocation_phrases:
          - "list tax reporting obligations for CBU"
          - "show FATCA and CRS registrations"
          - "which reporting regimes apply"
          - "display GIIN and QI designations"
          - "check CBU tax compliance status"
          - "what DAC6 obligations exist"
          - "show reporting entity assignments"
          - "list active tax regime registrations"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_tax_reporting
          schema: custody
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: regime
            type: string
            required: false
            maps_to: reporting_regime
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.cbu_tax_reporting

      # =========================================================================
      # TAX LOOKUP AND VALIDATION
      # =========================================================================
