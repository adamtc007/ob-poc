domains:
  cbu-custody:
    description: "CBU custody diagnostics: Query operational universe, SSIs, and Booking Rules"
    verbs:
      # ========================================
      # DIAGNOSTICS - Query operational state
      # ========================================
      # These verbs query the operational tables that are WRITTEN by trading-profile:materialize.
      # For authoring/editing, use trading-profile:* verbs instead.

      list-universe:
        description: List CBU's traded universe (read from operational tables)
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: universe
          tags: [read, operational-state]
          phase_tags: [trading]
        invocation_phrases:
          - "show traded universe for CBU"
          - "what instruments does this fund trade"
          - "list settlement universe"
          - "which markets are in scope"
          - "display instrument coverage"
          - "what can this structure trade"
          - "show DVP and FOP instruments"
          - "check universe completeness"
        crud:
          operation: list_by_fk
          table: cbu_instrument_universe
          schema: custody
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: record_set

      list-ssis:
        description: List SSIs for a CBU (read from operational tables)
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: ssi
          tags: [read, operational-state]
          phase_tags: [trading]
        invocation_phrases:
          - "show settlement instructions for CBU"
          - "list SSIs for this fund"
          - "what are the standing instructions"
          - "display SWIFT settlement details"
          - "which BICs are configured"
          - "show active SSI records"
          - "check settlement routing setup"
          - "what custodian accounts exist"
        crud:
          operation: list_by_fk
          table: cbu_ssi
          schema: custody
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: status
            type: string
            required: false
            maps_to: status
          - name: type
            type: string
            required: false
            maps_to: ssi_type
        returns:
          type: record_set

      list-booking-rules:
        description: List booking rules for a CBU (read from operational tables)
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: booking_rule
          tags: [read, operational-state]
          phase_tags: [trading]
        invocation_phrases:
          - "show booking rules for this CBU"
          - "what are the settlement routing rules"
          - "list trade booking priorities"
          - "how are DVP trades routed"
          - "display SSI selection rules"
          - "which rule matches FOP trades"
          - "check booking rule coverage"
          - "show active routing configuration"
        crud:
          operation: list_by_fk
          table: ssi_booking_rules
          schema: custody
          fk_col: cbu_id
          order_by: priority
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      list-agent-overrides:
        description: List agent overrides for an SSI
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: agent_override
          tags: [read, operational-state]
          phase_tags: [trading]
        invocation_phrases:
          - "show agent overrides for SSI"
          - "list settlement agent exceptions"
          - "what BIC overrides exist"
          - "display correspondent bank overrides"
          - "check sub-custodian routing overrides"
          - "are there agent substitutions"
          - "show SWIFT intermediary overrides"
          - "which agents are overridden"
        crud:
          operation: list_by_fk
          table: cbu_ssi_agent_override
          schema: custody
          fk_col: ssi_id
          order_by: sequence_order
        args:
          - name: ssi-id
            type: uuid
            required: true
            maps_to: ssi_id
            lookup:
              table: cbu_ssi
              entity_type: ssi
              schema: custody
              search_key: ssi_name
              primary_key: ssi_id
        returns:
          type: record_set

      # ========================================
      # VALIDATION - Check coverage and gaps
      # ========================================

      derive-required-coverage:
        description: Compare universe to booking rules, find gaps
        behavior: plugin
        handler: derive_required_coverage
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: coverage_gap
          tags: [read, validation, gap-analysis]
          phase_tags: [trading]
        invocation_phrases:
          - "find SSI coverage gaps"
          - "which instruments lack booking rules"
          - "check for missing settlement routes"
          - "run coverage gap analysis"
          - "are all universe entries covered"
          - "identify uncovered instrument classes"
          - "what DVP trades have no SSI"
          - "show settlement coverage shortfalls"
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: record_set

      validate-booking-coverage:
        description: Validate that all universe entries have matching booking rules
        behavior: plugin
        handler: validate_booking_coverage
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: coverage_validation
          tags: [read, validation, coverage-check]
          phase_tags: [trading]
        invocation_phrases:
          - "validate settlement coverage"
          - "is the booking setup complete"
          - "check all instruments have SSIs"
          - "run booking rule validation"
          - "verify DVP FOP coverage"
          - "does this CBU pass coverage check"
          - "are settlement instructions complete"
          - "confirm routing rule completeness"
        lifecycle:
          reads_tables:
            - custody.cbu_instrument_universe
            - custody.cbu_ssi
            - custody.ssi_booking_rules
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: record

      lookup-ssi:
        description: Find SSI for given trade characteristics (simulate ALERT lookup)
        behavior: plugin
        handler: lookup_ssi_for_trade
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: ssi_lookup
          tags: [read, routing, alert-simulation]
          phase_tags: [trading]
        invocation_phrases:
          - "find SSI for this trade"
          - "which SSI matches these characteristics"
          - "simulate ALERT SSI lookup"
          - "resolve settlement instruction for equity"
          - "what BIC routes this currency"
          - "test booking rule matching"
          - "where does this DVP settle"
          - "look up custodian for market"
        lifecycle:
          reads_tables:
            - custody.cbu_ssi
            - custody.ssi_booking_rules
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: string
            required: true
          - name: security-type
            type: string
            required: false
          - name: market
            type: string
            required: false
          - name: currency
            type: string
            required: true
          - name: settlement-type
            type: string
            required: false
          - name: counterparty-bic
            type: string
            required: false
        returns:
          type: record

      # ========================================
      # COMPOSITE - Bulk import
      # ========================================

      setup-ssi:
        description: Bulk import SSIs from SSI_ONBOARDING document
        behavior: plugin
        handler: setup_ssi_from_document
        metadata:
          tier: composite
          source_of_truth: operational
          scope: cbu
          writes_operational: true
          noun: ssi_setup
          tags: [bulk-import, document-driven]
          phase_tags: [trading]
        invocation_phrases:
          - "bulk import SSIs from document"
          - "load settlement instructions from file"
          - "import SSI onboarding spreadsheet"
          - "set up SSIs for new CBU"
          - "provision standing instructions in bulk"
          - "ingest SWIFT settlement data"
          - "initialize SSI configuration"
          - "onboard settlement routes from template"
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: document-id
            type: uuid
            required: true
            lookup:
              table: document_catalog
              entity_type: document
              schema: ob-poc
              search_key: document_name
              primary_key: doc_id
          - name: validation-mode
            type: string
            required: false
            default: STRICT
            valid_values:
              - STRICT
              - PERMISSIVE
        returns:
          type: record
