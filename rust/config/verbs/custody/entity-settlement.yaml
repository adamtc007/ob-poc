domains:
  entity-settlement:
    description: Entity settlement identity and SSIs (counterparty data from ALERT)
    verbs:
      set-identity:
        description: Set primary settlement identity for an entity
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: entity_settlement
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "set counterparty BIC code"
        - "assign settlement identity to entity"
        - "register SWIFT BIC for counterparty"
        - "configure ALERT participant ID"
        - "set LEI for settlement"
        - "update entity settlement identity"
        - "link BIC to counterparty"
        - "provision CTM participant details"
        behavior: crud
        crud:
          operation: upsert
          table: entity_settlement_identity
          schema: custody
          conflict_keys:
          - entity_id
          - primary_bic
          returning: identity_id
        args:
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: bic
          type: string
          required: true
          maps_to: primary_bic
        - name: lei
          type: string
          required: false
          maps_to: lei
        - name: alert-id
          type: string
          required: false
          maps_to: alert_participant_id
        - name: ctm-id
          type: string
          required: false
          maps_to: ctm_participant_id
        returns:
          type: uuid
          name: identity_id
          capture: true
      add-ssi:
        description: Add counterparty SSI (idempotent by entity+counterparty_bic+market+currency)
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: entity_settlement
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "add counterparty SSI"
        - "register settlement instruction for entity"
        - "set up SWIFT routing for counterparty"
        - "add ALERT SSI for broker"
        - "configure safekeeping account details"
        - "add DVP settlement route for entity"
        - "provision counterparty BIC and account"
        - "create entity settlement instruction"
        behavior: crud
        crud:
          operation: upsert
          table: entity_ssi
          schema: custody
          returning: entity_ssi_id
          conflict_keys:
          - entity_id
          - counterparty_bic
          - market_id
          - currency
        args:
        - name: entity-id
          type: uuid
          required: true
          maps_to: entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
        - name: instrument-class
          type: lookup
          required: false
          maps_to: instrument_class_id
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: custody
            code_column: code
            id_column: class_id
        - name: security-type
          type: lookup
          required: false
          maps_to: security_type_id
          lookup:
            table: security_types
            schema: custody
            code_column: code
            id_column: security_type_id
        - name: market
          type: lookup
          required: false
          maps_to: market_id
          lookup:
            table: markets
            entity_type: market
            schema: custody
            code_column: mic
            id_column: market_id
        - name: currency
          type: string
          required: false
          maps_to: currency
        - name: counterparty-bic
          type: string
          required: true
          maps_to: counterparty_bic
        - name: safekeeping-account
          type: string
          required: false
          maps_to: safekeeping_account
        - name: source
          type: string
          required: false
          maps_to: source
          valid_values:
          - ALERT
          - MANUAL
          - CTM
          default: ALERT
        - name: source-reference
          type: string
          required: false
          maps_to: source_reference
        - name: effective-date
          type: date
          required: true
          maps_to: effective_date
        returns:
          type: uuid
          name: entity_ssi_id
          capture: true
      remove-ssi:
        description: Remove a counterparty SSI
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: entity_settlement
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "remove counterparty SSI"
        - "delete settlement instruction for entity"
        - "deactivate SSI for broker"
        - "remove SWIFT routing for counterparty"
        - "clear entity settlement details"
        - "drop safekeeping account link"
        - "cancel counterparty settlement route"
        - "remove ALERT SSI record"
        behavior: crud
        crud:
          operation: delete
          table: entity_ssi
          schema: custody
        args:
        - name: ssi-id
          type: uuid
          required: true
          maps_to: entity_ssi_id
        returns:
          type: affected
