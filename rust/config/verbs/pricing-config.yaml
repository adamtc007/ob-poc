          - "set NAV calculation schedule"
          - "define valuation timing"
          - "schedule mark-to-market frequency"
          - "set end-of-day valuation time"
          - "configure position pricing schedule"
          - "when should NAV be calculated"
          - "define daily valuation cutoff"
          - "set intraday pricing frequency"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
