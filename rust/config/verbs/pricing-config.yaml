          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_valuation_schedule
          schema: ob-poc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
        returns:
          type: record_set
        lifecycle:
          reads_tables:
            - custody.cbu_valuation_schedule

