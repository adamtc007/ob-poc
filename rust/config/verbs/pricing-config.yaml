# Pricing Configuration Verbs
# =============================================================================
# Manages pricing source configuration by instrument class
# =============================================================================

domains:
  pricing-config:
    description: "Pricing source configuration management"
    verbs:
      set:
        flavour: attribute_mutating
        description: Set pricing source for instrument class
        invocation_phrases:
          - "set pricing config"
          - "configure pricing"
          - "update pricing configuration"
          - "set pricing source"
          - "define pricing rules"
          - "assign Bloomberg pricing feed"
          - "change pricing vendor for instrument"
          - "which source prices this asset"
          - "set mark-to-market source"
          - "configure price feed provider"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: cbu_pricing_config
          schema: ob-poc
          conflict_keys:
            - cbu_id
            - instrument_class_id
            - market_id
            - priority
          returning: config_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: profile-id
            type: uuid
            required: false
            maps_to: profile_id
            lookup:
              table: cbu_trading_profiles
              schema: ob-poc
              search_key: profile_id
              primary_key: profile_id
          - name: instrument-class
            type: lookup
            required: true
            maps_to: instrument_class_id
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: ob-poc
              code_column: code
              id_column: class_id
          - name: market
            type: lookup
            required: false
            maps_to: market_id
            lookup:
              table: markets
              entity_type: market
              schema: ob-poc
              code_column: mic
              id_column: market_id
          - name: currency
            type: string
            required: false
            maps_to: currency
          - name: priority
            type: integer
            required: true
            maps_to: priority
          - name: source
            type: string
            required: true
            maps_to: source
            valid_values:
              - BLOOMBERG
              - REUTERS
              - MARKIT
              - REFINITIV
              - ICE
              - MODEL
              - INTERNAL
              - VENDOR
              - COUNTERPARTY
          - name: price-type
            type: string
            required: false
            default: CLOSING
            maps_to: price_type
            valid_values:
              - CLOSING
              - MID
              - BID
              - ASK
              - VWAP
              - OFFICIAL
          - name: fallback-source
            type: string
            required: false
            maps_to: fallback_source
          - name: max-age-hours
            type: integer
            required: false
            default: 24
            maps_to: max_age_hours
          - name: tolerance-pct
            type: decimal
            required: false
            default: 5.0
            maps_to: tolerance_pct
          - name: stale-action
            type: string
            required: false
            default: WARN
            maps_to: stale_action
            valid_values:
              - WARN
              - BLOCK
              - USE_FALLBACK
              - ESCALATE
          - name: effective-date
            type: date
            required: false
            maps_to: effective_date
        returns:
          type: uuid
          name: config_id
          capture: true

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      link-resource:
        flavour: instance_adding
        description: Link pricing config to pricing feed resource
        invocation_phrases:
          - "link pricing resource"
          - "attach pricing source"
          - "connect pricing provider"
          - "link data source to pricing"
          - "wire up price feed"
          - "bind Refinitiv feed to config"
          - "associate pricing vendor resource"
          - "map pricing source to instrument"
          - "connect Bloomberg feed to config"
          - "attach valuation data provider"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: cbu_pricing_config
          schema: ob-poc
          key: config_id
        args:
          - name: config-id
            type: uuid
            required: true
            maps_to: config_id
          - name: pricing-resource-id
            type: uuid
            required: true
            maps_to: pricing_resource_id
            lookup:
              table: cbu_resource_instances
              entity_type: resource_instance
              schema: ob-poc
              search_key: instance_name
              primary_key: instance_id
        returns:
          type: affected

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      list:
        flavour: attribute_mutating
        description: List pricing configurations for CBU
        invocation_phrases:
          - "list pricing configs"
          - "show pricing configurations"
          - "get pricing configs"
          - "display pricing setups"
          - "what pricing sources are configured"
          - "show all price feeds"
          - "which vendors supply prices"
          - "view pricing source assignments"
          - "list active pricing providers"
          - "what is the pricing setup"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_pricing_config
          schema: ob-poc
          fk_col: cbu_id
          order_by: priority
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: string
            required: false
          - name: is-active
            type: boolean
            required: false
            default: true
            maps_to: is_active
        returns:
          type: record_set

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      remove:
        flavour: attribute_mutating
        description: Remove pricing configuration
        invocation_phrases:
          - "remove pricing config"
          - "delete pricing configuration"
          - "unset pricing config"
          - "clear pricing rules"
          - "drop pricing source assignment"
          - "remove price feed configuration"
          - "delete pricing vendor setup"
          - "eliminate pricing rule entry"
          - "discard pricing source mapping"
          - "purge pricing config for instrument"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: state_write
        behavior: crud
        crud:
          operation: delete
          table: cbu_pricing_config
          schema: ob-poc
        args:
          - name: config-id
            type: uuid
            required: true
            maps_to: config_id
        returns:
          type: affected

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      deactivate:
        flavour: attribute_mutating
        description: Deactivate pricing configuration
        invocation_phrases:
          - "deactivate pricing config"
          - "disable pricing"
          - "turn off pricing config"
          - "suspend pricing configuration"
          - "pause pricing source feed"
          - "deactivate price vendor link"
          - "stop using this pricing source"
          - "switch off valuation feed"
          - "freeze pricing configuration"
          - "temporarily disable price source"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: cbu_pricing_config
          schema: ob-poc
          key: config_id
          set_values:
            is_active: false
        args:
          - name: config-id
            type: uuid
            required: true
            maps_to: config_id
        returns:
          type: affected

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      find-for-instrument:
        flavour: attribute_mutating
        description: Find pricing source for given instrument characteristics
        invocation_phrases:
          - "find pricing for instrument"
          - "which pricing applies"
          - "get pricing config for instrument"
          - "instrument pricing lookup"
          - "where does this security price from"
          - "resolve pricing source for bond"
          - "what vendor prices this equity"
          - "look up price feed for asset"
          - "how is this instrument valued"
          - "which source provides this price"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: cbu
          noun: pricing_config
          phase_tags: [deal]
          side_effects: facts_only
        behavior: plugin
        handler: find_pricing_for_instrument
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: string
            required: true
          - name: market
            type: string
            required: false
          - name: currency
            type: string
            required: false
        returns:
          type: record
          description: Matching pricing config with source and parameters
        lifecycle:
          reads_tables:
            - custody.cbu_pricing_config

      # =========================================================================
