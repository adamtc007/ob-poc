# Matrix-Overlay Domain Verbs
# =============================================================================
# Links Trading Matrix entries to Product subscriptions
# Key insight: Products ADD attributes to matrix entries, they don't define them
# =============================================================================

domains:
  product-subscription:
    description: "CBU product subscription management"

    verbs:
      # =========================================================================
      # PRODUCT SUBSCRIPTION CRUD
      # =========================================================================

      subscribe:
        description: "Subscribe a CBU to a product"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "subscribe CBU to product"
          - "add product subscription"
          - "enable product for structure"
          - "activate product on CBU"
          - "sign up for custody product"
          - "enroll CBU in service"
          - "add product to fund"
          - "subscribe to prime brokerage"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_product_subscriptions
          schema: ob-poc
          unique_cols:
            - cbu_id
            - product_id
          returning: subscription_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: product
            type: lookup
            required: true
            maps_to: product_id
            lookup:
              table: products
              entity_type: product
              schema: ob-poc
              code_column: product_code
              id_column: product_id
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
          - name: config
            type: json
            required: false
            maps_to: config
        returns:
          type: uuid
          name: subscription_id
          capture: true

      unsubscribe:
        description: "Terminate a product subscription"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "unsubscribe from product"
          - "cancel product subscription"
          - "terminate product for CBU"
          - "remove product from structure"
          - "end custody product subscription"
          - "off-board product service"
          - "deactivate product subscription"
          - "drop product from fund"
        behavior: crud
        crud:
          operation: update
          table: cbu_product_subscriptions
          schema: ob-poc
          key: subscription_id
          set_values:
            status: TERMINATED
            effective_to: now()
        args:
          - name: subscription-id
            type: uuid
            required: true
            maps_to: subscription_id
        returns:
          type: affected

      suspend:
        description: "Suspend a product subscription"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "suspend product subscription"
          - "pause subscription temporarily"
          - "hold product for CBU"
          - "freeze product subscription"
          - "temporarily disable product"
          - "put subscription on hold"
          - "suspend custody service"
          - "pause product enrollment"
        behavior: crud
        crud:
          operation: update
          table: cbu_product_subscriptions
          schema: ob-poc
          key: subscription_id
          set_values:
            status: SUSPENDED
        args:
          - name: subscription-id
            type: uuid
            required: true
            maps_to: subscription_id
        returns:
          type: affected

      reactivate:
        description: "Reactivate a suspended subscription"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "reactivate subscription"
          - "resume suspended product"
          - "re-enable product for CBU"
          - "restore product subscription"
          - "unsuspend product service"
          - "bring subscription back online"
          - "restart product enrollment"
          - "activate suspended subscription"
        behavior: crud
        crud:
          operation: update
          table: cbu_product_subscriptions
          schema: ob-poc
          key: subscription_id
          set_values:
            status: ACTIVE
        args:
          - name: subscription-id
            type: uuid
            required: true
            maps_to: subscription_id
        returns:
          type: affected

      list:
        description: "List product subscriptions for a CBU"
        metadata:
          tier: reference
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "list product subscriptions"
          - "show products for CBU"
          - "what products is CBU subscribed to"
          - "display active subscriptions"
          - "get product list for fund"
          - "which products are enabled"
          - "show subscription status"
          - "list enrolled products"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_product_subscriptions
          schema: ob-poc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: status
            type: string
            required: false
            maps_to: status
            valid_values:
              - PENDING
              - ACTIVE
              - SUSPENDED
              - TERMINATED
        returns:
          type: record_set

  matrix-overlay:
    description: "Trading matrix product overlay management"

    verbs:
      # =========================================================================
      # OVERLAY OPERATIONS
      # =========================================================================

      add:
        description: "Add a product overlay to matrix entries"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "add product overlay"
          - "apply overlay to matrix"
          - "add services to matrix entry"
          - "overlay product on trading matrix"
          - "attach product to instrument class"
          - "layer product onto matrix"
          - "add SLA overlay"
          - "extend matrix with product"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_matrix_product_overlay
          schema: ob-poc
          unique_cols:
            - cbu_id
            - subscription_id
            - instrument_class_id
            - market_id
            - currency
            - counterparty_entity_id
          returning: overlay_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: subscription-id
            type: uuid
            required: true
            maps_to: subscription_id
          # Context scoping (NULL = applies to all)
          - name: instrument-class
            type: lookup
            required: false
            maps_to: instrument_class_id
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: market
            type: lookup
            required: false
            maps_to: market_id
            lookup:
              table: markets
              entity_type: market
              schema: custody
              code_column: mic
              id_column: market_id
          - name: currency
            type: string
            required: false
            maps_to: currency
          - name: counterparty
            type: uuid
            required: false
            maps_to: counterparty_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          # Attributes this overlay adds
          - name: additional-services
            type: json
            required: false
            maps_to: additional_services
            description: "Array of service codes to add"
          - name: additional-slas
            type: json
            required: false
            maps_to: additional_slas
            description: "Array of SLA template codes"
          - name: additional-resources
            type: json
            required: false
            maps_to: additional_resources
            description: "Array of extra resource requirements"
          - name: config
            type: json
            required: false
            maps_to: product_specific_config
        returns:
          type: uuid
          name: overlay_id
          capture: true

      remove:
        description: "Remove a product overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "remove product overlay"
          - "delete overlay from matrix"
          - "strip product from matrix entry"
          - "detach overlay"
          - "remove services from matrix"
          - "clear product overlay"
          - "drop overlay for instrument"
          - "unlink product from matrix"
        behavior: crud
        crud:
          operation: delete
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
        args:
          - name: overlay-id
            type: uuid
            required: true
            maps_to: overlay_id
        returns:
          type: affected

      suspend:
        description: "Suspend a product overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "suspend matrix overlay"
          - "pause product overlay"
          - "hold overlay temporarily"
          - "freeze overlay on matrix"
          - "disable overlay entry"
          - "temporarily suspend overlay"
          - "put overlay on hold"
          - "deactivate matrix overlay"
        behavior: crud
        crud:
          operation: update
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
          set_values:
            status: SUSPENDED
        args:
          - name: overlay-id
            type: uuid
            required: true
            maps_to: overlay_id
        returns:
          type: affected

      activate:
        description: "Activate a suspended overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "activate matrix overlay"
          - "resume suspended overlay"
          - "re-enable overlay"
          - "restore overlay on matrix"
          - "bring overlay back online"
          - "unsuspend product overlay"
          - "reactivate overlay entry"
          - "turn overlay back on"
        behavior: crud
        crud:
          operation: update
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
          set_values:
            status: ACTIVE
        args:
          - name: overlay-id
            type: uuid
            required: true
            maps_to: overlay_id
        returns:
          type: affected

      list:
        description: "List overlays for a CBU"
        metadata:
          tier: reference
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "list matrix overlays"
          - "show product overlays for CBU"
          - "what overlays are applied"
          - "display overlay entries"
          - "get all overlays"
          - "show active overlays"
          - "list overlays on matrix"
          - "which overlays are on this CBU"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_matrix_product_overlay
          schema: ob-poc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: subscription-id
            type: uuid
            required: false
            maps_to: subscription_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set

      list-by-subscription:
        description: "List overlays for a product subscription"
        metadata:
          tier: reference
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "list overlays for subscription"
          - "show overlays by product"
          - "what overlays does subscription have"
          - "get overlays for product subscription"
          - "display subscription overlays"
          - "which overlays apply to subscription"
          - "show product-level overlays"
          - "list overlays under subscription"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_matrix_product_overlay
          schema: ob-poc
          fk_col: subscription_id
        args:
          - name: subscription-id
            type: uuid
            required: true
            maps_to: subscription_id
        returns:
          type: record_set

      # =========================================================================
      # ANALYSIS OPERATIONS
      # =========================================================================

      effective-matrix:
        description: "Get effective matrix with all product overlays"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "show effective trading matrix"
          - "get combined matrix view"
          - "what is the effective matrix"
          - "display matrix with overlays"
          - "show merged product matrix"
          - "compute effective matrix"
          - "view trading matrix with products"
          - "render full matrix"
        behavior: plugin
        plugin:
          handler: MatrixEffectiveOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: lookup
            required: false
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: market
            type: lookup
            required: false
            lookup:
              table: markets
              entity_type: market
              schema: custody
              code_column: mic
              id_column: market_id
        returns:
          type: record_set
          description: |
            Returns matrix entries with aggregated product overlays:
            [
              {
                instrument_class: "EQUITY",
                market: "XLON",
                products: ["CUSTODY", "PRIME_BROKERAGE"],
                combined_services: [...],
                combined_slas: [...]
              }
            ]

      unified-gaps:
        description: "Get all gaps from both lifecycle and service domains"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "show matrix gaps"
          - "find missing resources"
          - "what is incomplete in matrix"
          - "identify coverage gaps"
          - "show service gaps"
          - "find lifecycle gaps"
          - "detect missing SSIs or connections"
          - "run gap analysis on matrix"
        behavior: plugin
        plugin:
          handler: MatrixUnifiedGapsOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: domain
            type: string
            required: false
            valid_values:
              - ALL
              - LIFECYCLE
              - SERVICE
            default: ALL
        returns:
          type: record_set
          description: |
            Returns unified gaps from both domains:
            [
              { source: "LIFECYCLE", operation: "SETTLEMENT", missing_resource: "SSI_SECURITIES" },
              { source: "SERVICE", operation: "REPORTING", missing_resource: "SWIFT_CONN" }
            ]

      compare-products:
        description: "Compare what different products add to a matrix entry"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
        invocation_phrases:
          - "compare product offerings"
          - "diff products on matrix"
          - "what does each product add"
          - "compare custody vs prime brokerage"
          - "show product differences"
          - "side-by-side product comparison"
          - "contrast product services"
          - "compare product SLAs"
        behavior: plugin
        plugin:
          handler: MatrixCompareProductsOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: lookup
            required: true
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: products
            type: string_list
            required: true
            description: "Product codes to compare"
        returns:
          type: record
          description: |
            {
              base_lifecycles: [...],
              by_product: {
                "CUSTODY": { services: [...], slas: [...] },
                "PRIME_BROKERAGE": { services: [...], slas: [...] }
              },
              overlap: [...],
              unique_to_each: { ... }
            }
