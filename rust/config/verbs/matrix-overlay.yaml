# Matrix-Overlay Domain Verbs
# =============================================================================
# Links Trading Matrix entries to Product subscriptions
# Key insight: Products ADD attributes to matrix entries, they don't define them
# =============================================================================

domains:
  matrix-overlay:
    description: "Trading matrix product overlay management"

    verbs:
      # =========================================================================
      # OVERLAY OPERATIONS
      # =========================================================================

      add:
        description: "Add a product overlay to matrix entries"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "add product overlay"
        - "apply overlay to matrix"
        - "add services to matrix entry"
        - "overlay product on trading matrix"
        - "attach product to instrument class"
        - "layer product onto matrix"
        - "add SLA overlay"
        - "extend matrix with product"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_matrix_product_overlay
          schema: ob-poc
          unique_cols:
          - cbu_id
          - subscription_id
          - instrument_class_id
          - market_id
          - currency
          - counterparty_entity_id
          returning: overlay_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: subscription-id
          type: uuid
          required: true
          maps_to: subscription_id
          # Context scoping (NULL = applies to all)
        - name: instrument-class
          type: lookup
          required: false
          maps_to: instrument_class_id
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: ob-poc
            code_column: code
            id_column: class_id
        - name: market
          type: lookup
          required: false
          maps_to: market_id
          lookup:
            table: markets
            entity_type: market
            schema: ob-poc
            code_column: mic
            id_column: market_id
        - name: currency
          type: string
          required: false
          maps_to: currency
        - name: counterparty
          type: uuid
          required: false
          maps_to: counterparty_entity_id
          lookup:
            table: entities
            entity_type: entity
            schema: ob-poc
            search_key: name
            primary_key: entity_id
          # Attributes this overlay adds
        - name: additional-services
          type: json
          required: false
          maps_to: additional_services
          description: "Array of service codes to add"
        - name: additional-slas
          type: json
          required: false
          maps_to: additional_slas
          description: "Array of SLA template codes"
        - name: additional-resources
          type: json
          required: false
          maps_to: additional_resources
          description: "Array of extra resource requirements"
        - name: config
          type: json
          required: false
          maps_to: product_specific_config
        returns:
          type: uuid
          name: overlay_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      remove:
        description: "Remove a product overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "remove product overlay"
        - "delete overlay from matrix"
        - "strip product from matrix entry"
        - "detach overlay"
        - "remove services from matrix"
        - "clear product overlay"
        - "drop overlay for instrument"
        - "unlink product from matrix"
        behavior: crud
        crud:
          operation: delete
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
        args:
        - name: overlay-id
          type: uuid
          required: true
          maps_to: overlay_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation

      suspend:
        description: "Suspend a product overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "suspend matrix overlay"
        - "pause product overlay"
        - "hold overlay temporarily"
        - "freeze overlay on matrix"
        - "disable overlay entry"
        - "temporarily suspend overlay"
        - "put overlay on hold"
        - "deactivate matrix overlay"
        behavior: crud
        crud:
          operation: update
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
          set_values:
            status: SUSPENDED
        args:
        - name: overlay-id
          type: uuid
          required: true
          maps_to: overlay_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      activate:
        description: "Activate a suspended overlay"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "activate matrix overlay"
        - "resume suspended overlay"
        - "re-enable overlay"
        - "restore overlay on matrix"
        - "bring overlay back online"
        - "unsuspend product overlay"
        - "reactivate overlay entry"
        - "turn overlay back on"
        behavior: crud
        crud:
          operation: update
          table: cbu_matrix_product_overlay
          schema: ob-poc
          key: overlay_id
          set_values:
            status: ACTIVE
        args:
        - name: overlay-id
          type: uuid
          required: true
          maps_to: overlay_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      list:
        description: "List overlays for a CBU"
        metadata:
          tier: reference
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list matrix overlays"
        - "show product overlays for CBU"
        - "what overlays are applied"
        - "display overlay entries"
        - "get all overlays"
        - "show active overlays"
        - "list overlays on matrix"
        - "which overlays are on this CBU"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_matrix_product_overlay
          schema: ob-poc
          fk_col: cbu_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: subscription-id
          type: uuid
          required: false
          maps_to: subscription_id
        - name: status
          type: string
          required: false
          maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-subscription:
        description: "List overlays for a product subscription"
        metadata:
          tier: reference
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list overlays for subscription"
        - "show overlays by product"
        - "what overlays does subscription have"
        - "get overlays for product subscription"
        - "display subscription overlays"
        - "which overlays apply to subscription"
        - "show product-level overlays"
        - "list overlays under subscription"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_matrix_product_overlay
          schema: ob-poc
          fk_col: subscription_id
        args:
        - name: subscription-id
          type: uuid
          required: true
          maps_to: subscription_id
        returns:
          type: record_set

      # =========================================================================
      # ANALYSIS OPERATIONS
      # =========================================================================
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      effective-matrix:
        description: "Get effective matrix with all product overlays"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "show effective trading matrix"
        - "get combined matrix view"
        - "what is the effective matrix"
        - "display matrix with overlays"
        - "show merged product matrix"
        - "compute effective matrix"
        - "view trading matrix with products"
        - "render full matrix"
        behavior: plugin
        plugin:
          handler: MatrixEffectiveOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: instrument-class
          type: lookup
          required: false
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: ob-poc
            code_column: code
            id_column: class_id
        - name: market
          type: lookup
          required: false
          lookup:
            table: markets
            entity_type: market
            schema: ob-poc
            code_column: mic
            id_column: market_id
        returns:
          type: record_set
          description: |
            Returns matrix entries with aggregated product overlays:
            [
              {
                instrument_class: "EQUITY",
                market: "XLON",
                products: ["CUSTODY", "PRIME_BROKERAGE"],
                combined_services: [...],
                combined_slas: [...]
              }
            ]
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      unified-gaps:
        description: "Get all gaps from both lifecycle and service domains"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "show matrix gaps"
        - "find missing resources"
        - "what is incomplete in matrix"
        - "identify coverage gaps"
        - "show service gaps"
        - "find lifecycle gaps"
        - "detect missing SSIs or connections"
        - "run gap analysis on matrix"
        behavior: plugin
        plugin:
          handler: MatrixUnifiedGapsOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: domain
          type: string
          required: false
          valid_values:
          - ALL
          - LIFECYCLE
          - SERVICE
          default: ALL
        returns:
          type: record_set
          description: |
            Returns unified gaps from both domains:
            [
              { source: "LIFECYCLE", operation: "SETTLEMENT", missing_resource: "SSI_SECURITIES" },
              { source: "SERVICE", operation: "REPORTING", missing_resource: "SWIFT_CONN" }
            ]
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      compare-products:
        description: "Compare what different products add to a matrix entry"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: matrix_overlay
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "compare product offerings"
        - "diff products on matrix"
        - "what does each product add"
        - "compare custody vs prime brokerage"
        - "show product differences"
        - "side-by-side product comparison"
        - "contrast product services"
        - "compare product SLAs"
        behavior: plugin
        plugin:
          handler: MatrixCompareProductsOp
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: instrument-class
          type: lookup
          required: true
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: ob-poc
            code_column: code
            id_column: class_id
        - name: products
          type: string_list
          required: true
          description: "Product codes to compare"
        returns:
          type: record
          description: |
            {
              base_lifecycles: [...],
              by_product: {
                "CUSTODY": { services: [...], slas: [...] },
                "PRIME_BROKERAGE": { services: [...], slas: [...] }
              },
              overlap: [...],
              unique_to_each: { ... }
            }
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
