# Lifecycle Domain Verbs
# =============================================================================
# Verbs for managing instrument lifecycle taxonomy
# Parallel to product/service/service-resource pattern
# =============================================================================

domains:
  lifecycle:
    description: "Instrument lifecycle taxonomy operations"

    verbs:
      # =========================================================================
      # LIFECYCLE REFERENCE DATA (read-only like services)
      # =========================================================================

      read:
        description: "Read a lifecycle by ID or code"
        invocation_phrases:
          - "read lifecycle"
          - "get lifecycle definition"
          - "show lifecycle"
          - "view lifecycle details"
          - "describe lifecycle"
          - "look up lifecycle by code"
          - "fetch lifecycle configuration"
          - "what is this lifecycle"
          - "retrieve lifecycle record"
          - "inspect lifecycle stage definition"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select
          table: lifecycles
          schema: ob-poc
        args:
          - name: lifecycle-id
            type: uuid
            required: false
            maps_to: lifecycle_id
          - name: code
            type: string
            required: false
            maps_to: code
        returns:
          type: record

      list:
        description: "List lifecycles with optional filters"
        invocation_phrases:
          - "list lifecycles"
          - "show all lifecycles"
          - "get lifecycles"
          - "display lifecycles"
          - "available lifecycles"
          - "enumerate lifecycle definitions"
          - "what lifecycles are configured"
          - "browse settlement and servicing lifecycles"
          - "show lifecycle catalogue"
          - "which lifecycles exist"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select
          table: lifecycles
          schema: ob-poc
        args:
          - name: category
            type: string
            required: false
            maps_to: category
            valid_values:
              - SETTLEMENT
              - ASSET_SERVICING
              - PRICING
              - OTC_LIFECYCLE
              - COLLATERAL
              - TAX
              - REGULATORY
          - name: owner
            type: string
            required: false
            maps_to: owner
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      list-by-instrument:
        description: "List lifecycles for an instrument class"
        invocation_phrases:
          - "list lifecycles by instrument"
          - "lifecycles for instrument"
          - "show instrument lifecycles"
          - "get lifecycles for instrument"
          - "which lifecycles apply to equities"
          - "find lifecycles for this instrument class"
          - "what servicing applies to bonds"
          - "instrument lifecycle requirements"
          - "lifecycle coverage for derivatives"
          - "mandatory lifecycles per instrument"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: lifecycles
          join_table: instrument_lifecycles
          join_col: lifecycle_id
          filter_col: instrument_class_id
          schema: ob-poc
        args:
          - name: instrument-class
            type: lookup
            required: true
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: is-mandatory
            type: boolean
            required: false
        returns:
          type: record_set

      # =========================================================================
      # LIFECYCLE RESOURCE TYPES (read-only like service_resource_types)
      # =========================================================================

      read-resource-type:
        description: "Read a lifecycle resource type"
        invocation_phrases:
          - "read resource type"
          - "show resource type"
          - "get resource type"
          - "view resource type"
          - "describe resource type"
          - "look up resource type details"
          - "fetch resource type definition"
          - "what is this resource type"
          - "inspect lifecycle resource type"
          - "retrieve resource type configuration"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select
          table: lifecycle_resource_types
          schema: ob-poc
        args:
          - name: resource-type-id
            type: uuid
            required: false
            maps_to: resource_type_id
          - name: code
            type: string
            required: false
            maps_to: code
        returns:
          type: record

      list-resource-types:
        description: "List lifecycle resource types"
        invocation_phrases:
          - "list resource types"
          - "show resource types"
          - "get all resource types"
          - "available resource types"
          - "display resource types"
          - "enumerate lifecycle resource types"
          - "which resource types are defined"
          - "browse account and SSI types"
          - "show resource type catalogue"
          - "what resource types exist"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select
          table: lifecycle_resource_types
          schema: ob-poc
        args:
          - name: resource-type
            type: string
            required: false
            maps_to: resource_type
            valid_values:
              - ACCOUNT
              - SSI
              - AGREEMENT
              - CONNECTIVITY
              - DATA_FEED
              - PROCESS
              - CLASSIFICATION
          - name: owner
            type: string
            required: false
            maps_to: owner
        returns:
          type: record_set

      list-resources-for-lifecycle:
        description: "List resource types required by a lifecycle"
        invocation_phrases:
          - "list resources for lifecycle"
          - "show lifecycle resources"
          - "get resources for lifecycle"
          - "lifecycle resource list"
          - "what resources does this lifecycle need"
          - "required resources for settlement lifecycle"
          - "show resource dependencies for lifecycle"
          - "which accounts and feeds are needed"
          - "lifecycle resource requirements"
          - "display required provisioning resources"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: select_with_join
          primary_table: lifecycle_resource_types
          join_table: lifecycle_resource_capabilities
          join_col: resource_type_id
          filter_col: lifecycle_id
          schema: ob-poc
        args:
          - name: lifecycle
            type: lookup
            required: true
            lookup:
              table: lifecycles
              entity_type: lifecycle
              schema: ob-poc
              code_column: code
              id_column: lifecycle_id
          - name: is-required
            type: boolean
            required: false
        returns:
          type: record_set

      # =========================================================================
      # CBU LIFECYCLE INSTANCE OPERATIONS (like cbu_resource_instances)
      # =========================================================================

      provision:
        description: "Provision a lifecycle resource instance for a CBU"
        invocation_phrases:
          - "provision lifecycle"
          - "start lifecycle provisioning"
          - "begin provisioning"
          - "provision new lifecycle instance"
          - "set up lifecycle"
          - "provision resource for CBU"
          - "create lifecycle resource instance"
          - "onboard new service resource"
          - "allocate custody resource instance"
          - "initialize resource provisioning"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleProvisionOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: resource-type
            type: lookup
            required: true
            lookup:
              table: lifecycle_resource_types
              entity_type: lifecycle_resource_type
              schema: ob-poc
              code_column: code
              id_column: resource_type_id
          - name: instance-identifier
            type: string
            required: false
            description: "Human-readable identifier (auto-generated if not provided)"
          # Context scoping
          - name: market
            type: lookup
            required: false
            description: "Market context (for per-market resources)"
            lookup:
              table: markets
              entity_type: market
              schema: custody
              code_column: mic
              id_column: market_id
          - name: currency
            type: string
            required: false
            description: "Currency context (for per-currency resources)"
          - name: counterparty
            type: uuid
            required: false
            description: "Counterparty context (for per-counterparty resources)"
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          # Provider details
          - name: provider
            type: string
            required: false
            description: "Provider code (BNYM, BLOOMBERG, etc.)"
          - name: provider-account
            type: string
            required: false
          - name: provider-bic
            type: string
            required: false
          # Dependencies
          - name: depends-on
            type: string_list
            required: false
            description: "URLs of resources this depends on"
          # Config
          - name: config
            type: json
            required: false
        produces:
          type: lifecycle_instance
          resolved: false
        returns:
          type: uuid
          name: instance_id
          capture: true

      activate:
        description: "Activate a lifecycle resource instance"
        invocation_phrases:
          - "activate lifecycle"
          - "start lifecycle"
          - "make lifecycle active"
          - "enable lifecycle"
          - "go live with lifecycle"
          - "bring resource instance online"
          - "activate provisioned resource"
          - "transition lifecycle to active"
          - "mark resource as live"
          - "turn on lifecycle instance"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: ACTIVE
            activated_at: now()
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: instance_id
        returns:
          type: affected

      suspend:
        description: "Suspend a lifecycle resource instance"
        invocation_phrases:
          - "suspend lifecycle"
          - "pause lifecycle"
          - "put lifecycle on hold"
          - "deactivate lifecycle temporarily"
          - "freeze lifecycle"
          - "suspend resource instance"
          - "halt service lifecycle processing"
          - "temporarily disable lifecycle resource"
          - "pause custody resource instance"
          - "place lifecycle on suspension"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: SUSPENDED
            suspended_at: now()
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: instance_id
          - name: reason
            type: string
            required: false
        returns:
          type: affected

      decommission:
        description: "Decommission a lifecycle resource instance"
        invocation_phrases:
          - "decommission lifecycle"
          - "retire lifecycle"
          - "end lifecycle"
          - "decommission service lifecycle"
          - "sunset lifecycle"
          - "terminate resource instance"
          - "wind down lifecycle resource"
          - "offboard lifecycle instance"
          - "retire provisioned resource"
          - "decommission custody resource"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: update
          table: cbu_lifecycle_instances
          schema: ob-poc
          key: instance_id
          set_values:
            status: DECOMMISSIONED
            decommissioned_at: now()
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: instance_id
          - name: reason
            type: string
            required: false
        returns:
          type: affected

      list-instances:
        description: "List lifecycle resource instances for a CBU"
        invocation_phrases:
          - "list lifecycle instances"
          - "show lifecycle instances"
          - "get active instances"
          - "display lifecycle instances"
          - "what resources are provisioned"
          - "show provisioned resources for CBU"
          - "which lifecycle instances are active"
          - "enumerate resource instances"
          - "view CBU resource provisioning status"
          - "list all provisioned lifecycle resources"
        metadata:
          tier: reference
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_lifecycle_instances
          schema: ob-poc
          fk_col: cbu_id
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: resource-type
            type: string
            required: false
            maps_to: resource_type_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set

      # =========================================================================
      # GAP ANALYSIS OPERATIONS
      # =========================================================================

      analyze-gaps:
        description: "Analyze lifecycle provisioning gaps for a CBU"
        invocation_phrases:
          - "analyze lifecycle gaps"
          - "find gaps in lifecycle"
          - "lifecycle gap analysis"
          - "identify missing lifecycle steps"
          - "what is missing for onboarding"
          - "run provisioning gap analysis"
          - "show unprovisioned resources"
          - "which resources still need setup"
          - "check for missing custody resources"
          - "find lifecycle provisioning shortfalls"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleAnalyzeGapsOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: scope
            type: string
            required: false
            default: ALL
            valid_values:
              - ALL
              - SECURITIES
              - DERIVATIVES
              - NEW
        returns:
          type: record_set
          description: |
            Returns gaps grouped by universe entry:
            [
              {
                instrument_class: "EQUITY",
                market: "XLON",
                missing_lifecycles: [],
                missing_resources: [
                  { code: "SAFEKEEPING_ACCOUNT", prompt: "..." }
                ]
              }
            ]

      check-readiness:
        description: "Check if CBU is ready to trade an instrument"
        invocation_phrases:
          - "check lifecycle readiness"
          - "is lifecycle ready"
          - "lifecycle readiness check"
          - "verify lifecycle prerequisites"
          - "can this CBU trade equities"
          - "check service readiness for instrument"
          - "are all resources provisioned"
          - "validate readiness to go live"
          - "is the CBU ready to trade"
          - "assess onboarding completeness"
        metadata:
          tier: diagnostics
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleCheckReadinessOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: instrument-class
            type: lookup
            required: true
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: market
            type: lookup
            required: false
            lookup:
              table: markets
              entity_type: market
              schema: custody
              code_column: mic
              id_column: market_id
          - name: counterparty
            type: uuid
            required: false
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        returns:
          type: record
          description: "{ ready: bool, blocking_gaps: [...], warnings: [...] }"

      # =========================================================================
      # PROVISIONING PLAN OPERATIONS
      # =========================================================================

      generate-plan:
        description: "Generate DSL provisioning plan for lifecycle gaps"
        invocation_phrases:
          - "generate lifecycle plan"
          - "create lifecycle plan"
          - "plan lifecycle rollout"
          - "lifecycle implementation plan"
          - "build onboarding plan for CBU"
          - "generate provisioning roadmap"
          - "create resource setup plan"
          - "draft lifecycle provisioning steps"
          - "plan service resource deployment"
          - "produce lifecycle onboarding template"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleGeneratePlanOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: user-responses
            type: json
            required: false
            description: "User responses to gap prompts"
        returns:
          type: record
          description: |
            {
              dsl_statements: [...],
              pending_prompts: [...],
              ready_to_execute: bool
            }

      execute-plan:
        description: "Execute a provisioning plan"
        invocation_phrases:
          - "execute lifecycle plan"
          - "run lifecycle plan"
          - "implement lifecycle plan"
          - "start lifecycle execution"
          - "apply provisioning plan"
          - "execute onboarding plan steps"
          - "run resource provisioning batch"
          - "deploy lifecycle resources"
          - "carry out lifecycle plan"
          - "provision resources from plan"
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleExecutePlanOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: plan
            type: json
            required: true
          - name: dry-run
            type: boolean
            required: false
            default: false
        returns:
          type: record

      # =========================================================================
      # DISCOVERY OPERATIONS
      # =========================================================================

      discover:
        description: "Discover all lifecycles and resources for an instrument"
        invocation_phrases:
          - "discover lifecycles"
          - "find applicable lifecycles"
          - "which lifecycles apply"
          - "lifecycle discovery"
          - "what servicing is needed for IRS"
          - "discover required lifecycle resources"
          - "explore lifecycles for instrument class"
          - "identify mandatory service lifecycles"
          - "what custody workflows apply"
          - "map lifecycles to instrument"
        metadata:
          tier: composite
          source_of_truth: workflow
          scope: cbu
          noun: lifecycle
          phase_tags: [monitoring]
        behavior: plugin
        plugin:
          handler: LifecycleDiscoverOp
        args:
          - name: instrument-class
            type: lookup
            required: true
            lookup:
              table: instrument_classes
              entity_type: instrument_class
              schema: custody
              code_column: code
              id_column: class_id
          - name: include-optional
            type: boolean
            required: false
            default: false
        returns:
          type: record
          description: |
            {
              instrument_class: "IRS",
              requires_isda: true,
              mandatory_lifecycles: [
                { code: "CONFIRMATION", resources: [...] },
                { code: "COLLATERAL_VM", resources: [...] }
              ],
              optional_lifecycles: [...]
            }

      # =========================================================================
      # VISUALIZATION OPERATIONS
      # =========================================================================
