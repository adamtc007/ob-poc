domains:
  onboarding:
    description: "Automated onboarding orchestration"
    verbs:
      auto-complete:
        flavour: attribute_mutating
        description: "Automatically progress onboarding by generating and executing DSL for missing entities"
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: workflow
          scope: cbu
          noun: onboarding
          tags: [onboarding]
          subject_kinds: [cbu]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
          - "auto-complete onboarding"
          - "finish onboarding automatically"
          - "generate missing onboarding steps"
          - "complete CBU setup automatically"
          - "fill in remaining onboarding"
          - "auto-generate missing entities"
          - "progress onboarding to completion"
          - "run auto-complete for structure"
        behavior: plugin
        plugin:
          handler: OnboardingAutoCompleteOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            description: "The CBU to auto-complete onboarding for"
            lookup:
              entity_type: cbu
              table: cbus
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: max-steps
            type: integer
            required: false
            default: 20
            description: "Maximum number of entities to create in one run"
          - name: dry-run
            type: boolean
            required: false
            default: false
            description: "If true, return generated DSL without executing"
          - name: target-stage
            type: string
            required: false
            description: "Optional: stop when this stage is complete (e.g., 'kyc_case', 'trading_profile')"
        returns:
          type: record
          description: "Summary of actions taken or DSL generated"
        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: reviewable

      compile-data-request:
        flavour: instance_adding
        description: "Compile a frozen service-resource data dictionary for a deal onboarding request"
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request
          tags: [onboarding, service-resource]
          subject_kinds: [deal_onboarding_request]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
          - "compile onboarding data request"
          - "build service resource data dictionary"
          - "prepare resource owner data request"
          - "freeze onboarding resource requirements"
        behavior: plugin
        handler: CompileDataRequestOp
        args:
          - name: onboarding-request-id
            type: uuid
            required: true
            lookup:
              entity_type: deal_onboarding_request
              table: deal_onboarding_requests
              schema: ob-poc
              search_key: request_id
              primary_key: request_id
        returns:
          type: record
          description: "Compiled data request summary"
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: onboarding-request-id
          target_workspace: onboarding_request
          target_slot: onboarding_data_request

      dispatch-ready-slices:
        flavour: attribute_mutating
        description: "Dispatch all ready service-resource data request slices to resource owners"
        effect_class: read_modify_write
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request
          tags: [onboarding, service-resource]
          phase_tags: [onboarding]
          side_effects: outbox_write
        invocation_phrases:
          - "dispatch ready onboarding slices"
          - "dispatch the ready slices"
          - "send ready resource owner requests"
          - "send the ready resource owner requests"
          - "send out the ready owner requests"
          - "forward ready owner requests"
          - "dispatch resource owner data requests"
          - "release ready slices to resource owners"
          - "kick off ready owner provisioning"
        behavior: plugin
        handler: DispatchReadySlicesOp
        args:
          - name: data-request-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: data-request-id
          target_workspace: onboarding_request
          target_slot: onboarding_data_request

      cancel-data-request:
        flavour: discretionary
        effect_class: read_modify_write
        role_guard:
          any_of: [onboarding_admin, ops_admin, mlro]
        audit_class: onboarding_data_request_cancel
        description: "Cancel all open slices for an onboarding data request"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request
          tags: [onboarding, service-resource]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
          - "cancel onboarding data request"
          - "stand down all resource owner requests"
        behavior: plugin
        handler: CancelDataRequestOp
        args:
          - name: data-request-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: data-request-id
          target_workspace: onboarding_request
          target_slot: onboarding_data_request

      cancel-slice:
        flavour: discretionary
        effect_class: read_modify_write
        role_guard:
          any_of: [onboarding_admin, ops_admin, mlro]
        audit_class: onboarding_data_request_slice_cancel
        description: "Cancel one open onboarding data request slice"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request_slice
          tags: [onboarding, service-resource]
          phase_tags: [onboarding]
          side_effects: state_write
        invocation_phrases:
          - "cancel onboarding data request slice"
          - "stand down this resource owner request"
        behavior: plugin
        handler: CancelSliceOp
        args:
          - name: slice-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: slice-id
          target_workspace: onboarding_request
          target_slot: onboarding_data_request_slice

      get-data-request:
        effect_class: read_snapshot
        flavour: attribute_mutating
        description: "Read one onboarding data request"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request
          side_effects: facts_only
        invocation_phrases:
          - "get onboarding data request"
          - "show data request"
        behavior: plugin
        handler: GetDataRequestOp
        args:
          - name: data-request-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: benign

      list-data-requests:
        effect_class: read_snapshot
        flavour: attribute_mutating
        description: "List onboarding data requests"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request
          side_effects: facts_only
        invocation_phrases:
          - "list onboarding data requests"
          - "show resource owner data requests"
        behavior: plugin
        handler: ListDataRequestsOp
        args:
          - name: cbu-id
            type: uuid
            required: false
          - name: status
            type: string
            required: false
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: benign

      list-slices:
        effect_class: read_snapshot
        flavour: attribute_mutating
        description: "List slices for an onboarding data request"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request_slice
          side_effects: facts_only
        invocation_phrases:
          - "list onboarding data request slices"
          - "show resource owner slices"
        behavior: plugin
        handler: ListSlicesOp
        args:
          - name: data-request-id
            type: uuid
            required: true
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: benign

      get-slice:
        effect_class: read_snapshot
        flavour: attribute_mutating
        description: "Read one onboarding data request slice"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request_slice
          side_effects: facts_only
        invocation_phrases:
          - "get onboarding data request slice"
          - "show resource owner slice"
        behavior: plugin
        handler: GetSliceOp
        args:
          - name: slice-id
            type: uuid
            required: true
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: benign

      get-slice-attrs:
        effect_class: read_snapshot
        flavour: attribute_mutating
        description: "List frozen attributes for an onboarding data request slice"
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: onboarding_data_request_attr
          side_effects: facts_only
        invocation_phrases:
          - "get onboarding data request attributes"
          - "show frozen slice attributes"
        behavior: plugin
        handler: GetSliceAttrsOp
        args:
          - name: slice-id
            type: uuid
            required: true
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: benign
