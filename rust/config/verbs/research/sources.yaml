domains:
  research.sources:
    description: Research source loader management - list, search, and fetch from pluggable sources

    invocation_hints:
      - "research source"
      - "data source"
      - "registry lookup"
      - "external source"
      - "which sources"

    verbs:
      list:
        flavour: attribute_mutating
        description: List all available research sources
        invocation_phrases:
          - "list research sources"
          - "what sources are available"
          - "which registries can you access"
          - "show data sources"
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: research_source
          tags: [read, meta, source-discovery]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: plugin
        handler: SourceListOp
        returns:
          type: record_set

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      info:
        flavour: attribute_mutating
        description: Get information about a specific research source
        invocation_phrases:
          - "tell me about this source"
          - "source capabilities"
          - "what can this source provide"
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: research_source
          tags: [read, meta, source-info]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: plugin
        handler: SourceInfoOp
        args:
          - name: source-id
            type: string
            required: true
            description: Source identifier (gleif, companies-house, sec-edgar)
            valid_values:
              - gleif
              - companies-house
              - sec-edgar
        returns:
          type: record

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      search:
        flavour: attribute_mutating
        description: Search a specific source for entities by name
        invocation_phrases:
          - "search source for"
          - "find in source"
          - "look up in"
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: entity_search_result
          tags: [read, external-source, registry-lookup]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: plugin
        handler: SourceSearchOp
        args:
          - name: source-id
            type: string
            required: true
            description: Source to search
          - name: query
            type: string
            required: true
            description: Entity name or search query
          - name: jurisdiction
            type: string
            required: false
            description: Jurisdiction filter (ISO 3166-1 alpha-2)
          - name: limit
            type: integer
            required: false
            default: 20
            description: Maximum results
          - name: include-inactive
            type: boolean
            required: false
            default: false
            description: Include inactive/dissolved entities
        returns:
          type: record_set

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      fetch:
        flavour: attribute_mutating
        description: Fetch entity data from a source by its key
        invocation_phrases:
          - "fetch from source"
          - "get record from"
          - "import from source"
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: entity_data
          tags: [read, external-source, registry-fetch]
          phase_tags: [onboarding]
          side_effects: state_write
        behavior: plugin
        handler: SourceFetchOp
        args:
          - name: source-id
            type: string
            required: true
            description: Source to fetch from
          - name: key
            type: string
            required: true
            description: Source-specific key (LEI, company number, CIK)
          - name: include-raw
            type: boolean
            required: false
            default: false
            description: Include raw API response
          - name: decision-id
            type: uuid
            required: false
            description: Research decision ID for audit trail
        returns:
          type: record

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      find-for-jurisdiction:
        flavour: attribute_mutating
        description: Find the best source for a jurisdiction and data type
        invocation_phrases:
          - "which source for"
          - "best source for jurisdiction"
          - "find source for"
        metadata:
          tier: diagnostics
          source_of_truth: external
          scope: global
          noun: research_source
          tags: [read, meta, source-routing]
          phase_tags: [onboarding]
          side_effects: facts_only
        behavior: plugin
        handler: SourceFindForJurisdictionOp
        args:
          - name: jurisdiction
            type: string
            required: true
            description: Jurisdiction code (ISO 3166-1 alpha-2)
          - name: data-type
            type: string
            required: true
            description: Type of data needed
            valid_values:
              - entity
              - control-holders
              - officers
              - parent-chain
              - subsidiaries
              - filings
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
