# Collateral Management Verbs (Pilot P.3 — 2026-04-23)
#
# Per-mandate collateral management config lifecycle per pass-3 §3.3.
# Captures WHICH CSAs are in play, collateral schedule, thresholds
# (MTA, minimum transfer amount), triparty arrangements — NOT the
# runtime margin call events (VM, IM posting flows) which are
# layer-3 operational.
#
# State machine: collateral_management_lifecycle (4 states).
#   configured → active → suspended → active → terminated
#
# Product gate: activated_by [product.derivatives, product.collateral_mgmt]
# Cross-slot constraint: collateral_management.active requires
#   isda_framework.is_active = true (per DAG §3 cross_slot_constraints).

domains:
  collateral-management:
    description: "Per-mandate collateral / CSA config lifecycle (derivatives)"
    invocation_hints:
      - collateral
      - CSA
      - margin
      - collateral management
      - triparty
      - MTA
      - collateral schedule
    verbs:

      configure:
        description: "Configure collateral management for a CBU (entry state)"
        invocation_phrases:
          - "configure collateral"
          - "set up collateral management"
          - "new collateral config"
          - "configure CSA operations"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: collateral_management
          subject_kinds: [cbu, trading_profile]
          phase_tags: [preferences_set]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: cbu
            type: uuid
            required: true
          - name: csa-reference
            type: uuid
            required: true
            description: "Reference to the ISDA/CSA that backs this collateral arrangement"
          - name: threshold
            type: decimal
            required: false
          - name: minimum-transfer-amount
            type: decimal
            required: false
          - name: triparty-agent
            type: string
            required: false
        returns:
          type: uuid
          name: collateral_management_id
          capture: true
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: "(new)"
                to: configured

      activate:
        description: "Activate collateral management (configured → active)"
        invocation_phrases:
          - "activate collateral"
          - "go live on collateral"
          - "start collateral management"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: collateral_management
          subject_kinds: [collateral_management]
          phase_tags: [preferences_set, parallel_run]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: collateral-management
            type: uuid
            required: true
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: configured
                to: active
        transition_args:
          entity_id_arg: collateral-management
          target_workspace: instrument_matrix
          target_slot: collateral_management

      suspend:
        description: "Suspend collateral operations (operational hold)"
        invocation_phrases:
          - "suspend collateral"
          - "pause collateral management"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: collateral_management
          subject_kinds: [collateral_management]
          phase_tags: [operational]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: collateral-management
            type: uuid
            required: true
          - name: reason
            type: string
            required: false
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: active
                to: suspended
        transition_args:
          entity_id_arg: collateral-management
          target_workspace: instrument_matrix
          target_slot: collateral_management

      reactivate:
        description: "Reactivate suspended collateral (suspended → active)"
        invocation_phrases:
          - "reactivate collateral"
          - "resume collateral"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: collateral_management
          subject_kinds: [collateral_management]
          phase_tags: [operational]
          side_effects: state_write
          harm_class: reversible
        behavior: plugin
        args:
          - name: collateral-management
            type: uuid
            required: true
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: suspended
                to: active
        transition_args:
          entity_id_arg: collateral-management
          target_workspace: instrument_matrix
          target_slot: collateral_management

      terminate:
        description: "Terminate collateral management (terminal)"
        invocation_phrases:
          - "terminate collateral"
          - "unwind collateral"
          - "close collateral"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: collateral_management
          subject_kinds: [collateral_management]
          phase_tags: [archive, terminate]
          side_effects: state_write
          harm_class: irreversible
        behavior: plugin
        args:
          - name: collateral-management
            type: uuid
            required: true
          - name: reason
            type: string
            required: false
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
          transitions:
            dag: instrument_matrix_dag
            edges:
              - from: active
                to: terminated
              - from: suspended
                to: terminated
        transition_args:
          entity_id_arg: collateral-management
          target_workspace: instrument_matrix
          target_slot: collateral_management
