domains:
  deal:
    description: "Deal Record management - commercial origination hub for sales, contracting, and onboarding"

    invocation_hints:
      - "deal"
      - "opportunity"
      - "sales"
      - "client onboarding"
      - "rate card"
      - "negotiation"

    verbs:
      # =========================================================================
      # DEAL CRUD
      # =========================================================================

      create:
        description: "Create a new deal record for a sales opportunity"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "create deal"
          - "new deal"
          - "create sales opportunity"
          - "open new deal"
          - "start deal"
          - "create client deal"
          - "set up a new deal"
          - "register a sales opportunity"
          - "open a deal for this client"
          - "start a new commercial deal"
          - "create a deal record"
          - "kick off a new deal"
          - "new mandate from the client"
          - "log a new sales opportunity"
          - "we've got a new prospect"
          - "start the commercial process"
          - "new IMA deal"
          - "create a custody deal"
        args:
          - name: deal-name
            type: string
            required: true
            maps_to: deal_name
            description: "Name of the deal"
          - name: primary-client-group-id
            type: uuid
            required: true
            maps_to: primary_client_group_id
            description: "Client group ID (e.g., Allianz, BlackRock)"
            lookup:
              table: client_group
              entity_type: client_group
              schema: ob-poc
              search_key: canonical_name
              primary_key: id
          - name: deal-reference
            type: string
            required: false
            maps_to: deal_reference
            description: "Internal deal tracking reference"
          - name: sales-owner
            type: string
            required: false
            maps_to: sales_owner
            description: "Lead sales contact"
          - name: sales-team
            type: string
            required: false
            maps_to: sales_team
            description: "Sales team/desk"
          - name: estimated-revenue
            type: decimal
            required: false
            maps_to: estimated_revenue
            description: "Estimated annual revenue"
          - name: currency-code
            type: string
            required: false
            maps_to: currency_code
            default: "USD"
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: deal_id
          capture: true
        outputs:
          - name: created_deal_id
            type: uuid
            entity_kind: deal
            description: ID of the newly created deal

      read-record:
        description: "Read the primary deal record by ID"
        behavior: crud
        crud:
          operation: select
          table: deals
          schema: ob-poc
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "get deal"
          - "show deal by id"
          - "show deal record by id"
          - "show me deal by id"
          - "show me deal record by id"
          - "deal details"
          - "view deal by id"
          - "read this deal"
          - "show the current deal record"
          - "what's the status of the deal"
          - "what is the deal status"
          - "check deal status"
          - "pull up the deal"
          - "give me the deal details"
          - "where does the deal stand"
          - "show me this deal"
          - "what's happening with the deal"
          - "deal progress"
          - "how is the deal going"
          - "what stage is the deal at"
          - "check on this deal"
          - "deal status check"
          - "what's the current state of this deal"
          - "look up this deal"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
        returns:
          type: record

      list:
        description: "List deals with optional filters"
        behavior: crud
        crud:
          operation: select
          table: v_deal_summary
          schema: ob-poc
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "list deals"
          - "show deals"
          - "show me deals"
          - "show me deal records"
          - "show me deal record"
          - "show me deal pipeline"
          - "all deals"
          - "deals for client"
          - "my deals"
          - "show me the deal pipeline"
          - "what deals do we have"
          - "list all active deals"
          - "show the sales pipeline"
          - "what's in the pipeline"
        args:
          - name: client-group-id
            type: uuid
            required: false
            maps_to: primary_client_group_id
          - name: status
            type: string
            required: false
            maps_to: deal_status
            valid_values:
              [
                PROSPECT,
                QUALIFYING,
                NEGOTIATING,
                KYC_CLEARANCE,
                CONTRACTED,
                ONBOARDING,
                ACTIVE,
                WINDING_DOWN,
                OFFBOARDED,
                CANCELLED,
              ]
          - name: sales-owner
            type: string
            required: false
            maps_to: sales_owner
        returns:
          type: record_set

      search-records:
        description: "Search deal records by name or reference"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "search deals"
          - "find deal"
          - "lookup deal"
        args:
          - name: query
            type: string
            required: true
            description: "Search term for deal name or reference"
        returns:
          type: record_set

      update-record:
        description: "Update primary deal record fields"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "update deal"
          - "modify deal"
          - "edit deal"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: deal-name
            type: string
            required: false
            maps_to: deal_name
          - name: sales-owner
            type: string
            required: false
            maps_to: sales_owner
          - name: estimated-revenue
            type: decimal
            required: false
            maps_to: estimated_revenue
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: affected

      update-status:
        description: "Transition deal status with lifecycle validation, including pre-contract KYC clearance"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "update deal status"
          - "change deal status"
          - "move deal to"
          - "advance deal"
          - "progress deal"
          - "change the deal stage"
          - "move this deal forward"
          - "mark this deal as negotiated"
          - "move this deal into onboarding"
          - "advance the commercial status"
          - "move the deal to approved"
          - "transition the deal status"
          - "promote the deal to the next stage"
          - "set this deal to contracted"
          - "mark deal as active"
          - "push the deal to qualifying"
          - "approve the deal"
          - "push deal to next stage"
          - "advance this deal to the next phase"
          - "change the deal phase"
          - "progress the deal forward"
          - "escalate the deal to onboarding"
          - "move deal status to contracted"
          - "update the deal pipeline stage"
          - "close the deal"
          - "agree the commercial terms"
          - "move to contracted"
          - "kick off onboarding for this deal"
          - "the deal is signed move it forward"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: new-status
            type: string
            required: true
            maps_to: deal_status
            valid_values:
              [
                PROSPECT,
                QUALIFYING,
                NEGOTIATING,
                KYC_CLEARANCE,
                CONTRACTED,
                ONBOARDING,
                ACTIVE,
                WINDING_DOWN,
                OFFBOARDED,
                CANCELLED,
              ]
        returns:
          type: affected

      cancel:
        description: "Cancel a deal (soft delete - sets status to CANCELLED)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: irreversible
        invocation_phrases:
          - "cancel deal"
          - "abort deal"
          - "close deal as lost"
          - "kill this deal"
          - "deal is dead"
          - "we lost this one"
          - "client walked away cancel the deal"
          - "pull the plug on this deal"
          - "mark this deal as lost"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: reason
            type: string
            required: true
            description: "Cancellation reason"
        returns:
          type: affected

      # =========================================================================
      # DEAL PARTICIPANTS
      # =========================================================================

      add-participant:
        description: "Add a participating entity (regional LEI) to a deal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_participant
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add participant to deal"
          - "add entity to deal"
          - "add contracting party"
          - "add deal participant"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: search_name
              primary_key: entity_id
          - name: participant-role
            type: string
            required: false
            maps_to: participant_role
            default: "CONTRACTING_PARTY"
            valid_values:
              [
                CONTRACTING_PARTY,
                GUARANTOR,
                INTRODUCER,
                INVESTMENT_MANAGER,
                FUND_ADMIN,
              ]
          - name: lei
            type: string
            required: false
            maps_to: lei
            description: "LEI of the participating entity"
          - name: is-primary
            type: boolean
            required: false
            maps_to: is_primary
            default: false
        returns:
          type: affected

      remove-participant:
        description: "Remove a participant from a deal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_participant
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove participant from deal"
          - "remove deal participant"
          - "delete participant"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
          - name: participant-role
            type: string
            required: false
            maps_to: participant_role
        returns:
          type: affected

      list-participants:
        description: "List all participants in a deal"
        behavior: crud
        crud:
          operation: select
          table: deal_participants
          schema: ob-poc
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_participant
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "list deal participants"
          - "show deal participants"
          - "who is in the deal"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
        returns:
          type: record_set

      # =========================================================================
      # DEAL PRODUCTS (Commercial Scope)
      # =========================================================================
      # Products must be added to a deal BEFORE rate cards can be created.
      # This establishes the DAG: Deal → Products → Rate Cards

      add-product:
        description: "Add a product to the deal's commercial scope"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_product
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add product to deal"
          - "include product in deal"
          - "deal covers product"
          - "add service to deal"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: product-id
            type: uuid
            required: true
            maps_to: product_id
            lookup:
              table: products
              entity_type: product
              schema: ob-poc
              search_key: name
              primary_key: product_id
          - name: product-status
            type: string
            required: false
            maps_to: product_status
            default: "PROPOSED"
            valid_values: [PROPOSED, NEGOTIATING, AGREED, DECLINED, REMOVED]
          - name: indicative-revenue
            type: decimal
            required: false
            maps_to: indicative_revenue
            description: "Estimated annual revenue for this product"
          - name: currency-code
            type: string
            required: false
            maps_to: currency_code
            default: "USD"
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: deal_product_id
          capture: true

      update-product-status:
        description: "Update the status of a product in the deal scope"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_product
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "update deal product status"
          - "agree product"
          - "decline product"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: product-id
            type: uuid
            required: true
            maps_to: product_id
          - name: product-status
            type: string
            required: true
            maps_to: product_status
            valid_values: [PROPOSED, NEGOTIATING, AGREED, DECLINED, REMOVED]
        returns:
          type: affected

      remove-product:
        description: "Remove a product from the deal scope (sets status to REMOVED)"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_product
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove product from deal"
          - "drop product from deal"
          - "exclude product"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: product-id
            type: uuid
            required: true
            maps_to: product_id
        returns:
          type: affected

      list-products:
        description: "List all products in the deal's commercial scope"
        behavior: crud
        crud:
          operation: select
          table: deal_products
          schema: ob-poc
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_product
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "list deal products"
          - "show deal products"
          - "what products in deal"
          - "deal scope"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: status
            type: string
            required: false
            maps_to: product_status
            valid_values: [PROPOSED, NEGOTIATING, AGREED, DECLINED, REMOVED]
        returns:
          type: record_set

      # =========================================================================
      # DEAL CONTRACTS
      # =========================================================================

      add-contract:
        description: "Link a service contract to a deal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_contract
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add contract to deal"
          - "link contract to deal"
          - "attach contract"
          - "sign the IMA"
          - "link the agreement to this deal"
          - "contract is signed attach it"
          - "hook the contract up to the deal"
          - "associate this MSA with the deal"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: contract-id
            type: uuid
            required: true
            maps_to: contract_id
          - name: contract-role
            type: string
            required: false
            maps_to: contract_role
            default: "PRIMARY"
            valid_values: [PRIMARY, ADDENDUM, SCHEDULE, SIDE_LETTER, NDA]
          - name: sequence-order
            type: integer
            required: false
            maps_to: sequence_order
        returns:
          type: affected

      remove-contract:
        description: "Unlink a contract from a deal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_contract
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove contract from deal"
          - "unlink contract"
          - "detach contract"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: contract-id
            type: uuid
            required: true
            maps_to: contract_id
        returns:
          type: affected

      list-contracts:
        description: "List all contracts linked to a deal"
        behavior: crud
        crud:
          operation: select
          table: deal_contracts
          schema: ob-poc
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_contract
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: facts_only
          harm_class: read_only
        invocation_phrases:
          - "list deal contracts"
          - "show contracts for deal"
          - "deal agreements"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
        returns:
          type: record_set

      # =========================================================================
      # RATE CARDS
      # =========================================================================

      create-rate-card:
        description: "Create a negotiated rate card for a product within a deal"
        behavior: plugin
        lifecycle:
          precondition_checks:
            - "requires_prior:deal.create"
            - "requires_prior:deal.add-product"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: deal_rate_card
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "create deal rate card"
          - "new rate card for deal"
          - "create pricing for deal"
          - "add rate card to deal"
          - "set up the rate card"
          - "set up rate card for custody services"
          - "create a fee schedule for this deal"
          - "build the rate card"
          - "start a new rate card for this product"
          - "set up pricing for custody"
          - "create a pricing schedule"
          - "set up the fee card for this product"
          - "build a fee schedule for custody"
          - "create the pricing card"
          - "set up custody pricing"
          - "create rate card for this service"
          - "new fee schedule"
          - "start the rate card for fund accounting"
          - "add pricing for this deal product"
        args:
          - name: deal-id
            type: uuid
            required: true
            maps_to: deal_id
          - name: contract-id
            type: uuid
            required: true
            maps_to: contract_id
          - name: product-id
            type: uuid
            required: true
            maps_to: product_id
            lookup:
              table: products
              entity_type: product
              schema: ob-poc
              search_key: name
              primary_key: product_id
          - name: rate-card-name
            type: string
            required: false
            maps_to: rate_card_name
          - name: effective-from
            type: date
            required: true
            maps_to: effective_from
          - name: effective-to
            type: date
            required: false
            maps_to: effective_to
        returns:
          type: uuid
          name: rate_card_id
          capture: true

      add-rate-card-line:
        description: "Add a fee line to a rate card"
        behavior: plugin
        lifecycle:
          precondition_checks:
            - "requires_prior:deal.create-rate-card"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: rate_card_line
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "add rate card line"
          - "add fee line"
          - "add pricing line"
          - "add fee to rate card"
          - "add a pricing row"
          - "insert a fee row on the rate card"
          - "add a charge line to this rate card"
        args:
          - name: rate-card-id
            type: uuid
            required: true
            maps_to: rate_card_id
          - name: fee-type
            type: string
            required: true
            maps_to: fee_type
            description: "Fee type (e.g., CUSTODY, FUND_ACCOUNTING, TA, FX, SETTLEMENT)"
          - name: fee-subtype
            type: string
            required: false
            maps_to: fee_subtype
            default: "DEFAULT"
          - name: pricing-model
            type: string
            required: true
            maps_to: pricing_model
            valid_values:
              [BPS, FLAT, PER_TRANSACTION, TIERED, SPREAD, MINIMUM_FEE]
          - name: rate-value
            type: decimal
            required: false
            maps_to: rate_value
            description: "BPS or per-unit rate"
          - name: minimum-fee
            type: decimal
            required: false
            maps_to: minimum_fee
          - name: maximum-fee
            type: decimal
            required: false
            maps_to: maximum_fee
          - name: currency-code
            type: string
            required: false
            maps_to: currency_code
            default: "USD"
          - name: tier-brackets
            type: json
            required: false
            maps_to: tier_brackets
            description: "Tiered pricing brackets as JSON array"
          - name: fee-basis
            type: string
            required: false
            maps_to: fee_basis
            valid_values: [AUM, NAV, TRADE_COUNT, POSITION_COUNT]
          - name: description
            type: string
            required: false
            maps_to: description
        returns:
          type: uuid
          name: line_id
          capture: true

      update-rate-card-line:
        description: "Modify an existing rate card line"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: rate_card_line
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: reversible
        invocation_phrases:
          - "update rate card line"
          - "modify fee line"
          - "change rate"
        args:
          - name: line-id
            type: uuid
            required: true
            maps_to: line_id
          - name: rate-value
            type: decimal
            required: false
            maps_to: rate_value
          - name: minimum-fee
            type: decimal
            required: false
            maps_to: minimum_fee
          - name: maximum-fee
            type: decimal
            required: false
            maps_to: maximum_fee
          - name: tier-brackets
            type: json
            required: false
            maps_to: tier_brackets
        returns:
          type: affected

      remove-rate-card-line:
        description: "Remove a fee line from a rate card"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: rate_card_line
          subject_kinds: [deal]
          phase_tags: [deal]
          side_effects: state_write
          harm_class: destructive
        invocation_phrases:
          - "remove rate card line"
          - "delete fee line"
