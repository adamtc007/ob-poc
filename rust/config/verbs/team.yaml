domains:
  team:
    description: "Team and organizational unit management"

    verbs:
      # =========================================================================
      # TEAM LIFECYCLE
      # =========================================================================

      create:
        flavour: instance_adding
        description: "Create a new team with delegated authority"
        effect_class: append_fact
        invocation_phrases:
          - "create team"
          - "new team"
          - "add team"
          - "set up team"
          - "register team"
          - "create a service team"
          - "provision new operations team"
          - "establish team for fund ops"
          - "set up client service team"
          - "build new custody team"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: insert
          table: teams
          schema: ob-poc
          returning: team_id
        args:
          - name: name
            type: string
            required: true
            maps_to: name
          - name: team-type
            type: string
            required: true
            maps_to: team_type
            valid_values: [fund-ops, manco-oversight, im-trading, spv-admin, client-service, accounting, reporting, board, investment-committee, conducting-officers, executive]
          - name: delegating-entity
            type: uuid
            required: true
            maps_to: delegating_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: authority-type
            type: string
            required: true
            maps_to: authority_type
            valid_values: [operational, oversight, trading, administrative, governance]
          - name: access-mode
            type: string
            required: true
            maps_to: access_mode
            valid_values: [explicit, by-manco, by-im, by-filter]
          - name: authority-scope
            type: json
            required: false
            maps_to: authority_scope
        produces:
          binding: team
          type: uuid

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      read:
        flavour: attribute_mutating
        description: "Read team details"
        effect_class: read_snapshot
        invocation_phrases:
          - "show team"
          - "get team details"
          - "view team"
          - "describe team"
          - "team info"
          - "what team is this"
          - "display team configuration"
          - "look up service team"
          - "fetch team summary"
          - "show team structure and authority"
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: facts_only
        behavior: crud
        crud:
          operation: select
          table: teams
          schema: ob-poc
          key: team_id
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      archive:
        flavour: attribute_mutating
        description: "Archive team (soft delete)"
        effect_class: read_modify_write
        invocation_phrases:
          - "archive team"
          - "deactivate team"
          - "retire team"
          - "remove team"
          - "close team"
          - "shut down the operations team"
          - "wind down service team"
          - "sunset this team"
          - "discontinue team access"
          - "disable team and memberships"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: teams
          schema: ob-poc
          key: team_id
          set_values:
            is_active: false
            archived_at: now()
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: reason
            type: string
            required: true
            maps_to: archive_reason

      # =========================================================================
      # MEMBERSHIP
      # =========================================================================

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      add-member:
        flavour: instance_adding
        description: "Add user to team with role"
        effect_class: idempotent_ensure
        invocation_phrases:
          - "add team member"
          - "add member to team"
          - "assign person to team"
          - "join team"
          - "add user to team"
          - "onboard analyst to the team"
          - "assign relationship manager to team"
          - "enroll user in service team"
          - "include user on operations team"
          - "put this person on the team"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: memberships
          schema: ob-poc
          conflict_keys: [team_id, user_id, role_key]
          returning: membership_id
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: user
            type: uuid
            required: true
            maps_to: user_id
            lookup:
              table: clients
              entity_type: user
              schema: ob-poc
              search_key: email
              primary_key: client_id
          - name: role
            type: string
            required: true
            maps_to: role_key
            description: "Role key: {team-type}.{function}:{level}"
          - name: effective-from
            type: date
            required: false
            maps_to: effective_from
          - name: effective-to
            type: date
            required: false
            maps_to: effective_to
        produces:
          binding: membership
          type: uuid

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      remove-member:
        flavour: attribute_mutating
        description: "Remove user from team (specific role)"
        effect_class: read_modify_write
        invocation_phrases:
          - "remove team member"
          - "remove member from team"
          - "unassign from team"
          - "leave team"
          - "remove user from team"
          - "take analyst off the team"
          - "drop member from operations team"
          - "revoke team membership"
          - "offboard user from service team"
          - "end team membership for user"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: delete
          table: memberships
          schema: ob-poc
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: user
            type: uuid
            required: true
            maps_to: user_id
            lookup:
              table: clients
              entity_type: user
              schema: ob-poc
              search_key: email
              primary_key: client_id
          - name: role
            type: string
            required: true
            maps_to: role_key
            description: "Role key to remove"

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      update-member:
        flavour: attribute_mutating
        description: "Update member's role key"
        effect_class: read_modify_write
        invocation_phrases:
          - "update team member"
          - "change member role"
          - "modify team membership"
          - "update member permissions"
          - "change team member role"
          - "promote team member to lead"
          - "adjust analyst role on team"
          - "edit membership role assignment"
          - "reassign member role within team"
          - "set new role for team member"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: memberships
          schema: ob-poc
          key: membership_id
        args:
          - name: membership
            type: uuid
            required: true
            maps_to: membership_id
          - name: new-role
            type: string
            required: true
            maps_to: role_key

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      transfer-member:
        flavour: attribute_mutating
        description: "Move user from one team to another (end old, create new)"
        effect_class: read_modify_write
        invocation_phrases:
          - "transfer team member"
          - "move member to another team"
          - "transfer between teams"
          - "reassign team member"
          - "move analyst to different team"
          - "relocate user across teams"
          - "switch team for this member"
          - "migrate member to new team"
          - "transfer user from ops to trading"
          - "move relationship manager between teams"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: plugin
        handler: team_transfer_member
        args:
          - name: from-team
            type: uuid
            required: true
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: to-team
            type: uuid
            required: true
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: user
            type: uuid
            required: true
            lookup:
              table: clients
              entity_type: user
              schema: ob-poc
              search_key: email
              primary_key: client_id
          - name: new-role
            type: string
            required: true

      # =========================================================================
      # GOVERNANCE MEMBERSHIP (Part 6)
      # =========================================================================

        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: reviewable
      add-governance-member:
        flavour: instance_adding
        description: "Add governance member with optional legal appointment link"
        effect_class: idempotent_ensure
        invocation_phrases:
          - "add governance member"
          - "assign governance role"
          - "add governance access"
          - "grant governance membership"
          - "appoint conducting officer to board"
          - "register governance participant"
          - "add user to investment committee"
          - "assign board member role"
          - "enroll conducting officer"
          - "provision governance team access"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: memberships
          schema: ob-poc
          conflict_keys: [team_id, user_id, role_key]
          returning: membership_id
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: user
            type: uuid
            required: true
            maps_to: user_id
            lookup:
              table: clients
              entity_type: user
              schema: ob-poc
              search_key: email
              primary_key: client_id
          - name: role
            type: string
            required: true
            maps_to: role_key
            description: "Governance role key: governance.{function}:{level}"
          - name: legal-appointment
            type: uuid
            required: false
            maps_to: legal_appointment_id
            description: "Link to cbu_entity_roles record"
          - name: requires-legal-link
            type: boolean
            required: false
            maps_to: requires_legal_appointment
            description: "Flag to require legal appointment"
        produces:
          binding: membership
          type: uuid

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      add-cbu-access:
        flavour: instance_adding
        description: "Add CBU to team's explicit access list"
        effect_class: idempotent_ensure
        invocation_phrases:
          - "grant CBU access"
          - "add CBU access to team"
          - "assign CBU to team"
          - "allow team to access CBU"
          - "give team access to structure"
          - "link team to client business unit"
          - "authorize team for this CBU"
          - "enable CBU visibility for team"
          - "provision team CBU permissions"
          - "connect team to fund structure"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: team_cbu_access
          schema: ob-poc
          conflict_keys: [team_id, cbu_id]
          returning: access_id
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
          - name: cbu
            type: uuid
            required: true
            maps_to: cbu_id
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      remove-cbu-access:
        flavour: attribute_mutating
        description: "Remove CBU from team's access"
        effect_class: read_modify_write
        invocation_phrases:
          - "revoke CBU access"
          - "remove CBU access from team"
          - "unassign CBU from team"
          - "deny team CBU access"
          - "withdraw team access to structure"
          - "block team from this CBU"
          - "disconnect team from fund"
          - "disable CBU visibility for team"
          - "take away team CBU permissions"
          - "terminate team access to unit"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: delete
          table: team_cbu_access
          schema: ob-poc
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
          - name: cbu
            type: uuid
            required: true
            maps_to: cbu_id

      # =========================================================================
      # ENTITLEMENTS
      # =========================================================================

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      grant-service:
        flavour: attribute_mutating
        description: "Grant service entitlement to team"
        effect_class: idempotent_ensure
        invocation_phrases:
          - "grant service to team"
          - "add service access"
          - "assign service to team"
          - "enable service for team"
          - "provision client portal access"
          - "allow reporting portal for team"
          - "give team repair queue access"
          - "entitle team to trade instruction"
          - "turn on service permissions"
          - "activate service entitlement for team"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: upsert
          table: team_service_entitlements
          schema: ob-poc
          conflict_keys: [team_id, service_code]
          returning: entitlement_id
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: service
            type: string
            required: true
            maps_to: service_code
            valid_values: [client-portal, reporting-portal, repair-queue, trade-instruction]
          - name: config
            type: json
            required: false
            maps_to: config
        produces:
          binding: entitlement
          type: uuid

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      revoke-service:
        flavour: discretionary
        effect_class: read_modify_write
        role_guard:
          any_of: [compliance_admin, senior_compliance, mlro]
        audit_class: team_revoke_service
        description: "Revoke service entitlement"
        invocation_phrases:
          - "revoke service from team"
          - "remove service access"
          - "disable service for team"
          - "unassign service"
          - "take away portal access"
          - "withdraw reporting entitlement"
          - "turn off service for team"
          - "block team from repair queue"
          - "terminate service permissions"
          - "deactivate team service entitlement"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: delete
          table: team_service_entitlements
          schema: ob-poc
        args:
          - name: team
            type: uuid
            required: true
            maps_to: team_id
            lookup:
              table: teams
              entity_type: team
              schema: ob-poc
              search_key: name
              primary_key: team_id
          - name: service
            type: string
            required: true
            maps_to: service_code

  # ===========================================================================
  # USER DOMAIN
  # ===========================================================================

  user:
    description: "User lifecycle management"

    verbs:
      create:
        flavour: instance_adding
        description: "Create portal user"
        effect_class: append_fact
        invocation_phrases:
          - "create user"
          - "new user"
          - "add user"
          - "register user"
          - "set up user account"
          - "provision portal user"
          - "onboard new analyst account"
          - "create relationship manager account"
          - "add a new team member account"
          - "register custody operations user"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: insert
          table: clients
          schema: ob-poc
          returning: client_id
        args:
          - name: email
            type: string
            required: true
            maps_to: email
          - name: name
            type: string
            required: true
            maps_to: name
          - name: employer
            type: uuid
            required: false
            maps_to: employer_entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: identity-provider
            type: string
            required: false
            maps_to: identity_provider
            default: local
        produces:
          binding: user
          type: uuid

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      suspend:
        flavour: discretionary
        effect_class: read_modify_write
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: user_suspend
        description: "Suspend user access"
        invocation_phrases:
          - "suspend user"
          - "deactivate user"
          - "disable user account"
          - "lock user"
          - "freeze user access"
          - "temporarily block user login"
          - "put user account on hold"
          - "pause user portal access"
          - "suspend analyst permissions"
          - "lock out this team member"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: clients
          schema: ob-poc
          key: client_id
          set_values:
            status: SUSPENDED
        args:
          - name: user
            type: uuid
            required: true
            maps_to: client_id

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      reactivate:
        flavour: attribute_mutating
        description: "Reactivate suspended user"
        effect_class: read_modify_write
        invocation_phrases:
          - "reactivate user"
          - "re-enable user"
          - "restore user access"
          - "unlock user"
          - "unsuspend user"
          - "bring user account back online"
          - "reinstate suspended analyst"
          - "resume user portal access"
          - "activate user account again"
          - "lift user suspension"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: clients
          schema: ob-poc
          key: client_id
          set_values:
            status: ACTIVE
        args:
          - name: user
            type: uuid
            required: true
            maps_to: client_id

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
      offboard:
        flavour: attribute_mutating
        description: "Offboard user completely (left company)"
        effect_class: read_modify_write
        invocation_phrases:
          - "offboard user"
          - "remove user"
          - "terminate user access"
          - "user offboarding"
          - "decommission user"
          - "process user leaver"
          - "close user account permanently"
          - "complete offboarding for analyst"
          - "revoke all access for departed user"
          - "finalize user departure"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: team
          phase_tags: [administration]
          side_effects: state_write
        behavior: crud
        crud:
          operation: update
          table: clients
          schema: ob-poc
          key: client_id
          set_values:
            status: OFFBOARDED
        args:
          - name: user
            type: uuid
            required: true
            maps_to: client_id
            lookup:
              table: clients
              entity_type: user
              schema: ob-poc
              search_key: email
              primary_key: client_id
          - name: reason
            type: string
            required: true
            maps_to: offboard_reason
            valid_values: [resigned, terminated, retired, deceased, other]
          - name: notes
            type: string
            required: false
            maps_to: offboard_notes

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
