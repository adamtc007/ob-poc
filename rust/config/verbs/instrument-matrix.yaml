# Instrument Matrix Domain Verbs
# =============================================================================
# Attachment and initialisation operations for the CBU instrument matrix.
# These verbs bootstrap the instrument matrix structure for a CBU, making it
# ready for instrument setup (equity, fixed income, etc.) and trading-profile
# configuration.
# =============================================================================

domains:
  instrument-matrix:
    description: "Instrument matrix attachment and initialisation"

    verbs:

      attach:
        flavour: instance_adding
        description: "Attach (bootstrap) an instrument matrix to a CBU, creating a draft trading profile if one does not exist. Idempotent."
        effect_class: idempotent_ensure
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: instrument_matrix
          tags: [lifecycle, write, idempotent, onboarding]
          phase_tags: [onboarding, configuring]
          side_effects: state_write
        invocation_phrases:
          - "attach instrument matrix to CBU"
          - "initialise instrument matrix"
          - "bootstrap instrument matrix"
          - "set up instrument matrix for CBU"
          - "create instrument matrix"
          - "wire instrument matrix to structure"
          - "attach IM to CBU"
          - "initialise trading profile structure"
          - "create trading profile for CBU"
          - "bootstrap the instrument matrix"
          - "set up IM for onboarding"
          - "prepare instrument matrix"
          - "attach matrix to onboarding unit"
        behavior: plugin
        plugin:
          handler: InstrumentMatrixAttachOp
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: template
            type: string
            required: false
            description: "Template code for the initial instrument universe (e.g. LUX_SICAV, IE_UCITS). Defaults to CBU-category-derived template."
        returns:
          type: record
          description: "{ trading_profile_id: uuid, created: bool }"
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: cbu-id
          target_workspace: instrument_matrix
          target_slot: cbu
