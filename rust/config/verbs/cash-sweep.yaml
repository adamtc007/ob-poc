# Cash Sweep Configuration Verbs
# =============================================================================
# Manages cash sweep and STIF configuration
# =============================================================================

domains:
  cash-sweep:
    description: "Cash sweep and STIF configuration management"
    verbs:
      configure:
        flavour: attribute_mutating
        description: Configure cash sweep for currency
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "configure cash sweep"
        - "set up cash sweep"
        - "create cash sweep configuration"
        - "add STIF sweep"
        - "configure overnight sweep"
        - "set up money market sweep"
        - "create sweep for currency"
        - "add cash management sweep"
        behavior: crud
        crud:
          operation: upsert
          table: cbu_cash_sweep_config
          schema: ob-poc
          conflict_keys:
          - cbu_id
          - currency
          returning: sweep_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: profile-id
          type: uuid
          required: false
          maps_to: profile_id
          lookup:
            table: cbu_trading_profiles
            schema: ob-poc
            search_key: profile_id
            primary_key: profile_id
        - name: currency
          type: string
          required: true
          maps_to: currency
        - name: threshold-amount
          type: decimal
          required: true
          maps_to: threshold_amount
        - name: vehicle-type
          type: string
          required: true
          maps_to: vehicle_type
          valid_values:
          - STIF
          - MMF
          - DEPOSIT
          - OVERNIGHT_REPO
          - TRI_PARTY_REPO
          - MANUAL
        - name: vehicle-id
          type: string
          required: false
          maps_to: vehicle_id
        - name: vehicle-name
          type: string
          required: false
          maps_to: vehicle_name
        - name: sweep-time
          type: string
          required: true
          maps_to: sweep_time
          description: Time in HH:MM format
        - name: sweep-timezone
          type: string
          required: true
          maps_to: sweep_timezone
          description: IANA timezone (e.g., Europe/Luxembourg)
        - name: sweep-frequency
          type: string
          required: false
          default: DAILY
          maps_to: sweep_frequency
          valid_values:
          - INTRADAY
          - DAILY
          - WEEKLY
          - MONTHLY
        - name: interest-allocation
          type: string
          required: false
          default: ACCRUED
          maps_to: interest_allocation
          valid_values:
          - ACCRUED
          - MONTHLY
          - QUARTERLY
          - REINVEST
        - name: effective-date
          type: date
          required: false
          maps_to: effective_date
        returns:
          type: uuid
          name: sweep_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      link-resource:
        flavour: instance_adding
        description: Link sweep config to cash management resource
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "link sweep to resource"
        - "connect sweep to cash resource"
        - "assign resource to sweep"
        - "attach cash resource to sweep"
        - "map sweep to resource instance"
        - "bind sweep configuration to resource"
        - "associate sweep with cash resource"
        - "link cash sweep resource"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        - name: sweep-resource-id
          type: uuid
          required: true
          maps_to: sweep_resource_id
          lookup:
            table: cbu_resource_instances
            entity_type: resource_instance
            schema: ob-poc
            search_key: instance_name
            primary_key: instance_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      list:
        flavour: attribute_mutating
        description: List cash sweep configurations for CBU
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list cash sweeps"
        - "show sweep configurations"
        - "what sweeps are configured"
        - "display cash sweep settings"
        - "get sweep configs for structure"
        - "show active cash sweeps"
        - "list STIF configurations"
        - "view sweep setup for CBU"
        behavior: crud
        crud:
          operation: list_by_fk
          table: cbu_cash_sweep_config
          schema: ob-poc
          fk_col: cbu_id
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: is-active
          type: boolean
          required: false
          default: true
          maps_to: is_active
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      update-threshold:
        flavour: attribute_mutating
        description: Update sweep threshold amount
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "update sweep threshold"
        - "change cash sweep amount"
        - "modify sweep threshold"
        - "adjust minimum sweep balance"
        - "set new sweep threshold"
        - "change sweep trigger amount"
        - "update minimum cash balance"
        - "modify sweep cutoff amount"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        - name: threshold-amount
          type: decimal
          required: true
          maps_to: threshold_amount
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update-timing:
        flavour: attribute_mutating
        description: Update sweep timing
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "update sweep timing"
        - "change sweep schedule"
        - "modify sweep time"
        - "adjust sweep frequency"
        - "change when sweep runs"
        - "update sweep to daily"
        - "set sweep timezone"
        - "reschedule cash sweep"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        - name: sweep-time
          type: string
          required: false
          maps_to: sweep_time
        - name: sweep-timezone
          type: string
          required: false
          maps_to: sweep_timezone
        - name: sweep-frequency
          type: string
          required: false
          maps_to: sweep_frequency
          valid_values:
          - INTRADAY
          - DAILY
          - WEEKLY
          - MONTHLY
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      change-vehicle:
        flavour: attribute_mutating
        description: Change sweep investment vehicle
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "change sweep vehicle"
        - "switch to different STIF"
        - "change money market fund"
        - "update sweep investment vehicle"
        - "switch sweep to overnight repo"
        - "change cash sweep destination"
        - "move sweep to new vehicle"
        - "update sweep fund"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        - name: vehicle-type
          type: string
          required: true
          maps_to: vehicle_type
          valid_values:
          - STIF
          - MMF
          - DEPOSIT
          - OVERNIGHT_REPO
          - TRI_PARTY_REPO
          - MANUAL
        - name: vehicle-id
          type: string
          required: false
          maps_to: vehicle_id
        - name: vehicle-name
          type: string
          required: false
          maps_to: vehicle_name
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
            escalation:
              - name: non_standard_vehicle
                when:
                  op: arg_in
                  arg: vehicle-type
                  values: ["OVERNIGHT_REPO", "TRI_PARTY_REPO", "MANUAL"]
                tier: requires_confirmation
                reason: "Non-standard cash-sweep vehicle — risk profile differs from approved STIF/MMF defaults."

      suspend:
        flavour: discretionary
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: cash_sweep_suspend
        description: Suspend cash sweep
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "suspend cash sweep"
        - "pause sweep"
        - "deactivate cash sweep"
        - "turn off sweep"
        - "disable sweep for now"
        - "halt cash sweep"
        - "put sweep on hold"
        - "stop sweep temporarily"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
          set_values:
            is_active: false
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      reactivate:
        flavour: attribute_mutating
        description: Reactivate cash sweep
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "reactivate cash sweep"
        - "turn sweep back on"
        - "re-enable sweep"
        - "resume cash sweep"
        - "restart sweep"
        - "bring sweep back online"
        - "activate sweep again"
        - "unsuspend cash sweep"
        behavior: crud
        crud:
          operation: update
          table: cbu_cash_sweep_config
          schema: ob-poc
          key: sweep_id
          set_values:
            is_active: true
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      remove:
        flavour: attribute_mutating
        description: Remove cash sweep configuration
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: cash_sweep
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "remove cash sweep"
        - "delete sweep configuration"
        - "remove sweep setup"
        - "drop cash sweep config"
        - "eliminate sweep"
        - "remove sweep for currency"
        - "delete sweep entry"
        - "clear cash sweep configuration"
        behavior: crud
        crud:
          operation: delete
          table: cbu_cash_sweep_config
          schema: ob-poc
        args:
        - name: sweep-id
          type: uuid
          required: true
          maps_to: sweep_id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: requires_confirmation
