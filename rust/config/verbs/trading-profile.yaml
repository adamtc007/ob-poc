domains:
  trading-profile:
    description: "Trading profile document management - single source of truth for CBU trading configuration"
    invocation_hints:
    - trading profile
    - trading setup
    - trading configuration
    - ISDA
    - CSA
    - counterparty
    - instruments
    - markets
    verbs:
      import:
        description: Import a trading profile document from YAML/JSON file or inline content
        behavior: plugin
        handler: import_trading_profile
        invocation_phrases:
        - "import trading profile"
        - "load trading profile"
        - "import profile for"
        - "upload trading mandate document"
        - "ingest trading profile YAML"
        - "bring in trading configuration"
        - "load custody mandate profile"
        - "import mandate from file"
        - "load profile from JSON"
        - "import trading setup document"
        - "upload trading mandate"
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [lifecycle, authoring]
          phase_tags: [trading]
          side_effects: state_write
        args:
        - name: cbu-id
          type: uuid
          required: true
          maps_to: cbu_id
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: file-path
          type: string
          required: false
          description: Path to YAML/JSON file containing the trading profile
        - name: document
          type: json
          required: false
          description: Inline JSON document (alternative to file-path)
        - name: version
          type: integer
          required: false
          default: 1
          description: Version number for the profile
        - name: status
          type: string
          required: false
          default: DRAFT
          valid_values:
          - DRAFT
          - VALIDATED
          - PENDING_REVIEW
          - ACTIVE
          - SUPERSEDED
          - ARCHIVED
        - name: notes
          type: string
          required: false
          description: Import notes
        returns:
          type: uuid
          name: profile_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      read:
        description: Read a trading profile by ID
        behavior: crud
        invocation_phrases:
        - "show trading profile"
        - "get trading profile"
        - "read trading profile"
        - "display trading mandate details"
        - "view profile configuration"
        - "fetch trading profile by ID"
        - "what does this mandate contain"
        - "retrieve trading profile record"
        - "look up trading profile"
        - "show mandate setup"
        - "show trading matrix"
        - "display trading profile"
        - "view trading profile"
        metadata:
          tier: diagnostics
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [read]
          phase_tags: [trading]
          side_effects: facts_only
        crud:
          operation: select
          table: cbu_trading_profiles
          schema: ob-poc
        args:
        - name: profile-id
          type: uuid
          required: true
          maps_to: profile_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      get-active:
        description: Get the active trading profile for a CBU
        behavior: plugin
        handler: get_active_trading_profile
        invocation_phrases:
        - "get active profile"
        - "show active trading profile"
        - "current trading profile"
        - "which mandate is live"
        - "show current trading configuration"
        - "what profile is active now"
        - "display live trading mandate"
        - "fetch active mandate for CBU"
        - "get production trading profile"
        - "show live profile version"
        metadata:
          tier: diagnostics
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [read, lookup]
          phase_tags: [trading]
          side_effects: facts_only
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-versions:
        description: List all versions of trading profiles for a CBU
        invocation_phrases:
        - "list trading profile versions"
        - "show profile version history"
        - "view all profile versions"
        - "list profile revisions"
        - "show trading history"
        - "get version history"
        - "list CBU profile versions"
        - "show profile changelog"
        - "how many mandate versions exist"
        - "display all trading profile drafts"
        behavior: crud
        metadata:
          tier: diagnostics
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [read, versioning]
          phase_tags: [trading]
          side_effects: facts_only
        crud:
          operation: list_by_fk
          table: cbu_trading_profiles
          schema: ob-poc
          fk_col: cbu_id
          order_by: version DESC
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      activate:
        description: |
          DEPRECATED — use trading-profile.go-live instead.

          Legacy verb that directly transitioned APPROVED → ACTIVE. The pilot
          P.2 lifecycle refactor introduced parallel_run as an explicit state
          between approved and active: APPROVED → PARALLEL_RUN → ACTIVE via
          enter-parallel-run + go-live respectively.

          Retained for backward compatibility with the existing
          activate_trading_profile handler; new code should route through
          trading-profile.enter-parallel-run → trading-profile.go-live.

          Tier tightened to match go-live: requires_explicit_authorisation
          (live mandate activation has same blast radius regardless of path).
        invocation_phrases:
        - "activate trading profile"
        - "make profile active"
        - "activate this version"
        - "switch to active profile"
        - "enable trading profile"
        - "set profile as active"
        - "activate CBU profile"
        - "put mandate into production"
        - "promote profile to live"
        behavior: plugin
        handler: activate_trading_profile
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [lifecycle, activation, deprecated]
          phase_tags: [trading]
          side_effects: state_write
          status: deprecated
          replaced_by: "trading-profile.go-live"
          since_version: "0.1"
          removal_version: "1.0"
        args:
        - name: profile-id
          type: uuid
          required: true
          description: The profile to activate
        - name: activated-by
          type: string
          required: false
          description: User who activated the profile
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      materialize:
        description: Materialize trading profile to operational tables (universe, SSIs, booking rules)
        behavior: plugin
        handler: materialize_trading_profile
        invocation_phrases:
        - "materialize trading profile"
        - "materialize profile"
        - "sync trading profile"
        - "deploy profile"
        - "apply trading profile"
        - "push mandate to operational tables"
        - "project profile to universe and SSIs"
        - "sync profile to custody tables"
        - "deploy trading configuration live"
        - "write profile to settlement tables"
        metadata:
          tier: composite
          source_of_truth: matrix
          scope: cbu
          writes_operational: true
          noun: trading_matrix
          tags: [projection, sync, critical]
          phase_tags: [trading]
          side_effects: state_write
        lifecycle:
          writes_tables:
          - custody.cbu_instrument_universe
          - custody.cbu_ssi
          - custody.ssi_booking_rules
          - custody.isda_agreements
          - custody.csa_agreements
        args:
        - name: profile-id
          type: uuid
          required: true
          description: The profile to materialize
        - name: sections
          type: string_list
          required: false
          description: "Sections to materialize (default: all). Options: universe, ssis, booking_rules, isda, subcustodians"
        - name: dry-run
          type: boolean
          required: false
          default: false
          description: If true, show what would be created without actually creating
        - name: force
          type: boolean
          required: false
          default: false
          description: If true, overwrite existing records instead of skipping
        returns:
          type: record
          description: Materialization result with counts of records created/updated/deleted
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      diff:
        description: Compare two trading profile versions
        invocation_phrases:
        - "diff trading profiles"
        - "compare profiles"
        - "show profile differences"
        - "compare two versions"
        - "what changed between"
        - "diff profile versions"
        - "show profile delta"
        - "highlight mandate differences"
        - "what is different between versions"
        - "compare trading profile changes"
        behavior: plugin
        handler: diff_trading_profiles
        metadata:
          tier: diagnostics
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [read, versioning, comparison]
          phase_tags: [trading]
          side_effects: facts_only
        args:
        - name: profile-id-1
          type: uuid
          required: true
          description: First profile to compare
        - name: profile-id-2
          type: uuid
          required: true
          description: Second profile to compare
        returns:
          type: record
          description: Diff result showing additions, removals, and changes

      # =========================================================================
      # DOCUMENT CONSTRUCTION VERBS
      # These verbs modify the JSONB document directly (source of truth)
      # =========================================================================
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      create-draft:
        description: Create a new draft trading profile for a CBU (use clone-to to copy from existing)
        invocation_phrases:
        - "create draft profile"
        - "start new profile draft"
        - "create trading draft"
        - "new profile version"
        - "draft new profile"
        - "start profile edit"
        - "create draft from active"
        - "begin profile changes"
        - "open new mandate draft"
        - "initialize trading profile draft"
        - "create a trading profile"
        - "new trading profile"
        - "create trading profile"
        behavior: plugin
        handler: create_draft_trading_profile
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [lifecycle, authoring]
          phase_tags: [trading]
          side_effects: state_write
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
        - name: notes
          type: string
          required: false
          description: Notes about this draft
        returns:
          type: uuid
          name: profile_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      clone-to:
        description: Clone a trading profile to another CBU, creating a new DRAFT profile
        invocation_phrases:
        - "clone profile to CBU"
        - "copy trading profile"
        - "clone profile"
        - "duplicate profile to"
        - "copy profile to new CBU"
        - "replicate trading setup"
        - "clone configuration"
        - "copy to target CBU"
        - "duplicate mandate to another structure"
        - "replicate trading mandate across CBUs"
        behavior: plugin
        handler: clone_trading_profile_to_cbu
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [lifecycle, authoring, cloning]
          phase_tags: [trading]
          side_effects: state_write
        args:
        - name: profile-id
          type: uuid
          required: true
          description: Source profile to clone from
        - name: target-cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
          description: Target CBU to clone the profile to
        - name: cloned-by
          type: string
          required: false
          description: User or system that performed the clone
        - name: adapt-base-currency
          type: string
          required: false
          description: Optionally change the base currency in the cloned profile
        - name: include-isda
          type: boolean
          required: false
          default: true
          description: Include ISDA agreements (may need counterparty adjustment)
        - name: notes
          type: string
          required: false
          description: Notes about the cloned profile
        returns:
          type: uuid
          name: profile_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      create-new-version:
        description: Create a new draft version from the current ACTIVE profile. Used when modifying a live trading matrix.
        invocation_phrases:
        - "create new profile version"
        - "version this profile"
        - "bump profile version"
        - "new version from current"
        - "create version"
        - "increment profile version"
        - "save as new version"
        - "draft revision of active mandate"
        - "fork new version from live"
        - "create amendment to trading profile"
        behavior: plugin
        handler: create_new_version_trading_profile
        metadata:
          tier: intent
          source_of_truth: matrix
          scope: cbu
          noun: trading_matrix
          tags: [lifecycle, authoring, versioning]
          phase_tags: [trading]
          side_effects: state_write
        args:
        - name: cbu-id
          type: uuid
          required: true
          lookup:
            table: cbus
            entity_type: cbu
            schema: ob-poc
            search_key: name
            primary_key: cbu_id
          description: CBU to create new version for (must have an ACTIVE profile)
        - name: created-by
          type: string
          required: false
          description: User or system creating the new version
        - name: notes
          type: string
          required: false
          description: Notes about why a new version is being created
        returns:
          type: uuid
          name: profile_id
          capture: true
          description: The new DRAFT profile ID (version = previous + 1)

      # --- Universe Section ---
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

