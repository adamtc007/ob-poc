domains:
  client-principal-relationship:
    description: "Client-principal-offering relationship management — tracks which clients are linked with which principals for which offerings"

    invocation_hints:
      - "relationship"
      - "client principal"
      - "booking relationship"
      - "onboarding relationship"

    verbs:
      record:
        flavour: attribute_mutating
        description: "Record a new client-principal-offering relationship"
        behavior: plugin
        lifecycle:
          precondition_checks:
            - "requires_prior:booking-principal.create"
            - "requires_scope:client_group"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: client_principal_relationship
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
          - "record relationship"
          - "create booking relationship"
          - "link client to principal"
          - "add client principal relationship"
        args:
          - name: client-group-id
            type: uuid
            required: true
            maps_to: client_group_id
            description: "Client group"
            lookup:
              table: client_group
              entity_type: client_group
              schema: ob-poc
              search_key: canonical_name
              primary_key: id
          - name: booking-principal-id
            type: uuid
            required: true
            maps_to: booking_principal_id
          - name: product-offering-id
            type: uuid
            required: true
            maps_to: product_offering_id
            description: "Product offering to onboard"
          - name: contract-ref
            type: string
            required: false
            maps_to: contract_ref
            description: "Contract reference"
        returns:
          type: record
          name: relationship

        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: reviewable
      terminate:
        flavour: discretionary
        role_guard:
          any_of: [compliance_officer, senior_compliance, mlro]
        audit_class: client_principal_relationship_terminate
        description: "Terminate an active client-principal relationship"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: client_principal_relationship
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
          - "terminate relationship"
          - "end booking relationship"
          - "offboard from principal"
        args:
          - name: relationship-id
            type: uuid
            required: true
            maps_to: relationship_id
        returns:
          type: affected
          name: rows_affected

        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: requires_confirmation
      list:
        flavour: attribute_mutating
        description: "List client-principal relationships with optional status filter"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: client_principal_relationship
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
          - "show client relationships"
          - "booking relationships for client"
          - "client principal history"
        args:
          - name: client-group-id
            type: uuid
            required: true
            maps_to: client_group_id
            lookup:
              table: client_group
              entity_type: client_group
              schema: ob-poc
              search_key: canonical_name
              primary_key: id
          - name: status
            type: string
            required: false
            maps_to: status
            description: "Filter by relationship status (active, terminated)"
        returns:
          type: record_set
          name: relationships

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      cross-sell-check:
        flavour: attribute_mutating
        description: "Check cross-sell opportunities — compare existing offerings against available offerings"
        behavior: plugin
        lifecycle:
          precondition_checks:
            - "requires_scope:client_group"
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: cross_sell
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
          - "cross sell check"
          - "cross sell opportunities"
          - "what else can we offer"
          - "check cross sell"
        args:
          - name: client-group-id
            type: uuid
            required: true
            maps_to: client_group_id
            lookup:
              table: client_group
              entity_type: client_group
              schema: ob-poc
              search_key: canonical_name
              primary_key: id
        returns:
          type: record
          name: cross_sell_result
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
