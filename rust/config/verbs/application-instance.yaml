domains:
  application-instance:
    description: Layer 4 application instance lifecycle
    invocation_hints:
      - application instance
      - app instance
      - BNY system instance
      - deployment
    verbs:
      provision:
        description: Provision a new application instance (creates row in PROVISIONED state)
        invocation_phrases:
          - "provision application instance"
          - "provision app instance"
          - "deploy application instance"
          - "create application instance"
          - "set up new instance"
          - "spin up application instance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        crud:
          operation: insert
          table: application_instances
          schema: ob-poc
          returning: id
        args:
          - name: application-id
            type: uuid
            required: true
            maps_to: application_id
            lookup:
              table: applications
              entity_type: application
              schema: ob-poc
              search_key: name
              primary_key: id
          - name: environment
            type: string
            required: true
            maps_to: environment
            description: Deployment environment (prod-eu, prod-us, uat, dev)
          - name: instance-label
            type: string
            required: true
            maps_to: instance_label
            description: Instance label (e.g. CCC-Settlement-2.7-prod-eu)
          - name: notes
            type: string
            required: false
            maps_to: notes
        returns:
          type: uuid
          name: id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      activate:
        description: Activate a provisioned (or offline / maintenance) instance — transition to ACTIVE
        invocation_phrases:
          - "activate application instance"
          - "activate app instance"
          - "bring instance live"
          - "make instance active"
          - "start serving from instance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - PROVISIONED
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: ACTIVE
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance

      enter-maintenance:
        description: Enter maintenance window — pause traffic without retiring bindings
        invocation_phrases:
          - "enter maintenance window"
          - "begin maintenance"
          - "pause instance for maintenance"
          - "schedule maintenance window"
          - "put instance into maintenance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - ACTIVE
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: MAINTENANCE_WINDOW
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
          - name: reason
            type: string
            required: false
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance

      exit-maintenance:
        description: Exit maintenance window — return instance to ACTIVE
        invocation_phrases:
          - "exit maintenance window"
          - "end maintenance"
          - "complete maintenance"
          - "restore instance after maintenance"
          - "resume from maintenance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - MAINTENANCE_WINDOW
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: ACTIVE
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance

      take-offline:
        description: Take instance OFFLINE (operational hold — incident, security freeze, capacity action)
        invocation_phrases:
          - "take instance offline"
          - "offline application instance"
          - "halt instance traffic"
          - "stop serving from instance"
          - "operational hold on instance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - ACTIVE
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: OFFLINE
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
          - name: reason
            type: string
            required: true
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance

      bring-online:
        description: Bring an OFFLINE instance back to ACTIVE
        invocation_phrases:
          - "bring instance online"
          - "online application instance"
          - "restart instance"
          - "resume offline instance"
          - "lift offline hold"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - OFFLINE
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: ACTIVE
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance

      decommission:
        description: Decommission an instance — terminal transition; cascades bindings to RETIRED
        invocation_phrases:
          - "decommission application instance"
          - "retire application instance"
          - "decommission app instance"
          - "permanently retire instance"
          - "sunset application instance"
        behavior: crud
        metadata:
          tier: intent
          source_of_truth: operational
          scope: global
          noun: application_instance
          tags: [lifecycle, write, destructive, platform]
          phase_tags: [lifecycle_resources]
          side_effects: state_write
        lifecycle:
          entity_arg: instance-id
          requires_states:
            - ACTIVE
            - OFFLINE
            - MAINTENANCE_WINDOW
            - DEGRADED
        crud:
          operation: update
          table: application_instances
          schema: ob-poc
          key: id
          set_values:
            lifecycle_status: DECOMMISSIONED
            decommissioned_at: now()
        args:
          - name: instance-id
            type: uuid
            required: true
            maps_to: id
            lookup:
              table: application_instances
              entity_type: application_instance
              schema: ob-poc
              search_key: instance_label
              primary_key: id
          - name: reason
            type: string
            required: true
            maps_to: notes
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
        transition_args:
          entity_id_arg: instance-id
          target_workspace: lifecycle_resources
          target_slot: application_instance
