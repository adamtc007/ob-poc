domains:
  typed-attribute:
    description: Typed attribute value persistence for non-CBU entities
    verbs:
      record:
        flavour: instance_adding
        description: Record a typed attribute value for an entity
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: attribute_value
          phase_tags: [kyc, onboarding]
          side_effects: state_write
        invocation_phrases:
          - "record typed attribute value"
          - "set entity attribute value"
          - "persist attribute for entity"
          - "store typed value for attribute"
          - "write attribute value to typed store"
          - "save entity attribute observation"
        behavior: crud
        crud:
          operation: insert
          table: attribute_values_typed
          schema: ob-poc
          returning: id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: attribute-id
            type: string
            required: true
            maps_to: attribute_id
          - name: attribute-uuid
            type: uuid
            required: true
            maps_to: attribute_uuid
            lookup:
              table: attribute_registry
              entity_type: attribute
              schema: ob-poc
              search_key: id
              primary_key: uuid
          - name: value-text
            type: string
            required: false
            maps_to: value_text
          - name: value-number
            type: decimal
            required: false
            maps_to: value_number
          - name: value-boolean
            type: boolean
            required: false
            maps_to: value_boolean
          - name: value-json
            type: json
            required: false
            maps_to: value_json
          - name: source
            type: json
            required: false
            maps_to: source
        returns:
          type: uuid
          description: The generated row id

        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      get:
        flavour: attribute_mutating
        description: Read the current typed attribute value for an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: attribute_value
          phase_tags: [kyc, onboarding]
          side_effects: facts_only
        invocation_phrases:
          - "get typed attribute value"
          - "read entity attribute"
          - "what is the value of attribute for entity"
          - "look up typed attribute"
        behavior: crud
        crud:
          operation: select
          table: attribute_values_typed
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
          - name: attribute-id
            type: string
            required: true
            maps_to: attribute_id

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      list-for-entity:
        flavour: attribute_mutating
        description: List all typed attribute values for an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: attribute_value
          phase_tags: [kyc, onboarding]
          side_effects: facts_only
        invocation_phrases:
          - "list typed attributes for entity"
          - "show all attribute values for entity"
          - "what attributes does this entity have"
          - "get entity attribute profile"
        behavior: crud
        crud:
          operation: list_by_fk
          table: attribute_values_typed
          schema: ob-poc
          fk_column: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
