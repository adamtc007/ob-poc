domains:
  observation:
    description: Attribute observations from various sources
    verbs:
      record:
        flavour: instance_adding
        description: Record an attribute observation
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "record attribute observation"
          - "log observed value for entity"
          - "capture data point from source"
          - "add observation for attribute"
          - "enter evidence observation"
          - "submit attribute finding"
          - "note observed entity data"
          - "create new observation record"
        behavior: crud
        crud:
          operation: insert
          table: attribute_observations
          schema: ob-poc
          returning: observation_id
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: attribute-id
            type: uuid
            required: true
            maps_to: attribute_id
            lookup:
              table: attribute_registry
              entity_type: attribute
              schema: ob-poc
              search_key: attribute_code
              primary_key: attribute_id
          - name: value-text
            type: string
            required: false
            maps_to: value_text
          - name: value-number
            type: decimal
            required: false
            maps_to: value_number
          - name: value-boolean
            type: boolean
            required: false
            maps_to: value_boolean
          - name: value-date
            type: date
            required: false
            maps_to: value_date
          - name: value-json
            type: json
            required: false
            maps_to: value_json
          - name: source-type
            type: string
            required: true
            maps_to: source_type
          - name: source-document-id
            type: uuid
            required: false
            maps_to: source_document_id
            lookup:
              table: document_catalog
              entity_type: document
              schema: ob-poc
              search_key: document_name
              primary_key: doc_id
          - name: confidence
            type: decimal
            required: false
            maps_to: confidence
          - name: is-authoritative
            type: boolean
            required: false
            maps_to: is_authoritative
          - name: extraction-method
            type: string
            required: false
            maps_to: extraction_method
        returns:
          type: uuid
          name: observation_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      record-from-document:
        flavour: attribute_mutating
        description: Record observation extracted from a document
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "extract observation from document"
          - "record data from document"
          - "capture value from uploaded file"
          - "log attribute from passport"
          - "pull data from submitted document"
          - "document based observation"
          - "observation sourced from evidence"
          - "add finding from document review"
        behavior: plugin
        handler: observation_from_document
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: document-id
            type: uuid
            required: true
            lookup:
              table: document_catalog
              entity_type: document
              schema: ob-poc
              search_key: document_name
              primary_key: doc_id
          - name: attribute
            type: string
            required: true
          - name: value
            type: string
            required: true
          - name: extraction-method
            type: string
            required: false
          - name: confidence
            type: decimal
            required: false
        returns:
          type: uuid
          name: observation_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: reviewable
      supersede:
        flavour: attribute_mutating
        description: Supersede an observation with a newer one
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "supersede old observation"
          - "replace outdated observation"
          - "update observation with newer"
          - "mark observation as superseded"
          - "newer evidence replaces old"
          - "override previous observation"
          - "retire stale observation"
          - "observation has been replaced"
        behavior: crud
        crud:
          operation: update
          table: attribute_observations
          schema: ob-poc
          key: observation_id
          set_values:
            status: SUPERSEDED
            superseded_at: now()
        args:
          - name: observation-id
            type: uuid
            required: true
            maps_to: observation_id
            lookup:
              table: attribute_observations
              entity_type: observation
              schema: ob-poc
              search_key: observation_id
              primary_key: observation_id
          - name: superseded-by
            type: uuid
            required: true
            maps_to: superseded_by
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      list-for-entity:
        flavour: attribute_mutating
        description: List all observations for an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list observations for entity"
          - "show all entity observations"
          - "what observations exist for person"
          - "get observation history"
          - "display entity evidence trail"
          - "pull up all observations"
          - "review entity data points"
          - "observations on file for entity"
        behavior: crud
        crud:
          operation: list_by_fk
          table: attribute_observations
          schema: ob-poc
          fk_col: entity_id
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      list-for-attribute:
        flavour: attribute_mutating
        description: List observations of a specific attribute for an entity
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list observations for attribute"
          - "show attribute observation history"
          - "what values recorded for field"
          - "get observations of specific attribute"
          - "display attribute evidence sources"
          - "observations for this data point"
          - "review attribute across sources"
          - "all recorded values for attribute"
        behavior: crud
        crud:
          operation: select
          table: attribute_observations
          schema: ob-poc
        args:
          - name: entity-id
            type: uuid
            required: true
            maps_to: entity_id
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: attribute-id
            type: uuid
            required: true
            maps_to: attribute_id
            lookup:
              table: attribute_registry
              entity_type: attribute
              schema: ob-poc
              search_key: attribute_code
              primary_key: attribute_id
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      get-current:
        flavour: attribute_mutating
        description: Get current best observation for an attribute
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "get current observation"
          - "what is the latest value"
          - "show best observation for attribute"
          - "current authoritative value"
          - "most recent observation"
          - "fetch active observation"
          - "what do we know about attribute"
          - "latest data point for field"
        behavior: plugin
        handler: observation_get_current
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: attribute
            type: string
            required: true
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      reconcile:
        flavour: attribute_mutating
        description: Compare observations for an attribute and auto-create discrepancies
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "reconcile observations for entity"
          - "compare attribute observations"
          - "find observation conflicts"
          - "check for data discrepancies"
          - "run reconciliation on attribute"
          - "detect conflicting data values"
          - "cross-check observation sources"
          - "auto-detect data mismatches"
        behavior: plugin
        handler: observation_reconcile
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: attribute
            type: string
            required: true
          - name: case-id
            type: uuid
            required: false
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
          - name: auto-create-discrepancies
            type: boolean
            required: false
            default: true
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: &id001
            - emitting
          consequence:
            baseline: reviewable
      verify-allegations:
        flavour: attribute_mutating
        description: Batch verify pending allegations against observations
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: observation
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "verify allegations against observations"
          - "batch check allegations"
          - "validate pending client claims"
          - "run allegation verification"
          - "match allegations to evidence"
          - "confirm or reject allegations"
          - "auto-verify outstanding allegations"
          - "check all allegations for entity"
        behavior: plugin
        handler: observation_verify_allegations
        args:
          - name: cbu-id
            type: uuid
            required: true
            lookup:
              table: cbus
              entity_type: cbu
              schema: ob-poc
              search_key: name
              primary_key: cbu_id
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: case-id
            type: uuid
            required: false
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: *id001
          consequence:
            baseline: reviewable
