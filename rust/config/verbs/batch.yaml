domains:
  batch:
    description: Batch execution control operations for DSL-native batch processing
    verbs:
      pause:
        description: Pause the current batch execution
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "pause the batch"
        - "hold batch processing"
        - "pause bulk operation"
        - "stop batch temporarily"
        - "suspend batch execution"
        - "halt the batch run"
        - "freeze batch processing"
        - "pause current bulk job"
        behavior: plugin
        plugin:
          handler: batch_pause
        args: []
        returns:
          type: batch_control_result
          description: Batch control result with status

      resume:
        description: Resume a paused batch execution
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "resume the batch"
        - "continue batch processing"
        - "restart paused batch"
        - "unpause the batch"
        - "resume bulk operation"
        - "pick up where we left off"
        - "continue the batch run"
        - "resume batch execution"
        behavior: plugin
        plugin:
          handler: batch_resume
        args: []
        returns:
          type: batch_control_result
          description: Batch control result with status

      continue:
        description: Continue batch execution for N more items
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "continue batch for more items"
        - "process next batch items"
        - "do a few more"
        - "run next N items"
        - "continue with more entries"
        - "process additional batch items"
        - "advance batch by count"
        - "step through batch items"
        behavior: plugin
        plugin:
          handler: batch_continue
        args:
        - name: count
          type: integer
          required: false
          default: 1
          description: Number of items to process before pausing again
        returns:
          type: batch_control_result
          description: Batch control result with status

      skip:
        description: Skip the current batch item
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "skip this batch item"
        - "skip current item"
        - "move to next item"
        - "bypass this entry"
        - "skip and continue"
        - "pass on this one"
        - "skip this CBU"
        - "move past current item"
        behavior: plugin
        plugin:
          handler: batch_skip
        args:
        - name: reason
          type: string
          required: false
          description: Reason for skipping the item
        returns:
          type: batch_control_result
          description: Batch control result with status

      abort:
        description: Abort the current batch execution
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "abort the batch"
        - "cancel batch processing"
        - "stop the batch entirely"
        - "kill batch execution"
        - "terminate batch run"
        - "abort bulk operation"
        - "cancel all remaining items"
        - "end batch immediately"
        behavior: plugin
        plugin:
          handler: batch_abort
        args:
        - name: reason
          type: string
          required: false
          description: Reason for aborting
        returns:
          type: batch_control_result
          description: Batch control result with status

      status:
        description: Get the current batch execution status
        metadata:
          tier: diagnostics
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: facts_only
        invocation_phrases:
        - "batch status"
        - "how is the batch doing"
        - "show batch progress"
        - "check batch execution status"
        - "how many items processed"
        - "batch completion percentage"
        - "what is the batch progress"
        - "get bulk operation status"
        behavior: plugin
        plugin:
          handler: batch_status
        args: []
        returns:
          type: batch_control_result
          description: Batch status information

      add-products:
        description: Add products to multiple CBUs in bulk
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: batch
          subject_kinds: []
          phase_tags: [administration]
          side_effects: state_write
        invocation_phrases:
        - "bulk add products to CBUs"
        - "add products to multiple structures"
        - "batch assign products"
        - "add custody products in bulk"
        - "apply products across CBUs"
        - "mass product assignment"
        - "add products to all structures"
        - "bulk product setup"
        behavior: plugin
        plugin:
          handler: batch_add_products
        args:
        - name: cbu-ids
          type: string_list
          required: true
          description: List of CBU IDs to add products to
        - name: products
          type: string_list
          required: true
          description: List of product codes to add
        returns:
          type: batch_control_result
          description: Result with success/failure counts
