domains:
  role:
    description: Entity role reference data (DIRECTOR, UBO, SHAREHOLDER, etc.)
    verbs:
      ensure:
        description: Create or update a role
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: role
          phase_tags: [stewardship]
        invocation_phrases:
          - "add a new entity role"
          - "register role definition"
          - "create role reference entry"
          - "configure a new role type"
          - "set up entity role"
          - "define a role like UBO"
          - "upsert role record"
          - "add role for onboarding"
        behavior: crud
        crud:
          operation: upsert
          table: roles
          schema: ob-poc
          conflict_keys:
            - name
          returning: role_id
        args:
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
        returns:
          type: uuid
          name: role_id
          capture: true

      read:
        description: Read a role by name
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: role
          phase_tags: [stewardship]
        invocation_phrases:
          - "look up role by name"
          - "get role details"
          - "show me this role definition"
          - "fetch role record"
          - "what is this entity role"
          - "read role reference data"
          - "find role by name"
          - "retrieve role information"
        behavior: crud
        crud:
          operation: select
          table: roles
          schema: ob-poc
        args:
          - name: name
            type: string
            required: true
            maps_to: name
        returns:
          type: record

      list:
        description: List all roles
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: role
          phase_tags: [stewardship]
        invocation_phrases:
          - "list all entity roles"
          - "show available roles"
          - "what roles are defined"
          - "display role reference table"
          - "enumerate role types"
          - "get all role records"
          - "which roles can be assigned"
          - "show me the role list"
        behavior: crud
        crud:
          operation: select
          table: roles
          schema: ob-poc
          order_by: name
        args: []
        returns:
          type: record_set

      delete:
        description: Delete a role
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: role
          phase_tags: [stewardship]
        invocation_phrases:
          - "delete a role"
          - "remove role definition"
          - "drop role from reference data"
          - "purge a role record"
          - "remove entity role type"
          - "delete role reference entry"
          - "clean up unused role"
          - "eliminate role record"
        behavior: crud
        crud:
          operation: delete
          table: roles
          schema: ob-poc
        args:
          - name: name
            type: string
            required: true
            maps_to: name
        returns:
          type: void
