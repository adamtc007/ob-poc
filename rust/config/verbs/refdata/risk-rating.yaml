domains:
  risk-rating:
    description: Risk rating reference data (LOW, MEDIUM, HIGH, etc.)
    verbs:
      ensure:
        description: Create or update a risk rating
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: risk_rating
          phase_tags: [kyc]
        invocation_phrases:
          - "add a new risk rating"
          - "register risk rating level"
          - "create risk rating entry"
          - "configure a risk classification"
          - "set up new risk tier"
          - "define risk rating code"
          - "upsert risk rating record"
          - "add KYC risk level"
        behavior: crud
        crud:
          operation: upsert
          table: risk_ratings
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: severity-level
            type: integer
            required: false
            maps_to: severity_level
            default: 0
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read a risk rating by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: risk_rating
          phase_tags: [kyc]
        invocation_phrases:
          - "look up risk rating by code"
          - "get risk rating details"
          - "show me this risk level"
          - "fetch risk rating definition"
          - "what is this risk rating"
          - "read risk classification record"
          - "find risk rating by code"
          - "retrieve risk tier information"
        behavior: crud
        crud:
          operation: select
          table: risk_ratings
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all risk ratings
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: risk_rating
          phase_tags: [kyc]
        invocation_phrases:
          - "list all risk ratings"
          - "show available risk levels"
          - "what risk ratings exist"
          - "display risk classification table"
          - "enumerate risk tier codes"
          - "get all risk rating records"
          - "which risk ratings are active"
          - "show me the risk rating scale"
        behavior: crud
        crud:
          operation: select
          table: risk_ratings
          schema: ob-poc
          order_by: severity_level
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a risk rating
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: risk_rating
          phase_tags: [kyc]
        invocation_phrases:
          - "deactivate a risk rating"
          - "disable this risk level"
          - "retire risk rating code"
          - "turn off a risk tier"
          - "mark risk rating as inactive"
          - "remove risk level from list"
          - "suspend a risk classification"
          - "deprecate this risk rating"
        behavior: crud
        crud:
          operation: update
          table: risk_ratings
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
