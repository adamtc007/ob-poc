domains:
  jurisdiction:
    description: Jurisdiction reference data (US, GB, LU, etc.)
    verbs:
      ensure:
        description: Create or update a jurisdiction
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: jurisdiction
        invocation_phrases:
          - "add a new jurisdiction"
          - "register jurisdiction code"
          - "create jurisdiction reference entry"
          - "configure a new jurisdiction"
          - "set up jurisdiction definition"
          - "define regulatory jurisdiction"
          - "upsert jurisdiction record"
          - "add domicile jurisdiction"
        behavior: crud
        crud:
          operation: upsert
          table: master_jurisdictions
          schema: ob-poc
          conflict_keys:
            - jurisdiction_code
          returning: jurisdiction_code
        args:
          - name: code
            type: string
            required: true
            maps_to: jurisdiction_code
          - name: name
            type: string
            required: true
            maps_to: jurisdiction_name
          - name: country-code
            type: string
            required: true
            maps_to: country_code
          - name: region
            type: string
            required: false
            maps_to: region
          - name: regulatory-framework
            type: string
            required: false
            maps_to: regulatory_framework
          - name: entity-formation-allowed
            type: boolean
            required: false
            maps_to: entity_formation_allowed
            default: true
          - name: offshore
            type: boolean
            required: false
            maps_to: offshore_jurisdiction
            default: false
          - name: regulatory-authority
            type: string
            required: false
            maps_to: regulatory_authority
        returns:
          type: string
          name: jurisdiction_code
          capture: true

      read:
        description: Read a jurisdiction by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: jurisdiction
        invocation_phrases:
          - "look up jurisdiction by code"
          - "get jurisdiction details"
          - "show me this jurisdiction"
          - "fetch jurisdiction definition"
          - "what is this jurisdiction code"
          - "read jurisdiction reference record"
          - "find jurisdiction by country code"
          - "retrieve jurisdiction information"
        behavior: crud
        crud:
          operation: select
          table: master_jurisdictions
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: jurisdiction_code
        returns:
          type: record

      list:
        description: List all jurisdictions
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: jurisdiction
        invocation_phrases:
          - "list all jurisdictions"
          - "show available jurisdictions"
          - "what jurisdictions are configured"
          - "display jurisdiction reference table"
          - "enumerate active domicile codes"
          - "get all jurisdiction records"
          - "which jurisdictions are supported"
          - "show me jurisdictions by region"
        behavior: crud
        crud:
          operation: select
          table: master_jurisdictions
          schema: ob-poc
          order_by: jurisdiction_code
        args:
          - name: region
            type: string
            required: false
            maps_to: region
          - name: offshore
            type: boolean
            required: false
            maps_to: offshore_jurisdiction
        returns:
          type: record_set

      delete:
        description: Delete a jurisdiction
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: jurisdiction
        invocation_phrases:
          - "delete a jurisdiction"
          - "remove jurisdiction record"
          - "drop jurisdiction from reference data"
          - "purge a jurisdiction code"
          - "remove domicile from system"
          - "delete jurisdiction reference entry"
          - "clean up unused jurisdiction"
          - "eliminate jurisdiction record"
        behavior: crud
        crud:
          operation: delete
          table: master_jurisdictions
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: jurisdiction_code
        returns:
          type: void
