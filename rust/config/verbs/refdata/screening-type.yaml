domains:
  screening-type:
    description: Screening type reference data (PEP, SANCTIONS, ADVERSE_MEDIA, etc.)
    verbs:
      ensure:
        description: Create or update a screening type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening_type
          phase_tags: [stewardship]
        invocation_phrases:
          - "add a new screening type"
          - "register screening classification"
          - "create screening type entry"
          - "configure screening category"
          - "set up PEP or sanctions type"
          - "define screening type code"
          - "upsert screening type record"
          - "add compliance screening category"
        behavior: crud
        crud:
          operation: upsert
          table: screening_types
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read a screening type by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: screening_type
          phase_tags: [stewardship]
        invocation_phrases:
          - "look up screening type by code"
          - "get screening type details"
          - "show me this screening type"
          - "fetch screening classification record"
          - "what is this screening type"
          - "read screening type definition"
          - "find screening type by code"
          - "retrieve screening category info"
        behavior: crud
        crud:
          operation: select
          table: screening_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all screening types
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: screening_type
          phase_tags: [stewardship]
        invocation_phrases:
          - "list all screening types"
          - "show available screening categories"
          - "what screening types exist"
          - "display screening classification codes"
          - "enumerate compliance screening types"
          - "get all screening type records"
          - "which screening types are active"
          - "show me the screening type list"
        behavior: crud
        crud:
          operation: select
          table: screening_types
          schema: ob-poc
          order_by: display_order
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a screening type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening_type
          phase_tags: [stewardship]
        invocation_phrases:
          - "deactivate a screening type"
          - "disable this screening classification"
          - "retire screening type code"
          - "turn off a screening category"
          - "mark screening type as inactive"
          - "remove screening type from list"
          - "suspend a screening classification"
          - "deprecate this screening type"
        behavior: crud
        crud:
          operation: update
          table: screening_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
