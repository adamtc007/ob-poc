# Reference Data Bulk Loading Operations
# These verbs load reference data from YAML files into the database

domains:
  refdata:
    description: "Reference data bulk loading operations"
    verbs:
      load-markets:
        description: Load markets from YAML file into custody.markets table
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: bulk_load
          phase_tags: [stewardship]
        invocation_phrases:
          - "load market reference data"
          - "import markets from file"
          - "bulk load market definitions"
          - "populate markets table from YAML"
          - "seed market data from file"
          - "how do I load markets"
          - "upload market reference records"
          - "import exchange data from YAML"
        behavior: plugin
        handler: load_markets_from_yaml
        args:
          - name: file-path
            type: string
            required: true
            description: Path to YAML file containing market definitions
          - name: mode
            type: string
            required: false
            default: UPSERT
            description: "INSERT (fail on conflict), UPSERT (update on conflict), REPLACE (delete all first)"
        returns:
          type: record
          description: Summary of loaded markets

      load-instrument-classes:
        description: Load instrument class taxonomy from YAML into custody.instrument_classes
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: bulk_load
          phase_tags: [stewardship]
        invocation_phrases:
          - "load instrument class taxonomy"
          - "import instrument classes from file"
          - "bulk load asset class definitions"
          - "populate instrument class table"
          - "seed instrument classes from YAML"
          - "upload instrument type reference data"
          - "how do I load instrument classes"
          - "import CFI class taxonomy"
        behavior: plugin
        handler: load_instrument_classes_from_yaml
        args:
          - name: file-path
            type: string
            required: true
            description: Path to YAML file containing instrument class taxonomy
          - name: mode
            type: string
            required: false
            default: UPSERT
        returns:
          type: record
          description: Summary of loaded instrument classes

      load-subcustodians:
        description: Load subcustodian network from YAML into custody.subcustodian_network
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: bulk_load
          phase_tags: [stewardship]
        invocation_phrases:
          - "load subcustodian network data"
          - "import subcustodians from file"
          - "bulk load agent bank network"
          - "populate subcustodian network table"
          - "seed subcustodian data from YAML"
          - "upload local agent bank records"
          - "how do I load subcustodians"
          - "import custody network from file"
        behavior: plugin
        handler: load_subcustodians_from_yaml
        args:
          - name: file-path
            type: string
            required: true
            description: Path to YAML file containing subcustodian network
          - name: mode
            type: string
            required: false
            default: UPSERT
        returns:
          type: record
          description: Summary of loaded subcustodians

      load-sla-templates:
        description: Load SLA templates from YAML into ob-poc.sla_templates
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: bulk_load
          phase_tags: [stewardship]
        invocation_phrases:
          - "load SLA templates from file"
          - "import service level agreements"
          - "bulk load SLA definitions"
          - "populate SLA template table"
          - "seed SLA data from YAML"
          - "upload service level templates"
          - "how do I load SLA templates"
          - "import SLA reference data"
        behavior: plugin
        handler: load_sla_templates_from_yaml
        args:
          - name: file-path
            type: string
            required: true
            description: Path to YAML file containing SLA templates
          - name: mode
            type: string
            required: false
            default: UPSERT
        returns:
          type: record
          description: Summary of loaded SLA templates

      load-all:
        description: Load all reference data from directory
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: bulk_load
          phase_tags: [stewardship]
        invocation_phrases:
          - "load all reference data"
          - "import all refdata from directory"
          - "bulk load everything at once"
          - "populate all reference tables"
          - "seed all reference data"
          - "run full reference data import"
          - "how do I reload all refdata"
          - "initialize all reference data tables"
        behavior: plugin
        handler: load_all_refdata
        args:
          - name: directory
            type: string
            required: true
            description: Directory containing reference data YAML files
          - name: mode
            type: string
            required: false
            default: UPSERT
        returns:
          type: record
          description: Summary of all loaded reference data
