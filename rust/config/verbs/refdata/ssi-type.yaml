domains:
  ssi-type:
    description: SSI type reference data (SECURITIES, CASH, COLLATERAL)
    verbs:
      ensure:
        description: Create or update an SSI type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: ssi_type
          phase_tags: [trading]
        invocation_phrases:
          - "add a new SSI type"
          - "register SSI classification"
          - "create SSI type entry"
          - "configure settlement instruction type"
          - "set up SSI category"
          - "define SSI type code"
          - "upsert SSI type record"
          - "add standing instruction type"
        behavior: crud
        crud:
          operation: upsert
          table: ssi_types
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read an SSI type by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: ssi_type
          phase_tags: [trading]
        invocation_phrases:
          - "look up SSI type by code"
          - "get SSI type details"
          - "show me this SSI type"
          - "fetch SSI type definition"
          - "what is this SSI type"
          - "read SSI type reference record"
          - "find SSI type by code"
          - "retrieve standing instruction type"
        behavior: crud
        crud:
          operation: select
          table: ssi_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all SSI types
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: ssi_type
          phase_tags: [trading]
        invocation_phrases:
          - "list all SSI types"
          - "show available SSI categories"
          - "what SSI types exist"
          - "display SSI type codes"
          - "enumerate standing instruction types"
          - "get all SSI type records"
          - "which SSI types are active"
          - "show me the SSI type list"
        behavior: crud
        crud:
          operation: select
          table: ssi_types
          schema: ob-poc
          order_by: display_order
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate an SSI type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: ssi_type
          phase_tags: [trading]
        invocation_phrases:
          - "deactivate an SSI type"
          - "disable this SSI classification"
          - "retire SSI type code"
          - "turn off an SSI type"
          - "mark SSI type as inactive"
          - "remove SSI type from list"
          - "suspend a standing instruction type"
          - "deprecate this SSI type"
        behavior: crud
        crud:
          operation: update
          table: ssi_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
