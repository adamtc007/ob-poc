domains:
  settlement-type:
    description: Settlement type reference data (DVP, FOP, RVP, etc.)
    verbs:
      ensure:
        description: Create or update a settlement type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: settlement_type
          phase_tags: [trading]
        invocation_phrases:
          - "add a new settlement type"
          - "register settlement method"
          - "create settlement type entry"
          - "configure DVP or FOP type"
          - "set up settlement instruction type"
          - "define settlement type code"
          - "upsert settlement type record"
          - "add trade settlement method"
        behavior: crud
        crud:
          operation: upsert
          table: settlement_types
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read a settlement type by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: settlement_type
          phase_tags: [trading]
        invocation_phrases:
          - "look up settlement type by code"
          - "get settlement type details"
          - "show me this settlement method"
          - "fetch settlement type definition"
          - "what is this settlement type"
          - "read settlement type record"
          - "find settlement type by code"
          - "retrieve settlement method info"
        behavior: crud
        crud:
          operation: select
          table: settlement_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all settlement types
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: settlement_type
          phase_tags: [trading]
        invocation_phrases:
          - "list all settlement types"
          - "show available settlement methods"
          - "what settlement types exist"
          - "display settlement type codes"
          - "enumerate DVP FOP RVP types"
          - "get all settlement type records"
          - "which settlement types are active"
          - "show me the settlement type list"
        behavior: crud
        crud:
          operation: select
          table: settlement_types
          schema: ob-poc
          order_by: display_order
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a settlement type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: settlement_type
          phase_tags: [trading]
        invocation_phrases:
          - "deactivate a settlement type"
          - "disable this settlement method"
          - "retire settlement type code"
          - "turn off a settlement type"
          - "mark settlement type as inactive"
          - "remove settlement method from list"
          - "suspend a settlement type"
          - "deprecate this settlement method"
        behavior: crud
        crud:
          operation: update
          table: settlement_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
