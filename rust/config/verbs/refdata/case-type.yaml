domains:
  case-type:
    description: KYC case type reference data (NEW_CLIENT, PERIODIC_REVIEW, etc.)
    verbs:
      ensure:
        description: Create or update a case type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: case_type
          phase_tags: [kyc]
        invocation_phrases:
          - "add a new case type"
          - "register KYC case type"
          - "create case type reference entry"
          - "configure a case classification"
          - "set up new review type"
          - "define a case type code"
          - "what case types can I add"
          - "upsert case type record"
        behavior: crud
        crud:
          operation: upsert
          table: case_types
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read a case type by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: case_type
          phase_tags: [kyc]
        invocation_phrases:
          - "look up case type by code"
          - "get case type details"
          - "show me this case type"
          - "fetch case type definition"
          - "what is this case type"
          - "read case type reference record"
          - "find case type by code"
          - "retrieve case type information"
        behavior: crud
        crud:
          operation: select
          table: case_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all case types
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: case_type
          phase_tags: [kyc]
        invocation_phrases:
          - "list all case types"
          - "show available case classifications"
          - "what case types exist"
          - "display KYC case types"
          - "enumerate review type codes"
          - "get all case type records"
          - "which case types are active"
          - "show me the case type list"
        behavior: crud
        crud:
          operation: select
          table: case_types
          schema: ob-poc
          order_by: display_order
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a case type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: case_type
          phase_tags: [kyc]
        invocation_phrases:
          - "deactivate a case type"
          - "disable this case classification"
          - "retire case type code"
          - "turn off a case type"
          - "mark case type as inactive"
          - "remove case type from active list"
          - "suspend a case type"
          - "deprecate this review type"
        behavior: crud
        crud:
          operation: update
          table: case_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
