domains:
  refdata:
    description: Unified reference data CRUD across operational reference domains
    verbs:
      ensure:
        flavour: instance_adding
        description: Create or update a reference data record for the requested domain
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: refdata
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "add reference data"
          - "upsert reference data"
          - "configure a reference code"
          - "create refdata entry"
          - "register a market or currency"
          - "define a jurisdiction or case type"
        behavior: plugin
        handler: RefdataEnsureOp
        args:
          - name: domain
            type: string
            required: true
          - name: code
            type: string
            required: false
          - name: iso-code
            type: string
            required: false
          - name: mic
            type: string
            required: false
          - name: name
            type: string
            required: false
          - name: description
            type: string
            required: false
          - name: country-code
            type: string
            required: false
          - name: primary-currency
            type: string
            required: false
          - name: symbol
            type: string
            required: false
          - name: decimal-places
            type: integer
            required: false
          - name: display-order
            type: integer
            required: false
          - name: severity-level
            type: integer
            required: false
          - name: region
            type: string
            required: false
          - name: regulatory-framework
            type: string
            required: false
          - name: entity-formation-allowed
            type: boolean
            required: false
          - name: offshore
            type: boolean
            required: false
          - name: regulatory-authority
            type: string
            required: false
          - name: csd-bic
            type: string
            required: false
          - name: timezone
            type: string
            required: false
          - name: is-active
            type: boolean
            required: false
        returns:
          type: record

        three_axis:
          state_effect: preserving
          external_effects:
            - emitting
          consequence:
            baseline: reviewable
      read:
        flavour: attribute_mutating
        description: Read a reference data record for the requested domain
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: refdata
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "read reference data"
          - "look up a reference code"
          - "show reference data details"
          - "fetch a market or currency"
        behavior: plugin
        handler: RefdataReadOp
        args:
          - name: domain
            type: string
            required: true
          - name: code
            type: string
            required: false
          - name: iso-code
            type: string
            required: false
          - name: mic
            type: string
            required: false
        returns:
          type: record

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      list:
        flavour: attribute_mutating
        description: List reference data records for the requested domain
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: refdata
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list reference data"
          - "show available refdata"
          - "display configured reference values"
        behavior: plugin
        handler: RefdataListOp
        args:
          - name: domain
            type: string
            required: true
          - name: region
            type: string
            required: false
          - name: offshore
            type: boolean
            required: false
          - name: country-code
            type: string
            required: false
          - name: is-active
            type: boolean
            required: false
        returns:
          type: record_set

        three_axis:
          state_effect: preserving
          external_effects:
            - observational
          consequence:
            baseline: benign
      deactivate:
        flavour: attribute_mutating
        description: Deactivate or remove a reference data record for the requested domain
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: refdata
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "deactivate reference data"
          - "retire a reference code"
          - "remove a market or currency"
          - "disable a case type"
        behavior: plugin
        handler: RefdataDeactivateOp
        args:
          - name: domain
            type: string
            required: true
          - name: code
            type: string
            required: false
          - name: iso-code
            type: string
            required: false
          - name: mic
            type: string
            required: false
        returns:
          type: void
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
