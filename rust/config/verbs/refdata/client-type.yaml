domains:
  client-type:
    description: Client type reference data (FUND, CORPORATE, etc.)
    verbs:
      ensure:
        description: Create or update a client type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: client_type
          phase_tags: [onboarding]
        invocation_phrases:
          - "add a new client type"
          - "register client classification"
          - "create client type entry"
          - "configure a client category"
          - "set up new client type"
          - "define client type code"
          - "upsert client type record"
          - "what client types can I add"
        behavior: crud
        crud:
          operation: upsert
          table: client_types
          schema: ob-poc
          conflict_keys:
            - code
          returning: code
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: description
            type: string
            required: false
            maps_to: description
          - name: display-order
            type: integer
            required: false
            maps_to: display_order
            default: 0
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: string
          name: code
          capture: true

      read:
        description: Read a client type by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: client_type
          phase_tags: [onboarding]
        invocation_phrases:
          - "look up client type by code"
          - "get client type details"
          - "show me this client type"
          - "fetch client classification record"
          - "what is this client type"
          - "read client type definition"
          - "find client type by code"
          - "retrieve client category info"
        behavior: crud
        crud:
          operation: select
          table: client_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
        returns:
          type: record

      list:
        description: List all client types
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: client_type
          phase_tags: [onboarding]
        invocation_phrases:
          - "list all client types"
          - "show available client categories"
          - "what client types exist"
          - "display client classification codes"
          - "enumerate client type options"
          - "get all client type records"
          - "which client types are active"
          - "show me the client type list"
        behavior: crud
        crud:
          operation: select
          table: client_types
          schema: ob-poc
          order_by: display_order
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a client type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: client_type
          phase_tags: [onboarding]
        invocation_phrases:
          - "deactivate a client type"
          - "disable this client classification"
          - "retire client type code"
          - "turn off a client type"
          - "mark client type as inactive"
          - "remove client type from list"
          - "suspend a client category"
          - "deprecate this client type"
        behavior: crud
        crud:
          operation: update
          table: client_types
          schema: ob-poc
        args:
          - name: code
            type: string
            required: true
            maps_to: code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
