domains:
  currency:
    description: Currency reference data (USD, EUR, GBP, etc.)
    verbs:
      ensure:
        description: Create or update a currency
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: currency
        invocation_phrases:
          - "add a new currency"
          - "register currency ISO code"
          - "create currency reference entry"
          - "configure a new currency"
          - "set up currency definition"
          - "define currency with ISO code"
          - "upsert currency record"
          - "add settlement currency"
        behavior: crud
        crud:
          operation: upsert
          table: currencies
          schema: ob-poc
          conflict_keys:
            - iso_code
          returning: currency_id
        args:
          - name: iso-code
            type: string
            required: true
            maps_to: iso_code
          - name: name
            type: string
            required: true
            maps_to: name
          - name: symbol
            type: string
            required: false
            maps_to: symbol
          - name: decimal-places
            type: integer
            required: false
            maps_to: decimal_places
            default: 2
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: true
        returns:
          type: uuid
          name: currency_id
          capture: true

      read:
        description: Read a currency by ISO code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: currency
        invocation_phrases:
          - "look up currency by ISO code"
          - "get currency details"
          - "show me this currency"
          - "fetch currency definition"
          - "what is this currency code"
          - "read currency reference record"
          - "find currency by code"
          - "retrieve currency information"
        behavior: crud
        crud:
          operation: select
          table: currencies
          schema: ob-poc
        args:
          - name: iso-code
            type: string
            required: true
            maps_to: iso_code
        returns:
          type: record

      list:
        description: List all currencies
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: currency
        invocation_phrases:
          - "list all currencies"
          - "show available currencies"
          - "what currencies are configured"
          - "display currency reference table"
          - "enumerate active currencies"
          - "get all currency records"
          - "which currencies are active"
          - "show me the currency list"
        behavior: crud
        crud:
          operation: select
          table: currencies
          schema: ob-poc
          order_by: iso_code
        args:
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
        returns:
          type: record_set

      deactivate:
        description: Deactivate a currency
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: currency
        invocation_phrases:
          - "deactivate a currency"
          - "disable this currency code"
          - "retire a currency"
          - "turn off a currency"
          - "mark currency as inactive"
          - "remove currency from active list"
          - "suspend a currency code"
          - "deprecate this currency"
        behavior: crud
        crud:
          operation: update
          table: currencies
          schema: ob-poc
        args:
          - name: iso-code
            type: string
            required: true
            maps_to: iso_code
          - name: is-active
            type: boolean
            required: false
            maps_to: is_active
            default: false
        returns:
          type: void
