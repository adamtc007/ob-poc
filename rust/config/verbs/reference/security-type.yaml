domains:
  security-type:
    description: SMPG/ALERT security type codes
    verbs:
      ensure:
        description: Create or update ALERT security type
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: security_type
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
        - "add a security type"
        - "register ALERT security type code"
        - "create security type entry"
        - "configure SMPG security classification"
        - "set up new security type"
        - "define security type with CFI"
        - "upsert security type record"
        - "add ALERT instrument type"
        behavior: crud
        crud:
          operation: upsert
          table: security_types
          schema: ob-poc
          conflict_keys:
          - code
          returning: security_type_id
        args:
        - name: class
          type: lookup
          required: true
          maps_to: instrument_class_id
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: ob-poc
            code_column: code
            id_column: class_id
        - name: code
          type: string
          required: true
          maps_to: code
        - name: name
          type: string
          required: true
          maps_to: name
        - name: cfi-pattern
          type: string
          required: false
          maps_to: cfi_pattern
        returns:
          type: uuid
          name: security_type_id
          capture: true
      list:
        description: List security types for an instrument class
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: security_type
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
        - "list security types for class"
        - "show security types by asset class"
        - "what security types exist"
        - "display ALERT security type codes"
        - "enumerate security types for instrument"
        - "get security types for class"
        - "which SMPG security types exist"
        - "show me security type list"
        behavior: crud
        crud:
          operation: list_by_fk
          table: security_types
          schema: ob-poc
          fk_col: class_id
        args:
        - name: class
          type: lookup
          required: true
          maps_to: class_id
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: ob-poc
            code_column: code
            id_column: class_id
        returns:
          type: record_set
