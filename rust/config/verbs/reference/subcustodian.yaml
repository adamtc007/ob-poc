domains:
  subcustodian:
    description: Bank's sub-custodian network (Omgeo Institution Network)
    verbs:
      ensure:
        flavour: instance_adding
        description: Create or update sub-custodian entry for market/currency
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: subcustodian
          phase_tags: [trading]
          side_effects: state_write
        invocation_phrases:
        - "add a subcustodian entry"
        - "register subcustodian for market"
        - "create subcustodian network record"
        - "configure local agent bank"
        - "set up subcustodian by BIC"
        - "define subcustodian for currency"
        - "upsert agent bank record"
        - "add custody network entry"
        behavior: crud
        crud:
          operation: upsert
          table: subcustodian_network
          schema: ob-poc
          conflict_keys:
          - market_id
          - currency
          - subcustodian_bic
          - effective_date
          returning: network_id
        args:
        - name: market
          type: lookup
          required: true
          maps_to: market_id
          lookup:
            table: markets
            entity_type: market
            schema: ob-poc
            code_column: mic
            id_column: market_id
        - name: currency
          type: string
          required: true
          maps_to: currency
        - name: subcustodian-bic
          type: string
          required: true
          maps_to: subcustodian_bic
        - name: subcustodian-name
          type: string
          required: false
          maps_to: subcustodian_name
        - name: local-agent-bic
          type: string
          required: false
          maps_to: local_agent_bic
        - name: local-agent-account
          type: string
          required: false
          maps_to: local_agent_account
        - name: pset
          type: string
          required: true
          maps_to: place_of_settlement_bic
        - name: csd-participant
          type: string
          required: false
          maps_to: csd_participant_id
        - name: is-primary
          type: boolean
          required: false
          maps_to: is_primary
          default: true
        - name: effective-date
          type: date
          required: true
          maps_to: effective_date
        returns:
          type: uuid
          name: network_id
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      list-by-market:
        flavour: attribute_mutating
        description: List sub-custodian entries for a market
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: subcustodian
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "list subcustodians for market"
        - "show agent banks by exchange"
        - "what subcustodians cover this market"
        - "display subcustodian network for MIC"
        - "enumerate local agents for market"
        - "get subcustodian entries by market"
        - "which subcustodians serve this venue"
        - "show me custody agents for market"
        behavior: crud
        crud:
          operation: list_by_fk
          table: subcustodian_network
          schema: ob-poc
          fk_col: market_id
        args:
        - name: market
          type: lookup
          required: true
          maps_to: market_id
          lookup:
            table: markets
            entity_type: market
            schema: ob-poc
            code_column: mic
            id_column: market_id
        - name: currency
          type: string
          required: false
          maps_to: currency
        returns:
          type: record_set
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
      lookup:
        flavour: attribute_mutating
        description: Find sub-custodian for market/currency
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: subcustodian
          phase_tags: [trading]
          side_effects: facts_only
        invocation_phrases:
        - "find subcustodian for market"
        - "look up agent bank for currency"
        - "which subcustodian handles this market"
        - "resolve subcustodian by market and currency"
        - "get active subcustodian for venue"
        - "who is our local agent here"
        - "subcustodian lookup by MIC"
        - "find custody agent for settlement"
        behavior: plugin
        handler: subcustodian_lookup
        args:
        - name: market
          type: string
          required: true
        - name: currency
          type: string
          required: true
        - name: as-of-date
          type: date
          required: false
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign
