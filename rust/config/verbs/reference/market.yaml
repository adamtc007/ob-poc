domains:
  market:
    description: Market/Exchange reference data
    verbs:
      ensure:
        description: Create or update market reference
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: market
        invocation_phrases:
          - "add a new market"
          - "register exchange by MIC code"
          - "create market reference entry"
          - "configure a trading venue"
          - "set up new exchange"
          - "define market with MIC"
          - "upsert market record"
          - "add stock exchange to refdata"
        behavior: crud
        crud:
          operation: upsert
          table: markets
          schema: custody
          conflict_keys:
          - mic
          returning: market_id
        args:
        - name: mic
          type: string
          required: true
          maps_to: mic
        - name: name
          type: string
          required: true
          maps_to: name
        - name: country-code
          type: string
          required: true
          maps_to: country_code
        - name: primary-currency
          type: string
          required: true
          maps_to: primary_currency
        - name: csd-bic
          type: string
          required: false
          maps_to: csd_bic
        - name: timezone
          type: string
          required: true
          maps_to: timezone
        returns:
          type: uuid
          name: market_id
          capture: true
      read:
        description: Read market by MIC
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: market
        invocation_phrases:
          - "look up market by MIC"
          - "get market details"
          - "show me this exchange"
          - "fetch market definition"
          - "what is this MIC code"
          - "read market reference record"
          - "find market by MIC code"
          - "retrieve exchange information"
        behavior: crud
        crud:
          operation: select
          table: markets
          schema: custody
        args:
        - name: mic
          type: string
          required: true
          maps_to: mic
        returns:
          type: record
      list:
        description: List markets
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: market
        invocation_phrases:
          - "list all markets"
          - "show available exchanges"
          - "what markets are configured"
          - "display market reference table"
          - "enumerate trading venues"
          - "get all market records"
          - "which exchanges are supported"
          - "show me markets by country"
        behavior: crud
        crud:
          operation: select
          table: markets
          schema: custody
        args:
        - name: country-code
          type: string
          required: false
          maps_to: country_code
        returns:
          type: record_set
