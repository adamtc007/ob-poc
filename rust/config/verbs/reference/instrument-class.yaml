domains:
  instrument-class:
    description: Instrument class with industry taxonomy mappings
    verbs:
      ensure:
        description: Create or update instrument class with CFI/SMPG/ISDA mappings
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: instrument_class
          phase_tags: [stewardship]
        invocation_phrases:
          - "add an instrument class"
          - "register asset class definition"
          - "create instrument class with CFI"
          - "configure instrument type mapping"
          - "set up new asset class"
          - "define instrument class taxonomy"
          - "upsert instrument class record"
          - "add SMPG instrument classification"
        behavior: crud
        crud:
          operation: upsert
          table: instrument_classes
          schema: custody
          conflict_keys:
          - code
          returning: class_id
        args:
        - name: code
          type: string
          required: true
          maps_to: code
        - name: name
          type: string
          required: true
          maps_to: name
        - name: settlement-cycle
          type: string
          required: true
          maps_to: default_settlement_cycle
        - name: swift-family
          type: string
          required: false
          maps_to: swift_message_family
        - name: cfi-category
          type: string
          required: false
          maps_to: cfi_category
        - name: cfi-group
          type: string
          required: false
          maps_to: cfi_group
        - name: smpg-group
          type: string
          required: false
          maps_to: smpg_group
        - name: isda-asset-class
          type: string
          required: false
          maps_to: isda_asset_class
        - name: requires-isda
          type: boolean
          required: false
          maps_to: requires_isda
          default: false
        - name: parent
          type: lookup
          required: false
          maps_to: parent_class_id
          lookup:
            table: instrument_classes
            entity_type: instrument_class
            schema: custody
            code_column: code
            id_column: class_id
        returns:
          type: uuid
          name: class_id
          capture: true
      read:
        description: Read instrument class by code
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: instrument_class
          phase_tags: [stewardship]
        invocation_phrases:
          - "look up instrument class by code"
          - "get instrument class details"
          - "show me this asset class"
          - "fetch instrument class definition"
          - "what is this instrument class"
          - "read instrument class record"
          - "find instrument class by code"
          - "retrieve asset class information"
        behavior: crud
        crud:
          operation: select
          table: instrument_classes
          schema: custody
        args:
        - name: code
          type: string
          required: true
          maps_to: code
        returns:
          type: record
      list:
        description: List instrument classes with filters
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: instrument_class
          phase_tags: [stewardship]
        invocation_phrases:
          - "list all instrument classes"
          - "show available asset classes"
          - "what instrument classes exist"
          - "display instrument class taxonomy"
          - "enumerate ISDA asset classes"
          - "get all instrument class records"
          - "filter instrument classes by SMPG"
          - "show me the asset class list"
        behavior: crud
        crud:
          operation: select
          table: instrument_classes
          schema: custody
        args:
        - name: smpg-group
          type: string
          required: false
          maps_to: smpg_group
        - name: isda-asset-class
          type: string
          required: false
          maps_to: isda_asset_class
        - name: requires-isda
          type: boolean
          required: false
          maps_to: requires_isda
        returns:
          type: record_set
