domains:
  shared-atom:
    description: Cross-workspace shared atom registry — declares attributes owned by one workspace and consumed by others
    invocation_hints:
    - register shared atom
    - activate shared atom
    - list shared atoms
    - shared atom consumers
    verbs:
      register:
        description: Register a new shared atom declaration. Enters Draft state.
        behavior: plugin
        handler: SharedAtomRegisterOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom
          subject_kinds: []
          phase_tags:
          - governance
          - setup
          side_effects: state_write
          harm_class: reversible
          action_class: create
        args:
        - name: atom-path
          type: string
          required: true
          description: Dot-notation attribute path (e.g. entity.lei)
        - name: display-name
          type: string
          required: true
          description: Human-readable name
        - name: owner-workspace
          type: string
          required: true
          description: Workspace that owns this atom
        - name: owner-constellation-family
          type: string
          required: true
          description: Constellation family within owner workspace
        returns:
          type: record
          capture: false
        invocation_phrases:
        - register shared atom
        - declare shared atom
        - create shared atom
        - add shared attribute
        - define cross-workspace attribute
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      activate:
        description: Promote a shared atom from Draft to Active. Propagation enforcement begins.
        behavior: plugin
        handler: SharedAtomActivateOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom
          subject_kinds: []
          phase_tags:
          - governance
          side_effects: state_write
          harm_class: irreversible
          action_class: update
        args:
        - name: atom-path
          type: string
          required: true
          description: Dot-notation attribute path of the atom to activate
        returns:
          type: record
          capture: false
        invocation_phrases:
        - activate shared atom
        - enable shared atom
        - promote shared atom to active
        - turn on shared atom enforcement
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable

      deprecate:
        description: Mark a shared atom as deprecated. Still enforced but no new consumers allowed.
        behavior: plugin
        handler: SharedAtomDeprecateOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom
          subject_kinds: []
          phase_tags:
          - governance
          side_effects: state_write
          harm_class: reversible
          action_class: update
        args:
        - name: atom-path
          type: string
          required: true
          description: Dot-notation attribute path of the atom to deprecate
        returns:
          type: record
          capture: false
        invocation_phrases:
        - deprecate shared atom
        - mark shared atom deprecated
        - sunset shared atom
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      retire:
        description: Remove a shared atom from active enforcement. Historical records retained.
        behavior: plugin
        handler: SharedAtomRetireOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom
          subject_kinds: []
          phase_tags:
          - governance
          side_effects: state_write
          harm_class: irreversible
          action_class: update
        args:
        - name: atom-path
          type: string
          required: true
          description: Dot-notation attribute path of the atom to retire
        returns:
          type: record
          capture: false
        invocation_phrases:
        - retire shared atom
        - remove shared atom
        - deregister shared atom
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation

      list:
        description: List all shared atoms, optionally filtered by lifecycle status
        behavior: plugin
        handler: SharedAtomListOp
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom
          subject_kinds: []
          phase_tags:
          - discovery
          - monitoring
          side_effects: facts_only
          harm_class: read_only
          action_class: list
        args:
        - name: status
          type: string
          required: false
          description: Filter by lifecycle status (draft, active, deprecated, retired)
        returns:
          type: record_set
          capture: false
        invocation_phrases:
        - list shared atoms
        - show shared atoms
        - what shared atoms exist
        - shared atom registry
        - show cross-workspace attributes
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-consumers:
        description: Show discovered consumers of a shared atom from verb footprint analysis
        behavior: plugin
        handler: SharedAtomListConsumersOp
        metadata:
          tier: diagnostics
          source_of_truth: sem_reg
          scope: global
          noun: shared_atom_consumer
          subject_kinds: []
          phase_tags:
          - discovery
          - monitoring
          side_effects: facts_only
          harm_class: read_only
          action_class: list
        args:
        - name: atom-path
          type: string
          required: true
          description: Dot-notation attribute path to inspect consumers for
        returns:
          type: record_set
          capture: false
        invocation_phrases:
        - list shared atom consumers
        - who consumes this shared atom
        - show consumers of shared atom
        - shared atom dependencies
        - cross-workspace consumers
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      replay-constellation:
        description: Replay a consuming constellation from the top after a shared fact supersession
        behavior: plugin
        handler: SharedAtomReplayConstellationOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: cbu
          noun: constellation_replay
          subject_kinds:
          - cbu
          phase_tags:
          - governance
          - remediation
          side_effects: state_write
          harm_class: irreversible
          action_class: update
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Entity ID to replay the constellation for
        - name: constellation-family
          type: string
          required: true
          description: Constellation family to replay (e.g. onboarding_workspace)
        - name: atom-path
          type: string
          required: true
          description: The shared atom that was superseded
        returns:
          type: record
          capture: false
        invocation_phrases:
        - replay constellation
        - rebuild stale constellation
        - replay after shared fact change
        - fix stale workspace state
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      acknowledge-shared-update:
        description: Acknowledge a shared fact supersession for an in-flight entity, advancing the consumer ref to current
        behavior: plugin
        handler: SharedAtomAcknowledgeOp
        metadata:
          tier: governance
          source_of_truth: sem_reg
          scope: cbu
          noun: shared_atom_acknowledgement
          subject_kinds:
          - cbu
          phase_tags:
          - governance
          side_effects: state_write
          harm_class: reversible
          action_class: update
        args:
        - name: entity-id
          type: uuid
          required: true
          description: Entity ID to acknowledge the update for
        - name: atom-path
          type: string
          required: true
          description: The shared atom path to acknowledge (e.g. entity.lei)
        returns:
          type: record
          capture: false
        invocation_phrases:
        - acknowledge shared update
        - accept shared fact change
        - acknowledge stale fact
        - pick up latest shared value
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
