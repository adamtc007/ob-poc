domains:
  resource-owner:
    description: "Resource owner principal governance operations"
    verbs:
      assign:
        flavour: attribute_mutating
        description: Assign a governed resource owner principal
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "assign resource owner"
          - "register resource owner principal"
          - "create resource owner principal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: resource_owner
          tags: [catalogue, resource-owner, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: owner-system
            type: string
            required: true
          - name: owner-principal-fqn
            type: string
            required: false
          - name: display-name
            type: string
            required: false
          - name: dispatch-endpoint
            type: string
            required: false
          - name: status
            type: string
            required: false
          - name: metadata
            type: json
            required: false
          - name: principal-capabilities
            type: json
            required: false
          - name: dispatch-enabled
            type: boolean
            required: false
        returns:
          type: record
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      amend:
        flavour: attribute_mutating
        description: Amend a governed resource owner principal
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "amend resource owner"
          - "update resource owner principal"
          - "revise resource owner principal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: resource_owner
          tags: [catalogue, resource-owner, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: owner-principal-fqn
            type: string
            required: false
          - name: owner-system
            type: string
            required: false
          - name: display-name
            type: string
            required: false
          - name: dispatch-endpoint
            type: string
            required: false
          - name: status
            type: string
            required: false
          - name: metadata
            type: json
            required: false
          - name: principal-capabilities
            type: json
            required: false
          - name: dispatch-enabled
            type: boolean
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: requires_confirmation

      unassign:
        flavour: discretionary
        description: Retire a governed resource owner principal
        effect_class: read_modify_write
        role_guard:
          any_of: [resource_owner, compliance_admin, senior_compliance, mlro]
        invocation_phrases:
          - "unassign resource owner"
          - "retire resource owner principal"
          - "deactivate resource owner principal"
        behavior: plugin
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: resource_owner
          tags: [catalogue, resource-owner, governance, write]
          phase_tags: [stewardship]
          side_effects: state_write
        args:
          - name: owner-principal-fqn
            type: string
            required: false
          - name: owner-system
            type: string
            required: false
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: requires_explicit_authorisation
