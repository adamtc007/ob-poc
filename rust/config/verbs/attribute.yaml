# verbs/attribute.yaml
# Attribute dictionary management for document-attribute catalogue

domains:
  attribute:
    description: "Attribute dictionary management - define attributes and map them to document types"

    verbs:
      define:
        flavour: attribute_mutating
        description: "Define a new governed attribute in the registry and SemOS"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "define a new attribute"
          - "add attribute to registry"
          - "register new data attribute"
          - "create attribute definition"
          - "set up a new attribute"
          - "add field to catalogue"
          - "define data element"
          - "register attribute for KYC"
          - "define governed attribute"
          - "register attribute in SemOS"
          - "define attribute for"
          - "create an attribute"
          - "add attribute definition"
          - "define a new attribute for"
          - "define attribute for KYC"
          - "new attribute for risk"
          - "define a new attribute for KYC risk"
        behavior: plugin
        handler: attribute_define_governed
        args:
          - name: id
            type: string
            required: true
            description: "Semantic ID (e.g., attr.identity.passport_number)"
            maps_to: id
          - name: display-name
            type: string
            required: true
            maps_to: display_name
          - name: category
            type: string
            required: true
            valid_values: [identity, financial, compliance, document, risk, contact, address, tax, employment, product, entity, ubo, isda, resource, cbu, trust, fund, partnership]
            maps_to: category
          - name: value-type
            type: string
            required: true
            valid_values: [string, integer, number, boolean, date, datetime, email, phone, address, currency, percentage, tax_id, json]
            maps_to: value_type
          - name: domain
            type: string
            required: false
            maps_to: domain
          - name: semos-description
            type: string
            required: false
            description: "Richer SemOS-governed description for the AttributeDef snapshot"
          - name: validation-rules
            type: json
            required: false
            maps_to: validation_rules
          - name: applicability
            type: json
            required: false
            maps_to: applicability
          - name: evidence-grade
            type: string
            required: false
            default: none
            valid_values: [none, prohibited, allowed_with_constraints, regulatory_evidence]
            description: "SemOS evidence sensitivity classification for the governed attribute definition"
        returns:
          type: uuid
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      define-derived:
        flavour: attribute_mutating
        description: "Define a derived attribute with its governed computation recipe"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, derivation, governance]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "define a derived attribute"
          - "create computed attribute"
          - "add below-the-line attribute"
          - "register derived data element"
          - "define fabricated attribute with recipe"
          - "create attribute with derivation"
          - "set up computed field"
          - "add attribute with calculation"
        behavior: plugin
        handler: attribute_define_derived
        args:
          - name: id
            type: string
            required: true
            description: "Semantic ID for the derived attribute (e.g., ubo.total_ownership_pct)"
          - name: display-name
            type: string
            required: true
          - name: category
            type: string
            required: true
            valid_values: [identity, financial, compliance, document, risk, contact, address, tax, employment, product, entity, ubo, isda, resource, cbu, trust, fund, partnership]
          - name: value-type
            type: string
            required: true
            valid_values: [string, integer, number, boolean, date, datetime, email, phone, address, currency, percentage, tax_id, json]
          - name: domain
            type: string
            required: true
          - name: semos-description
            type: string
            required: false
          - name: evidence-grade
            type: string
            required: false
            valid_values: [none, prohibited, allowed_with_constraints, regulatory_evidence]
            default: prohibited
          - name: derivation-function
            type: string
            required: true
          - name: derivation-inputs
            type: json
            required: true
            description: "JSON array of {attribute_fqn, role, required} objects"
          - name: null-semantics
            type: string
            required: false
            valid_values: [propagate, skip, error]
            default: propagate
          - name: freshness-seconds
            type: integer
            required: false
        returns:
          type: uuid
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      define-internal:
        flavour: attribute_mutating
        description: "Define an internal/system attribute with lightweight governance"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, governance, internal]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "create system flag attribute"
          - "add system processing flag"
          - "register internal system attribute"
          - "define operational system marker"
          - "provision internal processing marker"
          - "create internal operational indicator"
          - "add system-only attribute no governance"
          - "register platform system flag"
          - "new internal attribute for system use"
          - "define system attribute lightweight"
          - "add internal system field"
          - "create operational attribute auto-approved"
          - "register system routing attribute"
          - "define internal platform attribute"
          - "add system indicator attribute"
        behavior: plugin
        handler: attribute_define_internal
        args:
          - name: id
            type: string
            required: true
            description: "Semantic ID (e.g., system.routing_flag)"
          - name: display-name
            type: string
            required: true
            description: "Human-readable display name"
          - name: category
            type: string
            required: true
            valid_values: [identity, financial, compliance, document, risk, contact, address, tax, employment, product, entity, ubo, isda, resource, cbu, trust, fund, partnership]
          - name: value-type
            type: string
            required: true
            valid_values: [string, integer, number, boolean, date, datetime, email, phone, address, currency, percentage, tax_id, json]
          - name: domain
            type: string
            required: false
            description: "Domain prefix (inferred from id if omitted)"
          - name: semos-description
            type: string
            required: false
            description: "Rich description for SemOS governance"
          - name: validation-rules
            type: json
            required: false
            description: "Business-level validation rules (JSONB)"
          - name: applicability
            type: json
            required: false
            description: "Conditional applicability rules (JSONB)"
        returns:
          type: uuid
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      update-internal:
        flavour: attribute_mutating
        description: "Update metadata on an internal/system attribute (lightweight, no changeset)"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, governance, internal]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "patch system flag rules"
          - "update system attribute validation"
          - "modify internal attribute constraints"
          - "change system flag requirements"
          - "adjust internal system attribute settings"
          - "update operational attribute rules"
          - "reconfigure internal processing marker"
          - "modify system attribute metadata"
          - "patch internal attribute defaults"
          - "change system indicator rules"
        behavior: plugin
        handler: attribute_update_internal
        args:
          - name: id
            type: string
            required: true
            description: "Attribute semantic ID to update"
          - name: validation-rules
            type: json
            required: false
            description: "Updated business-level validation rules (JSONB)"
          - name: applicability
            type: json
            required: false
            description: "Updated conditional applicability rules (JSONB)"
          - name: is-required
            type: boolean
            required: false
            description: "Whether the attribute is required by default"
          - name: default-value
            type: string
            required: false
            description: "Default value (serialized as text)"
          - name: group-id
            type: string
            required: false
            description: "Logical grouping identifier"
        returns:
          type: record
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      classify:
        flavour: attribute_mutating
        description: "Assign or reassign taxonomy category for an attribute"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management, taxonomy]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "classify attribute"
          - "change attribute category"
          - "reassign attribute taxonomy"
          - "move attribute to category"
          - "recategorize attribute"
        behavior: crud
        crud:
          operation: update
          table: attribute_registry
          schema: ob-poc
          key: id
        args:
          - name: id
            type: string
            required: true
            maps_to: id
          - name: category
            type: string
            required: true
            valid_values: [identity, financial, compliance, document, risk, contact, address, tax, employment, product, entity, ubo, isda, resource, cbu, trust, fund, partnership]
            maps_to: category
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      set-evidence-grade:
        flavour: attribute_mutating
        description: "Set or change the evidence grade sensitivity classification for an attribute"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, governance, evidence]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "set evidence grade for attribute"
          - "change attribute sensitivity"
          - "elevate attribute evidence grade"
          - "mark attribute as regulatory evidence"
          - "set attribute access level"
          - "change evidence classification"
        behavior: plugin
        handler: attribute_set_evidence_grade
        args:
          - name: id
            type: string
            required: true
            description: "Attribute semantic ID"
          - name: evidence-grade
            type: string
            required: true
            valid_values: [none, prohibited, allowed_with_constraints, regulatory_evidence]
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      deprecate:
        flavour: attribute_mutating
        description: "Mark an attribute as deprecated without deleting operational references"
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, lifecycle]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "deprecate attribute"
          - "retire attribute"
          - "mark attribute as deprecated"
          - "remove attribute from active use"
          - "sunset attribute"
        behavior: plugin
        handler: attribute_deprecate
        args:
          - name: id
            type: string
            required: true
            description: "Attribute semantic ID"
          - name: reason
            type: string
            required: true
            description: "Reason for deprecation"
          - name: replacement
            type: string
            required: false
            description: "FQN of replacement attribute, if any"
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: requires_confirmation
        transition_args:
          entity_id_arg: attribute-def-id
          target_workspace: semos_maintenance
          target_slot: attribute_def

      inspect:
        flavour: attribute_mutating
        description: "Show full attribute definition including governance state, evidence grade, derivation recipe, and observation statistics"
        metadata:
          tier: reference
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          tags: [data-management, diagnostics]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "inspect attribute"
          - "show full attribute details"
          - "attribute deep dive"
          - "show attribute governance state"
          - "explain attribute"
          - "attribute diagnostic report"
          - "show attribute evidence grade and lineage"
        behavior: plugin
        handler: attribute_inspect
        args:
          - name: id
            type: string
            required: true
            description: "Attribute semantic ID, FQN, or UUID"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      update:
        flavour: attribute_mutating
        description: "Update an existing attribute"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "update attribute definition"
          - "modify attribute"
          - "change attribute settings"
          - "edit attribute validation rules"
          - "update data element"
          - "change attribute applicability"
          - "modify field definition"
          - "adjust attribute properties"
        behavior: crud
        crud:
          operation: update
          table: attribute_registry
          schema: ob-poc
          key: id
        args:
          - name: id
            type: string
            required: true
            maps_to: id
          - name: display-name
            type: string
            required: false
            maps_to: display_name
          - name: validation-rules
            type: json
            required: false
            maps_to: validation_rules
          - name: applicability
            type: json
            required: false
            maps_to: applicability
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable
      read:
        flavour: attribute_mutating
        description: "Read an attribute by semantic ID"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "get attribute details"
          - "show attribute definition"
          - "look up attribute"
          - "describe attribute"
          - "what is this attribute"
          - "fetch attribute by ID"
          - "read attribute info"
          - "find attribute definition"
        behavior: crud
        crud:
          operation: select
          table: attribute_registry
          schema: ob-poc
          key: id
        args:
          - name: id
            type: string
            required: true
            maps_to: id
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list:
        flavour: attribute_mutating
        description: "List attributes, optionally filtered by category or domain"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list all attributes"
          - "show attribute catalogue"
          - "what attributes are defined"
          - "display attributes by category"
          - "show identity attributes"
          - "list compliance data elements"
          - "browse attribute registry"
          - "get all registered attributes"
        behavior: crud
        crud:
          operation: select
          table: attribute_registry
          schema: ob-poc
        args:
          - name: category
            type: string
            required: false
            maps_to: category
          - name: domain
            type: string
            required: false
            maps_to: domain
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      map-to-document:
        flavour: attribute_mutating
        description: "Map attribute to document type (source or sink relationship)"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "map attribute to document"
          - "link attribute to document type"
          - "connect attribute to document"
          - "set document as attribute source"
          - "define document attribute mapping"
          - "add attribute extraction from document"
          - "associate field with document type"
          - "configure document data extraction"
        behavior: crud
        crud:
          operation: upsert
          table: document_attribute_links
          schema: ob-poc
          conflict_keys: [document_type_id, attribute_id, direction]
          returning: link_id
        args:
          - name: document-type
            type: lookup
            required: true
            description: "Document type code"
            lookup:
              table: document_types
              schema: ob-poc
              entity_type: document_type
              search_key: type_code
              primary_key: type_id
            maps_to: document_type_id
          - name: attribute
            type: lookup
            required: true
            description: "Attribute semantic ID (e.g., attr.identity.full_name)"
            lookup:
              table: attribute_registry
              schema: ob-poc
              entity_type: attribute
              search_key: id
              primary_key: uuid
            maps_to: attribute_id
          - name: direction
            type: string
            required: true
            valid_values: [SOURCE, SINK, BOTH]
            description: "SOURCE = document provides this attribute, SINK = document requires this attribute, BOTH = bidirectional"
            maps_to: direction
          - name: extraction-method
            type: string
            required: false
            valid_values: [OCR, AI, MRZ, IMAGE, MANUAL, DERIVED]
            description: "How the attribute is extracted from the document"
            maps_to: extraction_method
          - name: extraction-field-path
            type: string
            required: false
            description: "JSON path or field name for extraction"
            maps_to: extraction_field_path
          - name: is-authoritative
            type: boolean
            required: false
            default: false
            description: "Whether this document is an authoritative source for this attribute"
            maps_to: is_authoritative
          - name: proof-strength
            type: string
            required: false
            valid_values: [PRIMARY, SECONDARY, SUPPORTING]
            description: "Evidential strength when used as proof"
            maps_to: proof_strength
          - name: extraction-confidence-default
            type: decimal
            required: false
            description: "Default confidence score for extractions (0.0-1.0)"
            maps_to: extraction_confidence_default
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      unmap-from-document:
        flavour: attribute_mutating
        description: "Remove attribute mapping from document type"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "unmap attribute from document"
          - "remove attribute document link"
          - "disconnect attribute from document"
          - "delete document attribute mapping"
          - "unlink attribute from document type"
          - "remove extraction mapping"
          - "detach attribute from document"
          - "clear document attribute association"
        behavior: crud
        crud:
          operation: delete
          table: document_attribute_links
          schema: ob-poc
        args:
          - name: document-type
            type: lookup
            required: true
            lookup:
              table: document_types
              schema: ob-poc
              entity_type: document_type
              search_key: type_code
              primary_key: type_id
            maps_to: document_type_id
          - name: attribute
            type: lookup
            required: true
            lookup:
              table: attribute_registry
              schema: ob-poc
              entity_type: attribute
              search_key: id
              primary_key: uuid
            maps_to: attribute_id
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      list-sources:
        flavour: attribute_mutating
        description: "List all document types that provide (source) a given attribute"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list attribute sources"
          - "which documents provide this attribute"
          - "show source documents for attribute"
          - "where does this data come from"
          - "find authoritative sources for attribute"
          - "what documents contain this field"
          - "show proof documents for attribute"
          - "attribute source documents"
        behavior: plugin
        handler: attribute_list_sources
        args:
          - name: attribute
            type: string
            required: true
            description: "Attribute semantic ID"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-sinks:
        flavour: attribute_mutating
        description: "List all document types that require (sink) a given attribute"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list attribute sinks"
          - "which documents need this attribute"
          - "show consuming documents for attribute"
          - "where is this data required"
          - "what documents require this field"
          - "find attribute consumers"
          - "show dependent documents"
          - "attribute sink documents"
        behavior: plugin
        handler: attribute_list_sinks
        args:
          - name: attribute
            type: string
            required: true
            description: "Attribute semantic ID"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      trace-lineage:
        flavour: attribute_mutating
        description: "Show complete lineage for an attribute - sources, sinks, and resources that require it"
        metadata:
          tier: intent
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "trace attribute lineage"
          - "show attribute data flow"
          - "where does this attribute flow"
          - "attribute provenance chain"
          - "show full lineage for field"
          - "trace data element end to end"
          - "attribute impact analysis"
          - "follow attribute through pipeline"
        behavior: plugin
        handler: attribute_trace_lineage
        args:
          - name: attribute
            type: string
            required: true
            description: "Attribute semantic ID"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      list-by-document:
        flavour: attribute_mutating
        description: "List all attributes linked to a document type"
        metadata:
          tier: reference
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "list attributes for document type"
          - "show document attributes"
          - "what attributes does this document have"
          - "get fields for document type"
          - "show data extracted from document"
          - "list mapped attributes for document"
          - "document type attribute coverage"
          - "what can we extract from this document"
        behavior: plugin
        handler: attribute_list_by_document
        args:
          - name: document-type
            type: string
            required: true
            description: "Document type code"
          - name: direction
            type: string
            required: false
            valid_values: [SOURCE, SINK, BOTH]
            description: "Filter by direction"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      check-coverage:
        flavour: attribute_mutating
        description: "Check attribute coverage for a document type - what's mapped vs what's required"
        metadata:
          tier: diagnostics
          source_of_truth: catalog
          scope: global
          noun: attribute
          tags: [data-management]
          phase_tags: [stewardship]
          side_effects: facts_only
        invocation_phrases:
          - "check attribute coverage"
          - "what attributes are missing"
          - "document coverage report"
          - "are all required attributes mapped"
          - "coverage gap analysis for document"
          - "show unmapped attributes"
          - "attribute completeness check"
          - "verify document attribute coverage"
        behavior: plugin
        handler: attribute_check_coverage
        args:
          - name: document-type
            type: string
            required: true
            description: "Document type code"
        three_axis:
          state_effect: preserving
          external_effects: [observational]
          consequence:
            baseline: benign

      bridge-to-semos:
        flavour: attribute_mutating
        description: Publish SemOS AttributeDef snapshots for store attributes that lack governance
        metadata:
          tier: intent
          source_of_truth: sem_reg
          scope: global
          noun: attribute
          phase_tags: [stewardship]
          side_effects: state_write
        invocation_phrases:
          - "bridge attributes to semos"
          - "publish ungoverned attributes to semantic os"
          - "create semos snapshots for store-only attributes"
          - "govern existing attributes in semantic os"
          - "reconcile attribute registry with semos"
          - "bulk define attributes into semos"
        behavior: plugin
        handler: attribute_bridge_to_semos
        args:
          - name: limit
            type: integer
            required: false
            default: "100"
            description: "Maximum number of attributes to bridge in one batch"
        returns:
          type: record
          description: Bridge result with counts (bridged, already_governed, failed)
        three_axis:
          state_effect: preserving
          external_effects: [emitting]
          consequence:
            baseline: reviewable
