        metadata:
          tier: intent
          source_of_truth: external
          scope: cbu
          noun: screening
          subject_kinds: [entity, company, person, fund]
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: provider
            type: string
            required: false
        returns:
