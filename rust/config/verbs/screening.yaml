          type: uuid
          capture: true
        three_axis:
          state_effect: preserving
          external_effects: []
          consequence:
            baseline: reviewable

      run:
        description: Initiate a workstream screening. Idempotent by (workstream_id, screening_type).
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          subject_kinds: [entity-workstream]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "run workstream screening"
          - "start workstream screening"
          - "initiate screening for workstream"
          - "launch compliance screening for workstream"
          - "start screening workflow"
          - "begin screening checks"
          - "run full screening"
          - "run all screenings"
          - "start the full screening workflow"
          - "screen them"
          - "screen this entity"
          - "run screening on this party"
          - "start compliance checks"
          - "kick off screening"
          - "run a full screening -- sanctions, PEP, and adverse media"
          - "do a complete compliance screen"
          - "run all the checks on this entity"
          - "initiate screening"
          - "run the RBA assessment"
          - "risk based approach assessment"
          - "run a risk based approach check"
          - "conduct RBA screening"
          - "FATCA classification"
          - "CRS classification check"
          - "run FATCA checks"
          - "do the CRS review"
          - "run the checks on this entity"
          - "screen this party"
          - "do a full compliance check"
          - "run sanctions PEP and media on this entity"
          - "are they clear to onboard"
          - "compliance screening for this counterparty"
        behavior: crud
        produces:
          type: screening
          resolved: false
        consumes:
          - arg: workstream-id
            type: workstream
            required: true
        crud:
          operation: upsert
          table: screenings
          schema: ob-poc
          returning: screening_id
          conflict_keys:
            - workstream_id
            - screening_type
          set_values:
            screening_type: CONSOLIDATED
            status: PENDING
        emits_event: screening.started
        args:
          - name: workstream-id
            type: uuid
            required: true
            maps_to: workstream_id
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: ob-poc
              search_key: workstream_id
              primary_key: workstream_id
          - name: screening-type
            type: string
            required: true
            maps_to: screening_type
            valid_values:
              - SANCTIONS
              - PEP
              - ADVERSE_MEDIA
              - CREDIT
              - CRIMINAL
              - REGULATORY
              - CONSOLIDATED
          - name: provider
            type: string
            required: false
            maps_to: provider
        returns:
          type: uuid
          name: screening_id
          capture: true
        three_axis:
          state_effect: transition
          external_effects: []
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: screening-id
          target_workspace: kyc
          target_slot: screening

      complete:
        description: Record workstream screening completion.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          subject_kinds: [screening]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "complete workstream screening"
          - "record screening completion"
          - "finalize workstream screening result"
          - "mark screening complete"
          - "close screening review"
          - "finish screening"
          - "screening is done"
          - "close this screening"
          - "mark this screening as finished"
          - "record the screening outcome"
          - "finalise the compliance check"
          - "complete this screening check"
          - "screening came back clean mark it done"
          - "close off this screening"
          - "the check is done record it"
          - "mark the sanctions check as complete"
          - "sign off on the screening result"
        behavior: crud
        crud:
          operation: update
          table: screenings
          schema: ob-poc
          key: screening_id
          set_values:
            completed_at: now()
        emits_event: screening.completed
        args:
          - name: screening-id
            type: uuid
            required: true
            maps_to: screening_id
            lookup:
              table: screenings
              entity_type: screening
              schema: ob-poc
              search_key: screening_id
              primary_key: screening_id
          - name: status
            type: string
            required: true
            maps_to: status
            valid_values:
              - CLEAR
              - HIT_PENDING_REVIEW
              - ERROR
          - name: result-summary
            type: string
            required: false
            maps_to: result_summary
          - name: match-count
            type: integer
            required: false
            maps_to: match_count
        returns:
          type: affected
        three_axis:
          state_effect: transition
          external_effects: [emitting]
          consequence:
            baseline: reviewable
        transition_args:
          entity_id_arg: screening-id
          target_state_arg: status
          target_workspace: kyc
          target_slot: screening

