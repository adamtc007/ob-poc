domains:
  screening:
    description: Entity screening operations (PEP, sanctions, adverse media)
    verbs:
      pep:
        description: Run PEP (Politically Exposed Persons) screening
        invocation_phrases:
          - "run PEP screening"
          - "check for PEP"
          - "PEP check"
          - "screen for politically exposed"
          - "is this person a PEP"
          - "PEP scan"
          - "check political exposure"
          - "run PEP check"
          - "politically exposed person check"
          - "check whether this entity is a PEP"
          - "screen this entity for pep exposure"
          - "check if they are politically exposed"
          - "run pep screening on this party"
          - "screen this person for pep risk"
        metadata:
          tier: intent
          source_of_truth: external
          scope: cbu
          noun: screening
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: provider
            type: string
            required: false
        returns:
          type: uuid
          capture: true

      sanctions:
        description: Run sanctions list screening
        invocation_phrases:
          - "run sanctions check"
          - "sanctions screening"
          - "check sanctions lists"
          - "screen against sanctions"
          - "OFAC check"
          - "sanctions scan"
          - "run sanctions screening"
          - "check if sanctioned"
          - "sanctions list check"
          - "run sanctions screening on this entity"
          - "screen this entity against sanctions"
          - "check sanctions on this party"
          - "screen this name against sanctions lists"
          - "run sanctions screening for this onboarding entity"
        metadata:
          tier: intent
          source_of_truth: external
          scope: cbu
          noun: screening
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: lists
            type: string_list
            required: false
        returns:
          type: uuid
          capture: true

      adverse-media:
        description: Run adverse media screening
        invocation_phrases:
          - "run adverse media check"
          - "adverse media screening"
          - "check for negative news"
          - "media scan"
          - "screen for adverse media"
          - "negative media check"
          - "run media screening"
          - "check news coverage"
          - "adverse news scan"
          - "check this entity for adverse media"
          - "screen this entity for negative news"
          - "check this party for bad press"
          - "screen for negative media"
          - "look for adverse news on this entity"
        metadata:
          tier: intent
          source_of_truth: external
          scope: cbu
          noun: screening
          phase_tags: [kyc]
          side_effects: state_write
        behavior: plugin
        args:
          - name: entity-id
            type: uuid
            required: true
            lookup:
              table: entities
              entity_type: entity
              schema: ob-poc
              search_key: name
              primary_key: entity_id
          - name: lookback-months
            type: integer
            required: false
            default: 24
        returns:
          type: uuid
          capture: true

      run:
        description: Initiate a workstream screening. Idempotent by (workstream_id, screening_type).
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "run workstream screening"
          - "start workstream screening"
          - "initiate screening for workstream"
          - "launch compliance screening for workstream"
          - "start screening workflow"
          - "begin screening checks"
          - "run full screening"
          - "run all screenings"
          - "start the full screening workflow"
        behavior: crud
        produces:
          type: screening
          resolved: false
        consumes:
          - arg: workstream-id
            type: workstream
            required: true
        crud:
          operation: upsert
          table: screenings
          schema: ob-poc
          returning: screening_id
          conflict_keys:
            - workstream_id
            - screening_type
        emits_event: screening.started
        args:
          - name: workstream-id
            type: uuid
            required: true
            maps_to: workstream_id
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: ob-poc
              search_key: workstream_id
              primary_key: workstream_id
          - name: screening-type
            type: string
            required: true
            maps_to: screening_type
            valid_values:
              - SANCTIONS
              - PEP
              - ADVERSE_MEDIA
              - CREDIT
              - CRIMINAL
              - REGULATORY
              - CONSOLIDATED
          - name: provider
            type: string
            required: false
            maps_to: provider
        returns:
          type: uuid
          name: screening_id
          capture: true

      complete:
        description: Record workstream screening completion.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "complete workstream screening"
          - "record screening completion"
          - "finalize workstream screening result"
          - "mark screening complete"
          - "close screening review"
          - "finish screening"
        behavior: crud
        crud:
          operation: update
          table: screenings
          schema: ob-poc
          key: screening_id
          set_values:
            completed_at: now()
        emits_event: screening.completed
        args:
          - name: screening-id
            type: uuid
            required: true
            maps_to: screening_id
            lookup:
              table: screenings
              entity_type: screening
              schema: ob-poc
              search_key: screening_id
              primary_key: screening_id
          - name: status
            type: string
            required: true
            maps_to: status
            valid_values:
              - CLEAR
              - HIT_PENDING_REVIEW
              - ERROR
          - name: result-summary
            type: string
            required: false
            maps_to: result_summary
          - name: match-count
            type: integer
            required: false
            maps_to: match_count
        returns:
          type: affected

      review-hit:
        description: Review a screening hit for a workstream screening.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "review screening hit"
          - "assess sanctions match"
          - "adjudicate screening alert"
          - "resolve screening hit finding"
          - "review sanctions hit"
          - "investigate screening match"
        behavior: crud
        crud:
          operation: update
          table: screenings
          schema: ob-poc
          key: screening_id
          set_values:
            reviewed_at: now()
        emits_event: screening.reviewed
        args:
          - name: screening-id
            type: uuid
            required: true
            maps_to: screening_id
            lookup:
              table: screenings
              entity_type: screening
              schema: ob-poc
              search_key: screening_id
              primary_key: screening_id
          - name: status
            type: string
            required: true
            maps_to: status
            valid_values:
              - HIT_CONFIRMED
              - HIT_DISMISSED
          - name: notes
            type: string
            required: true
            maps_to: review_notes
          - name: red-flag-id
            type: uuid
            required: false
            maps_to: red_flag_id
            lookup:
              table: red_flags
              entity_type: red_flag
              schema: ob-poc
              search_key: red_flag_id
              primary_key: red_flag_id
        returns:
          type: affected

      bulk-refresh:
        description: Refresh screening coverage for all workstreams in a case.
        metadata:
          tier: intent
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: state_write
        invocation_phrases:
          - "bulk refresh screenings"
          - "rerun case screenings"
          - "refresh screening coverage for case"
          - "refresh sanctions pep and media checks"
        behavior: plugin
        plugin:
          handler: ScreeningBulkRefreshOp
        args:
          - name: case-id
            type: uuid
            required: true
            lookup:
              table: cases
              entity_type: kyc_case
              schema: kyc
              search_key: case_id
              primary_key: case_id
          - name: screening-type
            type: string
            required: false
            valid_values:
              - SANCTIONS
              - PEP
              - ADVERSE_MEDIA
              - CONSOLIDATED
        returns:
          type: affected

      list-by-workstream:
        description: List screenings for a workstream.
        metadata:
          tier: reference
          source_of_truth: operational
          scope: cbu
          noun: screening
          tags: [kyc]
          phase_tags: [kyc]
          side_effects: facts_only
        invocation_phrases:
          - "list screenings for workstream"
          - "show workstream screening results"
          - "what screenings have been run for workstream"
          - "show screening coverage for workstream"
        behavior: crud
        crud:
          operation: list_by_fk
          table: screenings
          schema: ob-poc
          fk_col: workstream_id
        args:
          - name: workstream-id
            type: uuid
            required: true
            lookup:
              table: entity_workstreams
              entity_type: entity_workstream
              schema: ob-poc
              search_key: workstream_id
              primary_key: workstream_id
          - name: screening-type
            type: string
            required: false
            maps_to: screening_type
          - name: status
            type: string
            required: false
            maps_to: status
        returns:
          type: record_set
