# Onboarding Request Journey Pack
# Deal-to-ops onboarding handoff for existing CBU targets

id: onboarding-request
name: Onboarding Request
version: "1.0"
description: >
  Create a post-clearance onboarding handoff from a contracted deal into an
  existing CBU and product target. Guides the user through deal selection,
  contract validation, existing CBU confirmation, and handoff creation.

invocation_phrases:
  - "onboarding request"
  - "request onboarding for this deal"
  - "submit onboarding handoff"
  - "handoff this deal to ops"
  - "product onboarding"
  - "deal onboarding"
  - "start onboarding"
  - "ops handoff"

required_context:
  - client_group_id

optional_context:
  - default_cbu
  - default_deal
  - default_contract

workspaces:
  - on_boarding

allowed_verbs:
  - deal.read-record
  - deal.list-contracts
  - deal.list-products
  - deal.request-onboarding
  - deal.request-onboarding-batch
  - cbu.read

forbidden_verbs:
  - cbu.delete
  - cbu.create

risk_policy:
  require_confirm_before_execute: true
  max_steps_without_confirm: 5

required_questions:
  - field: deal_id
    prompt: "Which deal is handing off into onboarding?"
    answer_kind: string

  - field: contract_id
    prompt: "Which linked contract should anchor the handoff?"
    answer_kind: string

  - field: cbu_id
    prompt: "Which existing CBU is the onboarding target?"
    answer_kind: string

  - field: product_id
    prompt: "Which contracted product is being onboarded?"
    answer_kind: string

optional_questions:
  - field: target_live_date
    prompt: "Target live date, if known?"
    answer_kind: string

  - field: requested_by
    prompt: "Who is requesting the onboarding handoff?"
    answer_kind: string

  - field: notes
    prompt: "Any operational notes for the onboarding team?"
    answer_kind: string

stop_rules:
  - "Deal record reviewed"
  - "Existing CBU confirmed"
  - "Onboarding handoff submitted"

templates:
  - template_id: standard-onboarding-handoff
    when_to_use: "Default deal handoff into onboarding for one existing CBU and one product"
    steps:
      - verb: deal.read-record
        args:
          deal-id: "{answers.deal_id}"

      - verb: deal.list-contracts
        args:
          deal-id: "{answers.deal_id}"

      - verb: deal.list-products
        args:
          deal-id: "{answers.deal_id}"

      - verb: cbu.read
        args:
          cbu-id: "{answers.cbu_id}"

      - verb: deal.request-onboarding
        args:
          deal-id: "{answers.deal_id}"
          contract-id: "{answers.contract_id}"
          cbu-id: "{answers.cbu_id}"
          product-id: "{answers.product_id}"
          target-live-date: "{answers.target_live_date}"
          requested-by: "{answers.requested_by}"
          notes: "{answers.notes}"

pack_summary_template: >
  Deal {{answers.deal_id}}
  handed off for onboarding against CBU {{answers.cbu_id}}.

section_layout:
  - title: "Deal Scope"
    verb_prefixes:
      - "deal."
  - title: "Target CBU"
    verb_prefixes:
      - "cbu."

definition_of_done:
  - "Existing CBU confirmed as onboarding target"
  - "Contracted deal product identified"
  - "Onboarding request submitted"

progress_signals:
  - signal: cbu_targeted
    description: "Existing CBU has been confirmed as the onboarding target"
  - signal: deal_validated
    description: "Deal, contract, and product scope have been reviewed"
  - signal: onboarding_requested
    description: "The onboarding handoff has been submitted"
