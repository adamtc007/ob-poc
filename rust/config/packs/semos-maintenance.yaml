id: semos-maintenance
name: SemOS Maintenance
version: "1.0"
description: >
  Govern the SemOS registry. Author changesets for attributes, verbs,
  schemas, and constellations. Submit for review, validate, dry-run,
  and publish. Bridge ungoverned attributes. Recompute derived values.

invocation_phrases:
  - "semos maintenance"
  - "registry governance"
  - "manage the registry"
  - "semantic os maintenance"
  - "attribute governance"
  - "stewardship workspace"

required_context: []
optional_context:
  - changeset_id

workspaces:
  - semos_maintenance

allowed_verbs:
  - changeset.compose
  - changeset.add-item
  - changeset.remove-item
  - changeset.refine-item
  - changeset.suggest
  - changeset.apply-template
  - changeset.attach-basis
  - changeset.validate-edit
  - changeset.cross-reference
  - changeset.impact-analysis
  - changeset.resolve-conflict
  - changeset.list
  - changeset.get
  - changeset.diff
  - governance.gate-precheck
  - governance.submit-for-review
  - governance.record-review
  - governance.validate
  - governance.dry-run
  - governance.plan-publish
  - governance.publish
  - governance.publish-batch
  - governance.rollback
  - registry.describe-object
  - registry.search
  - attribute.define
  - attribute.define-derived
  - attribute.define-internal
  - attribute.update-internal
  - attribute.inspect
  - attribute.classify
  - attribute.set-evidence-grade
  - attribute.deprecate
  - attribute.bridge-to-semos
  - attribute.read
  - attribute.list
  - typed-attribute.record
  - typed-attribute.get
  - typed-attribute.list-for-entity
  - derivation.recompute-stale
  - service-resource.check-attribute-gaps
  - service-resource.sync-definitions
  - phrase.observe-misses
  - phrase.coverage-report
  - phrase.check-collisions
  - phrase.propose
  - phrase.batch-propose
  - phrase.review-proposals
  - phrase.approve
  - phrase.reject
  - phrase.defer
  - constellation.hydrate
  - constellation.summary
  - delegation.add
  - delegation.end
  - delegation.list-delegates
  - delegation.list-delegations-received
  - discovery.available-actions
  - discovery.cascade-research
  - discovery.entity-context
  - discovery.entity-relationships
  - discovery.explain
  - discovery.graph-walk
  - discovery.inspect-data
  - discovery.run
  - discovery.search-data
  - discovery.search-entities
  - discovery.valid-transitions
  - discovery.verb-detail
  - focus.capture-manifest
  - focus.diff
  - focus.get
  - focus.render
  - focus.set
  - focus.viewport
  - graph.ancestors
  - graph.compare
  - graph.descendants
  - graph.filter
  - graph.find-connected
  - graph.focus
  - graph.group-by
  - graph.path
  - graph.validate
  - graph.view
  - maintenance.bootstrap-seeds
  - maintenance.cleanup
  - maintenance.drain-outbox
  - maintenance.health-pending
  - maintenance.health-stale-dryruns
  - maintenance.reindex-embeddings
  - maintenance.validate-schema-sync
  - schema.cross-reference
  - schema.domain.describe
  - schema.entity.describe
  - schema.entity.list-fields
  - schema.entity.list-relationships
  - schema.entity.list-verbs
  - schema.extract-attributes
  - schema.extract-entities
  - schema.extract-verbs
  - schema.generate-discovery-map
  - schema.generate-erd
  - schema.generate-verb-flow
  - schema.introspect
  - state.blocked-why
  - state.check-consistency
  - state.derive
  - state.derive-all
  - state.diagnose
  - state.list-overrides
  - state.override
  - state.revoke-override
