  - isda.create
  - isda.list
  - isda.add-csa
  - isda.remove-csa
  - isda.add-coverage
  - isda.remove-coverage
  # Instruction profile
  - instruction-profile.create-template
  - instruction-profile.read-template
  - instruction-profile.list-templates
  - instruction-profile.define-message-type
  - instruction-profile.list-message-types
  - instruction-profile.list-assignments
  - instruction-profile.list-field-overrides
  # Tax config
  - tax-config.define-jurisdiction
  - tax-config.list-jurisdictions
  - tax-config.set-tax-status
  - tax-config.list-tax-status
  - tax-config.set-treaty-rate
  - tax-config.list-treaty-rates
  - tax-config.set-reclaim-config
  - tax-config.list-reclaim-configs
  - tax-config.deactivate-reclaim
  - tax-config.set-reporting
  - tax-config.list-reporting
  # Movement
  - movement.subscribe
  - movement.redeem
  - movement.transfer-in
  - movement.transfer-out
  - movement.settle
  - movement.confirm
  - movement.cancel
  - movement.fail
  - movement.read
  - movement.list-by-holding
  - movement.capital-call
  - movement.distribute
  - movement.distribute-recallable
  - movement.record-commitment
  # Delivery
  - delivery.create
  - delivery.read
  - delivery.list
  # Reference data
  - instrument-class.ensure
  - instrument-class.list
  - instrument-class.read
  - security-type.ensure
  - security-type.list
  - subcustodian.ensure
  - subcustodian.list-by-market
  - subcustodian.lookup

forbidden_verbs: []

risk_policy:
  require_confirm_before_execute: true
  max_steps_without_confirm: 5

required_questions: []

optional_questions:
  - field: cbu_name
    prompt: "Which CBU is this for? (leave blank for group template)"
    answer_kind: entity_ref

  - field: profile_action
    prompt: "What would you like to do? (create template / attach to CBU / review / configure)"
    answer_kind: enum
    options_source: profile_actions
    default: "review"

pack_summary_template: >
  Instrument Matrix {{answers.cbu_name}}.

section_layout:
  - title: "Trading Profile"
    verb_prefixes:
      - "trading-profile."
  - title: "Settlement & Custody"
    verb_prefixes:
      - "settlement-chain."
      - "cbu-custody."
      - "entity-settlement."
      - "booking-principal."
      - "booking-location."
  - title: "Corporate Actions"
    verb_prefixes:
      - "corporate-action."
  - title: "Configuration"
    verb_prefixes:
      - "matrix-overlay."
      - "cash-sweep."
      - "trade-gateway."
      - "isda."
      - "instruction-profile."
      - "tax-config."
