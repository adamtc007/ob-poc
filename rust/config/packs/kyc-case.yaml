# KYC Case Journey Pack
# Open, manage, and complete KYC cases with document solicitation

id: kyc-case
name: KYC Case
version: "1.0"
description: >
  Open a KYC case for a client entity. This pack currently focuses on the
  durable case creation boundary so the case can be handed into the BPMN
  runtime cleanly. Follow-on workstream, screening, and document steps are
  handled after the case exists.

invocation_phrases:
  - "open a KYC case"
  - "start KYC review"
  - "KYC case"
  - "new KYC"
  - "KYC renewal"
  - "run KYC"
  - "compliance review"

required_context:
  - client_group_id

optional_context:
