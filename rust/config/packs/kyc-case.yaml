# KYC Case Journey Pack
# Open, manage, and complete KYC cases with document solicitation

id: kyc-case
name: KYC Case
version: "1.0"
description: >
  Open a KYC case for a client entity. This pack currently focuses on the
  durable case creation boundary so the case can be handed into the BPMN
  runtime cleanly. Follow-on workstream, screening, and document steps are
  handled after the case exists.

invocation_phrases:
  - "open a KYC case"
  - "start KYC review"
  - "KYC case"
  - "new KYC"
  - "KYC renewal"
  - "run KYC"
  - "compliance review"

required_context:
  - client_group_id

optional_context:
  - default_cbu
  - target_entity

workspaces:
  - kyc
  - on_boarding

allowed_verbs:
  - kyc-case.create
  - ubo.discover
  - ownership.compute
  - document.solicit
  - document.solicit-batch
  - screening.run
  - screening.sanctions
  - screening.pep
  - screening.adverse-media
  # KYC/screening/evidence macros
  - case.add-party
  - case.approve
  - case.list
  - case.open
  - case.reject
  - case.request-info
  - case.select
  - case.solicit-document
  - case.submit
  - doc-request.create
  - doc-request.reject
  - doc-request.respond
  - doc-request.send
  - doc-request.verify
  - evidence.link
  - evidence.reject
  - evidence.require
  - evidence.verify
  - evidence.waive
  - kyc-workstream.add
  - kyc-workstream.close
  - kyc-workstream.update-status
  - kyc.check-readiness
  - kyc.collect-documents
  - kyc.full-review
  - party.add
  - party.add-company
  - party.add-person
  - party.assign-identifier
  - party.details
  - party.list
  - party.search
  - party.set-address
  - party.update
  - red-flag.escalate
  - red-flag.raise
  - red-flag.resolve
  - screening-ops.bulk-refresh
  - screening-ops.review-hit
  - screening-ops.run
  - screening.full
  - screening.media-check
  - screening.pep-check
  - screening.sanctions-check
  - structure.assign-role
  - structure.list
  - structure.roles
  - structure.select
  - structure.setup
  - tollgate.evaluate
  - tollgate.override
  - ubo.allege
  - ubo.approve
  - ubo.discover
  - ubo.expire
  - ubo.promote
  - ubo.reject
  - ubo.trace-chains
  - ubo.verify

forbidden_verbs:
  - kyc.delete-case
  - entity.delete

risk_policy:
  require_confirm_before_execute: true
  max_steps_without_confirm: 3

required_questions:
  - field: entity_name
    prompt: "Which entity is this KYC case for?"
    answer_kind: entity_ref

  - field: case_type
    prompt: "Is this a new case or a renewal? (new / renewal)"
    answer_kind: enum
    options_source: case_types
    default: "new"

optional_questions:
  - field: reviewer
    prompt: "Who should review this case?"
    answer_kind: entity_ref

  - field: risk_rating
    prompt: "Initial risk rating? (low / medium / high)"
    answer_kind: enum
    options_source: risk_ratings
    default: "medium"

  - field: document_types
    prompt: "Which documents to solicit? (e.g. passport, proof_of_address, certificate_of_incorporation)"
    answer_kind: list
    default: ["passport", "proof_of_address"]

stop_rules:
  - "KYC case created"

templates:
  - template_id: new-kyc-case
    when_to_use: "Create a new KYC case and hand it to the durable workflow"
    steps:
      - verb: kyc-case.create
        args:
          cbu-id: "{answers.entity_name_id}"
          client-group-id: "{context.client_group_id}"
          case-type: "NEW_CLIENT"

  - template_id: renewal-kyc-case
    when_to_use: "Create a renewal KYC case and hand it to the durable workflow"
    steps:
      - verb: kyc-case.create
        args:
          cbu-id: "{answers.entity_name_id}"
          client-group-id: "{context.client_group_id}"
          case-type: "RENEWAL"

pack_summary_template: >
  KYC {{answers.case_type}} case for {{answers.entity_name}},
  risk rating: {{answers.risk_rating}}.

section_layout:
  - title: "Case Management"
    verb_prefixes:
      - "kyc."
  - title: "Due Diligence"
    verb_prefixes:
      - "ubo."
      - "screening."
  - title: "Documentation"
    verb_prefixes:
      - "document."

definition_of_done:
  - "KYC case created with correct type"
  - "UBO discovery completed (new cases)"
  - "Required documents solicited"
  - "Screening run against entity"
  - "Reviewer assigned if specified"

progress_signals:
  - signal: case_opened
    description: "KYC case has been created"
  - signal: ubo_complete
    description: "UBO discovery finished"
  - signal: docs_solicited
    description: "All required documents have been requested"
  - signal: screening_complete
    description: "Screening has been run"
