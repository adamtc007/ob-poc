# Book Setup Journey Pack
# Configure a client book (set of CBUs) with jurisdiction-specific templates

id: book-setup
name: Book Setup
version: "1.0"
description: >
  Set up a client book — a collection of CBUs under a single apex entity.
  Supports Luxembourg SICAV and UK OEIC structures with jurisdiction-specific
  templates for fund creation, product assignment, and custody configuration.

invocation_phrases:
  - "set up a book"
  - "configure client book"
  - "book setup"
  - "create a fund book"
  - "new book for client"
  - "set up funds"

required_context:
  - client_group_id

optional_context:
  - default_cbu
  - jurisdiction

workspaces:
  - cbu
  - onboarding_request

