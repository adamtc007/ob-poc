  - research.sources.find-for-jurisdiction
  - research.sources.info
  - research.sources.list
  - research.sources.search
  - research.workflow.audit-trail
  - research.workflow.confirm-decision
  - research.workflow.pending-decisions
  - research.workflow.record-action
  - research.workflow.record-anomaly
  - research.workflow.record-correction
  - research.workflow.record-decision
  - research.workflow.reject-decision
  - research.workflow.resolve-anomaly
  - research.workflow.supersession-trail
  # Product suite macros
  - structure.product-suite-custody-fa-ta
  - structure.product-suite-full
