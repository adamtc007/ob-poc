# Noun Index — ECIR (Entity-Centric Intent Resolution)
#
# Maps domain nouns to verb candidates via three resolution paths:
#   1. ExplicitMapping: action_verbs[action] → specific verb FQNs
#   2. NounKeyMatch: noun_keys → verbs with matching metadata.noun
#   3. SubjectKindMatch: entity_type_fqn → verbs with matching subject_kinds
#
# Each noun entry has:
#   aliases          — exact-match canonical aliases (longest-match-first scanning)
#   natural_aliases  — softer/fuzzy matches (broader recall, lower precision)
#   entity_type_fqn  — entity type for subject_kinds fallback (optional)
#   noun_keys        — maps to metadata.noun values on verbs
#   action_verbs     — explicit action→verb FQN mappings (optional, highest priority)

