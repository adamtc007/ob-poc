# Verb Concepts Lexicon
#
# This file defines verb concepts with labels, synonyms, and invocation phrases
# for the lexical search lane. It complements (not duplicates) verb_schemas.
#
# Ownership split:
# - verb_concepts.yaml OWNS: labels, synonyms, invocation phrases, domain, target_types, crud_type
# - verb_schemas/*.yaml OWNS: args, types, runtime behavior, validation
#
# Join key: dsl_verb (e.g., "cbu.create")

