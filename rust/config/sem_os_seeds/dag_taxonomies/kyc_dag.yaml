stream_governed:
  id: kyc_ubo_determination_stream
  description: >
    UBO/KYC determination verbs are governed by the stream lexicon and fold
    preconditions, not by DAG from-state/to-state slots. The DAG intentionally
    has no lifecycle slot for these stream-backed verb families.
  verb_families:
    - ubo.edge.*
    - ubo.determination.*
    - kyc.subject.*
    - kyc.role.*
    - kyc.obligation.*
    - kyc.person.*
  stream_tables:
    - kyc_intent_events
    - kyc_subject_streams
    - kyc_control_edge_projection
    - kyc_obligation_projection
    - kyc_subject_rollup_projection
  governance:
    dag_slots: intentionally_absent
    declaration: >
      Current state is derived from kyc_intent_events by folds/projections.
      Edge status is fold-output-only (K-11); no verb sets it directly.
    content_addressed_lexicon_manifest:
      table: kyc_lexicon_manifest
      enforcement_refs:
        - rust/crates/ob-poc-kyc-store/src/manifest.rs
    fold_preconditions:
      keys: [K-11]
      enforcement_refs:
        - rust/crates/ob-poc-kyc-substrate/src/lexicon.rs
        - rust/crates/ob-poc-kyc-store/src/store.rs
    approval_gate:
      key: K-23
      enforcement_refs:
        - rust/src/domain_ops/kyc_stream_ops.rs

# =============================================================================
# 1. OVERALL KYC-CASE LIFECYCLE (per case, derived)
# =============================================================================

overall_lifecycle:
  id: kyc_case_overall_lifecycle
  scope: per_kyc_case
  derived: true
  description: >
    Aggregate 8-phase lifecycle of a KYC case from intake through
    decision + any periodic-review re-entry. Derived from
    cases.status + entity_workstreams.status + screenings.status +
    kyc_decisions + red_flags + tollgate evaluations.

  phases:

    - name: case_opened
      description: "Case created; no workstreams or screenings yet."
      derivation:
        all_of:
          - "cases.status = 'INTAKE'"
          - "COUNT entity_workstreams WHERE case_id = this.case_id = 0"
      progression_verbs: [kyc-case.create, case-event.record]
      next_phase: discovery

    - name: discovery
      description: |
        Entity workstreams created; evidence collection in progress.
        UBO discovery runs here; document requests outbound.
      derivation:
        all_of:
          - "cases.status = 'DISCOVERY'"
          - "EXISTS entity_workstreams WHERE case_id = this.case_id"
      progression_verbs:
        - kyc-case.update-status
        - entity-workstream.update-status
        - document.create-request
        - ubo-registry.discover
      next_phase: screening_in_flight

    - name: screening_in_flight
      description: |
        Screenings running against parties; red-flags raised where hits
        found; screening-ops decisions pending.
      derivation:
        all_of:
          - "cases.status IN ('DISCOVERY', 'ASSESSMENT')"
          - "EXISTS screenings WHERE status IN ('RUNNING', 'HIT_PENDING_REVIEW')"
      progression_verbs:
        - screening.record-hit
        - red-flag.raise
        - screening.confirm
        - screening.dismiss
      next_phase: assessment

    - name: assessment
      description: |
        Risk-rating set; UBO chain finalized; all workstreams reached
        SCREEN or ASSESS state. Red-flags addressed.
      derivation:
        all_of:
          - "cases.status = 'ASSESSMENT'"
          - "cases.risk_rating IS NOT NULL"
          - "ALL entity_workstreams.status IN ('ASSESS', 'COMPLETE', 'ENHANCED_DD')"
      progression_verbs:
        - kyc-case.set-risk-rating
        - ubo-registry.promote
        - red-flag.close
      next_phase: review

    - name: review
      description: |
        Committee / senior-compliance review. All workstreams complete;
        kyc_decision row being drafted.
      derivation:
        all_of:
          - "cases.status = 'REVIEW'"
          - "ALL entity_workstreams.status = 'COMPLETE'"
      progression_verbs:
        - tollgate.evaluate
        - case.approve
        - case.reject
        - tollgate.override
      next_phase: decided

    - name: decided
      description: |
        Terminal business decision captured in kyc_decisions.status.
        Case proceeds to approval, rejection, referral, or closure.
      derivation:
        any_of:
          - "cases.status IN ('APPROVED', 'REJECTED', 'WITHDRAWN', 'DO_NOT_ONBOARD', 'EXPIRED', 'REFER_TO_REGULATOR')"
          - "EXISTS kyc_decisions WHERE case_id = this.case_id AND status IN ('CLEARED', 'REJECTED', 'CONDITIONAL')"
      progression_verbs:
        - kyc-case.close
        - kyc-case.reopen  # → remediation or discovery
      next_phase: closed (terminal) or remediation

    - name: remediation
      description: |
        Post-decision periodic review or event-driven re-review. Case
        re-opens with case_type = 'REMEDIATION' or 'PERIODIC_REVIEW'.
        Flags v1.3 candidate: periodic-review cadence not yet formally
        modeled (calendar-driven, not modeled here).
      derivation:
        all_of:
          - "cases.case_type IN ('PERIODIC_REVIEW', 'REMEDIATION', 'EVENT_DRIVEN')"
          - "cases.status IN ('DISCOVERY', 'ASSESSMENT', 'REVIEW')"
      progression_verbs: (re-enter the per-phase transitions above)
      next_phase: decided

    - name: closed
      description: |
        Terminal. Case concluded; no further transitions. Re-opens
        require a new case row (or reopen verb).
      derivation:
        all_of:
          - "cases.closed_at IS NOT NULL"
      progression_verbs: []
      next_phase: (none)

# =============================================================================
# 2. PER-SLOT STATE MACHINES
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # 2.1 Reconcile-existing state machines
  # ---------------------------------------------------------------------------

  - id: kyc_case
    stateless: false
    state_machine:
      id: kyc_case_lifecycle
      source_entity: '"ob-poc".cases'
      state_column: status
      scope: per_case
      description: |
        11-state KYC case lifecycle. Lifted (reconcile-existing) from
        existing rust/config/sem_os_seeds/state_machines/kyc_case_lifecycle.yaml.
        Schema-backed via cases.status CHECK constraint.
      predicate_bindings:
        - entity: evidence_requirement
          source_kind: dag_entity
          source_entity: evidence_requirement
          scope: attached_to this kyc_case
          required_universe:
            source_kind: dag_entity
            source_entity: evidence_requirement
        - entity: ubo_registry_entry
          source_kind: dag_entity
          source_entity: ubo_registry_entry
          scope: attached_to this kyc_case
          required_universe:
            source_kind: dag_entity
            source_entity: ubo_registry_requirement
        - entity: red_flag
          source_kind: dag_entity
          source_entity: red_flag
          scope: attached_to this kyc_case
        - entity: screening_run
          source_kind: dag_entity
          source_entity: screening_run
          scope: attached_to this kyc_case
          required_universe:
            source_kind: dag_entity
            source_entity: screening_requirement
      states:
        - id: INTAKE
          entry: true
          description: "Case created; scope not yet determined."
        - id: DISCOVERY
          description: "Entity workstreams created; evidence collection."
        - id: ASSESSMENT
          description: "Risk-rating being determined; UBO chain finalized."
        - id: REVIEW
          description: "Committee / compliance sign-off in progress."
        - id: APPROVED
          description: "Case approved; CBU cleared for onboarding."
          green_when: |
            every evidence_requirement exists
            AND every evidence_requirement.verification_status = VERIFIED
            AND every ubo_registry_entry exists
            AND every ubo_registry_entry.status != PENDING
            AND every ubo_registry_entry.status != REJECTED
            AND every ubo_registry_entry.status != EXPIRED
            AND count(red_flag where red_flag.status = OPEN) = 0
            AND every screening_run exists
            AND every screening_run.status = CLEAN
        - id: REJECTED
          description: "Case rejected; CBU cannot onboard under this case."
        - id: BLOCKED
          description: "Blocked pending external resolution (investigation, regulator)."
        - id: WITHDRAWN
          description: "Client withdrew application."
        - id: DO_NOT_ONBOARD
          description: "Hard-stop terminal — refusal with compliance hold."
        # Additional valid states from case lifecycle YAML:
        - id: EXPIRED
          entry_via:
            scheduler:
              name: case-validity-expiry
          description: "Case timed out (external — e.g. document validity lapsed)."
        - id: REFER_TO_REGULATOR
          description: "Escalated to external authority."
      transitions:
        - from: INTAKE
          to: DISCOVERY
          via: kyc-case.update-status
        - from: DISCOVERY
          to: ASSESSMENT
          via: kyc-case.update-status
        - from: ASSESSMENT
          to: REVIEW
          via: kyc-case.update-status
        # REVIEW → APPROVED: kyc-case.approve verb runs while REVIEW is
        # green; its handler makes the changes that satisfy APPROVED's
        # green_when. The destination state's green_when IS the
        # postcondition (state-node green-switch model, v1.4).
        - from: REVIEW
          to: APPROVED
          via: kyc-case.approve
        - from: REVIEW
          to: REJECTED
          via: kyc-case.reject
        - from: "(any non-terminal)"
          to: BLOCKED
          via: kyc-case.escalate
        - from: "(any non-terminal)"
          to: WITHDRAWN
          via: kyc-case.close
        - from: "(any non-terminal)"
          to: DO_NOT_ONBOARD
          via: kyc-case.reject (with do-not-onboard flag)
        - from: "(any non-terminal)"
          to: REFER_TO_REGULATOR
          via: [kyc-case.escalate, kyc-case.refer]
        - from: APPROVED
          to: DISCOVERY
          via: kyc-case.reopen (for periodic review)
      terminal_states: [APPROVED, REJECTED, WITHDRAWN, DO_NOT_ONBOARD, EXPIRED, REFER_TO_REGULATOR]

  - id: entity_kyc
    stateless: false
    state_machine:
      id: entity_kyc_lifecycle
      source_entity: "(derived — tracks entity journey through case workstreams)"
      state_column: (derived from entity_workstreams.status + stream projections)
      description: |
        Entity-level KYC journey (reconcile-existing from
        state_machines/entity_kyc_lifecycle.yaml). Tracks an entity's
        progression from initial skeleton/placeholder through
        workstream completion to approval as part of a case.
      states:
        - id: placeholder
          entry: true
          description: "Entity exists in skeleton form; no investigation yet."
        - id: empty
          description: "Entity identified but no data beyond basic identifiers."
        - id: filled
          description: "Entity data captured; workstream opened."
        - id: workstream_open
          description: "Active workstream progressing."
        - id: screening_complete
          description: "All required screenings run and cleared/dismissed."
        - id: evidence_collected
          description: "Required evidence collected and linked."
        - id: verified
          description: "Entity data verified against evidence + third-party sources."
        - id: approved
          description: "Entity cleared as part of a case."
      transitions:
        - from: placeholder
          to: empty
          via: "(backend: entity lookup / GLEIF import)"
        - from: empty
          to: filled
          via: skeleton.build
        - from: filled
          to: workstream_open
          via: entity-workstream.create
        - from: workstream_open
          to: screening_complete
          via: screening.run
        - from: screening_complete
          to: evidence_collected
          via: evidence.attach-document
        - from: evidence_collected
          to: verified
          via: evidence.mark-verified
        - from: verified
          to: approved
          via: entity-workstream.complete
      terminal_states: [approved]

  # ---------------------------------------------------------------------------
  # 2.2 New state machines (from schema evidence)
  # ---------------------------------------------------------------------------

  - id: entity_workstream
    stateless: false
    state_machine:
      id: entity_workstream_lifecycle
      source_entity: '"ob-poc".entity_workstreams'
      state_column: status
      description: |
        Per-entity workstream within a KYC case. 10 states from
        schema CHECK constraint.
      states:
        - id: PENDING
          entry: true
          description: "Workstream created; no activity."
        - id: COLLECT
          description: "Collecting facts + evidence."
        - id: VERIFY
          description: "Verifying collected data."
        - id: SCREEN
          description: "Running screenings."
        - id: ASSESS
          description: "Risk assessment in progress."
        - id: COMPLETE
          description: "All steps passed; ready for case-level review."
        - id: BLOCKED
          description: "Held on external dependency."
        - id: ENHANCED_DD
          description: "Enhanced due diligence required."
        - id: REFERRED
          description: "Referred up the escalation chain."
        - id: PROHIBITED
          description: "Terminal — entity cannot proceed."
      transitions:
        - from: PENDING
          to: COLLECT
          via: entity-workstream.create
        - from: COLLECT
          to: VERIFY
          via: evidence.mark-verified
        - from: VERIFY
          to: SCREEN
          via: screening.run
        - from: SCREEN
          to: ASSESS
          via: "(backend: screenings cleared)"
        - from: ASSESS
          to: COMPLETE
          via: entity-workstream.complete
        - from: "(any non-terminal)"
          to: BLOCKED
          via: entity-workstream.update-status
        - from: "(any non-terminal)"
          to: ENHANCED_DD
          via: red-flag.escalate
        - from: "(any non-terminal)"
          to: REFERRED
          # Retargeted (state-graph remediation Phase 5e): kyc-case.escalate
          # only ever wrote cases.escalation_level/status -- it never
          # touched entity_workstreams. kyc-case.refer is the dedicated verb
          # that actually cascades non-terminal workstreams to REFERRED.
          via: kyc-case.refer
        - from: "(any non-terminal)"
          to: PROHIBITED
          via: kyc-case.reject
      terminal_states: [COMPLETE, PROHIBITED]

  - id: screening
    stateless: false
    state_machine:
      id: screening_lifecycle
      source_entity: '"ob-poc".screenings'
      state_column: status
      description: |
        Per-screening lifecycle. 8 states from schema CHECK. Applies
        to each screening_type (SANCTIONS, PEP, ADVERSE_MEDIA, CREDIT,
        CRIMINAL, REGULATORY, CONSOLIDATED).
      states:
        - id: PENDING
          entry: true
          description: "Screening queued; not yet run."
        - id: RUNNING
          description: "Provider call in flight."
        - id: CLEAR
          description: "No hit."
        - id: HIT_PENDING_REVIEW
          description: "Hit found; awaiting analyst review."
        - id: HIT_CONFIRMED
          description: "Hit reviewed and confirmed — real match."
        - id: HIT_DISMISSED
          description: "Hit reviewed and dismissed — false positive."
        - id: ERROR
          description: "Provider error; needs retry."
        - id: EXPIRED
          description: "Stale; needs re-running."
      transitions:
        - from: PENDING
          to: RUNNING
          via: screening.run
        - from: RUNNING
          to: CLEAR
          via: "(backend: no hits)"
        - from: RUNNING
          to: HIT_PENDING_REVIEW
          via: screening.complete
        - from: HIT_PENDING_REVIEW
          to: HIT_CONFIRMED
          via: screening.review-hit
        - from: HIT_PENDING_REVIEW
          to: HIT_DISMISSED
          via: screening.review-hit
        - from: RUNNING
          to: ERROR
          via: "(backend: provider error)"
        - from: ERROR
          to: PENDING
          via: screening.bulk-refresh
        - from: "(CLEAR, HIT_DISMISSED)"
          to: EXPIRED
          via: "(time-decay trigger)"
        - from: EXPIRED
          to: PENDING
          via: screening.bulk-refresh
      terminal_states: [HIT_CONFIRMED]  # needs red_flag escalation

  - id: ubo_evidence
    stateless: false
    state_machine:
      id: ubo_evidence_lifecycle
      source_entity: '"ob-poc".ubo_evidence'
      state_column: verification_status
      description: "UBO evidence verification (4 states)."
      states:
        - id: PENDING
          entry: true
        - id: VERIFIED
        - id: REJECTED
        - id: EXPIRED
      transitions:
        - from: PENDING
          to: VERIFIED
          via: evidence.mark-verified
        - from: PENDING
          to: REJECTED
          via: evidence.mark-rejected
        - from: VERIFIED
          to: EXPIRED
          via: "(time-decay)"
      terminal_states: [REJECTED]

  # kyc_ubo_registry slot DELETED (state-graph remediation Phase 6a): the
  # entire ubo.registry.* verb family it depended on (promote/advance/
  # waive/reject/expire) has been deleted -- every op phantom-wrote
  # nonexistent columns against the live kyc_ubo_registry/kyc_ubo_evidence
  # schema and never successfully executed. The dsl.kyc/ubo.edge.*/
  # ubo.determination.* verbs govern UBO determination now, deliberately
  # with no DAG slot (governance is lexicon + fold-precondition + K-23, not
  # a from-state/to-state FSM).

  - id: kyc_ubo_evidence
    stateless: false
    state_machine:
      id: kyc_ubo_evidence_lifecycle
      source_entity: '"ob-poc".kyc_ubo_evidence'
      state_column: status
      description: "Evidence for UBO determination (7 states)."
      states:
        - id: REQUIRED
          entry: true
        # wire-later (state-graph remediation Phase 7d): the legacy document
        # request verb domain does not exist in this codebase; document.yaml
        # declares only the live `document:` domain. REQUESTED
        # was never reachable via any verb.
        - id: REQUESTED
          entry_via:
            signal:
              source: document_request_dispatch
        - id: RECEIVED
        - id: VERIFIED
        - id: REJECTED
          description: "Not terminal -- evidence.attach-document accepts a re-attach from REJECTED (see transitions)."
        - id: WAIVED
        # wire-later: no time-decay job exists; VERIFIED never expires today.
        - id: EXPIRED
          entry_via:
            scheduler:
              name: evidence-expiry
      transitions:
        # REQUIRED to REQUESTED and REQUESTED to RECEIVED rows
        # deleted (POLICY): the legacy send/verify verbs do not exist.
        # The real code path (evidence.rs do_link, verb
        # evidence.attach-document) accepts REQUIRED directly, with no
        # REQUESTED intermediate step.
        - from: REQUIRED
          to: RECEIVED
          via: evidence.attach-document
        - from: RECEIVED
          to: VERIFIED
          via: evidence.mark-verified
        - from: RECEIVED
          to: REJECTED
          via: evidence.mark-rejected
        # Added (state-graph remediation Phase 7d, ratified 7.14): code
        # (evidence.rs do_link) allows re-attaching a document after
        # rejection, contradicting REJECTED's old terminal_states
        # membership. Code wins.
        - from: REJECTED
          to: RECEIVED
          via: evidence.attach-document
        - from: "(any non-terminal)"
          to: WAIVED
          via: evidence.mark-waived
        # from: VERIFIED to: EXPIRED (via: "(time-decay)") row deleted
        # (POLICY): no time-decay job exists in this codebase.
      terminal_states: [WAIVED]

  - id: red_flag
    stateless: false
    state_machine:
      id: red_flag_lifecycle
      source_entity: '"ob-poc".red_flags'
      state_column: status
      description: "Risk-flag lifecycle (6 states)."
      states:
        - id: OPEN
          entry: true
          description: "Raised; no action yet."
        - id: UNDER_REVIEW
          description: "Being investigated."
        - id: MITIGATED
          description: "Mitigation applied; flag closed as handled."
        - id: WAIVED
          description: "Compliance waiver granted."
        - id: BLOCKING
          description: "Unresolved blocker — case cannot proceed."
        - id: CLOSED
          description: "Terminal — resolved or no-longer-applicable."
      transitions:
        - from: OPEN
          to: UNDER_REVIEW
          via: red-flag.escalate
        - from: UNDER_REVIEW
          to: MITIGATED
          via: red-flag.close
        - from: UNDER_REVIEW
          to: WAIVED
          via: red-flag.waive
        - from: UNDER_REVIEW
          to: BLOCKING
          via: red-flag.update-rating
        - from: "(MITIGATED, WAIVED)"
          to: CLOSED
          via: "(case progression)"
        - from: BLOCKING
          to: MITIGATED
          via: red-flag.close
      terminal_states: [CLOSED]

  - id: doc_request
    stateless: false
    state_machine:
      id: doc_request_lifecycle
      source_entity: '"ob-poc".doc_requests'
      state_column: status
      description: "Document request lifecycle (9 states)."
      states:
        - id: DRAFT
          entry: true
        - id: REQUIRED
        - id: REQUESTED
        - id: RECEIVED
        - id: UNDER_REVIEW
        - id: VERIFIED
        - id: REJECTED
        - id: WAIVED
        - id: EXPIRED
      transitions:
        - from: DRAFT
          to: REQUIRED
          via: document.create-request
        - from: REQUIRED
          to: REQUESTED
          via: document.mark-requested
        - from: REQUESTED
          to: RECEIVED
          via: document.mark-received
        - from: RECEIVED
          to: UNDER_REVIEW
          via: "(compliance review)"
        - from: UNDER_REVIEW
          to: VERIFIED
          via: document.verify-request
        - from: UNDER_REVIEW
          to: REJECTED
          via: evidence.mark-rejected
        - from: "(any non-terminal)"
          to: WAIVED
          via: evidence.mark-waived
        - from: "(VERIFIED, REJECTED)"
          to: EXPIRED
          via: "(time-decay)"
      terminal_states: [REJECTED, WAIVED]

  - id: outreach_request
    stateless: false
    state_machine:
      id: outreach_request_lifecycle
      source_entity: '"ob-poc".outreach_requests'
      state_column: status
      description: "Counterparty outreach (7 states)."
      states:
        - id: DRAFT
          entry: true
        - id: PENDING
        - id: SENT
        - id: REMINDED
        - id: RESPONDED
        - id: CLOSED
        - id: EXPIRED
      transitions:
        - from: DRAFT
          to: PENDING
          via: request.create
        - from: PENDING
          to: SENT
          via: request.remind
        - from: SENT
          to: REMINDED
          via: request.remind
        - from: "(SENT, REMINDED)"
          to: RESPONDED
          via: request.fulfill
        - from: "(RESPONDED, REMINDED)"
          to: CLOSED
          via: request.fulfill
        - from: "(SENT, REMINDED)"
          to: EXPIRED
          via: "(cutoff passed)"
      terminal_states: [CLOSED, EXPIRED]

  - id: kyc_decision
    stateless: false
    state_machine:
      id: kyc_decision_lifecycle
      source_entity: '"ob-poc".kyc_decisions'
      state_column: status
      description: "Final KYC decision (4 states)."
      predicate_bindings:
        - entity: kyc_case
          source_kind: dag_entity
          scope: parent kyc_case
      states:
        - id: PENDING_REVIEW
          entry: true
        - id: CLEARED
          green_when: |
            parent kyc_case exists
            AND parent kyc_case.state = APPROVED
        - id: REJECTED
        - id: CONDITIONAL
      transitions:
        # PENDING_REVIEW → CLEARED: kyc-case.approve drives this; the
        # destination state's green_when expresses the test (parent
        # kyc_case.status = APPROVED).
        - from: PENDING_REVIEW
          to: CLEARED
          via: kyc-case.approve
        - from: PENDING_REVIEW
          to: REJECTED
          via: kyc-case.reject
        - from: PENDING_REVIEW
          to: CONDITIONAL
          via: kyc-case.approve-with-conditions
      terminal_states: [CLEARED, REJECTED, CONDITIONAL]

  - id: kyc_service_agreement
    stateless: false
    state_machine:
      id: kyc_service_agreement_lifecycle
      source_entity: '"ob-poc".kyc_service_agreements'
      state_column: status
      description: |
        KYC-as-a-Service sponsor arrangement (4 states, proposed —
        schema today has no CHECK constraint).
      states:
        - id: DRAFT
          entry: true
        - id: ACTIVE
        - id: SUSPENDED
        - id: TERMINATED
      transitions:
        - from: DRAFT
          to: ACTIVE
          via: kyc-agreement.update-status (status=ACTIVE)
        - from: ACTIVE
          to: SUSPENDED
          via: kyc-agreement.update-status (status=SUSPENDED)
        - from: SUSPENDED
          to: ACTIVE
          via: kyc-agreement.update-status (status=ACTIVE)
        - from: "(ACTIVE, SUSPENDED)"
          to: TERMINATED
          via: kyc-agreement.update-status
      terminal_states: [TERMINATED]
    product_gates:
      activated_by: [product.kyc_service]

  # ---------------------------------------------------------------------------
  # 2.3 Stateless (compositional / read-only / rule-entity)
  # ---------------------------------------------------------------------------

  - id: workspace_root
    stateless: true
    rationale: "Aggregation root over KYC domains."

  - id: client_group
    stateless: false
    state_machine: (reconcile-existing — see instrument_matrix_dag.yaml §2.2 group.discovery_status_lifecycle; same table shared across workspaces)

  - id: board
    stateless: true
    rationale: |
      Board composition is transactional data (director lists, disclosures,
      resolutions). No lifecycle per se; directors are added / retired.
      Verbs are CRUD + research. Flag for v1.3: director approval might
      warrant its own workflow under enhanced-DD scope.

  - id: partnership
    stateless: true
    rationale: |
      Partnership structure is reference data (partners, interests).
      Partnership KYC uses the same entity_kyc lifecycle; the partnership
      itself doesn't have independent state.

  - id: trust
    stateless: true
    rationale: |
      Trust structure (trustee, settlor, beneficiaries) is ref data.
      Each party in the trust runs through entity_kyc_lifecycle
      independently.

  - id: capital
    stateless: true
    rationale: |
      Source-of-wealth / source-of-funds assessment. Verbs are assess /
      verify / report — CRUD pattern. No independent lifecycle; feeds
      into entity_kyc verification.

  - id: coverage
    stateless: true
    rationale: |
      Coverage computation is a cross-cutting read — given a case,
      what's covered. Stateless projection.

  - id: skeleton_build
    stateless: true
    rationale: |
      One-shot operation to create entity scaffold. No state;
      invocation either succeeds or fails.

  - id: tollgate
    stateless: true
    rationale: |
      Tollgate evaluations are pass/fail boolean at each case checkpoint
      (see tollgate_evaluations table — `passed` boolean, `overridden`
      boolean). No lifecycle. The GATE itself has behavior (approve /
      override / waive) but the tollgate instance is transactional.

  - id: case_event
    stateless: true
    rationale: |
      Event log (record / list). Append-only audit trail. Individual
      events don't transition state.

  - id: ubo_snapshot
    stateless: true
    rationale: |
      Point-in-time snapshot of UBO state (not a lifecycle entity).
      snapshot_type categorical only (MANUAL / PERIODIC / EVENT_DRIVEN /
      CASE_OPEN / CASE_CLOSE).

  # ---------------------------------------------------------------------------
  # 2.4 Relocated from cbu_dag.yaml (2026-06-22 — domain isolation)
  #
  # These KYC-domain state machines previously lived in the CBU DAG. They are
  # owned by KYC; CBU reads them read-only via a reference stub. Slot content
  # preserved exactly as authored in cbu_dag.yaml.
  # ---------------------------------------------------------------------------

  - id: entity_proper_person
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [proper_person]
    entry_state: GHOST
    state_machine:
      id: entity_proper_person_lifecycle
      source_entity: '"ob-poc".entity_proper_persons'
      state_column: person_state
      scope: per_natural_person_entity
      description: |
        Natural-person entity state. 3 states from schema comment.
        Applies to UBOs, directors, signatories, beneficial owners.
      states:
        - id: GHOST
          entry: true
          description: "Name-only; no identifying attributes."
        - id: IDENTIFIED
          description: "Has DOB / nationality / ID numbers."
        - id: VERIFIED
          description: "Confirmed by official documents."
      transitions:
        - from: GHOST
          to: IDENTIFIED
          via: entity.identify
        - from: IDENTIFIED
          to: VERIFIED
          via: entity.verify
      terminal_states: [VERIFIED]

  - id: entity_limited_company_ubo
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [limited_company]
    entry_state: PENDING
    state_machine:
      id: entity_limited_company_ubo_lifecycle
      source_entity: '"ob-poc".entity_limited_companies'
      state_column: ubo_status
      scope: per_limited_company_entity
      description: |
        UBO discovery state for limited companies. 5 states from
        schema comment. Tracks whether beneficial ownership has
        been traced and categorised.
      states:
        - id: PENDING
          entry: true
          description: "UBO discovery not yet attempted."
        - id: DISCOVERED
          description: "Beneficial owners identified via research."
        - id: PUBLIC_FLOAT
          description: "Widely-held public company; no UBO lookup required."
        - id: EXEMPT
          description: "Regulator-exempt (state-owned, sovereign, etc.)."
        - id: MANUAL_REQUIRED
          description: "Automated discovery failed; manual investigation needed."
      transitions:
        - from: PENDING
          to: DISCOVERED
          via: "(backend: UBO discovery pipeline)"
        - from: PENDING
          to: PUBLIC_FLOAT
          via: "(backend: listed-company check)"
        - from: PENDING
          to: EXEMPT
          via: "(backend: exemption classifier)"
        - from: PENDING
          to: MANUAL_REQUIRED
          via: "(backend: pipeline failure)"
        # from: MANUAL_REQUIRED to: DISCOVERED row deleted (state-graph
        # remediation Phase 6a, POLICY): the promotion verb no longer
        # exists (the whole ubo.registry.* family was deleted --
        # phantom-writing ops that never successfully executed). wire-later:
        # no verb currently resolves a manual UBO-discovery override.
      terminal_states: [DISCOVERED, PUBLIC_FLOAT, EXEMPT]

  - id: investor
    stateless: false
    state_machine:
      id: investor_lifecycle
      owner: "ops"
      expected_lifetime: long_lived     # V1.3-4 (SUSPENDED present)
      source_entity: '"ob-poc".investors'
      state_column: (derived from investor lifecycle events + status)
      scope: per_investor
      description: |
        Investor commercial lifecycle — from eligibility check through
        active subscription to offboarding. Distinct from investor_kyc
        (parallel; see below). This lifecycle is the
        "can-they-invest-right-now" state.
      states:
        - id: DRAFT
          entry: true
          description: "Investor record created; eligibility not confirmed."
        - id: ELIGIBLE
          description: "Eligibility confirmed (qualification test passed)."
        - id: ACTIVE
          description: "Subscribed; holding units."
        # REDEEMING + REDEEMED removed 2026-04-29 (D-003) — orphan states with
        # zero transitions reaching or leaving them. Redemption flow re-modelled
        # later if BNY-style redemption lifecycle is needed.
        - id: SUSPENDED
          description: "Temporary hold (KYC refresh, dispute, sanctions)."
        - id: OFFBOARDED
          description: "Account closed; exit completed."
      transitions:
        - from: DRAFT
          to: ELIGIBLE
          via: investor.mark-eligible
        - from: ELIGIBLE
          to: ACTIVE
          via: investor.activate
          precondition: "investor_kyc.status = APPROVED"
        - from: ACTIVE
          to: SUSPENDED
          via: investor.suspend
        - from: SUSPENDED
          to: ACTIVE
          via: investor.reinstate
        - from: "(ACTIVE, SUSPENDED)"
          to: OFFBOARDED
          via: investor.offboard
      terminal_states: [OFFBOARDED]

  - id: investor_kyc
    stateless: false
    # V1.3-4: no SUSPENDED state — KYC refresh semantics handled via
    # EXPIRED / REFRESH_REQUIRED; SUSPENDED doesn't apply.
    suspended_state_exempt: true
    # V1.3-6 periodic review cadence.
    periodic_review_cadence:
      base_window: "P2Y"
      risk_tiered_overrides:
        - risk_tier: HIGH
          window: "P1Y"
        - risk_tier: LOW
          window: "P3Y"
      review_scope: full
    state_machine:
      id: investor_kyc_lifecycle
      owner: compliance
      expected_lifetime: long_lived
      source_entity: '"ob-poc".investors'
      state_column: kyc_status
      scope: per_investor
      description: |
        Per-investor KYC state, parallel to investor_lifecycle. 6
        states from schema comment. Refresh cadence is regulatory
        (annual high-risk, biennial low-risk). Matches KYC findings
        V1.3-CAND-3 periodic review cadence pattern.
      states:
        - id: NOT_STARTED
          entry: true
        - id: IN_PROGRESS
          description: "KYC evidence being collected + verified."
        - id: APPROVED
          description: "KYC passed; investor can be ACTIVE."
        - id: REJECTED
          description: "KYC failed; investor cannot be ACTIVE. Terminal."
        - id: EXPIRED
          entry_via:
            trigger:
              name: kyc_expires_at
          description: "Approval lapsed; refresh required before new activity."
        - id: REFRESH_REQUIRED
          description: "Material change triggered mandatory re-KYC."
      transitions:
        - from: NOT_STARTED
          to: IN_PROGRESS
          via: investor.start-kyc
        - from: IN_PROGRESS
          to: APPROVED
          via: investor.approve-kyc
        - from: IN_PROGRESS
          to: REJECTED
          via: investor.reject-kyc
        - from: APPROVED
          to: EXPIRED
          via: "(backend: kyc_expires_at trigger)"
        - from: APPROVED
          to: REFRESH_REQUIRED
          via: investor.request-documents
        - from: "(EXPIRED, REFRESH_REQUIRED)"
          to: IN_PROGRESS
          via: investor.start-kyc
      terminal_states: [REJECTED]

  - id: holding
    stateless: false
    state_machine:
      id: holding_lifecycle
      owner: "ops"
      expected_lifetime: long_lived     # V1.3-4
      source_entity: '"ob-poc".holdings'
      state_column: holding_status
      scope: per_holding
      description: |
        Per-holding lifecycle. 7 states (schema has 4; v1.3 extends
        with RESTRICTED / PLEDGED / FROZEN per CBU findings G-8 for
        encumbered-holdings semantics — legal locks, collateral pledges,
        sanctions freezes). Schema migration deferred (D-2).
      states:
        - id: PENDING
          entry: true
          description: "Subscription recorded; awaiting settlement."
        - id: ACTIVE
          description: "Settled; units held; dividends accrue."
        - id: SUSPENDED
          description: "Temporary hold (dispute, KYC suspend on investor)."
        - id: RESTRICTED
          description: "Legal lock — court order, dispute freeze, specific restriction."
        - id: PLEDGED
          description: "Pledged as collateral against a loan/derivative; cannot redeem freely."
        - id: FROZEN
          description: "Sanctions exposure on investor; regulatory freeze."
        - id: CLOSED
          description: "Redemption complete; zero units."
      transitions:
        - from: PENDING
          to: ACTIVE
          via: holding.update-status
          args: { status: ACTIVE }
        - from: ACTIVE
          to: SUSPENDED
          via: holding.update-status
          args: { status: SUSPENDED }
        - from: SUSPENDED
          to: ACTIVE
          via: holding.update-status
          args: { status: ACTIVE }
        - from: ACTIVE
          to: RESTRICTED
          via: holding.restrict
        - from: RESTRICTED
          to: ACTIVE
          via: holding.lift-restriction
        - from: ACTIVE
          to: PLEDGED
          via: holding.pledge
        - from: PLEDGED
          to: ACTIVE
          via: holding.release-pledge
        - from: [ACTIVE, SUSPENDED, RESTRICTED, PLEDGED]
          to: FROZEN
          via: "(backend: sanctions hit)"
        - from: FROZEN
          to: ACTIVE
          via: "(backend: sanctions cleared)"
        - from: [ACTIVE, SUSPENDED, PENDING, RESTRICTED]
          to: CLOSED
          via: holding.close
      terminal_states: [CLOSED]

  # R-6 G-3: manco promoted to stateful. Regulatory-action cascade
  # applies to ALL CBUs managed by this manco. Schema landed in
  # migration 20260425_manco_regulatory_status.sql — manco state
  # carrier table is `manco_regulatory_status` keyed by manco_entity_id.
  - id: manco
    stateless: false
    closure: closed_bounded
    eligibility:
      entity_kinds: [limited_company]
    cardinality_max: 1
    entry_state: UNDER_REVIEW
    state_machine:
      id: manco_lifecycle
      owner: compliance
      expected_lifetime: long_lived
      source_entity: '"ob-poc".manco_regulatory_status'
      state_column: regulatory_status
      scope: per_manco
      description: |
        Per-manco regulatory + operational state. A manco under
        regulatory action cascades SUSPENDED to all CBUs it manages
        (cross-slot constraint hooked via cbu_entity_roles where role
        = fund_manager / sub_manager). Reference-data-like in v1.2;
        R-6 promotes to stateful because regulatory-action cascade
        is real commercial risk (Credit Suisse 2022, FTX, etc.).
      predicate_bindings:
        - entity: regulatory_licence
          source_kind: dag_entity
          source_entity: regulatory_licence
          scope: attached_to this manco
          required_universe:
            source_kind: dag_entity
            source_entity: regulatory_licence_requirement
        - entity: investigation
          source_kind: dag_entity
          source_entity: investigation
          scope: attached_to this manco
        - entity: periodic_review
          source_kind: dag_entity
          source_entity: periodic_review
          scope: attached_to this manco
        - entity: credit_risk_assessment
          source_kind: dag_entity
          source_entity: credit_risk_assessment
          scope: attached_to this manco
        - entity: operational_risk_assessment
          source_kind: dag_entity
          source_entity: operational_risk_assessment
          scope: attached_to this manco
      states:
        - id: UNDER_REVIEW
          entry: true
          description: "New manco being onboarded; not yet approved to manage mandates."
        - id: APPROVED
          description: "Manco cleared to manage new mandates."
          green_when: |
            every regulatory_licence exists
            AND every regulatory_licence.status = CURRENT
            AND count(investigation where investigation.status = OPEN) = 0
            AND periodic_review exists
            AND periodic_review.state = COMPLETE
            AND credit_risk_assessment exists
            AND credit_risk_assessment.state in {WITHIN_LIMITS, LOW}
            AND operational_risk_assessment exists
            AND operational_risk_assessment.state in {WITHIN_LIMITS, LOW}
        - id: UNDER_INVESTIGATION
          description: |
            Regulatory action or internal investigation; new mandates
            blocked; existing mandates under heightened scrutiny.
            Propagates SUSPENDED to all managed CBUs (cascade).
        - id: SUSPENDED
          description: "Full operational hold — managed CBUs all SUSPENDED."
        - id: SUNSET
          description: "No new mandates; existing ones run to exit. Wind-down in progress."
        - id: TERMINATED
          description: "Terminal. All mandates transferred or wound down; manco retired."
      transitions:
        - from: UNDER_REVIEW
          to: APPROVED
          via: manco.approve
        - from: UNDER_REVIEW
          to: TERMINATED
          via: manco.reject
        - from: APPROVED
          to: UNDER_INVESTIGATION
          via: manco.flag-regulatory
        - from: UNDER_INVESTIGATION
          to: APPROVED
          via: manco.clear-regulatory
        - from: UNDER_INVESTIGATION
          to: SUSPENDED
          via: manco.suspend
        - from: SUSPENDED
          to: UNDER_INVESTIGATION
          via: manco.partial-reinstate   # out of full suspension but still flagged
        - from: [APPROVED, UNDER_INVESTIGATION, SUSPENDED]
          to: SUNSET
          via: manco.begin-sunset
        - from: SUNSET
          to: TERMINATED
          via: manco.terminate
      terminal_states: [TERMINATED]

# =============================================================================
# 3. CROSS-SLOT CONSTRAINTS
# =============================================================================

cross_slot_constraints:

  - id: case_cannot_approve_without_workstreams_complete
    description: "Case → APPROVED requires all entity workstreams = COMPLETE."
    rule: |
      cases.status = 'APPROVED'
        → ALL entity_workstreams.status = 'COMPLETE'
    severity: error

  - id: case_cannot_approve_with_unresolved_red_flags
    description: "Case → APPROVED blocks while any red_flag.status = BLOCKING."
    rule: |
      cases.status = 'APPROVED'
        → COUNT red_flags WHERE status = 'BLOCKING' AND case_id = this.case_id = 0
    severity: error

  - id: case_cannot_approve_with_unresolved_screening_hits
    description: "Case → APPROVED blocks while any screening.status = HIT_CONFIRMED AND not cleared."
    rule: |
      cases.status = 'APPROVED'
        → ALL screenings.status IN ('CLEAR', 'HIT_DISMISSED', 'EXPIRED')
           OR EXISTS red_flags WHERE source = 'screening' AND status = 'MITIGATED'
    severity: error

  - id: doc_request_verified_triggers_workstream_advance
    description: |
      When all required doc_requests for a workstream are VERIFIED / WAIVED,
      entity_workstream.status advances (automatic, not validator error).
    rule: |
      ALL doc_requests WHERE workstream_id = this.workstream_id
        AND status IN ('VERIFIED', 'WAIVED')
        → entity_workstream.status advances VERIFY → SCREEN
    severity: informational

  # kyc_service_agreement_active_required_for_sponsored_cases and
  # periodic_review_cases_must_reference_predecessor deleted (state-graph
  # remediation Phase 5f): both referenced columns that do not exist on the
  # live "ob-poc".cases table (cases.kyc_context, cases.predecessor_case_id)
  # -- dead constraints, unenforceable by construction. cases.service_context
  # and cases.client_group_id exist and may be the intended live equivalents,
  # but re-authoring the rules against them is out of this remediation's
  # ratified scope.

# =============================================================================
# 4. PRODUCT-MODULE GATES
# =============================================================================

product_module_gates:

  always_on:
    - workspace_root
    - kyc_case
    - entity_kyc
    - entity_workstream
    - screening
    - ubo_evidence
    - kyc_ubo_evidence
    - red_flag
    - doc_request
    - outreach_request
    - kyc_decision
    - client_group
    - board
    - partnership
    - trust
    - capital
    - coverage
    - skeleton_build
    - tollgate
    - case_event
    - ubo_snapshot

  conditionally_on:
    - slot: kyc_service_agreement
      activated_by: [product.kyc_service]

# =============================================================================
# 5. OUT OF SCOPE (P16 three-layer + cross-workspace)
# =============================================================================

out_of_scope:

  # Layer 3 operational runtime
  - "Screening provider API calls + retry policy — layer 2 service-resource integration"
  - "Document scanning + OCR — layer 2/3 (provider integration)"
  - "Actual UBO computational determination runs — layer 3 (ubo_determination_runs is a log)"
  - "Case timer / deadline enforcement — layer 3 scheduler"
  - "Regulator reporting submissions — layer 3"

  # Cross-workspace dependencies (KYC → other workspaces)
  - "Investment Matrix mandate activation — requires KYC clearance; cross-workspace constraint captured separately"
  - "Deal onboarding — requires KYC. Cross-workspace"
  - "Client-group research (GLEIF import, corporate tree) — lives in instrument_matrix_dag (client_group slot)"

# =============================================================================
# 6. PRUNE SEMANTICS
# =============================================================================
# KYC has fewer prune cases than IM. Most KYC work is additive
# (add parties, add evidence, add screenings). Pruning = removing a
# party/workstream from a case's scope — rare; case-reopening is the
# more common mechanism.

prune_cascade_rules:

  - id: party_prune_cascades
    when: "pruning party P from a case's scope"
    cascades_to:
      - target: entity_workstream
        rule: "entity_workstream WHERE party_id = P → status = REFERRED (manual review)"
      - target: screening
        rule: "screenings WHERE party_id = P → status = EXPIRED (invalidated)"
      - target: ubo_evidence
        rule: "ubo_evidence WHERE party_id = P → removed"
      - target: red_flag
        rule: "red_flags WHERE party_id = P → CLOSED with audit trail"

  - id: workstream_prune_cascades
    when: "pruning entity_workstream W from a case"
    cascades_to:
      - target: doc_request
        rule: "doc_requests WHERE workstream_id = W → WAIVED with audit"
      - target: ubo_evidence
        rule: "ubo_evidence WHERE workstream_id = W → removed"

prune_pre_validation:
  required_verbs:
    - kyc-case.summarize  # read-only impact preview
    - ubo-registry.compute-impact  # assess UBO-chain impact
  abort_conditions:
    - "prune would leave case in APPROVED state without any active workstreams"
    - "prune would remove the last UBO in the chain (case cannot be UBO-less)"
    - "prune would orphan a red_flag linked to a regulatory notice"
