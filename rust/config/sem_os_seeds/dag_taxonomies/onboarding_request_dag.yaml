# Onboarding-Request Workspace — DAG Taxonomy (Tranche 3 — 2026-04-24)
#
# ============================================================================
# WORKSPACE PURPOSE:
#
# Onboarding-Request is the JOURNEY workspace for the Deal → Ops
# handoff. Once a Deal reaches CONTRACTED, operational onboarding
# requests are fired per-CBU-product to trigger account setup, SSI
# provisioning, custody routing, etc. This workspace sequences that
# handoff.
#
# Pack profile: 6 verbs, all cross-workspace (deal.* + cbu.read).
# No new stateful slots — the primary operational entity
# (deal_onboarding_request) already lives in Deal DAG §2.2.
# This workspace is a PACK-LEVEL WRAPPER that guides the Q&A for
# populating a deal_onboarding_request.
#
# ============================================================================
# CBU CONSTRUCT RELATIONSHIP:
#
# One DEAL typically covers many CBUs. Onboarding-Request produces
# ONE deal_onboarding_request per (deal, cbu, product) triple —
# that's the handoff to ops to provision the service for that
# specific CBU + product combination.
#
# Onboarding-Request bridges:
#   Deal (CONTRACTED commercial agreement) →
#   CBU (service_consumption transitions proposed → provisioned) →
#   CBU (operationally_active once all services provisioned)
#
# ============================================================================
# V1.3 conventions adopted: minimal. This workspace does not host
# entity state — it references Deal and CBU.
#
# PARENT DOCS:
#   - docs/backlog/catalogue-platform-refinement-v1_3.md
#   - deal_dag.yaml §2.2 deal_onboarding_request slot (owning workspace)
#   - rust/config/packs/onboarding-request.yaml

version: "1.0"
workspace: onboarding_request
dag_id: onboarding_request_dag

dsl_verb_reconciliation:
  onboarding_read_model:
    - onboarding.get-data-request
    - onboarding.get-slice
    - onboarding.get-slice-attrs
    - onboarding.list-data-requests
    - onboarding.list-slices
    - service-resource.get-provisioning-status

# =============================================================================
# 1. OVERALL LIFECYCLE — handoff-request journey
# =============================================================================
# Mirrors deal_onboarding_request lifecycle but adds a pre-submit
# assembly phase for the pack's Q&A flow.

overall_lifecycle:
  id: onboarding_request_overall_lifecycle
  scope: per_onboarding_request
  derived: true
  description: >
    6-phase journey from pre-submit assembly through ops acceptance
    to completion. Pre-submit phases (scoping / validating) are
    local to this workspace; post-submit phases reconcile to
    deal_onboarding_request states (PENDING / IN_PROGRESS /
    BLOCKED / COMPLETED / CANCELLED — owned by Deal workspace).
  phases:
    - name: scoping
      description: |
        Pack Q&A in progress: deal selected, contract confirmed, target
        CBU selected, product being specified. No deal_onboarding_request
        row yet; this is the pack's assembly phase.
      derivation:
        all_of:
          - "pack_state = scoping"
          - "NOT EXISTS deal_onboarding_request for this (deal, cbu, product)"
      progression_verbs:
        - deal.read
        - deal.list-contracts
        - deal.list-products
        - cbu.read
      next_phase: validating
    - name: validating
      description: |
        Assembled answers being validated: (deal exists + contracted,
        contract valid, CBU VALIDATED, product on deal). Ready to
        submit the handoff.
      derivation:
        all_of:
          - "answers populated + valid"
          - "deal.status = 'CONTRACTED'"
          - "cbus.status = 'VALIDATED'"
      progression_verbs: []
      next_phase: submitted
    - name: submitted
      description: |
        deal.request-onboarding fired. deal_onboarding_request row
        created in PENDING state. Ops team picks it up.
      derivation:
        all_of:
          - "EXISTS deal_onboarding_request for this (deal, cbu, product)"
          - "deal_onboarding_request.request_status = 'PENDING'"
      progression_verbs:
        - deal.update-onboarding-status  # ops advances
      next_phase: in_progress
    - name: in_progress
      description: |
        Ops working the handoff: accounts opening, SSIs setting up,
        service_consumption transitioning proposed → provisioned in
        CBU workspace.
      derivation:
        all_of:
          - "deal_onboarding_request.request_status = 'IN_PROGRESS'"
      progression_verbs:
        - deal.update-onboarding-status
      next_phase: "(completed | blocked)"
    - name: blocked
      description: |
        Handoff blocked on external dependency (KYC re-open, document
        gap, service-provider issue). Resumable.
      derivation:
        all_of:
          - "deal_onboarding_request.request_status = 'BLOCKED'"
      progression_verbs:
        - deal.update-onboarding-status
      next_phase: in_progress
    - name: completed
      description: |
        Terminal-positive. CBU fully onboarded for this deal scope.
        Contributes to CBU's operationally_active tollgate.
      derivation:
        all_of:
          - "deal_onboarding_request.request_status = 'COMPLETED'"
      progression_verbs: []
      next_phase: "(terminal)"
    - name: cancelled
      description: "Terminal-negative."
      derivation:
        all_of:
          - "deal_onboarding_request.request_status = 'CANCELLED'"
      progression_verbs: []
      next_phase: "(terminal)"

# =============================================================================
# 2. SLOTS — minimal; references to other workspaces
# =============================================================================

slots:

  - id: workspace_root
    stateless: true
    rationale: "Aggregation root for onboarding-request pack journey."

  - id: onboarding_request
    stateless: false
    state_machine: "(reconcile-existing — see deal_dag.yaml §2.2 deal_onboarding_request_lifecycle; Deal workspace owns the 5-state request lifecycle: PENDING → IN_PROGRESS → BLOCKED → COMPLETED / CANCELLED. This workspace creates rows and advances state but the authoritative state machine lives in Deal.)"

  - id: onboarding_data_request
    stateless: false
    closure: closed_bounded
    eligibility:
      entity_kinds: [onboarding_data_request]
    cardinality_max: 1
    entry_state: collecting
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_request
      join:
        via: onboarding_data_requests
        parent_fk: onboarding_request_id
        child_fk: data_request_id
    state_machine:
      id: onboarding_data_request_lifecycle
      owner: onboarding
      expected_lifetime: short_lived
      source_entity: '"ob-poc".onboarding_data_requests'
      state_column: request_status
      scope: per_deal_onboarding_request
      description: |
        Frozen per-onboarding service-resource data dictionary request.
        Compiled from SRDEF discovery snapshots and CBU attribute values,
        then dispatched to resource owners slice by slice.
      states:
        - id: collecting
          entry: true
          description: "Dictionary compiled but at least one required slice attribute is missing."
        - id: ready_for_dispatch
          description: "All slices have required values and can be dispatched."
        - id: dispatching
          description: "Dispatch has been requested and outbox delivery is in progress."
        - id: awaiting_owner
          description: "Resource owner has the request and has not returned a final locator."
        - id: completed
          description: "All slices activated successfully."
        - id: blocked
          description: "One or more slices failed or cannot progress."
        - id: cancelled
          description: "Request was cancelled before completion."
      transitions:
        - from: collecting
          to: ready_for_dispatch
          via: onboarding.compile-data-request
        - from: ready_for_dispatch
          to: dispatching
          via: onboarding.dispatch-ready-slices
        - from: dispatching
          to: awaiting_owner
          via: onboarding.dispatch-ready-slices
        - from: awaiting_owner
          to: completed
          via: service-resource.confirm-provisioning-result
        - from: [collecting, ready_for_dispatch, dispatching, awaiting_owner]
          to: blocked
          via: [service-resource.confirm-provisioning-result, readiness.compute]
        - from: [collecting, ready_for_dispatch, dispatching, awaiting_owner, blocked]
          to: cancelled
          via: onboarding.cancel-data-request
      terminal_states: [completed, cancelled]
    suspended_state_exempt: true

  - id: onboarding_data_request_slice
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [onboarding_data_request_slice]
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_data_request
      join:
        via: onboarding_data_request_slices
        parent_fk: data_request_id
        child_fk: slice_id
    state_machine:
      id: onboarding_data_request_slice_lifecycle
      owner: onboarding
      expected_lifetime: short_lived
      source_entity: '"ob-poc".onboarding_data_request_slices'
      state_column: slice_status
      scope: per_srdef_parameter_slice
      description: |
        Per-SRDEF/per-parameter slice of an onboarding data request. This
        is the dispatch grain addressed to a resource owner principal.
      states:
        - id: collecting
          entry: true
          description: "Required slice attributes are still missing."
        - id: ready
          description: "Slice can be dispatched."
        - id: dispatched
          description: "Provisioning request and outbox row prepared."
        - id: awaiting_owner
          description: "Dispatch outbox was delivered; waiting for owner result."
        - id: activated
          description: "Owner returned a successful locator."
        - id: blocked
          description: "Slice cannot progress until data or owner issue is resolved."
        - id: failed
          description: "Owner returned a terminal failure."
        - id: cancelled
          description: "Slice was stood down."
      transitions:
        - from: collecting
          to: ready
          via: onboarding.compile-data-request
        - from: ready
          to: dispatched
          via: onboarding.dispatch-ready-slices
        - from: dispatched
          to: awaiting_owner
          via: onboarding.dispatch-ready-slices
        - from: [dispatched, awaiting_owner]
          to: activated
          via: service-resource.confirm-provisioning-result
        - from: [collecting, ready, dispatched, awaiting_owner]
          to: failed
          via: service-resource.confirm-provisioning-result
        - from: [collecting, ready, dispatched, awaiting_owner, failed]
          to: cancelled
          via: [onboarding.cancel-slice, onboarding.cancel-data-request]
      terminal_states: [activated, failed, cancelled]
    suspended_state_exempt: true

  - id: onboarding_data_request_attr
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [onboarding_data_request_attr]
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_data_request_slice
      join:
        via: onboarding_data_request_attrs
        parent_fk: slice_id
        child_fk: attr_id
    state_machine:
      id: onboarding_data_request_attr_lifecycle
      owner: onboarding
      expected_lifetime: short_lived
      source_entity: '"ob-poc".onboarding_data_request_attrs'
      state_column: value_status
      scope: per_slice_attribute
      description: |
        Frozen attribute requirement/value row inside a data-request slice.
        Mutation stops once the slice leaves collecting/blocked.
      states:
        - id: missing
          entry: true
          description: "Required value absent from the frozen request."
        - id: present
          description: "Value was captured in the frozen request."
        - id: not_applicable
          description: "Conditional requirement did not apply."
      transitions:
        - from: missing
          to: present
          via: [onboarding.compile-data-request, typed-attribute.record]
        - from: missing
          to: not_applicable
          via: onboarding.compile-data-request
      terminal_states: [present, not_applicable]
    suspended_state_exempt: true

  - id: onboarding_data_request_discovery
    stateless: true
    closure: closed_unbounded
    eligibility:
      entity_kinds: [onboarding_data_request_discovery]
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_data_request
      join:
        via: onboarding_data_request_discoveries
        parent_fk: data_request_id
        child_fk: discovery_snapshot_id
    rationale: |
      Frozen discovery explanation for why each SRDEF slice entered the
      compiled data request. Immutable reference rows make the dictionary
      replayable after SRDEF coverage changes.

  - id: provisioning_request
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [provisioning_request]
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_data_request_slice
      join:
        via: onboarding_data_request_slices
        parent_fk: slice_id
        child_fk: provisioning_request_id
    state_machine:
      id: provisioning_request_lifecycle
      owner: onboarding
      expected_lifetime: short_lived
      source_entity: '"ob-poc".provisioning_requests'
      state_column: status
      scope: per_data_request_slice
      description: |
        Dispatch/request ledger row addressed to the resource owner for a
        ready data-request slice.
      states:
        - id: queued
          entry: true
        - id: sent
        - id: ack
        - id: completed
        - id: failed
        - id: cancelled
      transitions:
        - from: queued
          to: sent
          via: onboarding.dispatch-ready-slices
        - from: sent
          to: ack
          via: service-resource.confirm-provisioning-result
        - from: [sent, ack]
          to: completed
          via: service-resource.confirm-provisioning-result
        - from: [sent, ack]
          to: failed
          via: service-resource.confirm-provisioning-result
        - from: [queued, sent, ack]
          to: cancelled
          via: [onboarding.cancel-slice, onboarding.cancel-data-request]
      terminal_states: [completed, failed, cancelled]
    suspended_state_exempt: true

  - id: cbu_resource_instance
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [cbu_resource_instance]
    parent_slot:
      workspace: onboarding_request
      slot: onboarding_data_request_slice
      join:
        via: onboarding_data_request_slices
        parent_fk: slice_id
        child_fk: cbu_resource_instance_id
    state_machine:
      id: cbu_resource_instance_lifecycle
      owner: onboarding
      expected_lifetime: long_lived
      source_entity: '"ob-poc".cbu_resource_instances'
      state_column: status
      scope: per_cbu_resource
      description: |
        Runtime service-resource instance created from an owner-confirmed
        onboarding data-request slice.
      states:
        - id: PENDING
          entry: true
        - id: PROVISIONING
        - id: AWAITING_OWNER
        - id: ACTIVE
        - id: FAILED
        - id: CANCELLED
        - id: SUSPENDED
        - id: DECOMMISSIONED
      transitions:
        - from: PENDING
          to: PROVISIONING
          via: service-resource.provision
        - from: PENDING
          to: AWAITING_OWNER
          via: onboarding.dispatch-ready-slices
        - from: PROVISIONING
          to: AWAITING_OWNER
          via: onboarding.dispatch-ready-slices
        - from: AWAITING_OWNER
          to: ACTIVE
          via: service-resource.confirm-provisioning-result
        - from: AWAITING_OWNER
          to: FAILED
          via: service-resource.confirm-provisioning-result
        - from: [PENDING, PROVISIONING, AWAITING_OWNER, FAILED]
          to: CANCELLED
          via: [onboarding.cancel-slice, onboarding.cancel-data-request]
        - from: ACTIVE
          to: SUSPENDED
          via: service-resource.suspend
        - from: SUSPENDED
          to: ACTIVE
          via: service-resource.reactivate
        - from: [ACTIVE, SUSPENDED, FAILED, CANCELLED]
          to: DECOMMISSIONED
          via: service-resource.decommission
      terminal_states: [DECOMMISSIONED]
    suspended_state_exempt: true

  - id: resource_owner_principal
    stateless: false
    closure: closed_unbounded
    eligibility:
      entity_kinds: [resource_owner_principal]
    state_machine:
      id: resource_owner_principal_lifecycle
      owner: onboarding
      expected_lifetime: long_lived
      source_entity: '"ob-poc".resource_owner_principals'
      state_column: status
      scope: per_resource_owner
      description: |
        Addressable principal for systems or teams that own service-resource
        activation. Slices dispatch to this principal rather than to a
        free-text owner label.
      states:
        - id: active
          entry: true
          description: "May receive dispatch."
        - id: suspended
          description: "Temporarily unavailable for new dispatch."
        - id: retired
          description: "No longer valid."
      transitions:
        - from: active
          to: suspended
          via: governance.record-review
        - from: suspended
          to: active
          via: governance.record-review
        - from: [active, suspended]
          to: retired
          via: governance.record-review
      terminal_states: [retired]
    suspended_state_exempt: true

  - id: deal
    stateless: false
    state_machine: "(reference — see deal_dag.yaml §2.1 deal_commercial_lifecycle; read-only here — we pick an existing CONTRACTED deal)"

  - id: cbu
    stateless: false
    state_machine: "(reference — see cbu_dag.yaml §2.1; read-only here — we pick an existing VALIDATED CBU)"

  - id: contract
    stateless: true
    rationale: |
      Contract is selected (not state-transitioned) during the handoff.
      Contract lifecycle lives in contract domain (separate from Deal
      DAG). Stateless reference.

# =============================================================================
# 3. CROSS-SLOT CONSTRAINTS
# =============================================================================

cross_slot_constraints:

  - id: onboarding_request_requires_validated_cbu
    description: "Cannot submit onboarding request for a non-VALIDATED CBU."
    rule: |
      onboarding_request transitions scoping → submitted
        → cbu.status = 'VALIDATED'
    severity: error

  - id: onboarding_request_requires_contracted_deal
    description: "Cannot submit onboarding request for a non-CONTRACTED deal."
    rule: |
      onboarding_request transitions scoping → submitted
        → deal.status IN ('CONTRACTED', 'ONBOARDING', 'ACTIVE')
    severity: error

# =============================================================================
# 4. CROSS-WORKSPACE CONSTRAINTS (V1.3-1)
# =============================================================================

cross_workspace_constraints:

  - id: onboarding_request_requires_deal_contracted
    description: |
      Cannot create deal_onboarding_request unless the source deal is
      in CONTRACTED or later state (commercial agreement in place).
    source_workspace: deal
    source_slot: deal
    source_state: [CONTRACTED, ONBOARDING, ACTIVE]
    source_predicate: "deals.deal_id = this_request.deal_id"
    target_workspace: onboarding_request
    target_slot: onboarding_request
    target_transition: "validating -> submitted"
    severity: error

  - id: onboarding_request_requires_cbu_validated
    description: "Target CBU must be VALIDATED before onboarding handoff."
    source_workspace: cbu
    source_slot: cbu
    source_state: VALIDATED
    source_predicate: "cbus.cbu_id = this_request.cbu_id"
    target_workspace: onboarding_request
    target_slot: onboarding_request
    target_transition: "validating -> submitted"
    severity: error

derived_cross_workspace_state: []

# =============================================================================
# 5. PRODUCT-MODULE GATES
# =============================================================================

product_module_gates:
  always_on:
    - workspace_root
    - onboarding_request
    - onboarding_data_request
    - onboarding_data_request_slice
    - onboarding_data_request_attr
    - onboarding_data_request_discovery
    - provisioning_request
    - cbu_resource_instance
    - resource_owner_principal
    - deal
    - cbu
    - contract
  conditionally_on: []

# =============================================================================
# 6. OUT OF SCOPE
# =============================================================================

out_of_scope:
  - "deal_onboarding_request state machine — owned by Deal workspace"
  - "Service provisioning execution — CBU workspace's service_consumption slot governs this; Layer 3 ops runs the actual provisioning"
  - "Account opening, SSI setup, BIC routing — Layer 2 (triggered by CBU workspace transitions post-handoff)"
  - "Contract lifecycle — owned by contract domain (separate from Deal DAG)"

# =============================================================================
# 7. PRUNE SEMANTICS
# =============================================================================
# Cancellation of an onboarding request cascades to CBU's
# service_consumption slots (any provisioned services for this
# request may need to be unwound — ops decision).

prune_cascade_rules:
  - id: onboarding_request_cancel_cascade
    when: "deal.update-onboarding-status sets status = CANCELLED"
    cascades_to:
      - target: cbu
        rule: "service_consumption slots associated with this request → candidates for winding_down (manual ops review)"

prune_pre_validation:
  required_verbs:
    - deal.read
    - deal.list-products
    - cbu.read
  abort_conditions:
    - "cancel an IN_PROGRESS request where service_consumption is already active (must coordinate with ops)"
