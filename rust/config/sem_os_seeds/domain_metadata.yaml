        governance_tier: operational
        classification: internal
        pii: false
      bpmn_pending_dispatches:
        description: "Durable queue for BPMN dispatch resilience (retry on gRPC failure)"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      bpmn.start:
        reads: [bpmn_correlations]
        writes: [bpmn_correlations, bpmn_parked_tokens]
      bpmn.signal:
        reads: [bpmn_correlations, bpmn_parked_tokens]
        writes: [bpmn_parked_tokens]
      bpmn.cancel:
        reads: [bpmn_correlations]
        writes: [bpmn_correlations]
      bpmn.inspect:
        reads: [bpmn_correlations, bpmn_job_frames, bpmn_parked_tokens]

  # ---------------------------------------------------------------------------
  # SEMANTIC REGISTRY — Immutable Registry & Governance
  # ---------------------------------------------------------------------------
  sem-reg:
    description: "Semantic Registry — immutable snapshots, snapshot sets, changesets, agent plans, projections, and governance"
    tables:
      sem_reg.snapshots:
        description: "Universal immutable snapshot table for all 13 object types (INSERT-only)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.snapshot_sets:
        description: "Named grouping of snapshots for atomic publish"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.changesets:
        description: "Changeset workspace with 9-state status machine and content-addressed idempotency"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.changeset_entries:
        description: "Individual changes within changeset (add/modify/remove)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.changeset_reviews:
        description: "Review verdicts (approved/rejected/requested_changes)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.agent_plans:
        description: "Agent plans with goal, context resolution ref, assumptions, risk flags"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.plan_steps:
        description: "Plan steps pinning verb_id + verb_snapshot_id for provenance"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.decision_records:
        description: "Immutable decisions with snapshot_manifest (complete provenance chain)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.escalation_records:
        description: "Human escalation records with severity"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.derivation_edges:
        description: "Immutable lineage edges (input → output via verb)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.run_records:
        description: "Derivation run execution records"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.embedding_records:
        description: "Semantic embeddings per snapshot with staleness tracking"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.outbox_events:
        description: "Transactional outbox for reliable event dispatch"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.bootstrap_audit:
        description: "Seed bundle run tracking (idempotent by bundle_hash)"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      registry.describe:
        reads: [sem_reg.snapshots]
      registry.search:
        reads: [sem_reg.snapshots, sem_reg.embedding_records]
      registry.list-verbs:
        reads: [sem_reg.snapshots]
      registry.list-attributes:
        reads: [sem_reg.snapshots]
      changeset.propose:
        reads: [sem_reg.changesets]
        writes: [sem_reg.changesets, sem_reg.changeset_entries]
      changeset.validate:
        reads: [sem_reg.changesets, sem_reg.changeset_entries]
        writes: [sem_reg.changesets]
      changeset.publish:
        reads:
          [sem_reg.changesets, sem_reg.changeset_entries, sem_reg.snapshots]
        writes: [sem_reg.snapshots, sem_reg.snapshot_sets, sem_reg.changesets]

  # ---------------------------------------------------------------------------
  # STEWARDSHIP — Changeset Authoring & Show Loop
  # ---------------------------------------------------------------------------
  stewardship:
    description: "Stewardship layer — changeset workflow, basis records, conflict detection, focus states, viewports"
    tables:
      sem_reg.events:
        description: "Immutable event log (changeset_created, submitted, review_recorded, published)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.basis_records:
        description: "Basis of record (assertion, confidence, verified_by, source)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.basis_claims:
        description: "Claims within basis records"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.conflict_records:
        description: "Competing change conflicts (detected → resolved → archived)"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.focus_states:
        description: "Session focus state for Show Loop viewports"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.viewport_manifests:
        description: "Captured viewport state snapshots"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.idempotency_keys:
        description: "Idempotency keys for stewardship operations"
        governance_tier: operational
        classification: internal
        pii: false
      sem_reg.templates:
        description: "Stewardship template definitions"
        governance_tier: governed
        classification: internal
        pii: false
      sem_reg.verb_implementation_bindings:
        description: "Verb implementation bindings for stewardship tools"
        governance_tier: governed
        classification: internal
        pii: false
    verb_data_footprint:
      stew.compose-changeset:
        writes: [sem_reg.events, sem_reg.changesets]
      stew.submit-for-review:
        reads: [sem_reg.changesets]
        writes: [sem_reg.changesets, sem_reg.events]
      stew.approve-changeset:
        reads: [sem_reg.changesets]
        writes: [sem_reg.changesets, sem_reg.events]
      stew.publish-changeset:
        reads: [sem_reg.changesets, sem_reg.changeset_entries]
        writes: [sem_reg.snapshots, sem_reg.snapshot_sets, sem_reg.events]
      stew.attach-basis:
        reads: [sem_reg.basis_records]
        writes: [sem_reg.basis_records, sem_reg.basis_claims]
      stew.resolve-conflict:
        reads: [sem_reg.conflict_records]
        writes: [sem_reg.conflict_records]
      stew.set-focus:
        writes: [sem_reg.focus_states]
      stew.show:
        reads: [sem_reg.focus_states, sem_reg.snapshots]

