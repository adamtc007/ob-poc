# Domain Metadata Overlay
#
# Provides business descriptions, governance tiers, security labels for tables,
# and verb↔table data footprint mappings (which verbs read/write which tables).
#
# Loaded by DomainMetadata::from_file() in sem_os_obpoc_adapter/src/metadata.rs
# and merged into the seed bundle at build_seed_bundle() time.
#
# Schema mapping:
#   Tables without a schema prefix default to "ob-poc".
#   Tables in other schemas use "schema.table" notation (e.g., "kyc.cases").

domains:
  # ---------------------------------------------------------------------------
  # CLIENT GROUP — The Apex
  # ---------------------------------------------------------------------------
  client-group:
    description: "Client group resolution — apex commercial entities, aliases, anchors, and corporate hierarchy staging"
    tables:
      client_group:
        description: "Apex client groups (Allianz, BlackRock, Aviva) with discovery status and entity counts"
        governance_tier: governed
        classification: internal
        pii: false
      client_group_entity:
        description: "Staging table for entities discovered via research with membership type and review status"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_anchor:
        description: "Role-based anchors per jurisdiction (ultimate_parent, governance_controller, etc.)"
        governance_tier: governed
        classification: internal
        pii: false
      client_group_alias:
        description: "Searchable aliases for client group entity resolution with primary flag"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_alias_embedding:
        description: "Versioned BGE embeddings per client group alias"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_relationship:
        description: "Corporate hierarchy relationships with review status and promotion chain"
        governance_tier: governed
        classification: confidential
        pii: false
      client_group_entity_roles:
        description: "GLEIF-derived roles (SUBSIDIARY, ULTIMATE_PARENT) from research phase"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_entity_tag:
        description: "Entity classification tags within client groups"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_entity_tag_embedding:
        description: "Embeddings for entity tag search"
        governance_tier: operational
        classification: internal
        pii: false
      client_group_relationship_sources:
        description: "Source provenance for client group relationships"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      client-group.create:
        writes: [client_group]
      client-group.read:
        reads: [client_group]
      client-group.update:
        reads: [client_group]
        writes: [client_group]
      client-group.list:
        reads: [client_group]
      client-group.add-entity:
        reads: [client_group, entities]
        writes: [client_group_entity]
      client-group.add-anchor:
        reads: [client_group, entities]
        writes: [client_group_anchor]
      client-group.add-alias:
        reads: [client_group]
        writes: [client_group_alias]
      client-group.resolve:
        reads:
          [
            client_group,
            client_group_alias,
            client_group_anchor,
            client_group_alias_embedding,
          ]

  # ---------------------------------------------------------------------------
  # CBU — Client Business Unit
  # ---------------------------------------------------------------------------
  cbu:
    description: "Client Business Unit lifecycle — the atomic operational container for onboarding, KYC scope, and trading"
    tables:
      cbus:
        description: "Client Business Unit — operational container with jurisdiction, client_type, cbu_category, kyc_scope_template"
        governance_tier: governed
        classification: internal
        pii: false
      cbu_entity_roles:
        description: "Entity-to-CBU role assignments (depositary, ManCo, board director, auditor, IM, etc.)"
        governance_tier: governed
        classification: internal
        pii: false
      cbu_evidence:
        description: "Document/attestation evidence links per CBU"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_groups:
        description: "Governance book groups (ManCo, apex parent)"
        governance_tier: governed
        classification: internal
        pii: false
      cbu_group_members:
        description: "CBU membership in governance groups"
        governance_tier: governed
        classification: internal
        pii: false
      cbu_product_subscriptions:
        description: "Product subscriptions per CBU (PENDING → ACTIVE → SUSPENDED → TERMINATED)"
        governance_tier: governed
        classification: internal
        pii: false
      cbu_lifecycle_instances:
        description: "Active lifecycle instances per CBU"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_service_readiness:
        description: "Computed service readiness status per CBU"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_sla_commitments:
        description: "SLA commitments per CBU"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_resource_instances:
        description: "Provisioned service resource instances per CBU"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_change_log:
        description: "Immutable audit trail of CBU changes"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_creation_log:
        description: "CBU creation audit log"
        governance_tier: operational
        classification: internal
        pii: false
      cbu_subscriptions:
        description: "CBU contract-product subscriptions (onboarding gate enforcement via FK to contract_products)"
        governance_tier: governed
        classification: internal
        pii: false
    verb_data_footprint:
      cbu.create:
        reads: [cbus, cbu_entity_roles]
        writes: [cbus, cbu_entity_roles]
      cbu.read:
        reads: [cbus]
      cbu.update:
        reads: [cbus]
        writes: [cbus]
      cbu.delete:
        reads: [cbus]
        writes: [cbus]
      cbu.list:
        reads: [cbus]
      cbu.ensure:
        reads: [cbus]
        writes: [cbus]
      cbu.assign-role:
        reads: [cbu_entity_roles, roles]
        writes: [cbu_entity_roles]
      cbu.remove-role:
        reads: [cbu_entity_roles]
        writes: [cbu_entity_roles]
      cbu.parties:
        reads: [cbu_entity_roles, entities]
      cbu.show:
        reads: [cbus, cbu_entity_roles, roles]
      cbu.set-category:
        reads: [cbus, master_jurisdictions]
        writes: [cbus]
      cbu.add-product:
        reads: [products]
        writes: [service_delivery_map]
      cbu.remove-product:
        reads: [service_delivery_map]
        writes: [service_delivery_map]
      cbu.decide:
        reads: [cbus]
        writes: [cbus]
      cbu.attach-evidence:
        reads: [cbu_evidence]
        writes: [cbu_evidence]
      cbu.verify-evidence:
        reads: [cbu_evidence]
        writes: [cbu_evidence]
      cbu.list-evidence:
        reads: [cbu_evidence]
      cbu.create-from-client-group:
        reads: [client_group, entities, entity_proper_persons, cbu_entity_roles]
        writes: [cbus, cbu_entity_roles]

  # ---------------------------------------------------------------------------
  # ENTITY — Natural/Legal Person Management
  # ---------------------------------------------------------------------------
  entity:
    description: "Core entity model — natural persons, legal entities, funds, trusts, partnerships, and their identifiers"
    tables:
      entities:
        description: "Canonical entity registry with name, external_id, bods_entity_type, founding/dissolution dates"
        governance_tier: governed
        classification: internal
        pii: false
      entity_types:
        description: "Typed entity taxonomy (NATURAL_PERSON, LEGAL_ENTITY, LIMITED_COMPANY, FUND, TRUST, PARTNERSHIP, MANCO)"
        governance_tier: governed
        classification: internal
        pii: false
      entity_names:
        description: "Alternative names (legal, trading, aliases) by name_type"
        governance_tier: operational
        classification: internal
        pii: false
      entity_proper_persons:
        description: "Natural persons: date_of_birth, nationality, country_of_residence"
        governance_tier: governed
        classification: confidential
        pii: true
      entity_limited_companies:
        description: "Corporate entities: incorporation_country, share_capital"
        governance_tier: governed
        classification: internal
        pii: false
      entity_funds:
        description: "Fund entities: fund_type, gleif_category, jurisdiction, parent/master fund references"
        governance_tier: governed
        classification: internal
        pii: false
      entity_trusts:
        description: "Trust vehicles: trust_type, governing_law"
        governance_tier: governed
        classification: internal
        pii: false
      entity_partnerships:
        description: "Partnerships: partnership_type"
        governance_tier: governed
        classification: internal
        pii: false
      entity_manco:
        description: "Management companies: manco_type, regulated_by"
        governance_tier: governed
        classification: internal
        pii: false
      entity_identifiers:
        description: "Identifiers (LEI, ISIN, CUSIP, etc.) by type with issuing_authority"
        governance_tier: operational
        classification: internal
        pii: false
      entity_addresses:
        description: "Registered/operational addresses for entities"
        governance_tier: operational
        classification: confidential
        pii: true
      entity_relationships:
        description: "Canonical ownership/control edges (from_entity_id → to_entity_id)"
        governance_tier: governed
        classification: confidential
        pii: false
      entity_parent_relationships:
        description: "Parent-child hierarchy from GLEIF import"
        governance_tier: governed
        classification: internal
        pii: false
      entity_share_classes:
        description: "Share class definitions per fund entity"
        governance_tier: governed
        classification: internal
        pii: false
      entity_lifecycle_events:
        description: "Lifecycle events (incorporation, dissolution)"
        governance_tier: operational
        classification: internal
        pii: false
      entity_bods_links:
        description: "Links to BODS statement IDs for ownership transparency"
        governance_tier: operational
        classification: internal
        pii: false
      entity_concept_link:
        description: "Semantic concept associations for entity linking"
        governance_tier: operational
        classification: internal
        pii: false
      entity_feature:
        description: "Feature flags for ML/entity linking"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      entity.create:
        reads: [entity_types, entities]
        writes:
          [
            entities,
            entity_limited_companies,
            entity_proper_persons,
            entity_trusts,
            entity_partnerships,
          ]
      entity.ensure:
        reads:
          [
            entity_types,
            entities,
            entity_limited_companies,
            entity_proper_persons,
            entity_trusts,
            entity_partnerships,
          ]
        writes:
          [
            entities,
            entity_limited_companies,
            entity_proper_persons,
            entity_trusts,
            entity_partnerships,
          ]
      entity.read:
        reads: [entities]
      entity.update:
        reads: [entities]
        writes: [entities]
      entity.delete:
        reads: [entities]
        writes: [entities]
      entity.list:
        reads: [entities]
      entity.query:
        reads: [entities]
      entity.ghost:
        reads: [entity_proper_persons]
        writes: [entities, entity_proper_persons]
      entity.identify:
        reads: [entity_proper_persons]
        writes: [entity_proper_persons]
      entity.verify:
        reads: [entity_proper_persons]
        writes: [entity_proper_persons]
      entity.list-ghosts:
        reads: [entity_proper_persons]
      entity.ensure-or-placeholder:
        reads: [entities]
        writes: [entities]

  # ---------------------------------------------------------------------------
  # DEAL — Commercial Origination Hub
  # ---------------------------------------------------------------------------
  deal:
    description: "Commercial deal lifecycle — origination, rate card negotiation, onboarding handoff, and revenue tracking"
    tables:
      deals:
        description: "Commercial deal record hub with status machine (PROSPECT → ACTIVE → OFFBOARDED)"
        governance_tier: governed
        classification: confidential
        pii: false
      deal_participants:
        description: "Sales team members with roles (is_primary flag)"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_products:
        description: "Products scoped to a deal"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_contracts:
        description: "Links deals to legal contracts"
        governance_tier: governed
        classification: confidential
        pii: false
      deal_rate_cards:
        description: "Negotiable fee schedules with status machine (DRAFT → AGREED → SUPERSEDED)"
        governance_tier: governed
        classification: confidential
        pii: false
      deal_rate_card_lines:
        description: "Individual fee line items (BPS, FLAT, TIERED, PER_TRANSACTION pricing)"
        governance_tier: governed
        classification: confidential
        pii: false
      deal_slas:
        description: "Service level agreements attached to deals"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_documents:
        description: "Proposals, agreements, and other documents attached to deals"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_ubo_assessments:
        description: "KYC case references linked to deal"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_onboarding_requests:
        description: "Handoff from deal to CBU creation"
        governance_tier: operational
        classification: confidential
        pii: false
      deal_events:
        description: "Immutable audit trail of all deal changes"
        governance_tier: operational
        classification: confidential
        pii: false
    verb_data_footprint:
      deal.create:
        reads: [client_group]
        writes: [deals]
      deal.get:
        reads: [deals]
      deal.list:
        reads: [deals]
      deal.update:
        reads: [deals]
        writes: [deals]
      deal.update-status:
        reads: [deals]
        writes: [deals]
      deal.cancel:
        reads: [deals]
        writes: [deals]
      deal.add-participant:
        reads: [entities]
        writes: [deal_participants]
      deal.remove-participant:
        reads: [deal_participants]
        writes: [deal_participants]
      deal.add-product:
        reads: [products]
        writes: [deal_products]
      deal.remove-product:
        reads: [deal_products]
        writes: [deal_products]
      deal.add-contract:
        reads: [legal_contracts]
        writes: [deal_contracts]
      deal.remove-contract:
        reads: [deal_contracts]
        writes: [deal_contracts]
      deal.create-rate-card:
        reads: [products]
        writes: [deal_rate_cards]
      deal.add-rate-card-line:
        reads: [deal_rate_cards]
        writes: [deal_rate_card_lines]
      deal.propose-rate-card:
        reads: [deal_rate_cards]
        writes: [deal_rate_cards]
      deal.counter-offer:
        reads: [deal_rate_cards]
        writes: [deal_rate_cards]
      deal.agree-rate-card:
        reads: [deal_rate_cards]
        writes: [deal_rate_cards]
      deal.summary:
        reads:
          [
            deals,
            deal_participants,
            deal_products,
            deal_rate_cards,
            deal_rate_card_lines,
          ]

  # ---------------------------------------------------------------------------
  # BILLING — Fee Billing & Revenue
  # ---------------------------------------------------------------------------
  billing:
    description: "Fee billing profiles, account targets, billing periods, and revenue analytics"
    tables:
      fee_billing_profiles:
        description: "Billing configuration per deal with frequency, invoice currency, status"
        governance_tier: governed
        classification: confidential
        pii: false
      fee_billing_account_targets:
        description: "Which CBU resource instances to bill"
        governance_tier: governed
        classification: confidential
        pii: false
      fee_billing_periods:
        description: "Monthly/quarterly billing cycles (PENDING → CALCULATING → INVOICED → DISPUTED)"
        governance_tier: governed
        classification: confidential
        pii: false
      fee_billing_period_lines:
        description: "Calculated fee amounts per target per period"
        governance_tier: governed
        classification: confidential
        pii: false
    verb_data_footprint:
      billing.create-profile:
        reads: [deals, deal_rate_cards]
        writes: [fee_billing_profiles]
      billing.activate-profile:
        reads: [fee_billing_profiles]
        writes: [fee_billing_profiles]
      billing.add-account-target:
        reads: [cbus]
        writes: [fee_billing_account_targets]
      billing.remove-account-target:
        reads: [fee_billing_account_targets]
        writes: [fee_billing_account_targets]
      billing.create-period:
        reads: [fee_billing_profiles]
        writes: [fee_billing_periods]
      billing.calculate-period:
        reads:
          [
            fee_billing_periods,
            fee_billing_account_targets,
            deal_rate_card_lines,
          ]
        writes: [fee_billing_period_lines]
      billing.approve-period:
        reads: [fee_billing_periods]
        writes: [fee_billing_periods]
      billing.revenue-summary:
        reads: [fee_billing_periods, fee_billing_period_lines, deals]

  # ---------------------------------------------------------------------------
  # CONTRACT — Legal Contracts & Onboarding Gate
  # ---------------------------------------------------------------------------
  contract:
    description: "Legal contracts with product-level rate cards and CBU subscription onboarding gate"
    tables:
      legal_contracts:
        description: "Master contract record with client_label, reference, effective/termination dates, status"
        governance_tier: governed
        classification: confidential
        pii: false
      contract_products:
        description: "Composite key (contract_id, product_code) — products covered by contract"
        governance_tier: governed
        classification: confidential
        pii: false
      rate_cards:
        description: "Rate card definitions attached to contracts"
        governance_tier: governed
        classification: confidential
        pii: false
      contract_pack:
        description: "Grouped contract package definitions"
        governance_tier: governed
        classification: internal
        pii: false
      contract_template:
        description: "Contract template definitions within a pack"
        governance_tier: governed
        classification: internal
        pii: false
    verb_data_footprint:
      contract.create:
        reads: [client_group]
        writes: [legal_contracts]
      contract.get:
        reads: [legal_contracts]
      contract.list:
        reads: [legal_contracts]
      contract.update:
        reads: [legal_contracts]
        writes: [legal_contracts]
      contract.terminate:
        reads: [legal_contracts]
        writes: [legal_contracts]
      contract.add-product:
        reads: [products]
        writes: [contract_products]
      contract.remove-product:
        reads: [contract_products]
        writes: [contract_products]
      contract.subscribe:
        reads: [cbus, contract_products]
        writes: [cbu_subscriptions]
      contract.unsubscribe:
        reads: [cbu_subscriptions]
        writes: [cbu_subscriptions]
      contract.for-client:
        reads: [legal_contracts]

  # ---------------------------------------------------------------------------
  # TRADING PROFILE — Trading Matrix & Mandate Management
  # ---------------------------------------------------------------------------
  trading-profile:
    description: "Trading mandate profiles — instrument universe, markets, currencies, SSIs, booking rules"
    tables:
      cbu_trading_profiles:
        description: "Trading mandate profiles with version control (JSONB matrix data)"
        governance_tier: governed
        classification: confidential
        pii: false
      cbu_matrix_product_overlay:
        description: "Per-cell instrument/market/currency config overlay"
        governance_tier: governed
        classification: confidential
        pii: false
      trading_profile_materializations:
        description: "Materialized trading profile snapshots"
        governance_tier: operational
        classification: confidential
        pii: false
    verb_data_footprint:
      trading-profile.create-draft:
        reads: [cbus]
        writes: [cbu_trading_profiles]
      trading-profile.import:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]
      trading-profile.read:
        reads: [cbu_trading_profiles]
      trading-profile.get-active:
        reads: [cbu_trading_profiles]
      trading-profile.activate:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]
      trading-profile.materialize:
        reads: [cbu_trading_profiles]
        writes:
          [
            custody.cbu_instrument_universe,
            custody.cbu_ssi,
            custody.ssi_booking_rules,
            custody.isda_agreements,
            custody.csa_agreements,
          ]
      trading-profile.diff:
        reads: [cbu_trading_profiles]
      trading-profile.clone-to:
        reads: [cbu_trading_profiles, cbus]
        writes: [cbu_trading_profiles]
      trading-profile.add-component:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]
      trading-profile.remove-component:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]
      trading-profile.set-base-currency:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]
      trading-profile.update-im-scope:
        reads: [cbu_trading_profiles]
        writes: [cbu_trading_profiles]

  # ---------------------------------------------------------------------------
  # SESSION — Scope & Navigation
  # ---------------------------------------------------------------------------
  session:
    description: "Session scope management — CBU loading, history navigation, and scope queries"
    tables:
      sessions:
        description: "Agent session state with loaded CBU IDs and navigation history"
        governance_tier: operational
        classification: internal
        pii: false
      dsl_sessions:
        description: "DSL session ledger with run sheet entries"
        governance_tier: operational
        classification: internal
        pii: false
      dsl_session_events:
        description: "Session event log"
        governance_tier: operational
        classification: internal
        pii: false
      repl_sessions_v2:
        description: "V2 REPL session state (pack, runbook, context stack)"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      session.load-galaxy:
        reads: [cbus, client_group, entities]
      session.load-cluster:
        reads: [cbus, client_group, entities]
      session.load-cbu:
        reads: [cbus]
      session.load-jurisdiction:
        reads: [cbus, master_jurisdictions]
      session.unload-cbu:
        reads: [cbus]
      session.clear: {}
      session.undo: {}
      session.redo: {}
      session.info:
        reads: [cbus]
      session.list:
        reads: [cbus]

  # ---------------------------------------------------------------------------
  # FUND — Fund Structure Management
  # ---------------------------------------------------------------------------
  fund:
    description: "Fund lifecycle — umbrella structures, sub-funds, share classes, and compartments"
    tables:
      entity_funds:
        description: "Fund entities with fund_type, gleif_category, jurisdiction, parent/master fund"
        governance_tier: governed
        classification: internal
        pii: false
      fund_structure:
        description: "Fund structure hierarchy (umbrella → sub-fund → share class)"
        governance_tier: governed
        classification: internal
        pii: false
      entity_share_classes:
        description: "Share class definitions per fund"
        governance_tier: governed
        classification: internal
        pii: false
      fund_investments:
        description: "Fund investment positions"
        governance_tier: operational
        classification: confidential
        pii: false
      kyc.fund_vehicles:
        description: "KYC fund vehicle records per case"
        governance_tier: governed
        classification: internal
        pii: false
      kyc.fund_compartments:
        description: "Fund compartment structures per vehicle"
        governance_tier: governed
        classification: internal
        pii: false
      kyc.share_classes:
        description: "Share class definitions within compartments"
        governance_tier: governed
        classification: internal
        pii: false
      kyc.share_class_identifiers:
        description: "Share class identifier references (ISIN, CUSIP)"
        governance_tier: operational
        classification: internal
        pii: false
    verb_data_footprint:
      fund.create:
        reads: [entity_funds, entities]
        writes: [entities, entity_funds, fund_structure]
      fund.ensure:
        reads: [entity_funds, fund_structure]
        writes: [entities, entity_funds, entity_share_classes, fund_structure]
      fund.list:
        reads: [entity_funds]
      fund.get:
        reads: [entity_funds, fund_structure]
      fund.list-share-classes:
        reads: [entity_share_classes]

  # ---------------------------------------------------------------------------
  # KYC — Case Management & Workflows
  # ---------------------------------------------------------------------------
  kyc:
    description: "KYC case management — case lifecycle, entity workstreams, UBO registry, screening, evidence, and tollgate evaluation"
    tables:
      kyc.cases:
        description: "Case record with status machine (INTAKE → DISCOVERY → ASSESSMENT → REVIEW → APPROVED/REJECTED)"
        governance_tier: governed
        classification: confidential
        pii: false
      kyc.entity_workstreams:
        description: "Per-entity workstream within case with identity/ownership/screening verification"
        governance_tier: governed
        classification: confidential
        pii: false
      kyc.case_events:
        description: "Immutable event log per case"
        governance_tier: operational
        classification: confidential
        pii: false
      kyc.case_import_runs:
        description: "Import run case linkage with as_of date and idempotency"
        governance_tier: operational
