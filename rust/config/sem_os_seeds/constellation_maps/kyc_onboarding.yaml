constellation: kyc.onboarding
description: KYC onboarding lifecycle constellation — per-CBU delta case management, screening, and tollgate approval on top of a previously cleared group UBO/control perimeter. Evidence/documents are a separate constellation (evidence.collection) referenced by dependency.
jurisdiction: ALL
slots:
  cbu:
    type: cbu
    table: cbus
    pk: cbu_id
    cardinality: root
    # cbu.read/inspect are navigation — owned by group.ownership constellation.
    # KYC reads the CBU after it has inherited the group's baseline clearance.
    verbs:
      inspect: { verb: cbu.inspect, when: filled }
  client_group:
    type: cbu
    table: client_group
    pk: group_id
    join: { via: client_group_entity, parent_fk: cbu_id, child_fk: group_id }
    cardinality: optional
    depends_on: [cbu]
    state_machine: client_group_lifecycle
    verbs: {}
  group_kyc_clearance:
    type: case
    table: cases
    pk: case_id
    join: { via: cases, parent_fk: client_group_id, child_fk: case_id }
    cardinality: optional
    depends_on: [{ slot: client_group, min_state: group_kyc_cleared }]
    state_machine: kyc_case_lifecycle
    verbs:
      read: { verb: kyc-case.read, when: filled }
      state: { verb: kyc-case.summarize, when: filled }
  kyc_case:
    type: case
    table: cases
    pk: case_id
    join: { via: cases, parent_fk: cbu_id, child_fk: case_id }
    cardinality: mandatory
    depends_on: [cbu, { slot: group_kyc_clearance, min_state: approved }]
    state_machine: kyc_case_lifecycle
    verbs:
      create: { verb: kyc-case.create, when: empty }
      open: { verb: kyc-case.create, when: empty }
      read: { verb: kyc-case.read, when: filled }
      list_by_cbu: { verb: kyc-case.list-by-cbu, when: filled }
      state: { verb: kyc-case.summarize, when: filled }
      assign: { verb: kyc-case.assign, when: filled }
      update_status: { verb: kyc-case.update-status, when: filled }
      set_risk: { verb: kyc-case.set-risk-rating, when: filled }
      close: { verb: kyc-case.close, when: filled }
      reopen: { verb: kyc-case.reopen, when: filled }
      escalate: { verb: kyc-case.escalate, when: filled }
    children:
      tollgate:
        type: tollgate
        table: tollgate_evaluations
        pk: evaluation_id
        join:
          {
            via: tollgate_evaluations,
            parent_fk: case_id,
            child_fk: evaluation_id,
          }
        cardinality: optional
        depends_on: [{ slot: kyc_case, min_state: review }]
        verbs:
          evaluate: { verb: tollgate.evaluate, when: empty }
          check_gate: { verb: tollgate.check-gate, when: [empty, filled] }
          read: { verb: tollgate.read, when: filled }
          get_decision_readiness:
            { verb: tollgate.get-decision-readiness, when: filled }
          get_metrics: { verb: tollgate.get-metrics, when: filled }
          list_evaluations: { verb: tollgate.list-evaluations, when: filled }
          list_thresholds: { verb: tollgate.list-thresholds, when: filled }
          set_threshold: { verb: tollgate.set-threshold, when: filled }
          override: { verb: tollgate.override, when: filled }
          list_overrides: { verb: tollgate.list-overrides, when: filled }
          expire_override: { verb: tollgate.expire-override, when: filled }
  entity_workstream:
    type: entity
    entity_kinds: [person, company]
    join: { via: entity_workstreams, parent_fk: case_id, child_fk: entity_id }
    cardinality: optional
    depends_on: [kyc_case]
    state_machine: entity_workstream_lifecycle
    overlays: [red_flags, evidence]
    verbs:
      create: { verb: entity-workstream.create, when: empty }
      read: entity-workstream.read
      list_by_case: entity-workstream.list-by-case
      state: entity-workstream.state
      update:
        {
          verb: entity-workstream.update-status,
          when:
            [
              open,
              documents_requested,
              screening_initiated,
              screening_complete,
              evidence_collected,
              verified,
            ],
        }
      escalate_dd:
        {
          verb: entity-workstream.escalate-dd,
          when:
            [
              open,
              documents_requested,
              screening_initiated,
              screening_complete,
            ],
        }
      set_ubo:
        { verb: entity-workstream.set-ubo, when: [open, documents_requested] }
      complete:
        {
          verb: entity-workstream.complete,
          when: [evidence_collected, verified],
        }
      block:
        {
          verb: entity-workstream.block,
          when:
            [
              open,
              documents_requested,
              screening_initiated,
              screening_complete,
              evidence_collected,
            ],
        }
      # Red flag state verbs — flags are a state of the entity, not a separate entity
      flag_raise:
        {
          verb: red-flag.raise,
          when:
            [
              open,
              documents_requested,
              screening_initiated,
              screening_complete,
              evidence_collected,
            ],
        }
      flag_read: red-flag.read
      flag_list: red-flag.list
      flag_resolve:
        {
          verb: red-flag.resolve,
          when: [screening_complete, evidence_collected, verified],
        }
      flag_escalate:
        {
          verb: red-flag.escalate,
          when: [screening_initiated, screening_complete, evidence_collected],
        }
      flag_update:
        {
          verb: red-flag.update,
          when:
            [
              open,
              documents_requested,
              screening_initiated,
              screening_complete,
              evidence_collected,
            ],
        }
      flag_list_severity: red-flag.list-by-severity
      flag_close:
        {
          verb: red-flag.close,
          when: [screening_complete, evidence_collected, verified],
        }
      # Evidence/document state verbs — documents are evidence FOR the entity,
      # not positioned entities. The requirement dictionary defines what's needed,
      # the state machine tracks each requirement instance.
      req_create:
        { verb: requirement.create, when: [open, documents_requested] }
      req_create_set:
        { verb: requirement.create-set, when: [open, documents_requested] }
      req_check:
        {
          verb: requirement.check,
          when: [documents_requested, evidence_collected, verified],
        }
      req_list: requirement.list
      req_for_entity: requirement.list-for-entity
      req_unsatisfied:
        {
          verb: requirement.list-outstanding,
          when: [documents_requested, screening_complete, evidence_collected],
        }
      req_waive: { verb: requirement.waive, when: [documents_requested] }
      req_reinstate:
        { verb: requirement.reinstate, when: [evidence_collected, verified] }
      doc_solicit:
        {
          verb: document.solicit,
          when: [open, documents_requested, evidence_collected],
        }
      doc_solicit_batch:
        { verb: document.solicit-batch, when: [open, documents_requested] }
      doc_upload: { verb: document.upload, when: [documents_requested] }
      doc_verify:
        {
          verb: document.verify,
          when: [documents_requested, screening_complete, evidence_collected],
        }
      doc_reject:
        {
          verb: document.reject,
          when: [documents_requested, screening_complete],
        }
      doc_read: document.read
      doc_list: document.list
      doc_compute_reqs:
        {
          verb: document.compute-requirements,
          when: [open, documents_requested, evidence_collected],
        }
      doc_missing:
        {
          verb: document.missing-for-entity,
          when: [documents_requested, screening_complete, evidence_collected],
        }
  screening:
    type: entity
    entity_kinds: [person, company]
    join:
      {
        via: screenings,
        parent_fk: workstream_id,
        child_fk: screening_id,
        filter_column: screening_type,
      }
    cardinality: optional
    depends_on:
      - { slot: entity_workstream, min_state: open }
    state_machine: screening_lifecycle
    overlays: [screening_result]
    verbs:
      run: { verb: screening.run, when: [empty, not_started] }
      sanctions:
        { verb: screening.sanctions, when: [empty, not_started, filled] }
      pep: { verb: screening.pep, when: [empty, not_started, filled] }
      adverse_media:
        { verb: screening.adverse-media, when: [empty, not_started, filled] }
      bulk_refresh: { verb: screening.bulk-refresh, when: filled }
      read: { verb: screening.read, when: filled }
      list: { verb: screening.list, when: filled }
      list_by_workstream: { verb: screening.list-by-workstream, when: filled }
      review_hit: { verb: screening.review-hit, when: filled }
      update: { verb: screening.update-status, when: filled }
      escalate: { verb: screening.escalate, when: filled }
      resolve: { verb: screening.resolve, when: filled }
      complete: { verb: screening.complete, when: filled }
  # Evidence/documents are NOT embedded here — they are a separate concern
  # owned by evidence.collection constellation. KYC depends on evidence
  # being complete (tollgate checks coverage), but does not own the verbs.
  kyc_agreement:
    type: entity
    entity_kinds: [company]
    join: { via: kyc_service_agreements, parent_fk: case_id, child_fk: agreement_id }
    cardinality: optional
    depends_on: [kyc_case]
    state_machine: agreement_lifecycle
    verbs:
      create: { verb: kyc-agreement.create, when: [empty, pending] }
      read: kyc-agreement.read
      list: kyc-agreement.list
      update:
        { verb: kyc-agreement.update, when: [draft, sent, signed, active] }
      update_status:
        {
          verb: kyc-agreement.update-status,
          when: [draft, sent, signed, active],
        }
      sign: { verb: kyc-agreement.sign, when: [sent, signed] }
  identifier:
    type: entity
    entity_kinds: [entity]
    join:
      { via: entity_identifiers, parent_fk: entity_id, child_fk: identifier_id }
    cardinality: optional
    depends_on:
      - { slot: entity_workstream, min_state: open }
    state_machine: identifier_lifecycle
    verbs:
      add: { verb: identifier.add, when: [empty, failed] }
      read: identifier.read
      list: identifier.list
      verify: { verb: identifier.verify, when: [captured] }
      expire: { verb: identifier.expire, when: [captured, verified] }
      update: { verb: identifier.update, when: [captured, verified] }
      search: { verb: identifier.search, when: [empty, failed, captured] }
      resolve: { verb: identifier.resolve, when: [captured, verified] }
      list_by_type: identifier.list-by-type
      set_primary: { verb: identifier.set-primary, when: [verified] }
      remove: { verb: identifier.remove, when: [captured, verified, failed] }
  request:
    type: entity
    entity_kinds: [entity]
    # doc_requests joins via workstream_id, not case_id.
    # The request slot hangs off the kyc_case dependency, so we join through workstream.
    join: { via: doc_requests, parent_fk: workstream_id, child_fk: request_id }
    cardinality: optional
    depends_on: [kyc_case]
    state_machine: document_request_lifecycle
    verbs:
      create: { verb: request.create, when: [empty, pending, returned] }
      read: request.read
      list: request.list
      update: { verb: request.update, when: [sent, received] }
      complete: { verb: request.complete, when: [received] }
      cancel: { verb: request.cancel, when: [pending, sent] }
      assign: { verb: request.assign, when: [pending, sent, received] }
      reopen: { verb: request.reopen, when: [returned, waived, fulfilled] }
      escalate: { verb: request.escalate, when: [sent, received] }
  # red_flag is a STATE of an entity workstream (like "screened" or
  # "document requested"), not a separate positioned entity.
  # Red flag verbs are on the entity_workstream slot above.
  # Evidence and case-event are similarly state/annotation, not entities.
