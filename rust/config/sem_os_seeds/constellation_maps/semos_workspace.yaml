constellation: semos.workspace
description: >
  SemOS Maintenance workspace root — operational and diagnostic verbs for
  registry governance, schema management, and platform infrastructure.
jurisdiction: ALL
slots:
  workspace_root:
    type: cbu
    table: client_group
    pk: group_id
    cardinality: root
    verbs:
      # ── Maintenance/infrastructure ──────────────────────────────────
      maint_bootstrap: { verb: maintenance.bootstrap-seeds, when: [empty, filled] }
      maint_cleanup: { verb: maintenance.cleanup, when: filled }
      maint_drain: { verb: maintenance.drain-outbox, when: filled }
      maint_health_pending: maintenance.health-pending
      maint_health_stale: maintenance.health-stale-dryruns
      maint_reindex: { verb: maintenance.reindex-embeddings, when: filled }
      maint_validate: maintenance.validate-schema-sync
      # ── Constellation operations ────────────────────────────────────
      constellation_hydrate: { verb: constellation.hydrate, when: [empty, filled] }
      constellation_summary: constellation.summary
      # ── Discovery/introspection ─────────────────────────────────────
      discovery_run: { verb: discovery.run, when: [empty, filled] }
      discovery_explain: discovery.explain
      discovery_available: discovery.available-actions
      discovery_entity_context: discovery.entity-context
      discovery_relationships: discovery.entity-relationships
      discovery_graph_walk: { verb: discovery.graph-walk, when: filled }
      discovery_inspect: discovery.inspect-data
      discovery_search_data: { verb: discovery.search-data, when: [empty, filled] }
      discovery_search_entities: { verb: discovery.search-entities, when: [empty, filled] }
      discovery_transitions: discovery.valid-transitions
      discovery_verb_detail: discovery.verb-detail
      discovery_cascade: { verb: discovery.cascade-research, when: filled }
      # ── Semantic operations ─────────────────────────────────────────
      semantic_state: semantic.get-state
      semantic_stages: semantic.list-stages
      semantic_missing: semantic.missing-entities
      semantic_next: semantic.next-actions
      semantic_prompt: semantic.prompt-context
      semantic_stages_product: semantic.stages-for-product
      # ── State operations ────────────────────────────────────────────
      state_derive: { verb: state.derive, when: filled }
      state_derive_all: { verb: state.derive-all, when: filled }
      state_diagnose: state.diagnose
      state_consistency: state.check-consistency
      state_blocked: state.blocked-why
      state_override: { verb: state.override, when: filled }
      state_revoke: { verb: state.revoke-override, when: filled }
      state_list_overrides: state.list-overrides
      # ── BPMN orchestration ──────────────────────────────────────────
      bpmn_start: { verb: bpmn.start, when: [empty, filled] }
      bpmn_signal: { verb: bpmn.signal, when: filled }
      bpmn_cancel: { verb: bpmn.cancel, when: filled }
      bpmn_inspect: bpmn.inspect
      bpmn_compile: { verb: bpmn.compile, when: [empty, filled] }
      # ── Batch operations ────────────────────────────────────────────
      batch_status: batch.status
      batch_pause: { verb: batch.pause, when: filled }
      batch_resume: { verb: batch.resume, when: filled }
      batch_abort: { verb: batch.abort, when: filled }
      batch_skip: { verb: batch.skip, when: filled }
      batch_continue: { verb: batch.continue, when: filled }
      batch_add_products: { verb: batch.add-products, when: filled }
      # ── Docs bundle ─────────────────────────────────────────────────
      docs_apply: { verb: docs-bundle.apply, when: filled }
      docs_list_applied: docs-bundle.list-applied
      docs_list_available: docs-bundle.list-available
      # ── Template operations ─────────────────────────────────────────
      template_invoke: { verb: template.invoke, when: [empty, filled] }
      template_batch: { verb: template.batch, when: filled }
      # ── Admin/user/role management ──────────────────────────────────
      admin_reg_create: { verb: admin.regulators.create, when: [empty, filled] }
      admin_reg_list: admin.regulators.list
      admin_reg_read: admin.regulators.read
      admin_reg_update: { verb: admin.regulators.update, when: filled }
      admin_reg_deactivate: { verb: admin.regulators.deactivate, when: filled }
      admin_tiers_list: admin.regulatory-tiers.list
      admin_tiers_read: admin.regulatory-tiers.read
      admin_roles_create: { verb: admin.role-types.create, when: [empty, filled] }
      admin_roles_list: admin.role-types.list
      admin_roles_read: admin.role-types.read
      admin_roles_update: { verb: admin.role-types.update, when: filled }
      admin_roles_deactivate: { verb: admin.role-types.deactivate, when: filled }
      user_create: { verb: user.create, when: [empty, filled] }
      user_suspend: { verb: user.suspend, when: filled }
      user_reactivate: { verb: user.reactivate, when: filled }
      user_offboard: { verb: user.offboard, when: filled }
      user_check_access: user.check-access
      user_list_cbus: user.list-cbus
      user_list_teams: user.list-teams
      refdata_ensure: { verb: refdata.ensure, when: [empty, filled] }
      refdata_list: refdata.list
      refdata_read: refdata.read
      refdata_deactivate: { verb: refdata.deactivate, when: filled }
      refdata_load_all: { verb: refdata.load-all, when: [empty, filled] }
      refdata_load_instruments: { verb: refdata.load-instrument-classes, when: [empty, filled] }
      refdata_load_markets: { verb: refdata.load-markets, when: [empty, filled] }
      refdata_load_sla: { verb: refdata.load-sla-templates, when: [empty, filled] }
      refdata_load_subcustodians: { verb: refdata.load-subcustodians, when: [empty, filled] }
      role_ensure: { verb: role.ensure, when: [empty, filled] }
      role_list: role.list
      role_read: role.read
      role_delete: { verb: role.delete, when: filled }
      # ── Attribute management ────────────────────────────────────────
      attr_define_internal: { verb: attribute.define-internal, when: [empty, filled] }
      attr_update_internal: { verb: attribute.update-internal, when: filled }
      attr_update: { verb: attribute.update, when: filled }
      attr_check_coverage: attribute.check-coverage
      attr_list_by_document: attribute.list-by-document
      attr_list_sinks: attribute.list-sinks
      attr_list_sources: attribute.list-sources
      attr_map_to_doc: { verb: attribute.map-to-document, when: filled }
      attr_unmap: { verb: attribute.unmap-from-document, when: filled }
      attr_trace_lineage: attribute.trace-lineage
      attrs_gaps: attributes.gaps
      attrs_populate: { verb: attributes.populate, when: filled }
      attrs_rollup: { verb: attributes.rollup, when: filled }
      attrs_set: { verb: attributes.set, when: filled }
      # ── Shared atom registry ────────────────────────────────────────
      shared_atom_register: { verb: shared-atom.register, when: [empty, filled] }
      shared_atom_activate: { verb: shared-atom.activate, when: filled }
      shared_atom_deprecate: { verb: shared-atom.deprecate, when: filled }
      shared_atom_retire: { verb: shared-atom.retire, when: filled }
      shared_atom_list: shared-atom.list
      shared_atom_list_consumers: shared-atom.list-consumers
      shared_atom_replay: { verb: shared-atom.replay-constellation, when: filled }
      shared_atom_acknowledge: { verb: shared-atom.acknowledge-shared-update, when: filled }
      # ── Remediation lifecycle ──────────────────────────────────────
      remediation_list_open: remediation.list-open
      remediation_defer: { verb: remediation.defer, when: filled }
      remediation_revoke: { verb: remediation.revoke-deferral, when: filled }
      remediation_confirm: { verb: remediation.confirm-external-correction, when: filled }
      # ── Governance macros ─────────────────────────────────────────
      macro_bootstrap_registry: { verb: governance.bootstrap-attribute-registry, when: [empty, filled] }
      macro_define_dictionary: { verb: governance.define-service-dictionary, when: filled }
      macro_full_publish: { verb: governance.full-publish-pipeline, when: filled }
      macro_reconcile: { verb: governance.reconcile-registry, when: [empty, filled] }
      macro_seed_domain: { verb: attribute.seed-domain, when: [empty, filled] }
      macro_seed_derived: { verb: attribute.seed-derived, when: [empty, filled] }
      # ── Cross-workspace macros ─────────────────────────────────────
      macro_register_activate: { verb: shared-atom.register-and-activate, when: [empty, filled] }
      macro_consistency_check: { verb: shared-atom.full-consistency-check, when: [empty, filled] }
      macro_deprecate_retire: { verb: shared-atom.deprecate-and-retire, when: filled }
      macro_defer_audit: { verb: remediation.defer-with-audit-trail, when: filled }
      macro_resolve_confirm: { verb: remediation.resolve-with-confirmation, when: filled }
      macro_detect_remediate: { verb: shared-atom.detect-and-remediate, when: filled }
      macro_batch_replay: { verb: shared-atom.batch-replay, when: filled }
      macro_batch_acknowledge: { verb: shared-atom.acknowledge-batch, when: filled }
