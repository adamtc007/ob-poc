constellation: struct.lux.ucits.sicav
description: Luxembourg UCITS SICAV onboarding constellation
jurisdiction: LU
slots:
  cbu:
    type: cbu
    table: cbus
    pk: cbu_id
    cardinality: root
    verbs:
      create: cbu.create
      read: cbu.read
      show: cbu.show
  management_company:
    type: entity
    entity_kinds: [company]
    join:
      via: cbu_entity_roles
      parent_fk: cbu_id
      child_fk: entity_id
      filter_column: role
      filter_value: management-company
    cardinality: mandatory
    depends_on: [cbu]
    placeholder: true
    placeholder_detection: name_match
    state_machine: entity_kyc_lifecycle
    overlays:
      [entity_ref, workstream, screenings, evidence, red_flags, doc_requests]
    verbs:
      ensure:
        verb: entity.ensure-or-placeholder
        when: empty
      assign:
        verb: cbu.assign-role
        when: placeholder
      search:
        verb: party.search
        when: [placeholder, filled]
      add:
        verb: party.add
        when: empty
      show:
        verb: entity.read
        when: filled
  depositary:
    type: entity
    entity_kinds: [company]
    join:
      via: cbu_entity_roles
      parent_fk: cbu_id
      child_fk: entity_id
      filter_column: role
      filter_value: depositary
    cardinality: mandatory
    depends_on: [cbu]
    placeholder: true
    state_machine: entity_kyc_lifecycle
    overlays:
      [entity_ref, workstream, screenings, evidence, red_flags, doc_requests]
    verbs:
      ensure:
        verb: entity.ensure-or-placeholder
        when: empty
      assign:
        verb: cbu.assign-role
        when: placeholder
      search:
        verb: party.search
        when: [placeholder, filled]
      add:
        verb: party.add
        when: empty
  investment_manager:
    type: entity
    entity_kinds: [company]
    join:
      via: cbu_entity_roles
      parent_fk: cbu_id
      child_fk: entity_id
      filter_column: role
      filter_value: investment-manager
    cardinality: optional
    depends_on: [cbu]
    placeholder: true
    state_machine: entity_kyc_lifecycle
    overlays:
      [entity_ref, workstream, screenings, evidence, red_flags, doc_requests]
    verbs:
      ensure:
        verb: entity.ensure-or-placeholder
        when: empty
      assign:
        verb: cbu.assign-role
        when: placeholder
  ownership_chain:
    type: entity_graph
    entity_kinds: [person, company]
    join:
      via: entity_relationships
      parent_fk: from_entity_id
      child_fk: to_entity_id
    cardinality: recursive
    max_depth: 5
    depends_on: [management_company]
    state_machine: ubo_epistemic_lifecycle
    overlays: [registry, evidence, screenings]
    edge_overlays: [ownership]
    verbs:
      discover: ubo.discover
      allege: ubo.allege
      verify: ubo.verify
      promote: ubo.promote
      approve: ubo.approve
      reject: ubo.reject
  case:
    type: case
    table: cases
    pk: case_id
    join:
      via: cases
      parent_fk: cbu_id
      child_fk: case_id
    cardinality: optional
    depends_on: [management_company]
    state_machine: kyc_case_lifecycle
    verbs:
      open: case.open
      submit: case.submit
      approve: case.approve
      reject: case.reject
      request_info: case.request-info
    children:
      tollgate:
        type: tollgate
        table: tollgate_evaluations
        pk: evaluation_id
        join:
          via: tollgate_evaluations
          parent_fk: case_id
          child_fk: evaluation_id
        cardinality: optional
        depends_on:
          - slot: case
            min_state: intake
        verbs:
          evaluate: tollgate.evaluate
  mandate:
    type: mandate
    table: cbu_trading_profiles
    pk: profile_id
    join:
      via: cbu_trading_profiles
      parent_fk: cbu_id
      child_fk: profile_id
    cardinality: optional
    depends_on:
      - slot: cbu
        min_state: filled
      - slot: case
        min_state: intake
    verbs:
      create: mandate.create
bulk_macros:
  - role_slots
