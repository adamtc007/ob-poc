constellation: group.ownership
description: Client group ownership and control constellation — the root context for all onboarding. Maps group identity, GLEIF hierarchy, UBO discovery, control chain, group-level KYC clearance, and the controlled CBUs that inherit that baseline through control links such as ManCo relationships.
jurisdiction: ALL
slots:
  client_group:
    type: cbu
    table: client_group
    pk: group_id
    cardinality: root
    state_machine: client_group_lifecycle
    verbs:
      create: { verb: client-group.create, when: empty }
      read: { verb: client-group.read, when: filled }
      update: { verb: client-group.update, when: filled }
      set_canonical: { verb: client-group.set-canonical, when: filled }
      start_discovery:
        { verb: client-group.start-discovery, when: [empty, filled] }
      discover_entities:
        { verb: client-group.discover-entities, when: [empty, filled] }
      complete_discovery:
        { verb: client-group.complete-discovery, when: filled }
      # Consolidated: client-group.entity-manage replaces entity-add/remove/confirm/reject
      # action arg selects: add, remove, confirm, reject
      entity_manage: { verb: client-group.entity-manage, when: [empty, filled] }
      entity_add: { verb: client-group.entity-add, when: [empty, filled] }
      confirm_entity:
        {
          verb: client-group.confirm-entity,
          when:
            [
              filled,
              researching,
              ubo_mapped,
              control_mapped,
              group_kyc_cleared,
              cbus_identified,
              onboarding,
              active,
            ],
        }
      entity_remove: { verb: client-group.entity-remove, when: filled }
      list_entities: { verb: client-group.list-entities, when: filled }
      search_entities:
        { verb: client-group.search-entities, when: [empty, filled] }
      list_parties: { verb: client-group.list-parties, when: filled }
      list_unverified: { verb: client-group.list-unverified, when: filled }
      list_discrepancies:
        { verb: client-group.list-discrepancies, when: filled }
      verify_ownership: { verb: client-group.verify-ownership, when: filled }
      reject_entity: { verb: client-group.reject-entity, when: filled }
      assign_role: { verb: client-group.assign-role, when: filled }
      remove_role: { verb: client-group.remove-role, when: filled }
      list_roles: { verb: client-group.list-roles, when: filled }
      add_relationship: { verb: client-group.add-relationship, when: filled }
      list_relationships:
        { verb: client-group.list-relationships, when: filled }
      tag_add: { verb: client-group.tag-add, when: filled }
      tag_remove: { verb: client-group.tag-remove, when: filled }
  # Entity Research — multi-source entity discovery and import.
  # GLEIF (LEI), Companies House (UK), SEC EDGAR (US), and generic sources
  # all feed entity discovery into the client group perimeter.
  entity_research:
    type: entity
    entity_kinds: [company]
    join: { via: client_group_entity, parent_fk: group_id, child_fk: entity_id }
    cardinality: optional
    depends_on: [client_group]
    verbs:
      # ── GLEIF source (LEI registry) ──────────────────────────────────
      gleif_import: { verb: gleif.import-tree, when: empty }
      gleif_import_to_group:
        { verb: gleif.import-to-client-group, when: [empty, filled] }
      gleif_import_funds:
        { verb: gleif.import-managed-funds, when: [empty, filled] }
      gleif_search: { verb: gleif.search, when: [empty, filled] }
      gleif_refresh: { verb: gleif.refresh, when: [empty, filled] }
      gleif_enrich: { verb: gleif.enrich, when: [empty, filled] }
      gleif_lookup: { verb: gleif.lookup, when: [empty, filled] }
      gleif_resolve: { verb: gleif.resolve-successor, when: [empty, filled] }
      gleif_trace: { verb: gleif.trace-ownership, when: [empty, filled] }
      # ── Companies House source (UK registry) ────────────────────────
      ch_search: { verb: research.companies-house.search, when: [empty, filled] }
      ch_fetch: { verb: research.companies-house.fetch-company, when: [empty, filled] }
      ch_psc: { verb: research.companies-house.fetch-psc, when: [empty, filled] }
      ch_officers: { verb: research.companies-house.fetch-officers, when: [empty, filled] }
      ch_import: { verb: research.companies-house.import-company, when: [empty, filled] }
      # ── SEC EDGAR source (US filings) ───────────────────────────────
      sec_search: { verb: research.sec-edgar.search, when: [empty, filled] }
      sec_fetch: { verb: research.sec-edgar.fetch-company, when: [empty, filled] }
      sec_ubos: { verb: research.sec-edgar.fetch-beneficial-owners, when: [empty, filled] }
      sec_filings: { verb: research.sec-edgar.fetch-filings, when: [empty, filled] }
      sec_import: { verb: research.sec-edgar.import-company, when: [empty, filled] }
      # ── Generic source operations ───────────────────────────────────
      source_list: research.sources.list
      source_info: research.sources.info
      source_search: { verb: research.sources.search, when: [empty, filled] }
      source_fetch: { verb: research.sources.fetch, when: [empty, filled] }
      source_for_jurisdiction: research.sources.find-for-jurisdiction
      # ── Import run tracking (provenance) ────────────────────────────
      import_begin: { verb: research.import-run.begin, when: [empty, filled] }
      import_complete: { verb: research.import-run.complete, when: filled }
      import_supersede: { verb: research.import-run.supersede, when: filled }
      # ── Generic normalization ───────────────────────────────────────
      normalize: { verb: research.generic.normalize, when: filled }
  ubo_discovery:
    type: entity_graph
    entity_kinds: [person, company]
    join:
      {
        via: ubo_registry,
        parent_fk: subject_entity_id,
        child_fk: ubo_entity_id,
      }
    cardinality: recursive
    max_depth: 5
    depends_on: [entity_research]
    state_machine: ubo_epistemic_lifecycle
    overlays: [registry, evidence, screenings]
    edge_overlays: [ownership]
  control_chain:
    type: entity_graph
    entity_kinds: [company]
    join:
      {
        via: ownership_snapshots,
        parent_fk: root_entity_id,
        child_fk: entity_id,
      }
    cardinality: recursive
    max_depth: 10
    depends_on: [ubo_discovery]
    overlays: [ownership]
    edge_overlays: [control]
    verbs:
      refresh: { verb: ownership.refresh, when: filled }
      list_links: { verb: ownership.control-links.list, when: filled }
  group_kyc_clearance:
    type: case
    table: cases
    pk: case_id
    join: { via: cases, parent_fk: client_group_id, child_fk: case_id }
    cardinality: optional
    depends_on: [control_chain]
    state_machine: kyc_case_lifecycle
    verbs:
      read: { verb: kyc-case.read, when: filled }
      state: { verb: kyc-case.summarize, when: filled }
      update_status: { verb: kyc-case.update-status, when: filled }
      close: { verb: kyc-case.close, when: filled }
      case_status: { verb: kyc.case-status, when: [empty, filled] }
      list_missing_items: { verb: kyc.list-missing-items, when: [empty, filled] }
  cbu_identification:
    type: cbu
    table: cbus
    pk: cbu_id
    join: { via: client_group_entity, parent_fk: entity_id, child_fk: cbu_id }
    cardinality: optional
    depends_on:
      [control_chain, { slot: group_kyc_clearance, min_state: approved }]
    verbs:
      create: { verb: cbu.create, when: empty }
      create_from_group: { verb: cbu.create-from-client-group, when: empty }
      ensure: { verb: cbu.ensure, when: [empty, filled] }
      read: { verb: cbu.read, when: filled }
      list: { verb: cbu.list, when: [empty, filled] }
      list_subscriptions: { verb: cbu.list-subscriptions, when: filled }
      list_evidence: { verb: cbu.list-evidence, when: filled }
      list_structure_links: { verb: cbu.list-structure-links, when: filled }
      parties: { verb: cbu.parties, when: filled }
      update: { verb: cbu.update, when: filled }
      rename: { verb: cbu.rename, when: filled }
      set_jurisdiction: { verb: cbu.set-jurisdiction, when: filled }
      set_client_type: { verb: cbu.set-client-type, when: filled }
      set_commercial_client: { verb: cbu.set-commercial-client, when: filled }
      add_product: { verb: cbu.add-product, when: filled }
      remove_product: { verb: cbu.remove-product, when: filled }
      products: { verb: cbu.products, when: [empty, filled] }
      # I1 fold (2026-06-18): the 6 cbu.assign-* specialists collapse into one
      # cbu.assign-role parametrised by role-type.
      assign_role: { verb: cbu.assign-role, when: filled }
      remove_role: { verb: cbu.remove-role, when: filled }
      validate_roles: { verb: cbu.validate-roles, when: filled }
      attach_evidence: { verb: cbu.attach-evidence, when: filled }
      verify_evidence: { verb: cbu.verify-evidence, when: filled }
      request_proof_update: { verb: cbu.request-proof-update, when: filled }
      link_structure: { verb: cbu.link-structure, when: filled }
      unlink_structure: { verb: cbu.unlink-structure, when: filled }
      submit_for_validation: { verb: cbu.submit-for-validation, when: filled }
      reopen_validation: { verb: cbu.reopen-validation, when: filled }
      confirm: { verb: cbu.confirm, when: filled }
      reject: { verb: cbu.reject, when: filled }
      delete: { verb: cbu.delete, when: filled }
      delete_cascade: { verb: cbu.delete-cascade, when: filled }
      # cbu.assign-role is owned by struct_* constellations (role assignment
      # within a specific fund structure). Group ownership identifies CBUs,
      # not their role composition.
