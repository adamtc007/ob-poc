constellation: evidence.collection
description: Evidence collection and verification constellation — per-entity document requirements, solicitation, upload, QA, and verification workflows.
jurisdiction: ALL
slots:
  entity:
    type: entity
    entity_kinds: [person, company]
    table: entities
    pk: entity_id
    cardinality: root
    verbs:
      create: { verb: entity.create, when: empty }
      ensure: { verb: entity.ensure, when: [empty, filled] }
      read: { verb: entity.read, when: filled }
      list: { verb: entity.list, when: filled }
      query: { verb: entity.query, when: [empty, filled] }
      identify: { verb: entity.identify, when: filled }
      verify: { verb: entity.verify, when: filled }
      update: { verb: entity.update, when: filled }
      ghost: { verb: entity.ghost, when: filled }
      list_ghosts: { verb: entity.list-ghosts, when: filled }
      list_placeholders: { verb: entity.list-placeholders, when: filled }
      placeholder_summary: { verb: entity.placeholder-summary, when: filled }
      resolve_placeholder: { verb: entity.resolve-placeholder, when: filled }
      delete: { verb: entity.delete, when: filled }
  requirement:
    type: entity
    entity_kinds: [document]
    join: { via: document_requirements, parent_fk: entity_id, child_fk: requirement_id }
    cardinality: optional
    depends_on: [entity]
    state_machine: document_lifecycle
    verbs:
      create: { verb: requirement.create, when: empty }
      create_set: { verb: requirement.create-set, when: [empty, filled] }
      get: { verb: requirement.get, when: filled }
      check: { verb: requirement.check, when: filled }
      list: { verb: requirement.list, when: [empty, filled] }
      with_status: { verb: requirement.with-status, when: filled }
      for_entity: { verb: requirement.for-entity, when: filled }
      for_workflow: { verb: requirement.for-workflow, when: filled }
      unsatisfied: { verb: requirement.unsatisfied, when: filled }
      waive: { verb: requirement.waive, when: filled }
      reinstate: { verb: requirement.reinstate, when: filled }
      reset: { verb: requirement.reset, when: filled }
      mark_expired: { verb: requirement.mark-expired, when: filled }
  document:
    type: entity
    entity_kinds: [document]
    join: { via: documents, parent_fk: entity_id, child_fk: document_id }
    cardinality: optional
    depends_on: [requirement]
    overlays: [document_version, qa_status]
    verbs:
      create: { verb: document.create, when: empty }
      solicit: { verb: document.solicit, when: empty }
      solicit_set: { verb: document.solicit-set, when: empty }
      create_request: { verb: document.create-request, when: [empty, filled] }
      compute_requirements: { verb: document.compute-requirements, when: [empty, filled] }
      upload: { verb: document.upload, when: [empty, filled] }
      upload_version: { verb: document.upload-version, when: filled }
      extract: { verb: document.extract, when: filled }
      read: { verb: document.read, when: filled }
      get: { verb: document.get, when: filled }
      list: { verb: document.list, when: [empty, filled] }
      list_versions: { verb: document.list-versions, when: filled }
      list_requests_by_workstream: { verb: document.list-requests-by-workstream, when: filled }
      for_entity: { verb: document.for-entity, when: filled }
      missing_for_entity: { verb: document.missing-for-entity, when: filled }
      catalog: { verb: document.catalog, when: filled }
      mark_requested: { verb: document.mark-requested, when: filled }
      receive_request: { verb: document.receive-request, when: filled }
      start_qa: { verb: document.start-qa, when: filled }
      verify_request: { verb: document.verify-request, when: filled }
      reject_request: { verb: document.reject-request, when: filled }
      waive_request: { verb: document.waive-request, when: filled }
  version:
    type: entity
    entity_kinds: [document]
    join: { via: document_versions, parent_fk: document_id, child_fk: version_id }
    cardinality: optional
    depends_on: [document]
    verbs:
      verify: { verb: document.verify, when: filled }
      reject: { verb: document.reject, when: filled }
      read: { verb: document.read-version, when: filled }
  docs_bundle:
    type: entity
    entity_kinds: [document]
    join: { via: document_bundles, parent_fk: entity_id, child_fk: bundle_id }
    cardinality: optional
    depends_on: [entity]
    verbs:
      create: { verb: docs-bundle.create, when: empty }
      read: { verb: docs-bundle.read, when: filled }
      add_item: { verb: docs-bundle.add-item, when: filled }
      apply: { verb: docs-bundle.apply, when: filled }
      list_applied: { verb: docs-bundle.list-applied, when: filled }
      list_available: { verb: docs-bundle.list-available, when: [empty, filled] }
