constellation: governance.extended
description: Extended governance constellation — eligibility rulesets, rule management, reference data, team operations, temporal controls. The control framework governing all operational activity.
jurisdiction: ALL
slots:
  group:
    type: cbu
    table: client_group
    pk: group_id
    cardinality: root
    verbs: {}
  # ruleset verbs owned by governance.compliance constellation
  rule:
    type: entity
    entity_kinds: [entity]
    join: { via: rules, parent_fk: ruleset_id, child_fk: rule_id }
    cardinality: optional
    depends_on: [ruleset]
    verbs:
      create: { verb: rule.create, when: empty }
      read: { verb: rule.read, when: filled }
      update: { verb: rule.update, when: filled }
  rule_field:
    type: entity
    entity_kinds: [entity]
    join: { via: rule_fields, parent_fk: field_id, child_fk: field_id }
    cardinality: optional
    depends_on: [ruleset]
    verbs:
      list: { verb: rule-field.list, when: [empty, filled] }
      read: { verb: rule-field.read, when: filled }
  team:
    type: entity
    entity_kinds: [person]
    join: { via: team_members, parent_fk: group_id, child_fk: member_id }
    cardinality: optional
    depends_on: [group]
    verbs:
      add: { verb: team.add-member, when: [empty, filled] }
      remove: { verb: team.remove-member, when: filled }
      list: { verb: team.list-members, when: filled }
      transfer: { verb: team.transfer-member, when: filled }
      assign_role: { verb: team.assign-role, when: filled }
  refdata:
    type: entity
    entity_kinds: [entity]
    join: { via: reference_data, parent_fk: domain_id, child_fk: ref_id }
    cardinality: optional
    depends_on: [group]
    verbs:
      list: { verb: refdata.list, when: [empty, filled] }
      read: { verb: refdata.read, when: filled }
      create: { verb: refdata.create, when: empty }
      update: { verb: refdata.update, when: filled }
