fqn: family.deal_commercial
family_id: deal_commercial
label: Deal Commercial Operations
description: Family governing the complete deal lifecycle — origination, group-cleared contract negotiation, rate cards, billing, and onboarding handoff into controlled CBUs. Separate from structure-focused deal_lifecycle family.
domain_id: deal
selection_rules:
  - condition: "true"
    target_constellation: deal.lifecycle
    priority: 45
constellation_refs:
  - constellation_id: deal.lifecycle
    label: Deal Commercial Lifecycle
    jurisdiction: ALL
    entity_kind: deal
    triggers:
      - deal
      - contract
      - billing
      - rate card
      - pricing
      - fee
      - invoice
      - revenue
      - commercial
      - MSA
candidate_jurisdictions:
  - ALL
candidate_entity_kinds:
  - client-group
  - deal
  - contract
  - cbu
grounding_threshold:
  required_input_keys:
    - deal_name
  requires_entity_instance: false
  allows_draft_instance: true
