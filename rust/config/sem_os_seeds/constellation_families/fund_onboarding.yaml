fqn: family.fund_onboarding
family_id: fund_onboarding
label: Fund Onboarding
description: Family for selecting the right fund onboarding constellation.
domain_id: onboarding
selection_rules:
  - condition: jurisdiction == 'LU' && structure_type == 'ucits'
    target_constellation: struct.lux.ucits.sicav
    priority: 30
  - condition: jurisdiction == 'LU' && structure_type == 'raif'
    target_constellation: struct.lux.aif.raif
    priority: 29
  - condition: jurisdiction == 'LU' && structure_type == 'private-equity'
    target_constellation: struct.lux.pe.scsp
    priority: 28
  - condition: jurisdiction == 'IE'
    target_constellation: struct.ie.ucits.icav
    priority: 27
  - condition: jurisdiction == 'IE' && structure_type == 'aif'
    target_constellation: struct.ie.aif.icav
    priority: 26
  - condition: jurisdiction == 'IE' && strategy == 'hedge'
    target_constellation: struct.ie.hedge.icav
    priority: 25
  - condition: jurisdiction == 'UK' && structure_type == 'oeic'
    target_constellation: struct.uk.authorised.oeic
    priority: 24
  - condition: jurisdiction == 'UK' && structure_type == 'aut'
    target_constellation: struct.uk.authorised.aut
    priority: 23
  - condition: jurisdiction == 'UK' && structure_type == 'acs'
    target_constellation: struct.uk.authorised.acs
    priority: 22
  - condition: jurisdiction == 'UK' && structure_type == 'ltaf'
    target_constellation: struct.uk.authorised.ltaf
    priority: 21
  - condition: jurisdiction == 'UK' && structure_type == 'private-equity'
    target_constellation: struct.uk.private-equity.lp
    priority: 20
  - condition: jurisdiction == 'US' && structure_type == 'open-end'
    target_constellation: struct.us.40act.open-end
    priority: 19
  - condition: jurisdiction == 'US' && structure_type == 'closed-end'
    target_constellation: struct.us.40act.closed-end
    priority: 18
  - condition: jurisdiction == 'US' && structure_type == 'etf'
    target_constellation: struct.us.etf.40act
    priority: 17
  - condition: jurisdiction == 'US' && structure_type == 'private-fund'
    target_constellation: struct.us.private-fund.delaware-lp
    priority: 16
constellation_refs:
