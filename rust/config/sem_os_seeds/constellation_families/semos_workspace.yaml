fqn: family.semos_workspace
family_id: semos_workspace
label: SemOS Workspace
description: >
  Workspace-level root family for SemOS Maintenance. Hosts operational
  and diagnostic verbs spanning registry governance, schema management,
  and platform infrastructure.
domain_id: maintenance
selection_rules:
  - condition: "true"
    target_constellation: semos.workspace
    priority: 60
constellation_refs:
  - constellation_id: semos.workspace
    label: SemOS Workspace Root
    jurisdiction: ALL
    entity_kind: infrastructure
    triggers:
      - maintenance
      - discovery
      - semantic
      - state
      - bpmn
      - admin
      - user
candidate_jurisdictions:
  - ALL
candidate_entity_kinds:
  - infrastructure
grounding_threshold:
  required_input_keys: []
  requires_entity_instance: false
  allows_draft_instance: true
