pack_id: ob-poc.session-bootstrap
name: ob-poc Session Bootstrap Domain Pack
version: 0.1.0
implementation_mode: native_compiled
compatibility_tier: dry_run_only
owned_dags: [session_bootstrap_dag]
owned_packs: [session-bootstrap]
owned_state_machines: []
owned_constellation_maps:
  - cbu.workspace
owned_constellation_families:
  - cbu_workspace
owned_universes:
