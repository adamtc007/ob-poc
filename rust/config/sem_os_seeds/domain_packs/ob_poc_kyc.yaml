pack_id: ob-poc.kyc
name: ob-poc KYC Domain Pack
version: 0.1.0
implementation_mode: native_compiled
compatibility_tier: dry_run_only
owned_dags:
  - kyc_dag
owned_packs:
  - kyc-case
owned_state_machines:
  - kyc_case_lifecycle
  - entity_kyc_lifecycle
  - screening_lifecycle
  - document_request_lifecycle
owned_constellation_maps:
  - kyc.onboarding
  - kyc.workspace
  - kyc.extended
owned_constellation_families:
  - kyc_lifecycle
  - kyc_workspace
  - kyc_extended
owned_universes:
  - universe.kyc_operations
owned_verb_prefixes:
  - kyc-case.
  - kyc.
  - screening.
owned_entity_kinds:
  - kyc_case
business_crates: []
owned_constellations:
  - kyc.onboarding
allowed_transitions:
  - transition_ref: kyc-case.intake-to-discovery
    entity_type: kyc_case
    state_machine: kyc_case_lifecycle
    verb: kyc-case.update-status
    from_state: INTAKE
    to_state: DISCOVERY
    dry_run_enabled: true
    mutation_enabled: false
    hitl_required: true
    evidence_refs_required:
      - case_id
  - transition_ref: kyc-case.discovery-to-assessment
    entity_type: kyc_case
    state_machine: kyc_case_lifecycle
    verb: kyc-case.update-status
    from_state: DISCOVERY
    to_state: ASSESSMENT
    dry_run_enabled: true
    mutation_enabled: false
    hitl_required: true
    evidence_refs_required:
      - case_id
discovery_probes:
  - probe_id: kyc-case.read-state
    operation: read_state
    target: '"ob-poc".cases.status'
    idempotent: true
    modeled: true
    first_class_state_mutation: false
  - probe_id: kyc-case.read-evidence-summary
    operation: read_evidence_summary
    target: '"ob-poc".case_events'
    idempotent: true
    modeled: true
    first_class_state_mutation: false
projection_catalog:
  - kind: pack_manifest
    source: domain_pack.manifest
    default_classification: internal
    acp_visible_by_default: true
  - kind: probe_catalogue
    source: domain_pack.discovery_probes
    default_classification: internal
    acp_visible_by_default: true
  - kind: policy
    source: semos.domain_pack_policy
    default_classification: internal
    acp_visible_by_default: true
  - kind: transition_surface
    source: domain_pack.allowed_transitions
    default_classification: internal
    allowed_subject_kinds:
      - kyc_case
    acp_visible_by_default: true
  - kind: language_pack
    source: semos.language_pack.kyc_update_status
    default_classification: internal
    allowed_subject_kinds:
      - kyc_case
    max_depth: 2
    acp_visible_by_default: true
  - kind: discovery_surface
    source: semos.context_resolution.discovery_surface
    default_classification: internal
    max_depth: 3
    acp_visible_by_default: true
  - kind: verb_surface
    source: semos.session_verb_surface
    default_classification: internal
    max_depth: 2
    acp_visible_by_default: true
  - kind: dag
    source: semos.tos.hydrated_state
    default_classification: internal
    allowed_subject_kinds:
      - kyc_case
      - cbu
    max_depth: 4
    acp_visible_by_default: true
  - kind: graph_scene
    source: observatory.graph_scene_model
    default_classification: internal
    allowed_subject_kinds:
      - kyc_case
      - cbu
    max_depth: 4
    acp_visible_by_default: true
  - kind: governance
    source: semos.context_resolution.governance_signals
    default_classification: internal
    acp_visible_by_default: true
  - kind: evidence_schema
    source: semos.evidence_strategy
    default_classification: confidential
    allowed_subject_kinds:
      - kyc_case
    acp_visible_by_default: false
  - kind: affinity_graph
    source: semos.affinity_graph
    default_classification: internal
    max_depth: 3
    acp_visible_by_default: true
  - kind: lineage
    source: semos.lineage_store
    default_classification: confidential
    max_depth: 3
    acp_visible_by_default: false
  - kind: derivation_registry
    source: semos.derivation_registry
    default_classification: internal
    max_depth: 2
    acp_visible_by_default: true
  - kind: materiality
    source: semos.materiality_policy
    default_classification: internal
    acp_visible_by_default: true
mention_namespaces:
  - namespace: entity
    target_kind: semos.entity
    description: Entity references resolvable by Sage and the editor.
  - namespace: verb
    target_kind: semos.verb
    description: Verb and transition references exposed through the scoped verb surface.
  - namespace: pack
    target_kind: domain_pack
    description: Domain Pack manifest and compatibility references.
  - namespace: workbook
    target_kind: execution_workbook
    description: Workbook and evidence handoff references.
  - namespace: workspace
    target_kind: semos.workspace
    description: Workspace stack and constellation frame references.
declared_modes:
  - mode_id: sage:planning
    label: Sage Planning
    description: Discovery, projection, planning, explanation, attestation prompting, and workbook drafting.
  - mode_id: sage:execution
    label: Sage Execution
    description: Workbook validation, dry-run, HITL approval routing, and approved REPL DSL execution.
workflow_phases:
  - phase_id: discovery
    label: Discovery
    description: Read-only SemOS discovery and projection assembly.
  - phase_id: planning
    label: Planning
    description: Workbook and runbook plan construction without mutation.
  - phase_id: explanation
    label: Explanation
    description: Semantic diff, policy, and lineage explanation.
  - phase_id: attestation
    label: Attestation
    description: Approval-token and audit review before any restricted mutation path.
acp_personas:
  - persona_id: sage:planning
    label: Sage Planning
    description: Discovery, projection, planning, explanation, attestation prompting, and workbook drafting.
    mutation_authority: false
  - persona_id: sage:execution
    label: Sage Execution
    description: Workbook validation, dry-run, HITL approval routing, and approved REPL DSL execution.
    mutation_authority: true
resource_uri_schemes:
  - scheme: semos://pack-manifest/{pack_id}
    resource_kind: pack_manifest
    description: Domain Pack manifest reference.
  - scheme: semos://entity/{id}
    resource_kind: entity
    description: SemOS entity reference.
  - scheme: semos://verb/{id}
    resource_kind: verb
    description: SemOS verb reference.
  - scheme: semos://transition/{id}
    resource_kind: transition
    description: Domain transition reference.
  - scheme: semos://workbook/{id}
    resource_kind: workbook
    description: Execution workbook reference.
  - scheme: semos://semantic-diff/{id}
    resource_kind: semantic_diff
    description: Semantic diff artefact reference.
external_mcp_transports: []
typed_extension_points:
  - extension_id: semos.derivation_registry
    extension_kind: derivation_registry
    implementation_ref: native::sem_os_core::derivation_registry
  - extension_id: semos.lineage_projection
    extension_kind: lineage_projection
    implementation_ref: native::repl::session_trace
  - extension_id: semos.materiality_policy
    extension_kind: materiality_policy
    implementation_ref: native::domain_pack.allowed_transitions
classification_policy:
  max_prompt_classification: internal
  allow_external_llm: false
  required_redactions:
    - pii
    - confidential_evidence
