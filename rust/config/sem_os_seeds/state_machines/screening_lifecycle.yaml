state_machine: screening_lifecycle
description: >
  Two-phase compliance screening lifecycle.
  Phase 1 (Provider): All screening types (sanctions, PEP, adverse-media) execute
  in parallel. Each creates an independent PENDING record via idempotent
  (workstream_id, screening_type) constraint. The state tracks aggregate progress.
  Phase 2 (Adjudication): When hits are found, analyst reviews them sequentially.
  This separation reflects reality: providers run concurrently, but human review
  is sequential and staged.
states:
  [
    not_started,
    executing,
    all_clear,
    has_hits,
  ]
initial: not_started
transitions:
  # Phase 1: Provider execution (parallel — any screening verb from not_started or executing)
  - from: not_started
    to: executing
    verbs:
      [
        screening.run,
        screening.sanctions,
        screening.pep,
        screening.adverse-media,
      ]
  # Additional screenings can fire while already executing
  - from: executing
    to: executing
    verbs:
      [
        screening.sanctions,
        screening.pep,
        screening.adverse-media,
        screening.bulk-refresh,
      ]
  # All providers returned clear
  - from: executing
    to: all_clear
    verbs: [screening.complete]
  # At least one provider returned a hit
  - from: executing
    to: has_hits
    verbs: [screening.complete]

  # Phase 2: Adjudication (sequential analyst review)
  - from: has_hits
    to: has_hits
    verbs: [screening.review-hit]
  - from: has_hits
    to: all_clear
    verbs: [screening.complete]

  # Read/list available in any active state
  - from: executing
    to: executing
    verbs: [screening.list-by-workstream]
  - from: has_hits
    to: has_hits
    verbs: [screening.list-by-workstream]

  # Rescreen (start over from all_clear)
  - from: all_clear
    to: not_started
    verbs: [screening.run]

reducer:
  overlay_sources:
    scope:
      table: screenings
      join: workstream_id
      provides: [sanctions_status, pep_status, media_status]
    screening_result:
      table: screenings
      join: workstream_id
      provides: [sanctions_status, pep_status, media_status]
  conditions:
    has_sanctions:
      expr: "scope.sanctions_status IS NOT NULL"
    sanctions_is_clear:
      expr: "scope.sanctions_status = 'CLEAR'"
    has_pep:
      expr: "scope.pep_status IS NOT NULL"
    pep_is_clear:
      expr: "scope.pep_status = 'CLEAR'"
    has_media:
      expr: "scope.media_status IS NOT NULL"
    media_is_clear:
      expr: "scope.media_status = 'CLEAR'"
    all_providers_returned:
      expr: "has_sanctions AND has_pep AND has_media"
    all_clear:
      expr: "sanctions_is_clear AND pep_is_clear AND media_is_clear"
    any_hit:
      expr: "(scope.sanctions_status = 'HIT') OR (scope.pep_status = 'HIT') OR (scope.media_status = 'HIT')"
  rules:
    - state: all_clear
      requires: [all_clear]
    - state: has_hits
      requires: [all_providers_returned, any_hit]
    - state: executing
      requires: []
    - state: not_started
      requires: []
