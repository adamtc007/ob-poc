state_machine: entity_workstream_lifecycle
description: Entity workstream lifecycle for KYC onboarding progression
states:
  [
    open,
    documents_requested,
    screening_initiated,
    screening_complete,
    evidence_collected,
    verified,
    closed,
  ]
initial: open
transitions:
  - from: open
    to: documents_requested
    verbs: [document.solicit, document.solicit-batch]
  - from: open
    to: screening_initiated
    verbs: [screening.run, screening.sanctions, screening.pep, screening.adverse-media]
  - from: documents_requested
    to: screening_initiated
    verbs: [screening.run, screening.sanctions, screening.pep, screening.adverse-media]
  - from: documents_requested
    to: evidence_collected
    verbs: [document.verify]
  - from: screening_initiated
    to: screening_complete
    verbs: [screening.complete, screening.resolve]
  - from: screening_complete
    to: evidence_collected
    verbs: [document.verify]
  - from: evidence_collected
    to: verified
    verbs: [entity-workstream.complete]
  - from: verified
    to: closed
    verbs: [entity-workstream.complete]
  - from: screening_complete
    to: screening_initiated
    verbs: [screening.run]
  - from: evidence_collected
    to: documents_requested
    verbs: [document.solicit]
  - from: verified
    to: open
    verbs: [entity-workstream.update-status]
reducer:
  overlay_sources:
    red_flags:
      table: red_flags
      join: workstream_id
      provides: [flag_type, severity, status]
      cardinality: many
    evidence:
      table: kyc_ubo_evidence
      join: workstream_id
      provides: [evidence_type, status, verified_at]
      cardinality: many
    scope:
      table: entity_workstreams
      join: workstream_id
      provides: [workstream_status]
  conditions:
    status_is:
      expr: "scope.workstream_status = $1"
      parameterized: true
    documents_requested_status:
      expr: "status_is('DOCUMENTS_REQUESTED')"
    screening_initiated_status:
      expr: "status_is('SCREENING_INITIATED')"
    screening_complete_status:
      expr: "status_is('SCREENING_COMPLETE')"
    evidence_collected_status:
      expr: "status_is('EVIDENCE_COLLECTED')"
    verified_status:
      expr: "status_is('VERIFIED')"
    closed_status:
      expr: "status_is('CLOSED')"
  rules:
    - state: closed
      requires: [closed_status]
    - state: verified
      requires: [verified_status]
    - state: evidence_collected
      requires: [evidence_collected_status]
    - state: screening_complete
      requires: [screening_complete_status]
    - state: screening_initiated
      requires: [screening_initiated_status]
    - state: documents_requested
      requires: [documents_requested_status]
    - state: open
      requires: []
