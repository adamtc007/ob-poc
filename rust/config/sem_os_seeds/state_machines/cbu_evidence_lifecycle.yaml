state_machine: cbu_evidence_lifecycle
description: CBU evidence item lifecycle - pending, verified, rejected, expired
states: [PENDING, VERIFIED, REJECTED, EXPIRED]
initial: PENDING
transitions:
  - from: PENDING
    to: VERIFIED
    verbs: [cbu.verify-evidence]
  - from: PENDING
    to: REJECTED
    verbs: [cbu.verify-evidence]
  - from: VERIFIED
    to: EXPIRED
    verbs: [evidence.expire]
  - from: EXPIRED
    to: PENDING
    verbs: [cbu.attach-evidence]
reducer:
  overlay_sources:
    evidence:
      table: cbu_evidence
      join: evidence_id
      provides: [verification_status, expiry_status]
  conditions:
    evidence_pending:
      expr: "evidence.verification_status = 'PENDING'"
    evidence_verified:
      expr: "evidence.verification_status = 'VERIFIED'"
    evidence_rejected:
      expr: "evidence.verification_status = 'REJECTED'"
    evidence_expired:
      expr: "evidence.verification_status = 'EXPIRED' OR evidence.expiry_status = 'EXPIRED'"
  rules:
    - state: EXPIRED
      requires: [evidence_expired]
    - state: VERIFIED
      requires: [evidence_verified]
    - state: REJECTED
      requires: [evidence_rejected]
    - state: PENDING
      requires: [evidence_pending]
