state_machine: document_request_lifecycle
description: >
  Document request lifecycle — tracks the solicitation workflow.
  A request moves: pending → sent → received → fulfilled.
  Verification of the document content is NOT this lifecycle's concern —
  that belongs to document_lifecycle (evidence QA). This lifecycle only
  tracks whether the requested item was delivered.
states: [pending, sent, received, fulfilled, returned, waived]
initial: pending
transitions:
  - from: pending
    to: sent
    verbs: [request.create]
  - from: pending
    to: waived
    verbs: [request.cancel]
  - from: sent
    to: received
    verbs: [request.update]
  - from: received
    to: fulfilled
    verbs: [request.complete]
  - from: received
    to: returned
    verbs: [request.escalate]
  - from: returned
    to: sent
    verbs: [request.reopen]
  - from: waived
    to: pending
    verbs: [request.reopen]
reducer:
  overlay_sources:
    scope:
      table: doc_requests
      join: request_id
      provides: [document_request_status]
  conditions:
    status_is:
      expr: "scope.document_request_status = $1"
      parameterized: true
    pending_status:
      expr: "status_is('PENDING')"
    sent_status:
      expr: "status_is('SENT')"
    received_status:
      expr: "status_is('RECEIVED')"
    fulfilled_status:
      expr: "status_is('FULFILLED')"
    returned_status:
      expr: "status_is('RETURNED')"
    waived_status:
      expr: "status_is('WAIVED')"
  rules:
    - state: waived
      requires: [waived_status]
    - state: returned
      requires: [returned_status]
    - state: fulfilled
      requires: [fulfilled_status]
    - state: received
      requires: [received_status]
    - state: sent
      requires: [sent_status]
    - state: pending
      requires: []
