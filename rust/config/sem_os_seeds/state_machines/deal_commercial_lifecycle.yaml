state_machine: deal_commercial_lifecycle
description: |
  Deal commercial lifecycle (sales + BAC owned). Mirrors the inline
  state_machine definition in dag_taxonomies/deal_dag.yaml §2.1
  deal_commercial_lifecycle, projected here so the constellation_map
  loader can resolve it as a built-in state machine.

  Q4 + Q21 (b) amendment (D-004, 2026-04-29): the former BAC_APPROVAL
  and KYC_CLEARANCE states are collapsed into a single IN_CLEARANCE
  state with two parallel substate columns (deals.bac_status,
  deals.kyc_clearance_status). The substates run in parallel and gate
  CONTRACTED jointly.
states:
  [
    prospect,
    qualifying,
    negotiating,
    in_clearance,
    contracted,
    lost,
    rejected,
    withdrawn,
    cancelled,
  ]
initial: prospect
transitions:
  - from: prospect
    to: qualifying
    verbs: [deal.create, deal.update-status]
  - from: qualifying
    to: negotiating
    verbs: [deal.update-status, deal.create-rate-card]
  - from: negotiating
    to: in_clearance
    verbs: [deal.submit-for-bac]
  - from: in_clearance
    to: in_clearance
    verbs: [deal.bac-approve, deal.bac-reject, deal.update-kyc-clearance]
  - from: in_clearance
    to: contracted
    verbs: [deal.update-status, deal.add-contract]
  - from: in_clearance
    to: rejected
    verbs: [deal.bac-reject, deal.reject]
  - from: prospect
    to: lost
    verbs: [deal.mark-lost]
  - from: qualifying
    to: lost
    verbs: [deal.mark-lost]
  - from: negotiating
    to: lost
    verbs: [deal.mark-lost]
  - from: in_clearance
    to: lost
    verbs: [deal.mark-lost]
  - from: prospect
    to: withdrawn
    verbs: [deal.mark-withdrawn]
  - from: qualifying
    to: withdrawn
    verbs: [deal.mark-withdrawn]
  - from: negotiating
    to: withdrawn
    verbs: [deal.mark-withdrawn]
  - from: in_clearance
    to: withdrawn
    verbs: [deal.mark-withdrawn]
  - from: prospect
    to: cancelled
    verbs: [deal.cancel]
  - from: qualifying
    to: cancelled
    verbs: [deal.cancel]
  - from: negotiating
    to: cancelled
    verbs: [deal.cancel]
  - from: in_clearance
    to: cancelled
    verbs: [deal.cancel]
reducer:
  overlay_sources:
    scope:
      table: deals
      join: deal_id
      provides: [deal_status]
  conditions:
    status_is:
      expr: "scope.deal_status = $1"
      parameterized: true
    prospect_status:
      expr: "status_is('PROSPECT')"
    qualifying_status:
      expr: "status_is('QUALIFYING')"
    negotiating_status:
      expr: "status_is('NEGOTIATING')"
    in_clearance_status:
      expr: "status_is('IN_CLEARANCE')"
    contracted_status:
      expr: "status_is('CONTRACTED')"
    lost_status:
      expr: "status_is('LOST')"
    rejected_status:
      expr: "status_is('REJECTED')"
    withdrawn_status:
      expr: "status_is('WITHDRAWN')"
    cancelled_status:
      expr: "status_is('CANCELLED')"
  rules:
    - state: cancelled
      requires: [cancelled_status]
    - state: withdrawn
      requires: [withdrawn_status]
    - state: rejected
      requires: [rejected_status]
    - state: lost
      requires: [lost_status]
    - state: contracted
      requires: [contracted_status]
    - state: in_clearance
      requires: [in_clearance_status]
    - state: negotiating
      requires: [negotiating_status]
    - state: qualifying
      requires: [qualifying_status]
    - state: prospect
      requires: []
