state_machine: client_group_lifecycle
description: Client group lifecycle — from prospect discovery through group UBO/KYC clearance, controlled CBU linkage, and active servicing
states:
  [
    prospect,
    researching,
    ubo_mapped,
    control_mapped,
    group_kyc_cleared,
    cbus_identified,
    onboarding,
    active,
  ]
initial: prospect
transitions:
  - from: prospect
    to: researching
    verbs:
      [
        client-group.start-discovery,
        client-group.discover-entities,
        gleif.import-tree,
        gleif.import-to-client-group,
      ]
  - from: researching
    to: ubo_mapped
    verbs: [ubo.discover, ubo.allege]
  - from: ubo_mapped
    to: control_mapped
    verbs: [control.build-graph, ownership.trace-chain]
  - from: control_mapped
    to: group_kyc_cleared
    verbs: [ubo.approve, client-group.verify-ownership, kyc-case.close]
  - from: group_kyc_cleared
    to: cbus_identified
    verbs: [cbu.create, cbu.create-from-client-group, cbu.ensure]
  - from: cbus_identified
    to: onboarding
    verbs: [kyc-case.create, kyc.open-case]
  - from: onboarding
    to: active
    verbs: [kyc-case.close]
reducer:
  overlay_sources: {}
  conditions:
    has_gleif_import:
      expr: "scope.gleif_import_count > 0"
    has_ubo:
      expr: "scope.has_ubo_determination = true"
    has_control:
      expr: "scope.has_control_chain = true"
    has_group_kyc_clearance:
      expr: "scope.has_group_kyc_clearance = true"
    has_cbus:
      expr: "scope.cbu_count > 0"
    has_active_case:
      expr: "scope.active_case_count > 0"
    all_approved:
      expr: "scope.all_cases_approved = true"
  rules:
    - state: active
      requires: [has_group_kyc_clearance, all_approved]
    - state: onboarding
      requires: [has_group_kyc_clearance, has_active_case]
    - state: cbus_identified
      requires: [has_group_kyc_clearance, has_cbus]
    - state: group_kyc_cleared
      requires: [has_group_kyc_clearance]
    - state: control_mapped
      requires: [has_control]
    - state: ubo_mapped
      requires: [has_ubo]
    - state: researching
      requires: [has_gleif_import]
    - state: prospect
      requires: []
