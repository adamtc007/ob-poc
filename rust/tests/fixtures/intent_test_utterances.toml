# ============================================================================
# INTENT PIPELINE TEST FIXTURES
# ============================================================================
# Purpose: Test utterance -> verb selection accuracy
# Usage:   DATABASE_URL="postgresql:///data_designer" cargo test --features database --test intent_hit_rate -- --ignored --nocapture
#
# Categories:
#   direct    -- Uses verb vocabulary directly ("create a CBU")
#   natural   -- Natural business language ("onboard a new client")
#   indirect  -- Implies verb without naming it ("what documents are missing?")
#   contextual -- Requires workflow/entity context to disambiguate
#   adversarial -- Tests semantic collision resistance
#   multi_intent -- User wants 2+ actions (should match primary)
#
# Difficulty:
#   easy   -- Should match on lexicon/exact (Tier 0-2)
#   medium -- Requires semantic search (Tier 6) with good embeddings
#   hard   -- Requires LLM classifier or contextual boost
#   expert -- Domain expert language, abbreviations, implicit context
#
# ECIR Fields (optional):
#   expected_noun   -- Expected noun extracted by NounIndex
#   expected_action -- Expected action classification (create/list/get/update/delete/search/none)
#   ecir_path       -- Expected ECIR resolution path: deterministic | narrow | fallthrough
#
# NOTE: All utterances are what a real custody bank onboarding analyst,
# compliance officer, or relationship manager would actually say.
# ============================================================================

