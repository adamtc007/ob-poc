# Workspace-local Cargo configuration for rust/.
# Build settings (target-dir, rustc-wrapper, jobs) and sparse registry now live
# in ~/.cargo/config.toml so they apply uniformly across every workspace on this
# machine. This file keeps only what is genuinely workspace-scoped.

[alias]
x = "run --package xtask --"

[profile.dev]
incremental = true
debug = 1
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 2

[env]
DATABASE_URL = { value = "postgresql:///data_designer", force = false }
SQLX_OFFLINE = { value = "true", force = false }

# Local-dev patch overrides — redirect git-tag deps to ~/dev/ working trees.
# This file is committed (workspace build config); the patches are always active.
# To deactivate (e.g. to test against real tags), comment out the blocks below.
[patch."https://github.com/adamtc007/dsl"]
dsl_types = { path = "/Users/adamtc007/dev/dsl/crates/dsl_types" }
dsl-core  = { path = "/Users/adamtc007/dev/dsl/crates/dsl-core"  }

[patch."https://github.com/adamtc007/sem-os"]
sem_os_types    = { path = "/Users/adamtc007/dev/sem-os/crates/sem_os_types"    }
sem_os_core     = { path = "/Users/adamtc007/dev/sem-os/crates/sem_os_core"     }
sem_os_ontology = { path = "/Users/adamtc007/dev/sem-os/crates/sem_os_ontology" }
