# Workspace-local Cargo configuration for rust/.
# Build settings (target-dir, rustc-wrapper, jobs) and sparse registry now live
# in ~/.cargo/config.toml so they apply uniformly across every workspace on this
# machine. This file keeps only what is genuinely workspace-scoped.

[alias]
x = "run --package xtask --"

[net]
# Use the system git CLI for fetching, so that SSH keys and credential helpers
# configured in ~/.gitconfig and ~/.ssh/config are available.
# Required for private git-tag deps (github.com/adamtc007/dsl, .../sem-os).
git-fetch-with-cli = true

[profile.dev]
debug = 1
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 2

[env]
DATABASE_URL = { value = "postgresql:///data_designer", force = false }
SQLX_OFFLINE = { value = "true", force = false }

# Local-dev [patch] overrides for the extracted dsl/sem-os repos live in
# ~/.cargo/config.toml (user-global). URL-scoped, so they only fire on this
# machine for projects depending on the relevant GitHub URLs. CI never sees
# them — cold-clone builds resolve against the real git tags pinned in
# rust/Cargo.toml [workspace.dependencies].
