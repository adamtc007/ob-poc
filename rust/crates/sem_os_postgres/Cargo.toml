[package]
name = "sem_os_postgres"
version = "0.1.0"
edition = "2021"
description = "Semantic OS PostgreSQL adapter — implements core port traits with sqlx."

[dependencies]
sem_os_core = { path = "../sem_os_core" }
dsl-runtime = { path = "../dsl-runtime" }
async-trait = "0.1"
anyhow = "1.0"
# Phase 5c-migrate Phase B slice #29: rust_decimal re-added to unblock
# the NUMERIC-binding plugin ops migrated from `dsl-runtime::domain_ops`
# (economic_exposure, edge, observation, ownership, capital, etc.).
rust_decimal = { version = "1", features = ["serde-with-str"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json", "macros", "rust_decimal", "bigdecimal"] }
bigdecimal = { version = "0.4", features = ["serde"] }
# Phase 5c-migrate Phase B slice #31: ob-poc-types promoted from dev-deps —
# the manco ops need `manco_group::*` DTOs in production code.
ob-poc-types = { path = "../ob-poc-types" }
uuid = { version = "1", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Phase 5c-migrate Phase B slice #56: serde_yaml for refdata_loader
# bulk-load verbs that deserialize YAML reference files.
serde_yaml = "0.9"
sha2 = "0.10"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
