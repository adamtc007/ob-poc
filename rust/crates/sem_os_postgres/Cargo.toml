[package]
name = "sem_os_postgres"
version = "0.1.0"
edition = "2021"
description = "Semantic OS PostgreSQL adapter — implements core port traits with sqlx."

[dependencies]
sem_os_core = { path = "../sem_os_core" }
dsl-runtime = { path = "../dsl-runtime" }
async-trait = "0.1"
anyhow = "1.0"
# Phase 3: dropped sqlx `rust_decimal` feature and `rust_decimal` crate —
# only `crud_executor.rs` used them, and it moved to `dsl-runtime`.
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json", "macros"] }
uuid = { version = "1", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tracing = "0.1"

[dev-dependencies]
# Needed only by `ops::*` unit tests that stub `TransactionScope` for ops
# with no DB effects; production code stays clear of this crate.
ob-poc-types = { path = "../ob-poc-types" }
tokio = { version = "1", features = ["macros", "rt"] }
