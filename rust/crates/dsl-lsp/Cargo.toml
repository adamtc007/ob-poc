[package]
name = "dsl-lsp"
version = "0.1.0"
edition = "2021"
description = "Language Server Protocol implementation for the Onboarding DSL"
authors = ["OB-POC Team"]

[lib]
name = "dsl_lsp"
path = "src/lib.rs"

[[bin]]
name = "dsl-lsp"
path = "src/main.rs"

[dependencies]
# LSP protocol
tower-lsp = "0.20"
lsp-types = "0.95"

# Async runtime
tokio = { version = "1", features = ["full", "sync"] }

# Analyser surface. dsl-lsp's compiler / planner / validator /
# diagnostics / verb-registry / macros surface lives in dsl-runtime
# (post §9 item 9 consolidation, 2026-05-13). The previous
# `ob-poc = { path = "../..", features = ["database"] }` inverted edge
# is gone; dsl-lsp is now an analyser-tier consumer only.
dsl-core = { path = "../dsl-core" }
# ob-poc verb handler — lets dsl-lsp compile ob-poc DSL for diagnostics.
ob-poc-compiler = { path = "../ob-poc-compiler" }
dsl-runtime = { path = "../dsl-runtime" }
# dsl-runtime-split v1 Phase 11 (2026-05-14): dsl-lsp now reaches the
# analyser-tier modules (validation, verb_registry, runtime_registry,
# macros, suggestions, planning_facade, lsp_validator) directly.
dsl-analysis = { path = "../dsl-analysis" }

# Playbook support
playbook-core = { path = "../playbook-core" }

# Entity Gateway client (gRPC)
entity-gateway = { path = "../entity-gateway" }
tonic = "0.12"

# Utilities
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Regex for pattern matching
regex = "1"

# UUID
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
rust_decimal = "1"

[lints.rust]
unreachable_pub = "deny"
