[package]
name = "dsl-lsp"
version = "0.1.0"
edition = "2021"
description = "Language Server Protocol implementation for the Onboarding DSL"
authors = ["OB-POC Team"]

[lib]
name = "dsl_lsp"
path = "src/lib.rs"

[[bin]]
name = "dsl-lsp"
path = "src/main.rs"

[dependencies]
# LSP protocol
tower-lsp = "0.20"
lsp-types = "0.95"

# Async runtime
tokio = { version = "1", features = ["full", "sync"] }

# Analyser primitives — ast, parser, binding_context, config, diagnostics.
# §9 item 8 (capability-crate restructure v1) — first surgical step:
# move dsl-lsp's leaf imports off the application crate. Remaining
# ob_poc imports (planning, execution, tooling, suggestions, macros)
# need the §9 item 9 analyser consolidation before they can move.
dsl-core = { path = "../dsl-core" }
dsl-runtime = { path = "../dsl-runtime" }

# Main library (for planning, execution, tooling, suggestions, macros).
# This is the inverted edge — to be removed by §9 item 9 (consolidate
# analyser surface into dsl-runtime).
ob-poc = { path = "../..", features = ["database"] }

# Playbook support
playbook-core = { path = "../playbook-core" }
playbook-lower = { path = "../playbook-lower" }

# Entity Gateway client (gRPC)
entity-gateway = { path = "../entity-gateway" }
tonic = "0.12"

# Utilities
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Regex for pattern matching
regex = "1"

# UUID
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
rust_decimal = "1"

[lints.rust]
unreachable_pub = "deny"
