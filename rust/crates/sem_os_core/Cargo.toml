[package]
name = "sem_os_core"
version = "0.1.0"
edition = "2021"
description = "Semantic OS core — pure domain types, port traits, gate logic. Zero sqlx."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
# sem_os_core-split v1 Phase 2.5 (2026-05-14): types.rs extracted to
# sem_os_types crate. sem_os_core/src/types.rs is now a compat shim
# (`pub use sem_os_types::*;`). This dep stays after migration —
# sem_os_types is the bottom tier every SemOS-touching crate needs.
sem_os_types = { path = "../sem_os_types" }
# sem_os_core-split v1 Phase 2 (transitional, 2026-05-14): pure-type
# ontology leaves relocated to sem_os_ontology. Compat re-exports in
# lib.rs keep `sem_os_core::<def>::*` paths resolving for every
# downstream consumer (sem_os_postgres, sem_os_server, sem_os_client,
# ob-poc-boundary, ob-poc, dsl-runtime, dsl-analysis, etc). Removed
# in Phase 12.
sem_os_ontology = { path = "../sem_os_ontology" }
# sem_os_core-split v1 Phase 5 (transitional, 2026-05-14): policy-tier
# leaves (abac, context_policy, grounding, security, derivation) relocated
# to sem_os_policy. Compat re-exports in lib.rs keep `sem_os_core::*`
# paths resolving for downstream consumers. Removed in Phase 12.
sem_os_policy = { path = "../sem_os_policy" }
async-trait = "0.1"
tokio = { version = "1", features = ["sync"] }
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
prost = "0.13"
serde_yaml = "0.9"
sqlparser = "0.53"
strum = { version = "0.26", features = ["derive"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[build-dependencies]
prost-build = "0.13"

[lints.rust]
unreachable_pub = "deny"
