[package]
name = "sem_os_client"
version = "0.1.0"
edition = "2021"
description = "Semantic OS client — SemOsClient trait + InProcessClient + HttpClient."

[dependencies]
sem_os_core = { path = "../sem_os_core" }
sem_os_policy = { path = "../sem_os_policy" }
async-trait = "0.1"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
tracing = "0.1"

[lints.rust]
unreachable_pub = "deny"
