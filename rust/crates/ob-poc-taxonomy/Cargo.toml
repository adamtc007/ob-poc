[package]
name = "ob-poc-taxonomy"
version = "0.1.0"
edition = "2021"
description = "Generic taxonomy combinators (Product/Instrument), the taxonomy stack/builder/rules engine, plus the view-config-service loader. Paired because taxonomy::rules consumes view_config_service."

# Capability discipline (see docs/todo/ob-poc-domain-split-v1.md):
#   IN-SCOPE  : Generic taxonomy combinators (product/instrument), the
#               builder/stack/rules engine, view-mode + node-type + layout
#               config loader.
#   OUT-OF-SCOPE: Domain-specific taxonomy SERVICES (those live in ob-poc).

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
bigdecimal = { version = "0.4", features = ["serde"], optional = true }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json", "bigdecimal"], optional = true }

[features]
default = ["database"]
database = ["dep:sqlx", "dep:bigdecimal"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
reqwest = { version = "0.12", features = ["json"] }
toml = "0.8"

[lints.rust]
unreachable_pub = "deny"
