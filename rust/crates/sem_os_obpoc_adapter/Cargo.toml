[package]
name = "sem_os_obpoc_adapter"
version = "0.1.0"
edition = "2021"
description = "Semantic OS ob-poc adapter — scanner, seed builder, config bridge."

[dependencies]
sem_os_core.workspace = true
sem_os_ontology.workspace = true
sem_os_types.workspace = true
dsl-core.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
toml = "0.8"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
sem_os_policy.workspace = true
chrono = "0.4"

[features]
default = ["database"]
database = []

[lints.rust]
unreachable_pub = "deny"
