[package]
name = "ob-poc-semtaxonomy"
version = "0.1.0"
edition = "2021"
description = "Semantic taxonomy entity-extraction layer. Distinct from ob-poc-taxonomy (combinators) and ob-poc-ontology (lifecycle stages) — this is the entity-extraction pipeline shape."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"], optional = true }

[features]
default = []
database = ["dep:sqlx"]

[lints.rust]
unreachable_pub = "deny"
dead_code = "deny"
