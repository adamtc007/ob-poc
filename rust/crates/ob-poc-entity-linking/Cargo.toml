[package]
name = "ob-poc-entity-linking"
version = "0.1.0"
edition = "2021"
description = "Entity-linking reference data and resolver shapes. Mention extraction, candidate resolution, lexicon snapshot, normalization, compiler — the data plane for linking free-form mentions to canonical entities."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
anyhow = "1"
async-trait = "0.1"
bincode = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
# serde feature required by snapshot.rs's Serialize/Deserialize derives on
# HashMap<String, SmallVec<[Uuid; N]>> fields — previously masked by a
# different dependency's transitive feature unification when this crate's
# `database` feature (and its sqlx tree) was always on by default
# (2026-07-13 E5 fix, found once compiler.rs was gated out at
# --no-default-features and the leak stopped being papered over).
smallvec = { version = "1", features = ["serde"] }
thiserror = "1"
tracing = "0.1"
unicode-normalization = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"], optional = true }

[features]
default = ["database"]
database = ["dep:sqlx"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[lints.rust]
unreachable_pub = "deny"
