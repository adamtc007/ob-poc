[package]
name = "ob-poc-entity-linking"
version = "0.1.0"
edition = "2021"
description = "Entity-linking reference data and resolver shapes. Mention extraction, candidate resolution, lexicon snapshot, normalization, compiler — the data plane for linking free-form mentions to canonical entities."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
anyhow = "1"
async-trait = "0.1"
bincode = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
smallvec = "1"
thiserror = "1"
tracing = "0.1"
unicode-normalization = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"], optional = true }

[features]
default = []
database = ["dep:sqlx"]

[lints.rust]
unreachable_pub = "deny"
