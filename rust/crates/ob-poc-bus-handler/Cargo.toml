[package]
name = "ob-poc-bus-handler"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
description = "ob-poc receiver-side bus handler. Implements dsl-bus-server's InvocationDispatcher trait, routing verb invocations into a caller-supplied VerbExecutor port (T2B.9 wires the real ob-poc engine)."

# Capability discipline:
#   IN-SCOPE  : InvocationDispatcher impl, no-op ResultDispatcher,
#               VerbExecutor port trait, error mapping to BusServerError.
#   OUT-OF-SCOPE: actual ob-poc engine (lives in dsl-runtime; the
#                 caller wires the real executor at startup),
#                 catalogue validation (dsl-manifest), durability
#                 (dsl-bus-storage).

[dependencies]
# Bus crates ship in github.com/adamtc007/bpmn-lite v0.2.0 (workspace dep).
dsl-bus-server.workspace = true
dsl-bus-protocol.workspace = true
async-trait = "0.1"
uuid = { version = "1", features = ["v7", "serde"] }
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono"] }
tokio-stream = { version = "0.1", features = ["net"] }
tempfile = "3"
# T2B-DoD-wire-only — the end-to-end tests drive BusClient → outbox →
# sender → tcp → BusServer → ob-poc-bus-handler in a single process.
dsl-bus-client.workspace = true
dsl-bus-storage.workspace = true
async-trait = "0.1"
tonic = "0.12"

[lints.rust]
dead_code = "deny"
unreachable_pub = "deny"
