[package]
name = "sem_os_ontology"
version = "0.1.0"
edition = "2021"
description = "Semantic OS ontology vocabulary — the *_def family. Definition bodies for everything SemOS catalogues: attributes, entity types, document types, relationship types, state graphs, taxonomies, verbs, views, requirement profiles, evidence strategies, observations, etc. Pure data-with-validation; no ABAC, no projection, no enforcement."

# Capability discipline (see docs/todo/sem-os-core-split-v1.md §2.2):
#   IN-SCOPE: the *_def family. Definitions of *what exists in the world*.
#   OUT-OF-SCOPE: ABAC, gate evaluation, projection, registry mutation,
#                 enforcement, observation/projection. Those are policy-tier.
#
# Hard invariant: no edge from sem_os_ontology → sem_os_policy.
# Hard invariant: no edge from sem_os_core → sem_os_ontology
#                 (core knows nothing about ontology).

[dependencies]
# Phase 2 (pure-type leaves): policy_rule, observation_def, verb_contract,
# view_def, taxonomy_def, universe_def, requirement_profile_def,
# relationship_type_def, state_machine_def. serde + serde_json::Value
# in inline field types (caught at slice time, not by `^use ` grep).
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lints.rust]
unreachable_pub = "deny"
