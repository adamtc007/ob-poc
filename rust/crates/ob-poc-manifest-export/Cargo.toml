[package]
name = "ob-poc-manifest-export"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
description = "Catalogue manifest exporter for ob-poc — reads verb YAML + manifest-allowlist.yaml, emits the v0.6 §7 manifest consumed by federated DSL peers (bpmn-lite + dmn-lite)."

# Capability discipline:
#   IN-SCOPE  : read ob-poc verb catalogue YAMLs, intersect with the
#               published allowlist, convert to v0.6 §7 manifest schema,
#               emit YAML.
#   OUT-OF-SCOPE: full dsl-core verb model (only the fields needed for
#                 §7 are deserialised here), runtime catalogue access,
#                 bus protocol.

[[bin]]
name = "ob-poc-manifest-export"
path = "src/main.rs"

[dependencies]
# `dsl-manifest` ships in github.com/adamtc007/bpmn-lite v0.2.0 (workspace dep).
dsl-manifest.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"

[lints.rust]
dead_code = "deny"
