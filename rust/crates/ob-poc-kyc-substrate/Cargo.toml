[package]
name = "ob-poc-kyc-substrate"
version = "0.1.0"
edition = "2021"
description = "KYC/UBO W1 substrate: event contract, lexicon, control fold, obligation fold, determination. In-memory; no schema."

# No sqlx. No sem_os_core (git dep). No DB. Pure semantic model.
[dependencies]
anyhow      = "1.0"
chrono      = { version = "0.4", features = ["serde"] }
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
sha2        = "0.10"
hex         = "0.4"
thiserror   = "1.0"
uuid        = { version = "1.4", features = ["v4", "v5", "serde"] }
smallvec    = { version = "1.11", features = ["serde"] }

[dev-dependencies]
# No extra deps: tests are pure Rust over the slice types.

[lints.rust]
unreachable_pub = "deny"
