[package]
name = "sem_os_policy"
version = "0.1.0"
edition = "2021"
description = "Semantic OS governance + projection plane. Owns ABAC primitives, gate logic, policy enforcement, ACP discovery projection, affinity graph, observatory orientation/projection, stewardship + authoring lifecycle, state simulation, context policy/resolution, diagram emission. Decides *what may happen* and projects *what is shown*."

# Capability discipline (see docs/todo/sem-os-core-split-v1.md §2.3):
#   IN-SCOPE: ABAC, gates, enforcement, projection, observatory, affinity,
#             authoring lifecycle, stewardship, state simulation, context
#             policy/resolution, diagram emission, grounding, security labels.
#   OUT-OF-SCOPE: defining new ontology shapes (that's sem_os_ontology),
#                 engine primitives (that's sem_os_core), database
#                 persistence (that's sem_os_postgres).
#
# Hard invariant: sem_os_policy MUST be the most-downstream of the three;
# sem_os_ontology and sem_os_core never depend on it.

[dependencies]
# Phase 5 (policy leaves: abac, security, derivation). None of the
# three need sem_os_core today — that dep is added when context_policy
# + grounding move in Phase 6 (paired with domain_pack + context_resolution
# to avoid the Cargo cycle between policy and core's compat re-exports).
sem_os_ontology = { path = "../sem_os_ontology" }
sem_os_types = { path = "../sem_os_types" }

# Third-party — sha2 for context_policy fingerprinting; standard
# primitives elsewhere.
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
strum = { version = "0.26", features = ["derive"] }
thiserror = "1.0"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[lints.rust]
unreachable_pub = "deny"
