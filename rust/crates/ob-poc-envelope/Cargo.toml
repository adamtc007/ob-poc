[package]
name = "ob-poc-envelope"
version = "0.1.0"
edition = "2021"
description = "Envelope construction + TOCTOU recheck + ACP session-input draft-mode selector. The boundary tier — must not depend on execution crates."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
anyhow = "1.0"
async-trait = "0.1"
serde_json = "1.0"
uuid = { version = "1", features = ["v4", "serde"] }
# Optional — only needed by the SqlRowVersionProvider gated behind the
# `database` feature in toctou_recheck.
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid"], optional = true }

[features]
default = []
database = ["dep:sqlx"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }

[lints.rust]
unreachable_pub = "deny"
