[package]
name = "ob-poc-agent"
version = "0.1.0"
edition = "2021"
description = "Sage ACP runtime — planning loop, GoalFrame, frontier computation, constellation hydration, GoalProposalTrace emission, LSP/MCP/LLM clients, and the launchable `sage-acp` binary."

# Capability discipline (see Sage ACP capability plan Phase 2,
# docs/todo/capability-crate-restructure-v1.md §6 decision 6):
#   IN-SCOPE  : the Sage-ACP-server runtime + the binary entrypoint.
#               Holds in-memory SemOS indices, the LLM call site (BYOK),
#               an LSP-shaped channel client to the REPL, an MCP client
#               to the SemOS knowledge surface, audit emission, and the
#               Motivated Sage planning loop (GoalFrame, frontier,
#               blocker detection, prompt assembly, GoalProposalTrace).
#   OUT-OF-SCOPE: ACP discovery/projection (lives in ob-poc-boundary).
#                 Drafter type vocabulary (lives in ob-poc-sage).
#                 Validator/executor (lives in ob-poc::repl).
#                 SemOS substrate (sem_os_*).
#
# Forbidden dep: ob-poc. The agent reaches engines in ob-poc via
# trait abstractions defined in ob-poc-sage; concrete impls live in
# ob-poc; the binary integrator wires the impl into the agent at
# startup. Sage ACP is intended to ship as a standalone productisable
# artefact (V&S §3, R5), so no application-tier dep.
#
# MCA-002 escalation E-5 (2026-07-12): this rule is satisfied (no
# `ob-poc` path dep below) but is narrower than what EOP-VS-CONTROLPLANE-001
# v0.4's L1 (dependency-direction lock) now actually requires — this
# crate has direct `dsl-runtime`/`sem_os_client` deps below with no
# `ob-poc-control-plane` edge, so its capability calls are not yet CP-
# mediated. Not a defect against T11 (checkpoint topology does not
# require mediation) — flagged as owed work against T11.2 (keyed doors)
# / T12 (mediation cutover), carried in the ownership ledger's series
# completion invariant (E-T11.A). Do not read "no ob-poc dep" as "L1-
# compliant" until that lands.

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
ob-poc-diagnostics = { path = "../ob-poc-diagnostics" }
ob-poc-sage = { path = "../ob-poc-sage" }
# Boundary owns the ACP protocol dispatcher (AcpJsonRpcAgent), discovery
# projection, and pack manifest providers. The agent binary constructs
# the dispatcher with injected runtime deps.
ob-poc-boundary = { path = "../ob-poc-boundary" }
# Journey owns the pack manifest YAML loader + canonical hash. The agent
# uses it to populate its in-memory pack catalogue for the spike (Phase
# 2.5). The Phase 4 cutover swaps the disk loader for a sem_os_mcp-backed
# loader without changing the index surface.
ob-poc-journey = { path = "../ob-poc-journey" }
# Analyser surface — runbook validate / plan / diagnostics consumed by
# the LSP-shaped channel and the planning loop.
dsl-runtime = { path = "../dsl-runtime" }
# Parser direct dep — the Phase 2.7 spike channel runs parse-only
# validation via `dsl_core::parser::parse_program`. Phase 4 swaps the
# in-process channel for an out-of-process JSON-RPC client speaking
# real LSP traffic to `dsl-lsp` (which already consumes dsl-runtime's
# consolidated analyser).
dsl-core.workspace = true
# LLM client (BYOK Anthropic + OpenAI). The planning loop holds an
# Arc<dyn LlmClient>; the binary integrator wires AnthropicClient at
# startup. ob-agentic has no `ob-poc` edge so the charter-clean wall
# holds.
ob-agentic = { path = "../ob-agentic" }
# SemOS knowledge client — entity resolution, verb surface, FSM
# transitions, constellation walk. Read-only.
sem_os_client = { path = "../sem_os_client" }
# Cross-capability primitives.
sem_os_core.workspace = true
# SemOS MCP server — Phase 4.3 wires the agent's knowledge surface
# + constellation hydrator through this crate's protocol + tool
# registry. In-process today; future subprocess transport keeps
# the same protocol shape.
sem_os_mcp = { path = "../sem_os_mcp" }

# T11.1b (2026-07-12): deps needed by the relocated sage/journey/research/
# semtaxonomy_v2 engines (see crate doc). dsl-analysis is the real home of
# runtime_registry/verb_registry (sage::verb_index reaches it directly, not
# through ob-poc's dsl_v2 compat re-export). ob-poc-semtaxonomy is the
# governed-registry-authored taxonomy client semtaxonomy_v2 compiles
# against.
dsl-analysis = { path = "../dsl-analysis" }
ob-poc-semtaxonomy = { path = "../ob-poc-semtaxonomy" }
# T11.2 Part A (2026-07-13): AgentTurnContext's `actor` field is
# sem_os_policy::abac::ActorContext — ob-poc-boundary already depends on
# this crate for the same type; adding it directly here avoids a detour
# through a re-export ob-poc-boundary doesn't itself provide.
sem_os_policy.workspace = true
sem_os_types.workspace = true
handlebars = "6.0"
regex = "1.12.2"
rust_decimal = { version = "1.33", features = ["serde"] }
serde_yaml = "0.9"
jsonschema = { version = "0.29", default-features = false, features = ["resolve-file"] }

# Async runtime.
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serde / error / logging primitives.
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
# Phase 5.3 OTLP exporter — HTTP+JSON push to an OTLP-compatible
# collector endpoint. Best-effort; failure logs at warn level and
# does not block planning. reqwest is already a transitive dep
# through ob-agentic + sem_os_client; promoting to a direct dep
# documents the use.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
# Out-of-process LSP transport — speaks LSP framing to a subprocess
# `dsl-lsp` binary. The protocol DTOs come from lsp-types (same
# crate dsl-lsp uses internally so wire shape matches verbatim).
lsp-types = "0.95"

[dev-dependencies]
tempfile = "3"

[features]
default = []
# `ob-poc-sage::session_context` (sqlx::PgPool-backed loaders) is only
# reachable when this crate's own `database` feature is on, cascading to
# `ob-poc-sage/database`. Without this, `cargo build -p ob-poc-agent`
# (any feature combination of THIS crate's own, empty, [features] set)
# unconditionally failed: `sage/mod.rs`'s `pub use
# ob_poc_sage::session_context` referenced a module ob-poc-sage only
# compiles behind its own `database` feature, which nothing in
# ob-poc-agent's dependency declaration ever requested. Building the full
# `ob-poc` binary masked this — root's own `database` feature enables
# `ob-poc-sage/database` directly, and Cargo's feature unification made
# that available to the copy of ob-poc-sage reached via ob-poc-agent too
# — but `ob-poc-agent` could never be built, tested, or `cargo doc`'d in
# isolation. Found via the control-plane graduation G0 E5 slice, 2026-07-13.
database = ["ob-poc-sage/database"]

[lints.rust]
unreachable_pub = "deny"
