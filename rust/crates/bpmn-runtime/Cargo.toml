[package]
name = "bpmn-runtime"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
description = "Journey-persisted hydrate/dehydrate runtime for the unified DSL v0.1 (Tranche 6)"

[dependencies]
dsl-atoms = { path = "../dsl-atoms" }
dsl-diagnostics = { path = "../dsl-diagnostics" }
dsl-bpmn-frontend = { path = "../dsl-bpmn-frontend" }
dsl-lowering = { path = "../dsl-lowering" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.4", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
async-trait = "0.1"

[lints.rust]
unreachable_pub = "deny"
