[package]
name = "ob-poc-booking-principal"
version = "0.1.0"
edition = "2021"
description = "Booking principal taxonomy reference data. Legal entity, booking location, booking principal, ruleset, rule, service availability, gap report, delivery plan, eligibility evaluation results, contract pack — the shapes for the booking-principal capability."

# Capability discipline (see docs/todo/ob-poc-domain-split-v1.md):
#   IN-SCOPE  : Booking principal DTOs and the rule evaluator's data types.
#   OUT-OF-SCOPE: The rule evaluator engine, the booking principal
#                 repository, governance, materialization.

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }

[lints.rust]
unreachable_pub = "deny"
