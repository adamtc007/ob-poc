[package]
name = "ob-poc-diagnostics"
version = "0.1.0"
edition = "2021"
description = "Error types, events, and telemetry helpers for OB-POC. Depends on no other ob-poc workspace crate downstream (audit §5 Rule 4)."

[dependencies]
# error.rs
nom = "7.1"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

# events module
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
crossbeam-channel = "0.5"
tokio = { version = "1", features = ["fs", "io-util", "time", "sync", "macros"] }
tracing = "0.1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"], optional = true }

[features]
default = []
# Gates DSLError Database/DocumentProcessing/DslManager variants AND the
# DB-backed event sinks (events::store::PgEventStore + events::session_log::*).
# Aligned with ob-poc's own `database` feature.
database = ["dep:sqlx"]

[dev-dependencies]
tempfile = "3"

[lints.rust]
unreachable_pub = "deny"
