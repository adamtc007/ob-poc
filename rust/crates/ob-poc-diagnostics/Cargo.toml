[package]
name = "ob-poc-diagnostics"
version = "0.1.0"
edition = "2021"
description = "Error types, events, and telemetry helpers for OB-POC. Depends on no other ob-poc workspace crate downstream (audit §5 Rule 4)."

[dependencies]
nom = "7.1"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

[features]
default = []
# Gates Database/DocumentProcessing/DslManager error variants. No
# associated optional deps — these variants carry plain Strings, so the
# feature is a pure variant-existence gate aligned with ob-poc's own
# `database` feature.
database = []

[lints.rust]
unreachable_pub = "deny"
