[package]
name = "ob-poc-web"
version = "0.1.0"
edition = "2021"
description = "Hybrid web server for OB-POC: HTML/TS panels + WASM graph"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors", "trace", "set-header"] }
http = "1.0"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async utilities
futures = "0.3"

# UUID for CBU IDs
uuid = { version = "1", features = ["serde", "v4"] }

# Re-use existing ob-poc types
ob-poc = { path = "../..", features = ["server"] }

# Shared API types (single source of truth for all boundaries)
ob-poc-types = { path = "../ob-poc-types" }

# Phase 3 slice A (2026-07-01): direct deps for the 3 real hub-re-export
# consumers migrated off `ob_poc::{entity_linking,lexicon,acp_session_input_draft_mode}`.
ob-poc-entity-linking = { path = "../ob-poc-entity-linking" }
ob-poc-authoring = { path = "../ob-poc-authoring" }
ob-poc-boundary = { path = "../ob-poc-boundary" }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"] }

# EntityGateway for embedded gRPC service
entity-gateway = { path = "../entity-gateway" }
tonic = "0.12"

# Semantic voice command matching
ob-semantic-matcher = { path = "../ob-semantic-matcher" }

# Semantic OS client + core + postgres stores
sem_os_core.workspace = true
sem_os_types.workspace = true
sem_os_ontology.workspace = true
sem_os_policy.workspace = true
sem_os_client = { path = "../sem_os_client" }
sem_os_postgres = { path = "../sem_os_postgres" }

# DSL runtime — data-plane interpreter (owns PgCrudExecutor, VerbExecutionPort).
# Phase 3 relocation of PgCrudExecutor from sem_os_postgres to dsl-runtime
# means the startup wiring now imports it from this crate.
dsl-runtime = { path = "../dsl-runtime" }

# T9.1e — verb->table write-footprint loader (G7 shadow evaluation).
sem_os_obpoc_adapter = { path = "../sem_os_obpoc_adapter" }

# T2B.9 — federated DSL bus (extracted to github.com/adamtc007/bpmn-lite v0.2.0).
dsl-bus-client.workspace = true
dsl-bus-server.workspace = true
dsl-bus-storage.workspace = true
dsl-bus-protocol.workspace = true
ob-poc-bus-handler = { path = "../ob-poc-bus-handler" }
async-trait = "0.1"
anyhow = "1"
# dsl-runtime-split v1 Phase 11 (2026-05-14): main.rs reaches
# `dsl_analysis::catalogue_loader` directly for the boot-time YAML→DB
# seed pipeline.
dsl-analysis = { path = "../dsl-analysis" }

# BPMN runtime (unified DSL v0.1) — process registry + human-task integration.
bpmn-runtime = { path = "../bpmn-runtime", features = ["postgres"] }
dsl-migrate-verify = { path = "../dsl-migrate-verify" }

[features]
default = []

[lints.rust]
unreachable_pub = "deny"
