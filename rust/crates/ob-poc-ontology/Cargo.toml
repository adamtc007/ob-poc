[package]
name = "ob-poc-ontology"
version = "0.1.0"
edition = "2021"
description = "Ontology lifecycle and semantic-stage reference data. Lifecycle stage / semantic stage definitions, entity taxonomy YAML loader, service-level lookups. No DB coupling — pure config + types."

[dependencies]
dsl-core.workspace = true
ob-poc-types = { path = "../ob-poc-types" }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid = { version = "1", features = ["v4", "serde"] }
anyhow = "1"
thiserror = "1"

[lints.rust]
unreachable_pub = "deny"
