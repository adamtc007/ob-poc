[package]
name = "ob-poc-trading-profile"
version = "0.1.0"
edition = "2021"
description = "Trading profile AST and resolver shapes. TradingProfile AST, builder, DB ops, resolver, validator, document ops — the data plane for the trading-profile capability (the largest single business capability)."

[dependencies]
ob-poc-types = { path = "../ob-poc-types" }
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"], optional = true }

[features]
default = []
database = ["dep:sqlx"]

[lints.rust]
unreachable_pub = "deny"
