[package]
name = "dsl-sage"
version = "0.1.0"
edition = "2021"
rust-version = "1.95"
description = "Sage pack matcher — utterance → ranked decision-pack candidates"

[dependencies]
dsl-atoms          = { path = "../dsl-atoms" }
dsl-diagnostics    = { path = "../dsl-diagnostics" }
dsl-resolution     = { path = "../dsl-resolution" }
dsl-parser         = { path = "../dsl-parser" }
dsl-ast            = { path = "../dsl-ast" }
dsl-bpmn-frontend  = { path = "../dsl-bpmn-frontend" }
serde          = { version = "1.0", features = ["derive"] }
serde_json     = "1.0"
anyhow         = "1.0"
tracing        = "0.1"
async-trait    = "0.1"
tokio          = { version = "1", features = ["rt", "macros"] }
uuid           = { version = "1.4", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

[lints.rust]
unreachable_pub = "deny"
