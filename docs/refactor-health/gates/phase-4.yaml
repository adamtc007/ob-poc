scope_statement: |
  Per three-plane architecture v0.3 §13 Phase 4. Physically move plugin-op
  files from `rust/src/domain_ops/` to `rust/crates/dsl-runtime/src/domain_ops/`,
  where the `CustomOperation` trait + registry already live. Registration
  flows through the inventory mechanism unchanged; the `#[register_custom_op]`
  macro uses absolute `::dsl_runtime::` paths and those now resolve inside
  the `dsl-runtime` crate itself via `extern crate self as dsl_runtime;`.

  Slice A covers 14 files whose ownership-matrix row has `dest = dsl-runtime`
  AND `blockers = —` AND no `crate::` imports that reach ob-poc-only modules
  beyond the inventory-friendly `domain_ops` internals. Files with blocker
  traits (DocumentRequirementsService, AttributeIdentityService, etc.) wait
  until Phase 5 when the adapter traits get defined.

  Each moved file is rewritten during the move:
  - Dead legacy inherent `execute(&VerbCall, &mut ExecutionContext, &PgPool)`
    methods deleted (trait method removed in Phase 2.5 Slice D-quick — the
    inherent impls remained as unreachable dead code).
  - Local file-scoped VerbCall-based helpers (`get_required_string`,
    `get_optional_date`, etc.) deleted.
  - Imports that became unused after the deletions — `crate::dsl_v2::ast::VerbCall`,
    `crate::dsl_v2::executor::{ExecutionContext, ExecutionResult}`,
    `super::helpers::{extract_*}` — stripped.
  - `#[cfg(feature = "database")]` gates dropped (dsl-runtime has sqlx
    unconditionally; the `CustomOperation` trait requires `execute_json`
    unconditionally).
  - `use super::CustomOperation;` → `use crate::custom_op::CustomOperation;`
  - `use super::helpers::{json_*};` → `use crate::domain_ops::helpers::{json_*};`
  - `dsl_runtime::VerbExecutionContext` / `::VerbExecutionOutcome` in method
    signatures → bare `VerbExecutionContext` / `VerbExecutionOutcome` (imported
    via `use crate::execution::{VerbExecutionContext, VerbExecutionOutcome};`).

  A new `dsl-runtime::domain_ops::helpers` module mirrors only the `json_*`
  arg-extraction family. The `extract_*` (VerbCall-based) and `ext_*`
  (ob-poc-session-coupled) helper families stay in `ob-poc::domain_ops::helpers`
  where the unmoved files that still use them live.

  Deferred from Slice A to later slices:
  - `research_workflow_ops.rs` — uses `super::sem_os_helpers::extract_args_as_json`
    which stays in ob-poc.
  - `batch_control_ops.rs` cross-crate type reference — `ExecutionResult::BatchControl`
    holds a `BatchControlResult` from the moved module; `rust/src/dsl_v2/executor.rs`
    was updated to reference `dsl_runtime::domain_ops::batch_control_ops::BatchControlResult`
    (one-line import rewrite, not a blocker).

