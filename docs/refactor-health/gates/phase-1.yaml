scope_statement: |
  Per implementation plan §3 Phase 1. Create dsl-runtime crate. Move
  VerbExecutionPort trait (and its MockVerbExecutor test support) from
  sem_os_core::execution to dsl-runtime. Phase 1 does NOT move supporting
  types (VerbExecutionContext, VerbExecutionResult, VerbSideEffects,
  VerbExecutionOutcome) — those stay in sem_os_core until Phase 2.
  Because Phase 2 hasn't moved those types yet, dsl-runtime imports them
  from sem_os_core. This creates a TRANSITIONAL dsl-runtime → sem_os_core
  Cargo dep that Phase 2 reverses.

  No deprecated re-export in sem_os_core::execution because that would
  create a circular dep (sem_os_core → dsl-runtime → sem_os_core). The
  re-export lands in Phase 2 after the dep direction inverts. Call sites
  updated directly.

